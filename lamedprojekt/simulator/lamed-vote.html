<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>למ״ד — הצבעה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--ink:#1a1208;--paper:#f5f0e8;--paper2:#e8e0cc;--accent:#1a3a6b;--accent2:#c9a84c;--green:#1a5c1a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--ink);color:var(--paper);font-family:'Heebo',sans-serif;display:flex;flex-direction:column;min-height:100vh;}

/* NO-SESSION SCREEN */
#no-session{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;}
#no-session h2{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;color:var(--accent2);margin-bottom:12px;}
#no-session p{font-size:14px;color:#aaa;}

/* WAITING SCREEN */
#waiting{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;}
.spin{width:48px;height:48px;border:4px solid #333;border-top-color:var(--accent2);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
#waiting h2{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;color:var(--accent2);margin-bottom:8px;}
#waiting p{font-size:14px;color:#888;}
.presenter-tag{display:inline-block;background:var(--accent);color:white;padding:4px 16px;font-size:13px;font-weight:700;margin-top:12px;}

/* QUESTION SCREEN */
#question{display:none;flex:1;flex-direction:column;padding:20px 20px 32px;}
.q-header{margin-bottom:20px;}
.q-num{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:8px;}
.q-progress-dots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.qd{width:10px;height:10px;border-radius:50%;background:#333;}
.qd.done{background:var(--green);}
.qd.active{background:var(--accent2);}
.q-text-display{font-family:'Frank Ruhl Libre',serif;font-size:clamp(18px,4vw,26px);font-weight:900;line-height:1.3;color:white;margin-bottom:28px;}

/* SCALE VOTING */
.scale-section{flex:1;display:flex;flex-direction:column;justify-content:center;}
.scale-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:10px;}
.scale-nums-row{display:grid;grid-template-columns:repeat(11,1fr);gap:6px;margin-bottom:20px;}
.scale-option{background:#222;border:2px solid #333;padding:14px 0;text-align:center;font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:900;cursor:pointer;border-radius:6px;color:#888;transition:all .15s;user-select:none;}
.scale-option:active{transform:scale(.94);}
.scale-option.selected{background:var(--accent2);border-color:var(--accent2);color:var(--ink);}
.send-btn{width:100%;padding:16px;background:var(--accent);color:white;border:none;font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:900;cursor:pointer;margin-top:20px;border-radius:4px;transition:background .15s;}
.send-btn:active{background:#0f2a50;}
.send-btn:disabled{background:#333;color:#666;cursor:not-allowed;}

/* OPEN QUESTION */
.open-section{flex:1;display:flex;flex-direction:column;}
.open-ta{flex:1;background:#1a1a1a;border:2px solid #333;color:var(--paper);font-family:'Heebo',sans-serif;font-size:15px;padding:14px;resize:none;border-radius:4px;min-height:120px;outline:none;}
.open-ta:focus{border-color:var(--accent2);}

/* VOTED SCREEN */
#voted{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;}
.voted-icon{font-size:72px;margin-bottom:16px;}
#voted h2{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;color:var(--accent2);margin-bottom:8px;}
#voted p{font-size:14px;color:#888;}

/* DONE SCREEN */
#done{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;}
#done h2{font-family:'Frank Ruhl Libre',serif;font-size:32px;font-weight:900;color:var(--accent2);margin-bottom:12px;}
#done p{font-size:14px;color:#888;}

/* BOTTOM BAR */
.bottom-bar{background:#111;border-top:2px solid #222;padding:10px 20px;text-align:center;font-size:11px;color:#444;letter-spacing:1px;}
</style>
</head>
<body>

<div id="no-session" style="display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;">
  <div style="font-size:48px;margin-bottom:16px;">🔗</div>
  <h2 style="font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;color:var(--accent2);margin-bottom:10px;">קישור לא תקין</h2>
  <p style="font-size:14px;color:#aaa;">נא לקבל קישור מהמורה ולנסות שוב</p>
</div>

<div id="waiting" style="display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;">
  <div class="spin"></div>
  <h2>ממתין להצגה</h2>
  <p>המורה יתחיל בקרוב</p>
  <div class="presenter-tag" id="w-presenter"></div>
</div>

<div id="question" style="display:none;flex:1;flex-direction:column;padding:20px 20px 32px;">
  <div class="q-header">
    <div class="q-num" id="q-num-label"></div>
    <div class="q-progress-dots" id="q-dots"></div>
    <div class="q-text-display" id="q-text"></div>
  </div>
  <div id="q-body"></div>
</div>

<div id="voted" style="display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;">
  <div class="voted-icon">✅</div>
  <h2>תגובתך נשלחה!</h2>
  <p>ממתין לשאלה הבאה...</p>
  <div class="spin" style="margin-top:24px;"></div>
</div>

<div id="done" style="display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;">
  <div style="font-size:72px;margin-bottom:16px;">🎓</div>
  <h2>תודה!</h2>
  <p>ההצגה הסתיימה. תגובותיך נשמרו.</p>
</div>

<div class="bottom-bar">למ״ד • למידה מבוססת דילמות</div>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

const QUESTIONS=[
  {type:'scale',text:'עד כמה הדילמה האישית הוצגה בצורה ברורה?'},
  {type:'scale',text:'עד כמה הדילמה המקצועית הייתה מובנת?'},
  {type:'scale',text:'עד כמה החקר של העבודה נראה ברור, רציני ומעמיק?'},
  {type:'scale',text:'עד כמה התובנות מהחקר היו מעניינות ומשמעותיות?'},
  {type:'scale',text:'עד כמה נעשה שימוש במושגים מתחום התקשורת?'},
  {type:'scale',text:'עד כמה העבודה מתייחסת לנושאים חברתיים?'},
  {type:'scale',text:'עד כמה ההצגה של העבודה הייתה ברורה ומסודרת?'},
  {type:'scale',text:'עד כמה נושא העבודה חשוב בעינייך?'},
  {type:'open',text:'מה היה החלק הכי ברור בעבודה?'},
  {type:'open',text:'מה היה החלק שהיה צריך להסביר קצת יותר?'},
];

const params=new URLSearchParams(location.search);
const sessionId=params.get('s');
// unique voter ID (anonymous, per device per session)
const voterId='v_'+Math.random().toString(36).slice(2,10);

let currentShownQ=-1;
let hasVotedOnCurrent=false;

function show(id){
  ['no-session','waiting','question','voted','done'].forEach(s=>{
    document.getElementById(s).style.display=s===id?'flex':'none';
  });
}

if(!sessionId){show('no-session');}
else{
  // Register voter presence
  db.ref('lamed/sessions/'+sessionId+'/voters/'+voterId).set(true);

  // Listen to session status
  db.ref('lamed/sessions/'+sessionId).on('value',snap=>{
    if(!snap.exists()){show('no-session');return;}
    const s=snap.val();
    if(s.status==='waiting'){
      show('waiting');
      const wp=document.getElementById('w-presenter');
      if(wp) wp.textContent=s.presenter||'';
    } else if(s.status==='question'){
      const qi=s.currentQ;
      if(qi!==currentShownQ){
        currentShownQ=qi;
        hasVotedOnCurrent=false;
        renderQuestion(qi,s.questionType);
      }
    } else if(s.status==='done'){
      show('done');
    }
  });
}

function renderQuestion(idx,type){
  const q=QUESTIONS[idx];
  if(!q){show('waiting');return;}

  const dots=QUESTIONS.map((_,i)=>`<div class="qd${i<idx?' done':i===idx?' active':''}"></div>`).join('');
  document.getElementById('q-num-label').textContent=`שאלה ${idx+1} מתוך ${QUESTIONS.length}`;
  document.getElementById('q-dots').innerHTML=dots;
  document.getElementById('q-text').textContent=q.text;

  if(type==='scale'||q.type==='scale'){
    let selected=null;
    const nums=Array.from({length:11},(_,i)=>
      `<div class="scale-option" id="so-${i}" onclick="selectNum(${i})">${i}</div>`
    ).join('');
    document.getElementById('q-body').innerHTML=`
      <div class="scale-section">
        <div class="scale-label"><span>כלל לא</span><span>מאוד</span></div>
        <div class="scale-nums-row">${nums}</div>
        <button class="send-btn" id="send-btn" disabled onclick="sendScale()">שלח ←</button>
      </div>`;
    window._selectedNum=null;
  } else {
    document.getElementById('q-body').innerHTML=`
      <div class="open-section">
        <textarea class="open-ta" id="open-ta" placeholder="כתוב/י את תשובתך כאן..." maxlength="300"></textarea>
        <button class="send-btn" style="margin-top:16px;" onclick="sendOpen()">שלח ←</button>
      </div>`;
  }
  show('question');
}

function selectNum(n){
  window._selectedNum=n;
  document.querySelectorAll('.scale-option').forEach((el,i)=>{
    el.classList.toggle('selected',i===n);
  });
  const btn=document.getElementById('send-btn');
  if(btn) btn.disabled=false;
}

function sendScale(){
  if(window._selectedNum===null)return;
  const btn=document.getElementById('send-btn');
  if(btn)btn.disabled=true;
  db.ref('lamed/sessions/'+sessionId+'/votes/'+currentShownQ+'/'+voterId).set({
    rating:window._selectedNum,sentAt:Date.now()
  }).then(()=>{
    hasVotedOnCurrent=true;
    show('voted');
  });
}

function sendOpen(){
  const ta=document.getElementById('open-ta');
  const ans=ta?ta.value.trim():'';
  if(!ans)return;
  db.ref('lamed/sessions/'+sessionId+'/votes/'+currentShownQ+'/'+voterId).set({
    answer:ans,sentAt:Date.now()
  }).then(()=>{
    hasVotedOnCurrent=true;
    show('voted');
  });
}
</script>
</body>
</html>
