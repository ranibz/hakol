<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>למ״ד — מסך מורה</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{
  --ink:#0d0d14;
  --ink2:#13131f;
  --ink3:#1c1c2e;
  --surface:#1e1e30;
  --surface2:#252540;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --text:#f0efff;
  --muted:rgba(240,239,255,.45);
  --dim:rgba(240,239,255,.25);
  --v:#8b5cf6;
  --v2:#6d28d9;
  --v3:#a78bfa;
  --lime:#a3e635;
  --cyan:#22d3ee;
  --rose:#fb7185;
  --amber:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  font-family:'Heebo',sans-serif;
  background:var(--ink);color:var(--text);
  min-height:100vh;min-height:100dvh;
  background-image:
    radial-gradient(ellipse 110% 60% at 80% -10%,rgba(139,92,246,.18) 0%,transparent 55%),
    radial-gradient(ellipse 70% 50% at 10% 100%,rgba(34,211,238,.1) 0%,transparent 50%),
    radial-gradient(ellipse 50% 40% at 90% 90%,rgba(251,113,133,.08) 0%,transparent 45%);
}

/* ══ SETUP SCREEN ══ */
#setup{
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
  padding-top:max(24px,env(safe-area-inset-top));
  padding-bottom:max(24px,env(safe-area-inset-bottom));
}
.setup-card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:32px;
  padding:48px 40px;
  max-width:460px;width:100%;
  box-shadow:0 0 0 1px rgba(139,92,246,.15),0 32px 64px rgba(0,0,0,.5);
  position:relative;overflow:hidden;
}
.setup-card::before{
  content:'';position:absolute;top:-80px;right:-80px;
  width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,92,246,.2) 0%,transparent 70%);
  pointer-events:none;
}
.setup-logo{
  font-family:'Syne',sans-serif;font-size:58px;font-weight:800;
  background:linear-gradient(135deg,#c4b5fd,#a78bfa,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;line-height:1;margin-bottom:6px;
  filter:drop-shadow(0 0 20px rgba(167,139,250,.4));
}
.setup-sub{
  text-align:center;font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--dim);margin-bottom:40px;
}
.sf{margin-bottom:20px;}
.sf label{
  display:block;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:9px;font-weight:700;
}
.sf input{
  width:100%;padding:15px 18px;
  background:var(--ink3);
  border:1.5px solid var(--border);
  border-radius:16px;color:var(--text);
  font-family:'Heebo',sans-serif;font-size:16px;outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.sf input:focus{
  border-color:var(--v3);background:var(--surface2);
  box-shadow:0 0 0 4px rgba(139,92,246,.2),0 0 20px rgba(139,92,246,.1);
}
.sf input::placeholder{color:var(--dim);}
.start-btn{
  width:100%;padding:17px;margin-top:12px;
  background:linear-gradient(135deg,var(--v),var(--v2));
  color:#fff;border:none;border-radius:18px;
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;
  cursor:pointer;letter-spacing:.3px;
  box-shadow:0 6px 28px rgba(109,40,217,.5),0 0 0 1px rgba(139,92,246,.3);
  transition:all .25s;position:relative;overflow:hidden;
}
.start-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;transition:opacity .2s;
}
.start-btn:hover::after{opacity:1;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(109,40,217,.6);}
.start-btn:active{transform:translateY(0);}
.serr{color:var(--rose);font-size:12px;margin-top:10px;text-align:center;display:none;font-weight:700;}

/* ══ HOST CHROME ══ */
#host{display:none;min-height:100vh;min-height:100dvh;flex-direction:column;}

.topbar{
  background:rgba(13,13,20,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 18px;
  padding-right:max(18px,env(safe-area-inset-right));
  padding-left:max(18px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  position:sticky;top:0;z-index:50;
}
.topbar-logo{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  background:linear-gradient(135deg,#c4b5fd,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.topbar-right{display:flex;align-items:center;gap:8px;}
.voter-pill{
  background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.35);
  padding:6px 14px;border-radius:100px;font-size:12px;font-weight:700;color:#c4b5fd;
  display:flex;align-items:center;gap:6px;
}
.voter-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:#a3e635;animation:livepulse 2s infinite;flex-shrink:0;}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(163,230,53,.4);}50%{opacity:.7;box-shadow:0 0 0 5px rgba(163,230,53,0);}}
.copy-link-btn{
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);
  color:var(--amber);padding:7px 14px;border-radius:10px;
  font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;
  transition:all .2s;
}
.copy-link-btn:hover{background:rgba(251,191,36,.2);}

.presenter-strip{
  background:linear-gradient(90deg,rgba(139,92,246,.12),rgba(34,211,238,.06));
  border-bottom:1px solid var(--border);
  padding:10px 20px;font-size:12px;
  display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;
  color:var(--muted);
}
.presenter-strip .name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--amber);}
.presenter-strip .cls{color:var(--dim);font-size:11px;}

/* ══ STAGE ══ */
#stage{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow-y:auto;}

/* ══ WAITING ══ */
.wait-screen{text-align:center;max-width:500px;width:100%;}
.wait-screen h2{
  font-family:'Syne',sans-serif;font-size:clamp(36px,8vw,56px);font-weight:800;margin-bottom:16px;
  background:linear-gradient(135deg,#c4b5fd,#22d3ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
}
.wait-screen p{font-size:15px;color:var(--muted);margin-bottom:36px;line-height:1.6;}
.copy-block{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:24px;padding:24px;margin-bottom:28px;
  display:flex;flex-direction:column;gap:12px;align-items:center;
  box-shadow:0 4px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);
}
.copy-block .copy-lbl{
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);font-weight:700;
}
.big-copy-btn{
  background:linear-gradient(135deg,var(--v),var(--v2));
  color:#fff;border:none;padding:15px 32px;border-radius:14px;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 20px rgba(109,40,217,.4);transition:all .2s;width:100%;
}
.big-copy-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(109,40,217,.5);}
.wa-btn{
  background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.2);
  color:#4ade80;padding:12px 24px;border-radius:12px;
  font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
  transition:all .2s;width:100%;
}
.wa-btn:hover{background:rgba(37,211,102,.15);}
.copy-ok{color:var(--lime);font-size:13px;font-weight:700;display:none;animation:fadeUp .3s ease;}
.begin-btn{
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);padding:15px 48px;border-radius:18px;
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;cursor:pointer;
  transition:all .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}
.begin-btn:hover{
  border-color:rgba(139,92,246,.5);color:#c4b5fd;
  box-shadow:0 0 20px rgba(139,92,246,.2),inset 0 1px 0 rgba(255,255,255,.1);
}

/* ══ QUESTION ══ */
.q-screen{max-width:820px;width:100%;text-align:center;}
.q-progress{display:flex;gap:6px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
.qp-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s;}
.qp-dot.done{background:var(--lime);}
.qp-dot.active{background:var(--v3);box-shadow:0 0 12px rgba(167,139,250,.7);transform:scale(1.3);}
.q-badge{
  display:inline-block;
  background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);
  color:#c4b5fd;padding:5px 18px;border-radius:100px;
  font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:20px;
}
.q-big-text{
  font-family:'Syne',sans-serif;font-size:clamp(22px,3.5vw,42px);
  font-weight:800;line-height:1.2;letter-spacing:-.5px;
  margin-bottom:32px;color:var(--text);
}
.vote-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border2);
  padding:8px 20px;border-radius:100px;font-size:14px;font-weight:600;
  color:var(--muted);margin-bottom:28px;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
}
.vote-pill strong{color:#c4b5fd;font-weight:800;}

/* ══ BARS ══ */
.bars-wrap{display:flex;align-items:flex-end;justify-content:center;gap:6px;height:110px;margin-bottom:14px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{
  width:38px;border-radius:8px 8px 3px 3px;
  transition:height .45s cubic-bezier(.34,1.1,.64,1),background .3s;
  min-height:4px;
  box-shadow:0 -2px 8px rgba(255,255,255,.05);
}
.bar-num{font-size:11px;color:var(--dim);font-weight:600;}

.avg-big{
  font-family:'Syne',sans-serif;font-size:88px;font-weight:800;line-height:1;
  background:linear-gradient(135deg,#c4b5fd,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:none;
  filter:drop-shadow(0 0 30px rgba(196,181,253,.3));
}
.avg-lbl{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:8px;display:none;}

/* ══ OPEN ANSWERS ══ */
.open-list{
  max-height:280px;overflow-y:auto;
  display:flex;flex-direction:column;gap:8px;
  width:100%;text-align:right;margin-bottom:24px;
}
.open-item{
  background:var(--surface);border:1px solid var(--border);
  border-right:3px solid var(--v3);
  padding:12px 18px;border-radius:0 14px 14px 0;
  font-size:14px;color:rgba(240,239,255,.8);line-height:1.55;
  animation:fadeUp .3s ease;
}

/* ══ NAV ══ */
.nav-row{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
.nav-btn{
  padding:14px 32px;border-radius:16px;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;cursor:pointer;
  transition:all .2s;border:none;
}
.nav-btn.primary{
  background:linear-gradient(135deg,var(--v),var(--v2));color:#fff;
  box-shadow:0 4px 20px rgba(109,40,217,.4);
}
.nav-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(109,40,217,.55);}
.nav-btn.sec{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text);
}
.nav-btn.sec:hover{border-color:rgba(139,92,246,.4);color:#c4b5fd;}

/* ══ SUMMARY ══ */
.sum-screen{max-width:900px;width:100%;}
.sum-screen h2{
  font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:800;text-align:center;margin-bottom:10px;
  background:linear-gradient(135deg,#c4b5fd,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sum-presenter{text-align:center;font-size:13px;color:var(--muted);margin-bottom:32px;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
@media(max-width:580px){.sum-grid{grid-template-columns:1fr;}}
.sum-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px;padding:22px;
  box-shadow:0 4px 24px rgba(0,0,0,.25);
}
.sum-q{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;font-weight:600;}
.sum-score{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
.sum-avg{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;}
.sum-cnt{font-size:12px;color:var(--dim);}
.sum-mini{display:flex;align-items:flex-end;gap:3px;height:36px;}
.sum-bar{flex:1;border-radius:4px 4px 0 0;min-height:2px;transition:height .5s;}
.open-sec{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px;padding:22px;margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,.2);
}
.open-sec h4{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#c4b5fd;margin-bottom:14px;}
.open-ans{
  border-right:3px solid rgba(139,92,246,.4);padding:10px 16px;
  font-size:13px;color:rgba(240,239,255,.7);margin-bottom:8px;line-height:1.6;
  background:var(--ink3);border-radius:0 10px 10px 0;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ══ MOBILE ══ */
@media(max-width:640px){
  .setup-card{padding:36px 22px;border-radius:26px;}
  .setup-logo{font-size:46px;}
  .start-btn{font-size:16px;padding:15px;}
  .topbar{padding:10px 14px;}
  .voter-pill{font-size:11px;padding:5px 11px;}
  #stage{padding:16px 12px;align-items:flex-start;}
  .wait-screen{max-width:100%;}
  .copy-block{padding:18px 14px;border-radius:20px;}
  .begin-btn{width:100%;padding:15px 20px;font-size:16px;}
  .q-screen{max-width:100%;}
  .q-big-text{font-size:clamp(17px,5.5vw,24px);margin-bottom:20px;}
  .bars-wrap{height:72px;gap:3px;}
  .bar{width:22px;border-radius:5px 5px 2px 2px;}
  .bar-num{font-size:9px;}
  .avg-big{font-size:60px;}
  .open-list{max-height:200px;}
  .nav-row{gap:8px;margin-top:16px;}
  .nav-btn{padding:13px 16px;font-size:14px;flex:1;}
  .sum-screen h2{font-size:26px;}
  .sum-grid{gap:10px;}
  .sum-card{padding:18px;}
  .sum-avg{font-size:36px;}
  #qeditor{padding:16px 12px;}
  .qe-card{padding:28px 18px;border-radius:24px;}
  .qe-title{font-size:20px;}
  .qe-tabs{gap:6px;margin-bottom:20px;}
  .qe-tab{font-size:12px;padding:11px 6px;}
  .set-grid{gap:8px;}
  .set-card{padding:14px;}
  .qe-go{font-size:14px;padding:14px;}
  .qe-back{font-size:13px;padding:12px 16px;}
  .qe-input{font-size:16px;}
  .add-q-btn{font-size:13px;}
  .preset-preview{max-height:200px;}
}

/* ══ QUESTION EDITOR ══ */
#qeditor{display:none;min-height:100vh;align-items:center;justify-content:flex-start;padding:80px 20px 40px;}
.qe-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:32px;padding:44px 40px;max-width:680px;width:100%;margin:0 auto;
  box-shadow:0 0 0 1px rgba(139,92,246,.1),0 24px 60px rgba(0,0,0,.5);
  position:relative;overflow:hidden;
}
.qe-card::before{
  content:'';position:absolute;bottom:-60px;left:-60px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(34,211,238,.12) 0%,transparent 70%);
  pointer-events:none;
}
.qe-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:6px;color:var(--text);}
.qe-sub{font-size:13px;color:var(--muted);margin-bottom:30px;}
.qe-tabs{display:flex;gap:8px;margin-bottom:28px;}
.qe-tab{
  flex:1;padding:12px;border-radius:14px;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
  border:1.5px solid var(--border);background:transparent;color:var(--dim);
  transition:all .2s;text-align:center;
}
.qe-tab.active{
  background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.4);color:#c4b5fd;
  box-shadow:0 0 16px rgba(139,92,246,.15);
}
.qe-tab:hover:not(.active){background:var(--surface2);color:var(--text);}

/* PRESET */
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
@media(max-width:500px){.set-grid{grid-template-columns:1fr;}}
.set-card{
  background:var(--ink3);border:1.5px solid var(--border);
  border-radius:18px;padding:20px;cursor:pointer;transition:all .2s;text-align:right;
}
.set-card:hover{border-color:rgba(139,92,246,.4);background:var(--surface2);transform:translateY(-2px);}
.set-card.selected{
  border-color:var(--v3);background:rgba(139,92,246,.1);
  box-shadow:0 0 0 3px rgba(139,92,246,.2),0 8px 24px rgba(109,40,217,.2);
}
.set-card-icon{font-size:26px;margin-bottom:10px;}
.set-card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:5px;color:var(--text);}
.set-card-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.set-card-count{display:inline-flex;gap:5px;margin-top:10px;}
.set-chip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;}
.set-chip.scale{background:rgba(163,230,53,.12);color:var(--lime);}
.set-chip.open{background:rgba(251,191,36,.12);color:var(--amber);}

/* PREVIEW */
.preset-preview{
  background:var(--ink3);border:1px solid var(--border);
  border-radius:16px;padding:16px 18px;margin-bottom:22px;max-height:260px;overflow-y:auto;
  display:none;
}
.preset-preview.visible{display:block;}
.preview-title{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);margin-bottom:12px;font-weight:700;}
.preview-item{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.preview-item:last-child{border-bottom:none;}
.preview-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--dim);width:20px;flex-shrink:0;}
.preview-text{flex:1;font-size:12px;color:rgba(240,239,255,.65);line-height:1.45;}
.preview-type{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.preview-type.scale{background:rgba(163,230,53,.12);color:var(--lime);}
.preview-type.open{background:rgba(251,191,36,.12);color:var(--amber);}

/* CUSTOM */
.qe-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:360px;overflow-y:auto;}
.qe-row{
  display:flex;align-items:center;gap:8px;
  background:var(--ink3);border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;animation:fadeUp .2s ease;
}
.qe-row-num{
  width:26px;height:26px;border-radius:8px;
  background:rgba(139,92,246,.2);color:#c4b5fd;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.qe-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Heebo',sans-serif;font-size:14px;color:var(--text);
  padding:2px 0;
}
.qe-input::placeholder{color:var(--dim);}
.qe-type-toggle{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--muted);padding:5px 11px;border-radius:9px;
  font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .15s;
  font-family:'Heebo',sans-serif;
}
.qe-type-toggle.open{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:var(--amber);}
.qe-type-toggle.scale{background:rgba(163,230,53,.1);border-color:rgba(163,230,53,.3);color:var(--lime);}
.qe-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:4px;flex-shrink:0;transition:color .15s;}
.qe-del:hover{color:var(--rose);}
.add-q-btn{
  width:100%;padding:12px;border-radius:14px;
  background:rgba(139,92,246,.06);border:1.5px dashed rgba(139,92,246,.3);

}
.add-q-btn:hover{background:rgba(139,92,246,.12);color:#c4b5fd;border-color:rgba(139,92,246,.5);}
.qe-limit{font-size:11px;color:var(--dim);text-align:center;margin-top:8px;}
.qe-actions{display:flex;gap:10px;margin-top:28px;}
.qe-go{
  flex:1;padding:16px;
  background:linear-gradient(135deg,var(--v),var(--v2));color:#fff;border:none;
  border-radius:16px;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 20px rgba(109,40,217,.4);transition:all .2s;
}
.qe-go:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(109,40,217,.55);}
.qe-back{

/* ══ CREDIT ══ */
.credit-footer{
  text-align:center;padding:18px;font-size:11px;
  color:rgba(240,239,255,.18);letter-spacing:1.5px;
  border-top:1px solid rgba(255,255,255,.05);
}

/* ══ PAGE HEADER ══ */
.page-header-fixed{
  position:fixed;top:0;left:0;right:0;z-index:200;
  text-align:center;padding:10px 16px 8px;
  background:rgba(13,13,20,.8);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.07);
}
.page-title-main{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  background:linear-gradient(135deg,#c4b5fd,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.2;
}
.page-sub-main{
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(240,239,255,.35);font-weight:600;margin-top:2px;
}
</style>
</head>
<body>

<div class="page-header-fixed">
  <div class="page-title-main">הערכת עמיתים</div>
  <div class="page-sub-main">תקשורת וחברה</div>
</div>

<!-- QUESTION EDITOR — מסך ראשון -->
<div id="qeditor" style="display:flex;flex-direction:column;">
  <div style="max-width:660px;margin:40px auto;padding:0 24px;width:100%;">
    <div class="qe-card">
      <div class="setup-logo" style="margin-bottom:4px;">למ״ד</div>
      <div class="setup-sub" style="margin-bottom:24px;">הערכת עמיתים • עבודת גמר</div>
      <div class="qe-title">בחר את השאלות</div>
      <div class="qe-sub">שלב 1 מתוך 2 — תוכל לקבוע שם מציג/ה בשלב הבא</div>
      <div class="qe-tabs">
        <button class="qe-tab active" id="tab-preset" onclick="switchTab('preset')">✦ שאלות מוכנות</button>
        <button class="qe-tab" id="tab-custom" onclick="switchTab('custom')">✎ שאלות אישיות</button>
      </div>

      <!-- PRESET -->
      <div id="panel-preset">
        <div class="set-grid" id="set-grid"></div>
        <div class="preset-preview" id="preset-preview">
          <div class="preview-title">תצוגה מקדימה</div>
          <div id="preview-items"></div>
        </div>
        <div class="qe-actions">
          <button class="qe-go" id="use-preset-btn" onclick="presetToSetup()" disabled style="opacity:.4;cursor:not-allowed;">המשך — הזן שם מציג/ה ←</button>
        </div>
      </div>

      <!-- CUSTOM -->
      <div id="panel-custom" style="display:none;">
        <div class="qe-rows" id="custom-rows"></div>
        <button class="add-q-btn" onclick="addRow()" id="add-q-btn">+ הוסף שאלה</button>
        <div class="qe-limit" id="q-limit">0 / 10 שאלות</div>
        <div class="qe-actions">
          <button class="qe-go" onclick="customToSetup()">המשך — הזן שם מציג/ה ←</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SETUP — מסך שני -->
<div id="setup" style="display:none;">
  <div class="setup-card">
    <div class="setup-logo">למ״ד</div>
    <div class="setup-sub">שלב 2 מתוך 2</div>
    <div class="sf">
      <label>שם המציג/ה</label>
      <input id="presenter-name" placeholder="שם התלמיד/ה המציג/ה" onkeydown="if(event.key==='Enter')startSession()">
    </div>
    <div class="sf">
      <label>שם הכיתה</label>
      <input id="class-name" placeholder="לדוגמה: יב3" onkeydown="if(event.key==='Enter')startSession()">
    </div>
    <div id="setup-qs-summary" style="background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.2);border-radius:12px;padding:11px 16px;font-size:12px;color:rgba(26,26,46,.55);margin-bottom:18px;display:none;"></div>
    <div class="serr" id="setup-err">נא למלא את כל השדות</div>
    <button class="start-btn" onclick="startSession()">פתח סשן הצגה ←</button>
    <button class="qe-back" style="width:100%;margin-top:10px;text-align:center;" onclick="backToEditor()">← חזרה לשאלות</button>
  </div>
</div>

<!-- HOST -->
<div id="host" style="display:none;flex-direction:column;">
  <div class="topbar">
    <div class="topbar-logo">למ״ד</div>
    <div class="topbar-right">
      <div class="voter-pill">👥 <span id="voter-count-num">0</span> מדרגים</div>
      <button class="copy-link-btn" id="topbar-copy-btn" onclick="copyTopLink(this)">📋 העתק קישור</button>
    </div>
  </div>
  <div class="presenter-strip">
    <span>מציג/ה:</span>
    <span class="name" id="presenter-display"></span>
    <span class="cls" id="class-display"></span>
  </div>
  <div id="stage"></div>
</div>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

const PRESETS=[
  {
    id:'gemr',icon:'🎓',
    title:'הערכת עמיתים — פרויקט למד',
    desc:'דילמה, חקר, תובנות, מושגי תקשורת',
    questions:[
      {type:'scale',text:'עד כמה הדילמה האישית הוצגה בצורה ברורה?'},
      {type:'scale',text:'עד כמה הדילמה המקצועית הייתה מובנת?'},
      {type:'scale',text:'עד כמה החקר של העבודה נראה ברור, רציני ומעמיק?'},
      {type:'scale',text:'עד כמה התובנות מהחקר היו מעניינות ומשמעותיות?'},
      {type:'scale',text:'עד כמה נעשה שימוש במושגים מתחום התקשורת?'},
      {type:'scale',text:'עד כמה העבודה מתייחסת לנושאים חברתיים?'},
      {type:'scale',text:'עד כמה ההצגה של העבודה הייתה ברורה ומסודרת?'},
      {type:'scale',text:'עד כמה נושא העבודה חשוב בעינייך?'},
      {type:'open',text:'מה היה החלק הכי ברור בעבודה?'},
      {type:'open',text:'מה היה החלק שהיה צריך להסביר קצת יותר?'},
    ]
  },
];

let selectedPresetId=null;
let QS=[];
let sessionId='',currentQ=-1,votesListener=null,presenterName='',className='',voteUrl='';

// ─── SETUP / NAV ───
function backToEditor(){
  document.getElementById('setup').style.display='none';
  document.getElementById('qeditor').style.display='flex';
}
function showSetup(){
  // הצג סיכום שאלות נבחרות
  const n=QS.length;
  const ns=QS.filter(q=>q.type==='scale').length;
  const no=QS.filter(q=>q.type==='open').length;
  const sum=document.getElementById('setup-qs-summary');
  if(sum){
    sum.style.display='block';
    sum.innerHTML=`✦ נבחרו ${n} שאלות — ${ns} דירוג, ${no} פתוחות`;
  }
  document.getElementById('qeditor').style.display='none';
  document.getElementById('setup').style.display='flex';
  setTimeout(()=>document.getElementById('presenter-name')?.focus(),100);
}
function presetToSetup(){
  const p=PRESETS.find(x=>x.id===selectedPresetId);
  if(!p)return;
  QS=[...p.questions];
  showSetup();
}
function customToSetup(){
  document.querySelectorAll('.qe-input').forEach((el,i)=>{if(customRows[i])customRows[i].text=el.value.trim();});
  const valid=customRows.filter(r=>r.text.trim());
  if(!valid.length){alert('נא להוסיף לפחות שאלה אחת');return;}
  QS=valid.map(r=>({type:r.type,text:r.text.trim()}));
  showSetup();
}

// ─── TABS ───
function switchTab(tab){
  document.getElementById('tab-preset').classList.toggle('active',tab==='preset');
  document.getElementById('tab-custom').classList.toggle('active',tab==='custom');
  document.getElementById('panel-preset').style.display=tab==='preset'?'block':'none';
  document.getElementById('panel-custom').style.display=tab==='custom'?'block':'none';
}

// ─── PRESET SETS ───
function renderSetGrid(){
  document.getElementById('set-grid').innerHTML=PRESETS.map(p=>{
    const ns=p.questions.filter(q=>q.type==='scale').length;
    const no=p.questions.filter(q=>q.type==='open').length;
    return `<div class="set-card" id="sc-${p.id}" onclick="selectPreset('${p.id}')">
      <div class="set-card-icon">${p.icon}</div>
      <div class="set-card-title">${p.title}</div>
      <div class="set-card-desc">${p.desc}</div>
      <div class="set-card-count">
        <span class="set-chip scale">${ns} דירוג</span>
        <span class="set-chip open">${no} פתוחות</span>
      </div>
    </div>`;
  }).join('');
}
function selectPreset(id){
  selectedPresetId=id;
  document.querySelectorAll('.set-card').forEach(el=>el.classList.remove('selected'));
  document.getElementById('sc-'+id)?.classList.add('selected');
  const p=PRESETS.find(x=>x.id===id);
  if(!p)return;
  const prev=document.getElementById('preset-preview');
  const items=document.getElementById('preview-items');
  prev.classList.add('visible');
  items.innerHTML=p.questions.map((q,i)=>`
    <div class="preview-item">
      <div class="preview-num">${i+1}</div>
      <div class="preview-text">${esc(q.text)}</div>
      <div class="preview-type ${q.type}">${q.type==='scale'?'דירוג':'פתוחה'}</div>
    </div>`).join('');
  const btn=document.getElementById('use-preset-btn');
  btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';
  btn.textContent='השתמש בסט זה ←';
}

// ─── CUSTOM ───
let customRows=[];
function renderCustomRows(){
  if(customRows.length===0) customRows=[{text:'',type:'scale'}];
  updateCustomUI();
}
function updateCustomUI(){
  const container=document.getElementById('custom-rows');
  if(!container)return;
  container.innerHTML=customRows.map((r,i)=>`
    <div class="qe-row" id="qr-${i}">
      <div class="qe-row-num">${i+1}</div>
      <input class="qe-input" placeholder="טקסט השאלה..." value="${esc(r.text)}"
        oninput="customRows[${i}].text=this.value">
      <button class="qe-type-toggle ${r.type}" onclick="toggleType(${i})">
        ${r.type==='scale'?'דירוג':'פתוחה'}
      </button>
      <button class="qe-del" onclick="delRow(${i})" title="מחק">✕</button>
    </div>`).join('');
  const lim=document.getElementById('q-limit');
  if(lim)lim.textContent=customRows.length+' / 10 שאלות';
  const add=document.getElementById('add-q-btn');
  if(add)add.style.display=customRows.length>=10?'none':'block';
}
function addRow(){
  if(customRows.length>=10)return;
  customRows.push({text:'',type:'scale'});
  updateCustomUI();
  setTimeout(()=>{
    const inputs=document.querySelectorAll('.qe-input');
    if(inputs.length)inputs[inputs.length-1].focus();
  },50);
}
function delRow(i){
  if(customRows.length<=1)return;
  customRows.splice(i,1);
  updateCustomUI();
}
function toggleType(i){
  customRows[i].type=customRows[i].type==='scale'?'open':'scale';
  updateCustomUI();
}

// ─── SESSION ───
function startSession(){
  presenterName=document.getElementById('presenter-name').value.trim();
  className=document.getElementById('class-name').value.trim();
  if(!presenterName||!className){document.getElementById('setup-err').style.display='block';return;}
  sessionId='lamed_'+Date.now();
  voteUrl=location.origin+location.pathname.replace('lamed-host.html','lamed-vote.html')+'?s='+sessionId;
  db.ref('lamed/sessions/'+sessionId).set({
    presenter:presenterName,className,startedAt:Date.now(),
    status:'waiting',currentQ:-1,
    questions:QS.map(q=>({text:q.text,type:q.type}))
  }).then(()=>{
    document.getElementById('qeditor').style.display='none';
    document.getElementById('host').style.display='flex';
    document.getElementById('presenter-display').textContent=presenterName;
    document.getElementById('class-display').textContent='כיתה: '+className;
    db.ref('lamed/sessions/'+sessionId+'/voters').on('value',snap=>{
      document.getElementById('voter-count-num').textContent=snap.exists()?Object.keys(snap.val()).length:0;
    });
    showWaiting();
  });
}

function showWaiting(){
  currentQ=-1;
  db.ref('lamed/sessions/'+sessionId).update({status:'waiting',currentQ:-1});
  if(votesListener){db.ref('lamed/sessions/'+sessionId+'/votes').off();votesListener=null;}
  document.getElementById('stage').innerHTML=`
    <div class="wait-screen">
      <h2>מוכנים?</h2>
      <p>שלח את הקישור לתלמידים ולחץ התחל</p>
      <div class="copy-block">
        <div class="copy-lbl">קישור לתלמידים</div>
        <button class="big-copy-btn" onclick="copyLink(this)">📋 העתק קישור לתלמידים</button>
        <button class="wa-btn" onclick="openWA()">📲 שלח בוואטסאפ</button>
        <div class="copy-ok" id="copy-ok">✓ הקישור הועתק ללוח!</div>
      </div>
      <button class="begin-btn" onclick="goToQuestion(0)">התחל הצגה ←</button>
    </div>`;
}

function copyLink(btn){
  navigator.clipboard.writeText(voteUrl).then(()=>{
    btn.textContent='✓ הועתק!';
    const ok=document.getElementById('copy-ok');if(ok)ok.style.display='block';
    setTimeout(()=>{btn.textContent='📋 העתק קישור לתלמידים';},2500);
  }).catch(()=>prompt('העתק:',voteUrl));
}
function copyTopLink(btn){
  navigator.clipboard.writeText(voteUrl).then(()=>{btn.textContent='✓ הועתק!';setTimeout(()=>{btn.textContent='📋 העתק קישור';},2000);}).catch(()=>prompt('העתק:',voteUrl));
}
function openWA(){
  window.open('https://wa.me/?text='+encodeURIComponent('הצבעה על ההצגה:\n'+voteUrl),'_blank');
}

function goToQuestion(idx){
  if(idx>=QS.length){showSummary();return;}
  currentQ=idx;
  const q=QS[idx];
  db.ref('lamed/sessions/'+sessionId).update({status:'question',currentQ:idx,questionType:q.type});
  if(votesListener){db.ref('lamed/sessions/'+sessionId+'/votes/'+idx).off();}
  if(q.type==='scale') renderScale(idx);
  else renderOpen(idx);
}

function dots(idx){
  return QS.map((_,i)=>`<div class="qp-dot${i<idx?' done':i===idx?' active':''}"></div>`).join('');
}

function renderScale(idx){
  const q=QS[idx];
  document.getElementById('stage').innerHTML=`
    <div class="q-screen">
      <div class="q-progress">${dots(idx)}</div>
      <div class="q-badge">שאלה ${idx+1} מתוך ${QS.length}</div>
      <div class="q-big-text">${q.text}</div>
      <div class="vote-pill">הצביעו: <strong id="vcnt">0</strong></div>
      <div class="bars-wrap" id="bars-wrap">
        ${Array.from({length:11},(_,i)=>`<div class="bar-col"><div class="bar" id="bar-${i}" style="height:4px;background:rgba(255,255,255,.07);"></div><div class="bar-num">${i}</div></div>`).join('')}
      </div>
      <div class="avg-big" id="avg-big">—</div>
      <div class="avg-lbl" id="avg-lbl">ממוצע</div>
      <div class="nav-row">
        ${idx>0?`<button class="nav-btn sec" onclick="goToQuestion(${idx-1})">→ חזרה</button>`:''}
        <button class="nav-btn primary" onclick="goToQuestion(${idx+1})">${idx<QS.length-1?'הבאה ←':'סיכום ←'}</button>
      </div>
    </div>`;
  votesListener=db.ref('lamed/sessions/'+sessionId+'/votes/'+idx).on('value',snap=>{
    const votes=snap.val()||{};
    const vals=Object.values(votes).filter(v=>v.rating!==undefined).map(v=>v.rating);
    const vcnt=document.getElementById('vcnt');if(vcnt)vcnt.textContent=vals.length;
    const counts=Array(11).fill(0);vals.forEach(v=>counts[v]++);
    const max=Math.max(...counts,1);
    const colors=['#ef4444','#f87171','#fb923c','#f5a623','#facc15','#a3e635','#4ade80','#34d399','#22d3ee','#60a5fa','#7c5cfc'];
    counts.forEach((c,i)=>{
      const bar=document.getElementById('bar-'+i);
      if(bar){bar.style.height=Math.max(4,Math.round((c/max)*90))+'px';bar.style.background=c>0?colors[i]:'rgba(255,255,255,.07)';}
    });
    if(vals.length>0){
      const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      const ab=document.getElementById('avg-big'),al=document.getElementById('avg-lbl');
      if(ab){ab.textContent=avg;ab.style.display='block';}
      if(al)al.style.display='block';
    }
  });
}

function renderOpen(idx){
  const q=QS[idx];
  document.getElementById('stage').innerHTML=`
    <div class="q-screen">
      <div class="q-progress">${dots(idx)}</div>
      <div class="q-badge">שאלה ${idx+1} מתוך ${QS.length}</div>
      <div class="q-big-text">${q.text}</div>
      <div class="vote-pill">ענו: <strong id="vcnt">0</strong></div>
      <div class="open-list" id="open-list"></div>
      <div class="nav-row">
        ${idx>0?`<button class="nav-btn sec" onclick="goToQuestion(${idx-1})">→ חזרה</button>`:''}
        <button class="nav-btn primary" onclick="goToQuestion(${idx+1})">${idx<QS.length-1?'הבאה ←':'סיכום ←'}</button>
      </div>
    </div>`;
  votesListener=db.ref('lamed/sessions/'+sessionId+'/votes/'+idx).on('value',snap=>{
    const votes=snap.val()||{};
    const answers=Object.values(votes).filter(v=>v.answer).map(v=>v.answer);
    const vcnt=document.getElementById('vcnt');if(vcnt)vcnt.textContent=answers.length;
    const list=document.getElementById('open-list');
    if(list)list.innerHTML=answers.map(a=>`<div class="open-item">${esc(a)}</div>`).join('');
  });
}

function showSummary(){
  db.ref('lamed/sessions/'+sessionId).update({status:'done'});
  if(votesListener){db.ref('lamed/sessions/'+sessionId+'/votes').off();votesListener=null;}
  db.ref('lamed/sessions/'+sessionId+'/votes').once('value').then(snap=>{
    const all=snap.val()||{};
    window._summaryData={presenter:presenterName,className,votes:all};
    const colors=['#ef4444','#f87171','#fb923c','#f5a623','#facc15','#a3e635','#4ade80','#34d399','#22d3ee','#60a5fa','#7c5cfc'];
    let html=`<div class="sum-screen"><h2>סיכום הצגה</h2>
      <div class="sum-presenter">מציג/ה: <strong style="color:#c4b5fd">${esc(presenterName)}</strong> &nbsp;|&nbsp; כיתה: ${esc(className)}</div>
      <div class="sum-grid">`;
    QS.forEach((q,i)=>{
      if(q.type!=='scale')return;
      const votes=all[i]||{};
      const vals=Object.values(votes).filter(v=>v.rating!==undefined).map(v=>v.rating);
      if(!vals.length){html+=`<div class="sum-card"><div class="sum-q">${q.text}</div><div class="sum-avg" style="color:rgba(255,255,255,.2);">—</div></div>`;return;}
      const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      const sc=parseFloat(avg);
      const col=sc>=7?'#4ade80':sc>=5?'#f5a623':'#f87171';
      const counts=Array(11).fill(0);vals.forEach(v=>counts[v]++);
      const max=Math.max(...counts,1);
      const bars=counts.map((c,j)=>`<div class="sum-bar" style="height:${Math.max(2,Math.round((c/max)*32))}px;background:${c>0?colors[j]:'rgba(255,255,255,.07)'}"></div>`).join('');
      html+=`<div class="sum-card">
        <div class="sum-q">${q.text}</div>
        <div class="sum-score"><div class="sum-avg" style="color:${col}">${avg}</div><div class="sum-cnt">${vals.length} הצבעות</div></div>
        <div class="sum-mini">${bars}</div>
      </div>`;
    });
    html+=`</div>`;
    QS.forEach((q,i)=>{
      if(q.type!=='open')return;
      const answers=Object.values(all[i]||{}).filter(v=>v.answer).map(v=>v.answer);
      html+=`<div class="open-sec"><h4>${q.text}</h4>
        ${answers.length?answers.map(a=>`<div class="open-ans">${esc(a)}</div>`).join(''):'<div class="open-ans" style="opacity:.35;">אין תשובות</div>'}
      </div>`;
    });
    html+=`<div class="nav-row" style="margin-top:20px;">
      <button class="nav-btn primary" onclick="exportCSV()">⬇ ייצוא CSV</button>
      <button class="nav-btn sec" onclick="location.reload()">סשן חדש ←</button>
    </div></div>`;
    document.getElementById('stage').innerHTML=html;
  });
}

function exportCSV(){
  const d=window._summaryData;if(!d){alert('אין נתונים');return;}
  let rows=['"מציג/ה","כיתה","שאלה","ממוצע / תשובה","הצבעות"'];
  Object.entries(d.votes).forEach(([idx,votes])=>{
    const qi=parseInt(idx);
    const q=QS[qi]||{text:'שאלה '+(qi+1),type:'scale'};
    const label=q.text,vals=Object.values(votes);
    if(q.type==='scale'){
      const r=vals.filter(v=>v.rating!==undefined).map(v=>v.rating);
      if(r.length){const avg=(r.reduce((a,b)=>a+b,0)/r.length).toFixed(2);rows.push(`"${d.presenter}","${d.className}","${label}","${avg}","${r.length}"`);}
    } else {
      vals.filter(v=>v.answer).forEach(v=>rows.push(`"${d.presenter}","${d.className}","${label}","${String(v.answer).replace(/"/g,'""')}","—"`));
    }
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+rows.join('\n'));
  a.download='lamed-'+d.presenter+'-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
