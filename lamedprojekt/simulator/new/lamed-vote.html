<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>למ״ד — הצבעה</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root { --primary: #6366f1; --accent: #f5a623; --bg: #0f172a; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Heebo',sans-serif; background:var(--bg); color:white;
  background-image: radial-gradient(at 50% -20%, rgba(99,102,241,0.15) 0%, transparent 80%);
  min-height:100vh; display:flex; flex-direction:column;
}

.screen { padding: 30px 20px; display:none; flex-direction:column; align-items:center; text-align:center; animation: slideUp 0.4s ease; }
.screen.active { display:flex; }
@keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

.q-card {
  background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px; padding: 25px; margin-bottom: 25px; width: 100%;
}
.q-card-text { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }

.snum {
  aspect-ratio: 1; display:flex; align-items:center; justify-content:center;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px; font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
  transition: 0.2s; color: rgba(255,255,255,0.5);
}
.snum.sel { background: var(--primary); color: white; transform: scale(1.1); box-shadow: 0 0 20px rgba(99,102,241,0.4); border-color: transparent; }

.send-btn {
  width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), #4338ca);
  border: none; border-radius: 18px; color: white; font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
}
.send-btn:disabled { opacity: 0.3; }

.pulse-ring { width:80px; height:80px; border-radius:50%; background: var(--primary); animation: pulse 2s infinite; margin-bottom:30px; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); } 70% { box-shadow: 0 0 0 20px rgba(99,102,241,0); } 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); } }
</style>
</head>
<body>
<div id="waiting" class="screen active">
  <div class="pulse-ring"></div>
  <h2 style="font-family:'Syne';">ממתין להצגה</h2>
  <p style="opacity:0.6;">המורה יפתח את השאלה הראשונה מיד...</p>
</div>
<script>
// ה-JS המקורי של lamed-vote.html נשאר כאן
</script>
</body>
</html>
