<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>למ״ד — מסך מורה</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Heebo',sans-serif;
  background:#08080f;color:#fff;min-height:100vh;
  background-image:
    radial-gradient(ellipse 100% 60% at 50% -10%, rgba(124,92,252,.12) 0%, transparent 70%);
}

/* SETUP */
#setup{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;
}
.setup-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:24px;padding:40px;max-width:460px;width:100%;
  backdrop-filter:blur(10px);
}
.setup-logo{
  font-family:'Syne',sans-serif;font-size:48px;font-weight:800;
  background:linear-gradient(135deg,#7c5cfc,#f5a623);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;text-align:center;
}
.setup-sub{text-align:center;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:36px;}
.sf{margin-bottom:18px;}
.sf label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:7px;font-weight:600;}
.sf input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;color:#fff;
  font-family:'Heebo',sans-serif;font-size:15px;outline:none;
  transition:border-color .2s;
}
.sf input:focus{border-color:#7c5cfc;}
.sf input::placeholder{color:rgba(255,255,255,.2);}
.start-btn{
  width:100%;padding:15px;margin-top:8px;
  background:linear-gradient(135deg,#7c5cfc,#5c3ddb);
  color:#fff;border:none;border-radius:14px;
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;
  cursor:pointer;letter-spacing:.5px;
  box-shadow:0 4px 24px rgba(124,92,252,.35);
  transition:all .2s;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,92,252,.5);}
.serr{color:#f87171;font-size:12px;margin-top:8px;text-align:center;display:none;}

/* HOST */
#host{display:none;min-height:100vh;flex-direction:column;}

.topbar{
  background:rgba(255,255,255,.03);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.topbar-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  background:linear-gradient(135deg,#7c5cfc,#f5a623);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.voter-pill{
  background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.3);
  padding:5px 14px;border-radius:100px;font-size:13px;font-weight:600;color:#a78bfa;
}
.copy-link-btn{
  background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);
  color:#f5a623;padding:7px 16px;border-radius:10px;
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
  transition:all .2s;
}
.copy-link-btn:hover{background:rgba(245,166,35,.2);}

.presenter-strip{
  background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(245,166,35,.08));
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:10px 28px;font-size:13px;
  display:flex;align-items:center;justify-content:center;gap:16px;
}
.presenter-strip .name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#f5a623;}
.presenter-strip .cls{color:rgba(255,255,255,.4);font-size:12px;}

/* STAGE */
#stage{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px;}

/* WAITING */
.wait-screen{text-align:center;max-width:500px;}
.wait-screen h2{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;margin-bottom:12px;
  background:linear-gradient(135deg,#7c5cfc,#f5a623);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.wait-screen p{font-size:15px;color:rgba(255,255,255,.4);margin-bottom:32px;}
.copy-block{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:16px;padding:20px 24px;margin-bottom:28px;
  display:flex;flex-direction:column;gap:12px;align-items:center;
}
.copy-block .copy-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);}
.big-copy-btn{
  background:linear-gradient(135deg,#7c5cfc,#5c3ddb);
  color:#fff;border:none;padding:14px 32px;border-radius:14px;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 20px rgba(124,92,252,.35);transition:all .2s;width:100%;
}
.big-copy-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(124,92,252,.5);}
.wa-btn{
  background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);
  color:#25d366;padding:11px 24px;border-radius:12px;
  font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
  transition:all .2s;width:100%;
}
.wa-btn:hover{background:rgba(37,211,102,.2);}
.copy-ok{color:#4ade80;font-size:13px;font-weight:700;display:none;animation:fadeUp .3s ease;}
.begin-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  color:#fff;padding:14px 40px;border-radius:14px;
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;cursor:pointer;
  transition:all .2s;
}
.begin-btn:hover{background:rgba(255,255,255,.1);}

/* QUESTION */
.q-screen{max-width:760px;width:100%;text-align:center;}
.q-progress{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;}
.qp-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .3s;}
.qp-dot.done{background:#4ade80;}
.qp-dot.active{background:#7c5cfc;box-shadow:0 0 10px #7c5cfc;}
.q-badge{
  display:inline-block;background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.3);
  color:#a78bfa;padding:4px 16px;border-radius:100px;
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:20px;
}
.q-big-text{
  font-family:'Syne',sans-serif;font-size:clamp(22px,3.5vw,38px);
  font-weight:800;line-height:1.2;letter-spacing:-.5px;
  margin-bottom:32px;
}
.vote-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  padding:6px 18px;border-radius:100px;font-size:14px;font-weight:600;
  color:rgba(255,255,255,.6);margin-bottom:28px;
}
.vote-pill strong{color:#a78bfa;}

/* LIVE BARS */
.bars-wrap{display:flex;align-items:flex-end;justify-content:center;gap:8px;height:100px;margin-bottom:12px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:36px;border-radius:6px 6px 0 0;transition:height .4s cubic-bezier(.34,1.1,.64,1),background .4s;min-height:4px;}
.bar-num{font-size:11px;color:rgba(255,255,255,.35);}

.avg-big{font-family:'Syne',sans-serif;font-size:72px;font-weight:800;line-height:1;
  background:linear-gradient(135deg,#7c5cfc,#f5a623);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;display:none;}
.avg-lbl{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;margin-top:4px;display:none;}

/* OPEN ANSWERS */
.open-list{
  max-height:260px;overflow-y:auto;
  display:flex;flex-direction:column;gap:8px;
  width:100%;text-align:right;margin-bottom:24px;
}
.open-item{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-right:3px solid #7c5cfc;
  padding:10px 16px;border-radius:0 10px 10px 0;
  font-size:14px;color:rgba(255,255,255,.7);line-height:1.5;
}

/* NAV */
.nav-row{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.nav-btn{
  padding:12px 28px;border-radius:12px;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;cursor:pointer;
  transition:all .2s;border:none;
}
.nav-btn.primary{
  background:linear-gradient(135deg,#7c5cfc,#5c3ddb);color:#fff;
  box-shadow:0 4px 18px rgba(124,92,252,.3);
}
.nav-btn.primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,92,252,.45);}
.nav-btn.sec{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;}
.nav-btn.sec:hover{background:rgba(255,255,255,.1);}

/* SUMMARY */
.sum-screen{max-width:860px;width:100%;}
.sum-screen h2{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;text-align:center;margin-bottom:6px;
  background:linear-gradient(135deg,#7c5cfc,#f5a623);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sum-presenter{text-align:center;font-size:13px;color:rgba(255,255,255,.35);margin-bottom:28px;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:580px){.sum-grid{grid-template-columns:1fr;}}
.sum-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:18px 20px;
}
.sum-q{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:10px;line-height:1.4;}
.sum-score{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.sum-avg{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;}
.sum-cnt{font-size:12px;color:rgba(255,255,255,.25);}
.sum-mini{display:flex;align-items:flex-end;gap:3px;height:32px;}
.sum-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height .5s;}
.open-sec{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:18px 20px;margin-bottom:12px;
}
.open-sec h4{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#a78bfa;margin-bottom:14px;}
.open-ans{
  border-right:3px solid rgba(124,92,252,.4);padding:8px 14px;
  font-size:13px;color:rgba(255,255,255,.6);margin-bottom:6px;line-height:1.5;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-logo">למ״ד</div>
    <div class="setup-sub">הערכת עמיתים • עבודת גמר</div>
    <div class="sf">
      <label>שם המציג/ה</label>
      <input id="presenter-name" placeholder="שם התלמיד/ה המציג/ה" onkeydown="if(event.key==='Enter')startSession()">
    </div>
    <div class="sf">
      <label>שם הכיתה</label>
      <input id="class-name" placeholder="לדוגמה: יב3" onkeydown="if(event.key==='Enter')startSession()">
    </div>
    <div class="serr" id="setup-err">נא למלא את כל השדות</div>
    <button class="start-btn" onclick="startSession()">פתח סשן הצגה ←</button>
  </div>
</div>

<!-- HOST -->
<div id="host" style="display:none;flex-direction:column;">
  <div class="topbar">
    <div class="topbar-logo">למ״ד</div>
    <div class="topbar-right">
      <div class="voter-pill">👥 <span id="voter-count-num">0</span> מדרגים</div>
      <button class="copy-link-btn" id="topbar-copy-btn" onclick="copyTopLink(this)">📋 העתק קישור</button>
    </div>
  </div>
  <div class="presenter-strip">
    <span>מציג/ה:</span>
    <span class="name" id="presenter-display"></span>
    <span class="cls" id="class-display"></span>
  </div>
  <div id="stage"></div>
</div>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

const QS=[
  {type:'scale',text:'עד כמה הדילמה האישית הוצגה בצורה ברורה?'},
  {type:'scale',text:'עד כמה הדילמה המקצועית הייתה מובנת?'},
  {type:'scale',text:'עד כמה החקר של העבודה נראה ברור, רציני ומעמיק?'},
  {type:'scale',text:'עד כמה התובנות מהחקר היו מעניינות ומשמעותיות?'},
  {type:'scale',text:'עד כמה נעשה שימוש במושגים מתחום התקשורת?'},
  {type:'scale',text:'עד כמה העבודה מתייחסת לנושאים חברתיים?'},
  {type:'scale',text:'עד כמה ההצגה של העבודה הייתה ברורה ומסודרת?'},
  {type:'scale',text:'עד כמה נושא העבודה חשוב בעינייך?'},
  {type:'open',text:'מה היה החלק הכי ברור בעבודה?'},
  {type:'open',text:'מה היה החלק שהיה צריך להסביר קצת יותר?'},
];

let sessionId='',currentQ=-1,votesListener=null,presenterName='',className='',voteUrl='';

function startSession(){
  presenterName=document.getElementById('presenter-name').value.trim();
  className=document.getElementById('class-name').value.trim();
  if(!presenterName||!className){document.getElementById('setup-err').style.display='block';return;}
  sessionId='lamed_'+Date.now();
  voteUrl=location.origin+location.pathname.replace('lamed-host.html','lamed-vote.html')+'?s='+sessionId;
  db.ref('lamed/sessions/'+sessionId).set({presenter:presenterName,className,startedAt:Date.now(),status:'waiting',currentQ:-1}).then(()=>{
    document.getElementById('setup').style.display='none';
    document.getElementById('host').style.display='flex';
    document.getElementById('presenter-display').textContent=presenterName;
    document.getElementById('class-display').textContent='כיתה: '+className;
    db.ref('lamed/sessions/'+sessionId+'/voters').on('value',snap=>{
      document.getElementById('voter-count-num').textContent=snap.exists()?Object.keys(snap.val()).length:0;
    });
    showWaiting();
  });
}

function showWaiting(){
  currentQ=-1;
  db.ref('lamed/sessions/'+sessionId).update({status:'waiting',currentQ:-1});
  if(votesListener){db.ref('lamed/sessions/'+sessionId+'/votes').off();votesListener=null;}
  document.getElementById('stage').innerHTML=`
    <div class="wait-screen">
      <h2>מוכנים?</h2>
      <p>שלח את הקישור לתלמידים ולחץ התחל</p>
      <div class="copy-block">
        <div class="copy-lbl">קישור לתלמידים</div>
        <button class="big-copy-btn" onclick="copyLink(this)">📋 העתק קישור לתלמידים</button>
        <button class="wa-btn" onclick="openWA()">📲 שלח בוואטסאפ</button>
        <div class="copy-ok" id="copy-ok">✓ הקישור הועתק ללוח!</div>
      </div>
      <button class="begin-btn" onclick="goToQuestion(0)">התחל הצגה ←</button>
    </div>`;
}

function copyLink(btn){
  navigator.clipboard.writeText(voteUrl).then(()=>{
    btn.textContent='✓ הועתק!';
    const ok=document.getElementById('copy-ok');if(ok)ok.style.display='block';
    setTimeout(()=>{btn.textContent='📋 העתק קישור לתלמידים';},2500);
  }).catch(()=>prompt('העתק:',voteUrl));
}
function copyTopLink(btn){
  navigator.clipboard.writeText(voteUrl).then(()=>{btn.textContent='✓ הועתק!';setTimeout(()=>{btn.textContent='📋 העתק קישור';},2000);}).catch(()=>prompt('העתק:',voteUrl));
}
function openWA(){
  window.open('https://wa.me/?text='+encodeURIComponent('הצבעה על ההצגה:\n'+voteUrl),'_blank');
}

function goToQuestion(idx){
  if(idx>=QS.length){showSummary();return;}
  currentQ=idx;
  const q=QS[idx];
  db.ref('lamed/sessions/'+sessionId).update({status:'question',currentQ:idx,questionType:q.type});
  if(votesListener){db.ref('lamed/sessions/'+sessionId+'/votes/'+idx).off();}
  if(q.type==='scale') renderScale(idx);
  else renderOpen(idx);
}

function dots(idx){
  return QS.map((_,i)=>`<div class="qp-dot${i<idx?' done':i===idx?' active':''}"></div>`).join('');
}

function renderScale(idx){
  const q=QS[idx];
  document.getElementById('stage').innerHTML=`
    <div class="q-screen">
      <div class="q-progress">${dots(idx)}</div>
      <div class="q-badge">שאלה ${idx+1} מתוך ${QS.length}</div>
      <div class="q-big-text">${q.text}</div>
      <div class="vote-pill">הצביעו: <strong id="vcnt">0</strong></div>
      <div class="bars-wrap" id="bars-wrap">
        ${Array.from({length:11},(_,i)=>`<div class="bar-col"><div class="bar" id="bar-${i}" style="height:4px;background:rgba(255,255,255,.1);"></div><div class="bar-num">${i}</div></div>`).join('')}
      </div>
      <div class="avg-big" id="avg-big">—</div>
      <div class="avg-lbl" id="avg-lbl">ממוצע</div>
      <div class="nav-row">
        ${idx>0?`<button class="nav-btn sec" onclick="goToQuestion(${idx-1})">→ חזרה</button>`:''}
        <button class="nav-btn primary" onclick="goToQuestion(${idx+1})">${idx<QS.length-1?'הבאה ←':'סיכום ←'}</button>
      </div>
    </div>`;
  votesListener=db.ref('lamed/sessions/'+sessionId+'/votes/'+idx).on('value',snap=>{
    const votes=snap.val()||{};
    const vals=Object.values(votes).filter(v=>v.rating!==undefined).map(v=>v.rating);
    const vcnt=document.getElementById('vcnt');if(vcnt)vcnt.textContent=vals.length;
    const counts=Array(11).fill(0);vals.forEach(v=>counts[v]++);
    const max=Math.max(...counts,1);
    const colors=['#ef4444','#f87171','#fb923c','#f5a623','#facc15','#a3e635','#4ade80','#34d399','#22d3ee','#60a5fa','#7c5cfc'];
    counts.forEach((c,i)=>{
      const bar=document.getElementById('bar-'+i);
      if(bar){bar.style.height=Math.max(4,Math.round((c/max)*90))+'px';bar.style.background=c>0?colors[i]:'rgba(255,255,255,.08)';}
    });
    if(vals.length>0){
      const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      const ab=document.getElementById('avg-big'),al=document.getElementById('avg-lbl');
      if(ab){ab.textContent=avg;ab.style.display='block';}
      if(al)al.style.display='block';
    }
  });
}

function renderOpen(idx){
  const q=QS[idx];
  document.getElementById('stage').innerHTML=`
    <div class="q-screen">
      <div class="q-progress">${dots(idx)}</div>
      <div class="q-badge">שאלה ${idx+1} מתוך ${QS.length}</div>
      <div class="q-big-text">${q.text}</div>
      <div class="vote-pill">ענו: <strong id="vcnt">0</strong></div>
      <div class="open-list" id="open-list"></div>
      <div class="nav-row">
        ${idx>0?`<button class="nav-btn sec" onclick="goToQuestion(${idx-1})">→ חזרה</button>`:''}
        <button class="nav-btn primary" onclick="goToQuestion(${idx+1})">${idx<QS.length-1?'הבאה ←':'סיכום ←'}</button>
      </div>
    </div>`;
  votesListener=db.ref('lamed/sessions/'+sessionId+'/votes/'+idx).on('value',snap=>{
    const votes=snap.val()||{};
    const answers=Object.values(votes).filter(v=>v.answer).map(v=>v.answer);
    const vcnt=document.getElementById('vcnt');if(vcnt)vcnt.textContent=answers.length;
    const list=document.getElementById('open-list');
    if(list)list.innerHTML=answers.map(a=>`<div class="open-item">${esc(a)}</div>`).join('');
  });
}

function showSummary(){
  db.ref('lamed/sessions/'+sessionId).update({status:'done'});
  if(votesListener){db.ref('lamed/sessions/'+sessionId+'/votes').off();votesListener=null;}
  db.ref('lamed/sessions/'+sessionId+'/votes').once('value').then(snap=>{
    const all=snap.val()||{};
    window._summaryData={presenter:presenterName,className,votes:all};
    const colors=['#ef4444','#f87171','#fb923c','#f5a623','#facc15','#a3e635','#4ade80','#34d399','#22d3ee','#60a5fa','#7c5cfc'];
    let html=`<div class="sum-screen"><h2>סיכום הצגה</h2>
      <div class="sum-presenter">מציג/ה: <strong style="color:#f5a623">${esc(presenterName)}</strong> &nbsp;|&nbsp; כיתה: ${esc(className)}</div>
      <div class="sum-grid">`;
    QS.forEach((q,i)=>{
      if(q.type!=='scale')return;
      const votes=all[i]||{};
      const vals=Object.values(votes).filter(v=>v.rating!==undefined).map(v=>v.rating);
      if(!vals.length){html+=`<div class="sum-card"><div class="sum-q">${q.text}</div><div class="sum-avg" style="color:rgba(255,255,255,.2);">—</div></div>`;return;}
      const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      const sc=parseFloat(avg);
      const col=sc>=7?'#4ade80':sc>=5?'#f5a623':'#f87171';
      const counts=Array(11).fill(0);vals.forEach(v=>counts[v]++);
      const max=Math.max(...counts,1);
      const bars=counts.map((c,j)=>`<div class="sum-bar" style="height:${Math.max(2,Math.round((c/max)*32))}px;background:${c>0?colors[j]:'rgba(255,255,255,.08)'}"></div>`).join('');
      html+=`<div class="sum-card">
        <div class="sum-q">${q.text}</div>
        <div class="sum-score"><div class="sum-avg" style="color:${col}">${avg}</div><div class="sum-cnt">${vals.length} הצבעות</div></div>
        <div class="sum-mini">${bars}</div>
      </div>`;
    });
    html+=`</div>`;
    QS.forEach((q,i)=>{
      if(q.type!=='open')return;
      const answers=Object.values(all[i]||{}).filter(v=>v.answer).map(v=>v.answer);
      html+=`<div class="open-sec"><h4>${q.text}</h4>
        ${answers.length?answers.map(a=>`<div class="open-ans">${esc(a)}</div>`).join(''):'<div class="open-ans" style="opacity:.35;">אין תשובות</div>'}
      </div>`;
    });
    html+=`<div class="nav-row" style="margin-top:20px;">
      <button class="nav-btn primary" onclick="exportCSV()">⬇ ייצוא CSV</button>
      <button class="nav-btn sec" onclick="location.reload()">סשן חדש ←</button>
    </div></div>`;
    document.getElementById('stage').innerHTML=html;
  });
}

function exportCSV(){
  const d=window._summaryData;if(!d){alert('אין נתונים');return;}
  const QL=['דילמה אישית','דילמה מקצועית','עומק החקר','תובנות','מושגי תקשורת','נושאים חברתיים','בהירות ההצגה','חשיבות הנושא','מה היה ברור?','מה צריך פירוט?'];
  const types=['scale','scale','scale','scale','scale','scale','scale','scale','open','open'];
  let rows=['"מציג/ה","כיתה","שאלה","ממוצע / תשובה","הצבעות"'];
  Object.entries(d.votes).forEach(([idx,votes])=>{
    const qi=parseInt(idx),label=QL[qi]||'שאלה '+(qi+1),vals=Object.values(votes);
    if(types[qi]==='scale'){
      const r=vals.filter(v=>v.rating!==undefined).map(v=>v.rating);
      if(r.length){const avg=(r.reduce((a,b)=>a+b,0)/r.length).toFixed(2);rows.push(`"${d.presenter}","${d.className}","${label}","${avg}","${r.length}"`);}
    } else {
      vals.filter(v=>v.answer).forEach(v=>rows.push(`"${d.presenter}","${d.className}","${label}","${String(v.answer).replace(/"/g,'""')}","—"`));
    }
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+rows.join('\n'));
  a.download='lamed-'+d.presenter+'-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>

</html>
