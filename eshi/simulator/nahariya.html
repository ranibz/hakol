<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מי אלוף הטריוויה של נהריה?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* תמונת רקע - אפשר להחליף את הקישור לתמונה אישית שלך של נהריה */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Nahariya_beach_promenade.jpg/1200px-Nahariya_beach_promenade.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }
        /* שכבת כהות על הרקע כדי שהטקסט יבלוט */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        .container {
            background: rgba(0, 0, 50, 0.85); /* כחול כהה בסגנון המיליונר */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.6);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid #ffd700;
        }
        h1 {
            color: #ffd700; /* צהוב זהב */
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px #000;
        }
        p {
            font-size: 1.1em;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .rules {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .code-box {
            background: linear-gradient(45deg, #ff007f, #ff8c00); /* תיבה צבעונית בולטת */
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid #fff;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1em;
            font-family: inherit;
            text-align: right;
        }
        button {
            background: linear-gradient(to bottom, #ffd700, #b8860b);
            color: #000;
            padding: 15px;
            border: 2px solid #fff;
            border-radius: 8px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover {
            background: linear-gradient(to bottom, #ffea00, #daa520);
            transform: scale(1.05);
        }
        .notice {
            font-size: 0.9em;
            color: #ff9999;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>מי אלוף הטריוויה של נהריה?</h1>
    
    <div class="rules">
        <p><strong>איך משחקים?</strong></p>
        <p>ענו נכונה על שאלות הטריוויה, השתמשו בגלגלי ההצלה בחוכמה, ונסו להגיע לפסגה כדי לזכות בתואר האלוף של נהריה!</p>
    </div>

    <div class="code-box">
        קוד הפעלה למשחק: 1234
    </div>

    <form id="gameForm" onsubmit="startGame(event)">
        <input type="text" id="playerName" placeholder="הכנס שם מלא" required>
        <input type="tel" id="playerPhone" placeholder="הכנס מספר טלפון" required>
        <button type="submit">התחל משחק!</button>
    </form>

    <p class="notice">* שימו לב: כל משתתף רשאי לשחק עד פעמיים.</p>
</div>

<script>
    function startGame(event) {
        event.preventDefault(); // מונע את רענון הדף הרגיל של טופס
        
        const name = document.getElementById('playerName').value;
        const phone = document.getElementById('playerPhone').value;
        
        if(name && phone) {
            // ברגע שהוזנו פרטים, המשתמש מועבר לקישור המשחק
            window.location.href = "https://hakolbakaf.co.il/eshi/simulator/millionaire-nahariya.html";
        }
    }
</script>

</body>
</html>
