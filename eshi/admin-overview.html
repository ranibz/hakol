<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנהל — סקירת הגשות</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--paper-dark:#e8e0cc;--ink:#1a1208;--ink-light:#6b5d45;--accent:#8b1a1a;--blue:#2563af;--green:#2d7a2d;--warm:#7a4f1a;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,18,8,0.055) 27px,rgba(26,18,8,0.055) 28px);}
/* LOGIN */
.login-overlay{position:fixed;inset:0;background:rgba(26,18,8,.92);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink);max-width:380px;width:100%;padding:36px;}
.login-head{background:var(--ink);color:var(--paper);text-align:center;padding:16px;margin:-36px -36px 24px;}
.login-head h2{font-family:'Frank Ruhl Libre',serif;font-size:24px;font-weight:900;}
.login-head p{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.6;margin-top:3px;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-light);margin-bottom:5px;}
.lf input{width:100%;padding:11px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;outline:none;box-shadow:var(--shadow-sm);}
.lf input:focus{border-color:var(--accent);}
.lbtn{width:100%;padding:12px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);transition:all .15s;}
.lbtn:hover{background:var(--accent);}
.lerr{color:var(--accent);font-size:13px;font-weight:700;margin-top:8px;display:none;text-align:center;}
/* MASTHEAD */
.masthead{background:var(--ink);color:var(--paper);border-bottom:6px double var(--paper-dark);}
.mhi{max-width:1000px;margin:0 auto;padding:0 22px;}
.mht{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #444;font-size:11px;letter-spacing:1px;opacity:.65;}
.mhti{text-align:center;padding:18px 0 12px;}
.mhti h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(22px,4vw,42px);font-weight:900;}
.mhti p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--paper-dark);margin-top:4px;}
.mhr{height:3px;background:var(--paper-dark);margin-bottom:10px;}
/* PAGE */
.page{max-width:1000px;margin:0 auto;padding:28px 20px 60px;}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px;}
.stat{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:14px;text-align:center;}
.sn{font-family:'Frank Ruhl Libre',serif;font-size:34px;font-weight:900;color:var(--accent);line-height:1;}
.sn.b{color:var(--blue);}
.sn.g{color:var(--green);}
.sl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-light);margin-top:4px;}
/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.si{padding:9px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:14px;outline:none;flex:1;min-width:180px;}
.si:focus{border-color:var(--accent);}
.sb{padding:9px 18px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:14px;font-weight:700;cursor:pointer;}
.sb:hover{background:var(--accent);}
.sb.sec{background:var(--paper-dark);color:var(--ink);border:2px solid var(--ink);}
/* TEACHER CARDS */
.section-title{font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:900;border-bottom:3px double var(--ink);padding-bottom:8px;margin-bottom:14px;margin-top:24px;}
.teacher-card{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);margin-bottom:10px;overflow:hidden;}
.tc-head{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;transition:background .15s;user-select:none;}
.tc-head:hover{background:var(--paper-dark);}
.tc-icon{font-size:22px;flex-shrink:0;}
.tc-name{font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700;flex:1;}
.tc-meta{font-size:12px;color:var(--ink-light);}
.tc-badge{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.badge{padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:1px;border:1.5px solid;}
.badge.total{border-color:var(--ink);color:var(--ink);}
.badge.topics{border-color:var(--blue);color:var(--blue);}
.tc-arr{transition:transform .25s;color:var(--ink-light);}
.teacher-card.open .tc-arr{transform:rotate(180deg);}
.tc-body{display:none;border-top:2px solid var(--paper-dark);}
.teacher-card.open .tc-body{display:block;}
/* TOPIC ROWS */
.topic-row{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--paper-dark);cursor:pointer;transition:background .15s;}
.topic-row:last-child{border-bottom:none;}
.topic-row:hover{background:#fff8f0;}
.topic-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.topic-name{font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;flex:1;}
.topic-count{font-size:12px;color:var(--ink-light);}
.topic-arr{font-size:12px;color:var(--ink-light);}
/* SUBMISSIONS TABLE */
.subs-panel{display:none;background:var(--paper-dark);border-top:2px solid var(--ink);}
.topic-row.open + .subs-panel{display:block;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--ink);color:var(--paper);padding:9px 13px;text-align:right;font-size:11px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--paper-dark);cursor:pointer;transition:background .15s;background:white;}
tbody tr:hover{background:#fff8f0;}
tbody td{padding:9px 13px;font-size:13px;}
.xrow{cursor:default!important;}
.xrow:hover{background:white!important;}
.xi{padding:14px 18px;background:var(--paper);border-top:1px solid var(--paper-dark);}
.xb{background:white;border:2px solid var(--ink);padding:11px 15px;margin-bottom:7px;border-right:4px solid var(--accent);}
.xb.xbl{border-right-color:var(--blue);}
.xb.xbg{border-right-color:var(--green);}
.xb h5{font-family:'Frank Ruhl Libre',serif;font-size:13px;color:var(--accent);margin-bottom:4px;}
.xb.xbl h5{color:var(--blue);}
.xb.xbg h5{color:var(--green);}
.xb p{font-size:12px;color:var(--ink-light);line-height:1.6;}
.empty{text-align:center;padding:24px;color:var(--ink-light);font-size:14px;}
.loading{text-align:center;padding:40px;color:var(--ink-light);}
footer{margin-top:48px;border-top:2px solid var(--ink);padding-top:14px;text-align:center;font-size:12px;color:var(--ink-light);}
</style>
</head>
<body>
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-head"><h2>כניסת מנהל</h2><p>סקירת הגשות • גליל מערבי</p></div>
    <div class="lf"><label>סיסמת מנהל</label><input id="admin-pass" type="password" placeholder="הזינו סיסמת מנהל" autocomplete="off"></div>
    <button class="lbtn" onclick="adminLogin()">כניסה ←</button>
    <div class="lerr" id="lerr">סיסמה שגויה.</div>
  </div>
</div>
<header class="masthead">
  <div class="mhi">
    <div class="mht"><span>ממשק מנהל • גליל מערבי</span><span id="mh-time">—</span></div>
    <div class="mhti"><h1>סקירת הגשות</h1><p>מורים • נושאים • תלמידים</p></div>
    <div class="mhr"></div>
  </div>
</header>
<div class="page">
  <div class="stats">
    <div class="stat"><div class="sn" id="s-teachers">0</div><div class="sl">מורים פעילים</div></div>
    <div class="stat"><div class="sn b" id="s-topics">0</div><div class="sl">נושאים</div></div>
    <div class="stat"><div class="sn g" id="s-total">0</div><div class="sl">סה"כ הגשות</div></div>
    <div class="stat"><div class="sn" id="s-today" style="color:var(--warm)">0</div><div class="sl">הגשות היום</div></div>
  </div>
  <div class="search-bar">
    <input class="si" id="search-input" placeholder="חיפוש לפי שם מורה או תלמיד..." oninput="renderAll()">
    <button class="sb sec" onclick="loadAll()">↺ רענן</button>
  </div>
  <div id="content"><div class="loading">ממתין לכניסה...</div></div>
  <footer>פיתוח: רני בן זאב • גליל מערבי</footer>
</div>
<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

const TOPIC_NAMES={
  denotation:'ציון ומשמעות',msagur:'מסגור',freedom:'חופש הביטוי',
  globalization:'גלובליזציה',stereotype:'סטריאוטיפים',hadara:'הדרה',
  ovdan:'אובדן הילדות',sederyom:'סדר יום',fakenews:'פייק ניוז',
  editnews:'אתה עורך עיתון',deno:'ציון ומשמעות',frames:'מסגור'
};
const TOPIC_COLORS=['#8b1a1a','#2563af','#2d7a2d','#7a4f1a','#6b21a8','#0d9488','#c2410c','#1d4ed8'];

// data: { teacherCode: { topicKey: [submissions] } }
let allData={};
let teachers={};

function adminLogin(){
  const pass=document.getElementById('admin-pass').value.trim();
  if(!pass){document.getElementById('lerr').style.display='block';return;}
  db.ref('admin_config/admin_password').once('value',snap=>{
    if(pass===snap.val()){
      document.getElementById('login-overlay').style.display='none';
      document.getElementById('mh-time').textContent=new Date().toLocaleString('he-IL');
      loadAll();
    } else {
      document.getElementById('lerr').style.display='block';
    }
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login-overlay').style.display!=='none')adminLogin();});

function loadAll(){
  document.getElementById('content').innerHTML='<div class="loading">טוען נתונים...</div>';
  allData={};
  // טעינת רשימת מורים
  db.ref('teachers').once('value',snap=>{
    snap.forEach(c=>{teachers[c.key]=c.val();});
  });
  // טעינת כל הנושאים תחת tests/
  db.ref('tests').once('value',snap=>{
    snap.forEach(topicSnap=>{
      const topic=topicSnap.key;
      topicSnap.forEach(subSnap=>{
        const sub={key:subSnap.key,...subSnap.val()};
        if(!sub.student) return;
        const code=sub.student.classCode||'unknown';
        if(!allData[code]) allData[code]={};
        if(!allData[code][topic]) allData[code][topic]=[];
        allData[code][topic].push(sub);
      });
    });
    renderAll();
  });
}

function renderAll(){
  const q=(document.getElementById('search-input').value||'').trim().toLowerCase();
  // קבץ לפי קוד מורה
  const codes=Object.keys(allData).sort();
  if(!codes.length){document.getElementById('content').innerHTML='<div class="empty">אין הגשות עדיין.</div>';return;}

  // סטטיסטיקות
  let totalSubs=0,todaySubs=0,topicSet=new Set(),teacherSet=new Set();
  const today=new Date().toDateString();
  codes.forEach(code=>{
    teacherSet.add(code);
    Object.entries(allData[code]).forEach(([topic,subs])=>{
      topicSet.add(topic);
      subs.forEach(s=>{
        totalSubs++;
        if(new Date(s.submittedAt).toDateString()===today) todaySubs++;
      });
    });
  });
  document.getElementById('s-teachers').textContent=teacherSet.size;
  document.getElementById('s-topics').textContent=topicSet.size;
  document.getElementById('s-total').textContent=totalSubs;
  document.getElementById('s-today').textContent=todaySubs;

  let html='';
  codes.forEach(code=>{
    const topics=allData[code];
    // חיפוש
    let matchCode=!q||code.toLowerCase().includes(q);
    // בדוק אם יש תלמיד תואם
    let hasMatch=matchCode;
    if(!hasMatch && q){
      Object.values(topics).forEach(subs=>{
        subs.forEach(s=>{if(s.student&&s.student.name&&s.student.name.toLowerCase().includes(q))hasMatch=true;});
      });
    }
    if(!hasMatch) return;

    const totalForTeacher=Object.values(topics).reduce((a,s)=>a+s.length,0);
    const topicCount=Object.keys(topics).length;
    const tName=getTeacherName(code);

    html+=`<div class="teacher-card" id="tc-${code}">
      <div class="tc-head" onclick="togTeacher('${code}')">
        <span class="tc-icon">👤</span>
        <div style="flex:1">
          <div class="tc-name">${tName}</div>
          <div class="tc-meta">קוד: ${code}</div>
        </div>
        <div class="tc-badge">
          <span class="badge total">${totalForTeacher} הגשות</span>
          <span class="badge topics">${topicCount} נושאים</span>
        </div>
        <span class="tc-arr">▼</span>
      </div>
      <div class="tc-body" id="tb-${code}">`;

    Object.entries(topics).forEach(([topic,subs],ti)=>{
      const color=TOPIC_COLORS[ti%TOPIC_COLORS.length];
      const tname=TOPIC_NAMES[topic]||topic;
      const panelId=`sp-${code}-${topic}`;
      html+=`<div class="topic-row" id="tr-${code}-${topic}" onclick="togTopic('${code}','${topic}')">
        <div class="topic-dot" style="background:${color}"></div>
        <div class="topic-name">${tname}</div>
        <div class="topic-count">${subs.length} הגשות</div>
        <div class="topic-arr">▶</div>
      </div>
      <div class="subs-panel" id="${panelId}">${buildSubsTable(subs,topic,q)}</div>`;
    });

    html+=`</div></div>`;
  });

  document.getElementById('content').innerHTML=html||'<div class="empty">לא נמצאו תוצאות.</div>';
}

function getTeacherName(code){
  // חפש בין המורים הרשומים
  for(const k in teachers){
    if(teachers[k].password===code||k===code) return teachers[k].name||code;
  }
  return code;
}

function buildSubsTable(subs,topic,q){
  const filtered=q?subs.filter(s=>!q||s.student.name.toLowerCase().includes(q)||s.student.class.toLowerCase().includes(q)):subs;
  if(!filtered.length) return '<div class="empty">אין הגשות.</div>';
  let html='<table><thead><tr><th>#</th><th>שם תלמיד</th><th>כיתה</th><th>תאריך</th><th></th></tr></thead><tbody>';
  filtered.forEach((s,i)=>{
    const dt=new Date(s.submittedAt);
    const time=dt.toLocaleDateString('he-IL')+' '+dt.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const xid=`xr-${topic}-${s.key}`;
    html+=`<tr onclick="togSub('${xid}')">
      <td style="color:var(--ink-light)">${i+1}</td>
      <td style="font-weight:700">${s.student.name}</td>
      <td>${s.student.class}</td>
      <td style="font-size:12px;color:var(--ink-light);direction:ltr;text-align:right">${time}</td>
      <td style="color:var(--ink-light)">▾</td>
    </tr>
    <tr class="xrow" id="${xid}" style="display:none">
      <td colspan="5"><div class="xi">${buildAnswers(s.answers)}</div></td>
    </tr>`;
  });
  html+='</tbody></table>';
  return html;
}

function buildAnswers(answers){
  if(!answers) return '<p style="color:var(--ink-light);font-size:13px">אין תשובות</p>';
  const SKIP=['sort_result','dilemma_verdicts'];
  const colors=['','xbl','xbg','','xbl','xbg',''];
  return Object.entries(answers).filter(([k,v])=>!SKIP.includes(k)&&v).map(([k,v],i)=>`
    <div class="xb ${colors[i%colors.length]}">
      <h5>${k.replace(/_/g,' ')}</h5>
      <p>${v}</p>
    </div>`).join('')||'<p style="color:var(--ink-light);font-size:13px">אין תשובות טקסטואליות</p>';
}

function togTeacher(code){
  const card=document.getElementById('tc-'+code);
  card.classList.toggle('open');
}

function togTopic(code,topic){
  const row=document.getElementById(`tr-${code}-${topic}`);
  const panel=document.getElementById(`sp-${code}-${topic}`);
  const isOpen=row.classList.contains('open');
  // סגור כולם באותו מורה
  document.querySelectorAll(`#tb-${code} .topic-row`).forEach(r=>r.classList.remove('open'));
  document.querySelectorAll(`#tb-${code} .subs-panel`).forEach(p=>p.style.display='none');
  if(!isOpen){
    row.classList.add('open');
    panel.style.display='block';
  }
}

function togSub(id){
  const r=document.getElementById(id);
  if(!r) return;
  const open=r.style.display!=='none';
  // סגור כולם בטבלה
  r.closest('table').querySelectorAll('.xrow').forEach(x=>x.style.display='none');
  if(!open) r.style.display='';
}
</script>
</body>
</html>
