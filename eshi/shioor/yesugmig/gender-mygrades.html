<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הציונים שלי — ייצוג מגדרי</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#f5f0e8;color:#1a1208;direction:rtl;min-height:100vh;}
.masthead{background:#1a1208;color:#f5f0e8;text-align:center;padding:16px 20px 12px;border-bottom:4px solid #c9a84c;}
.masthead-kicker{font-size:.7rem;letter-spacing:3px;color:#c9a84c;margin-bottom:4px;}
.masthead h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;}
.rule{height:3px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#f5f0e8;border:3px solid #1a1208;box-shadow:6px 6px 0 #1a1208;padding:28px 24px;width:100%;max-width:380px;}
.modal h2{font-family:'Frank Ruhl Libre',serif;font-size:1.4rem;font-weight:900;margin-bottom:18px;text-align:center;}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-weight:700;font-size:.85rem;margin-bottom:5px;}
.modal-field input{width:100%;padding:11px 13px;border:2px solid #1a1208;background:white;font-family:'Heebo',sans-serif;font-size:.95rem;outline:none;}
.modal-field input[type="email"]{direction:ltr;text-align:left;}
.modal-field input:focus{border-color:#c9a84c;}
.modal-btn{width:100%;padding:13px;background:#1a1208;color:#c9a84c;border:none;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:6px;}
.modal-err{color:#c0392b;font-size:.85rem;text-align:center;margin-top:8px;display:none;}
.content{max-width:700px;margin:0 auto;padding:28px 16px 60px;}
.grade-card{background:white;border:2px solid #1a1208;box-shadow:4px 4px 0 #1a1208;padding:22px;margin-bottom:20px;border-radius:2px;}
.gc-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;padding-bottom:14px;border-bottom:2px solid #eee;}
.grade-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Frank Ruhl Libre',serif;font-size:1.6rem;font-weight:900;flex-shrink:0;border:3px solid;}
.grade-circle.graded{background:#d4edda;color:#155724;border-color:#b7efc5;}
.grade-circle.pending{background:#f0f0f0;color:#888;border-color:#ddd;font-size:.85rem;text-align:center;line-height:1.2;padding:8px;}
.gc-info{flex:1;}
.gc-clip{display:inline-block;background:#1a1208;color:#c9a84c;padding:2px 10px;font-size:.75rem;font-weight:700;border-radius:10px;margin-bottom:6px;}
.gc-date{font-size:.78rem;color:#888;margin-bottom:4px;}
.gc-title{font-family:'Frank Ruhl Libre',serif;font-size:1.05rem;font-weight:900;}
.grade-bar{height:8px;border-radius:4px;margin:6px 0;overflow:hidden;background:#eee;}
.grade-fill{height:100%;border-radius:4px;transition:width .6s;}
.gc-note{background:#fff9e8;border:1px solid #f0d060;padding:10px 12px;border-radius:2px;font-size:.88rem;line-height:1.6;color:#555;margin-bottom:12px;}
.gc-note strong{color:#856404;display:block;font-size:.75rem;margin-bottom:3px;}
.scale-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.scale-row-label{font-size:.8rem;font-weight:700;min-width:110px;flex-shrink:0;}
.scale-pips{display:flex;gap:3px;}
.scale-pip{width:16px;height:16px;border-radius:3px;background:#ddd;}
.scale-pip.filled{background:#c9a84c;}
.answers-section{border-top:2px solid #eee;padding-top:12px;margin-top:4px;}
.answers-title{font-size:.78rem;font-weight:700;color:#888;margin-bottom:10px;letter-spacing:1px;}
.ans-item{background:#f9f5ed;border:1px solid #ddd;padding:10px 12px;border-radius:2px;margin-bottom:8px;}
.ans-label{font-size:.72rem;font-weight:700;color:#888;margin-bottom:4px;}
.ans-value{font-size:.85rem;line-height:1.6;color:#333;}
.dilemma-badge{display:inline-block;padding:4px 14px;border-radius:12px;font-weight:700;font-size:.9rem;margin-bottom:12px;}
.dilemma-badge.empower{background:#d4edda;color:#155724;}
.dilemma-badge.object{background:#fce4ec;color:#880e4f;}
.dilemma-badge.both{background:#fff3cd;color:#856404;}
.dilemma-badge.unknown{background:#f0f0f0;color:#666;}
</style>
</head>
<body>
<div class="masthead">
  <div class="masthead-kicker">ציונים · ייצוג מגדרי</div>
  <h1>⭐ הציונים שלי</h1>
</div>
<div class="rule"></div>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>⭐ הציונים שלי</h2>
    <div class="modal-field"><label>כתובת מייל</label><input type="email" id="inp-email" placeholder="your@email.com"></div>
    <div class="modal-field"><label>קוד מורה</label><input type="text" id="inp-code" placeholder="קוד שקיבלת מהמורה"></div>
    <button class="modal-btn" onclick="doSearch()">הצג ציונים →</button>
    <div class="modal-err" id="modal-err">לא נמצאו הגשות עם הפרטים האלה</div>
  </div>
</div>
<div class="content" id="mainContent" style="display:none;"></div>

<script>
const FB_CONFIG={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app"};
firebase.initializeApp(FB_CONFIG);
const db=firebase.database();

function doSearch(){
  const email=document.getElementById('inp-email').value.trim().toLowerCase();
  const code=document.getElementById('inp-code').value.trim().toLowerCase();
  if(!email||!code){document.getElementById('modal-err').style.display='block';return;}
  db.ref('tests/gender').once('value').then(snap=>{
    const results=[];
    snap.forEach(c=>{
      const d={_key:c.key,...c.val()};
      if((d.student?.email||'').toLowerCase()===email&&(d.student?.classCode||'').toLowerCase()===code) results.push(d);
    });
    if(!results.length){document.getElementById('modal-err').style.display='block';return;}
    document.getElementById('modalBg').style.display='none';
    document.getElementById('mainContent').style.display='block';
    renderGrades(results);
  });
}

function scalePipsHtml(val,max=5){
  if(!val) return '';
  let h='<div class="scale-pips">';
  for(let i=1;i<=max;i++) h+=`<div class="scale-pip${i<=val?' filled':''}"></div>`;
  return h+'</div>';
}

function dilemmaClass(pos){
  if(pos==='העצמה') return 'empower';
  if(pos==='חיפצון') return 'object';
  if(pos==='גם וגם') return 'both';
  return 'unknown';
}

function renderGrades(results){
  let html='';
  results.forEach(d=>{
    const hasGrade=d.feedback&&d.feedback.grade!==undefined;
    const grade=hasGrade?d.feedback.grade:null;
    const gradeColor=grade>=90?'#155724':grade>=75?'#0d6efd':grade>=60?'#856404':'#c0392b';
    const subDate=d.submittedAt?new Date(d.submittedAt).toLocaleDateString('he-IL'):'—';
    const gradeDate=d.feedback?.gradedAt?new Date(d.feedback.gradedAt).toLocaleDateString('he-IL'):'';
    const ans=d.answers||{};
    const pos=ans.dilemma_position||'';
    html+=`<div class="grade-card">
      <div class="gc-top">
        <div class="grade-circle ${hasGrade?'graded':'pending'}">${hasGrade?grade:'טרם<br>הוערך'}</div>
        <div class="gc-info">
          ${ans.clip_chosen?`<span class="gc-clip">🎬 ${escHtml(ans.clip_chosen)}</span>`:''}
          <div class="gc-date">הוגש: ${subDate}</div>
          <div class="gc-title">ייצוג מגדרי</div>
          ${hasGrade?`<div class="grade-bar"><div class="grade-fill" style="background:${gradeColor};width:${grade}%"></div></div>`:''}
        </div>
      </div>
      ${hasGrade&&d.feedback.note?`<div class="gc-note"><strong>הערת המורה:</strong>${escHtml(d.feedback.note)}</div>`:''}
      ${gradeDate?`<div style="font-size:.75rem;color:#888;margin-bottom:12px;">הוערך: ${gradeDate}</div>`:''}
      <div class="answers-section">
        <div class="answers-title">התשובות שלי</div>
        ${pos?`<div class="dilemma-badge ${dilemmaClass(pos)}">${pos==='העצמה'?'💚':pos==='חיפצון'?'🔴':pos==='גם וגם'?'⚖️':'❓'} ${escHtml(pos)}</div>`:''}
        ${ans.clip_desc?`<div class="ans-item"><div class="ans-label">תיאור הקליפ</div><div class="ans-value">${escHtml(ans.clip_desc)}</div></div>`:''}
        <div class="scale-row"><span class="scale-row-label">כמות נשים:</span>${scalePipsHtml(ans.quant_female)}</div>
        <div class="scale-row"><span class="scale-row-label">כמות גברים:</span>${scalePipsHtml(ans.quant_male)}</div>
        <div class="scale-row"><span class="scale-row-label">מיניות גלויה:</span>${scalePipsHtml(ans.qual_sexual)}</div>
        <div class="scale-row"><span class="scale-row-label">סוכנות נשית:</span>${scalePipsHtml(ans.qual_agency)}</div>
        ${ans.quant_explain?`<div class="ans-item"><div class="ans-label">הסבר כמות</div><div class="ans-value">${escHtml(ans.quant_explain)}</div></div>`:''}
        ${ans.qual_appearance?`<div class="ans-item"><div class="ans-label">מראה ולבוש</div><div class="ans-value">${escHtml(ans.qual_appearance)}</div></div>`:''}
        ${ans.qual_active?`<div class="ans-item"><div class="ans-label">פעיל / פסיבי</div><div class="ans-value">${escHtml(ans.qual_active)}</div></div>`:''}
        ${ans.dilemma_reason?`<div class="ans-item"><div class="ans-label">נימוק לעמדה</div><div class="ans-value">${escHtml(ans.dilemma_reason)}</div></div>`:''}
        ${ans.dilemma_success?`<div class="ans-item"><div class="ans-label">הצלחה ללא מיניות?</div><div class="ans-value">${escHtml(ans.dilemma_success)}</div></div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('mainContent').innerHTML=html||'<div style="text-align:center;padding:40px;color:#888;">לא נמצאו הגשות</div>';
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
