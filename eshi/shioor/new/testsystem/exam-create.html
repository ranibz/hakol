<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל המבחנים — גרסת הברזל</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; padding: 20px; }
        .main-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; max-width: 900px; margin: auto; }
        .btn-primary { background: #2563eb; border: none; padding: 12px; font-weight: 700; }
        .q-box { border-right: 4px solid #2563eb; background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 15px; }
        #share-box { display: none; background: #ecfdf5; border: 2px solid #10b981; padding: 15px; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="main-card">
    <h1 class="text-center mb-4" style="color: #1e3a8a;">מחולל המבחנים החכם</h1>
    
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label fw-bold">שם המבחן</label>
            <input type="text" id="exam-title" class="form-control" placeholder="למשל: תקשורת יא׳">
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">נושא אקטואלי</label>
            <input type="text" id="main-topic" class="form-control" placeholder="למשל: רשתות חברתיות">
        </div>
        <div class="col-12">
            <label class="form-label fw-bold">מושגים (מופרדים בפסיק)</label>
            <input type="text" id="concepts" class="form-control" value="מסגור, סדר יום, פייק ניוז">
        </div>
    </div>

    <div class="mt-4">
        <button id="btn-gen" class="btn btn-primary w-100 mb-2" onclick="generateQuestion()">✨ צור שאלה ב-AI</button>
        <button id="btn-save" class="btn btn-success w-100" style="display:none;" onclick="saveToFirebase()">💾 שמור והפץ</button>
    </div>

    <div id="share-box">
        <label class="form-label fw-bold text-success">המבחן מוכן! שלח לתלמידים:</label>
        <div class="input-group">
            <input type="text" id="student-link" class="form-control" readonly>
            <button class="btn btn-outline-success" onclick="copyLink()">העתק</button>
        </div>
    </div>

    <div id="questions-area"></div>
</div>

<script>
// Firebase Config - וודא שהפרטים האלו מדויקים אצלך
const firebaseConfig = {
    apiKey: "AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",
    databaseURL: "https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tests-fd938"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// הגדרות API - שימוש ב-v1 ובשם מודל יציב
const API_KEY = "AIzaSyDXexsbNZ-uMT-oIuxyIJQyF9rMmU9ObiI";
const MODEL = "gemini-1.5-flash"; // מודל יציב ביותר לשימוש API
const API_URL = `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${API_KEY}`;

let questions = [];

async function generateQuestion() {
    const topic = document.getElementById('main-topic').value;
    const concepts = document.getElementById('concepts').value;
    const btn = document.getElementById('btn-gen');

    if(!topic) return alert("נא להזין נושא");
    
    btn.disabled = true;
    btn.innerHTML = 'מייצר שאלה... ⏳';

    const prompt = `צור שאלת בגרות בתקשורת על "${topic}" עם המושגים: ${concepts}. החזר JSON בלבד: {"context":"רקע","question":"שאלה"}`;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
            })
        });

        const data = await response.json();
        
        // בדיקת שגיאות מהשרת של גוגל
        if (data.error) throw new Error(data.error.message);

        const rawText = data.candidates[0].content.parts[0].text;
        const q = JSON.parse(rawText);
        
        questions.push(q);
        renderQuestion(q, questions.length);
        
        btn.disabled = false;
        btn.innerHTML = '✨ צור שאלה נוספת';
        document.getElementById('btn-save').style.display = 'block';

    } catch (e) {
        console.error("Critical Error:", e);
        alert("תקלה: " + e.message);
        btn.disabled = false;
        btn.innerHTML = '✨ נסה שוב';
    }
}

function renderQuestion(q, num) {
    const area = document.getElementById('questions-area');
    const div = document.createElement('div');
    div.className = "q-box";
    div.innerHTML = `<h5>שאלה ${num}</h5><p>${q.context}</p><p class="fw-bold">${q.question}</p>`;
    area.prepend(div);
}

function saveToFirebase() {
    const title = document.getElementById('exam-title').value || "מבחן ללא שם";
    const newRef = db.ref('exams').push();
    newRef.set({ title, questions, createdAt: Date.now() }).then(() => {
        const examId = newRef.key;
        // יצירת הקישור - וודא שהקובץ exam-take.html נמצא באותה תיקייה בשרת
        const baseUrl = window.location.href.split('exam-create.html')[0];
        document.getElementById('student-link').value = baseUrl + 'exam-take.html?id=' + examId;
        document.getElementById('share-box').style.display = 'block';
    });
}

function copyLink() {
    const input = document.getElementById('student-link');
    input.select();
    navigator.clipboard.writeText(input.value);
    alert("הקישור הועתק!");
}
</script>
</body>
</html>
