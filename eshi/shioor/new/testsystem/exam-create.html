<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל המבחנים — סביבת עבודה יציבה</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --blue: #2563eb; --light: #f8fafc; }
        body { font-family: 'Assistant', sans-serif; background: var(--light); color: #1e293b; padding-top: 30px; }
        .card-main { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; border: none; }
        .btn-gen { background: var(--blue); color: white; border: none; padding: 12px; font-weight: 700; border-radius: 8px; }
        .btn-gen:hover { background: #1d4ed8; }
        .q-preview { border-right: 4px solid var(--blue); background: #f1f5f9; padding: 15px; border-radius: 6px; margin-top: 15px; }
        #link-section { display: none; background: #ecfdf5; border: 1px solid #10b981; padding: 15px; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 850px;">
    <div class="card-main">
        <h2 class="text-center mb-4" style="color: #1e3a8a;">יצירת מבחן חכם</h2>
        
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">שם המבחן</label>
                <input type="text" id="exam-title" class="form-control" placeholder="למשל: תקשורת יא׳">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">נושא המבחן</label>
                <input type="text" id="main-topic" class="form-control" placeholder="למשל: רשתות חברתיות">
            </div>
            <div class="col-12">
                <label class="form-label fw-bold">מושגים (מופרדים בפסיק)</label>
                <input type="text" id="concepts" class="form-control" value="מסגור, סדר יום, פייק ניוז">
            </div>
        </div>

        <div class="mt-4">
            <button id="btn-gen" class="btn btn-gen w-100 mb-2" onclick="generateQuestion()">✨ צור שאלה ב-AI</button>
            <button id="btn-save" class="btn btn-success w-100" style="display:none;" onclick="saveToFirebase()">💾 שמור והפץ לתלמידים</button>
        </div>

        <div id="link-section">
            <label class="form-label fw-bold text-success">המבחן נשמר ב-Firebase! שלח קישור זה:</label>
            <div class="input-group">
                <input type="text" id="final-link" class="form-control" readonly>
                <button class="btn btn-outline-success" onclick="copyText()">העתק</button>
            </div>
        </div>

        <div id="display-area" class="mt-4"></div>
    </div>
</div>

<script>
// Firebase Config - וודא שהפרטים האלו מדויקים
const firebaseConfig = {
    apiKey: "AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",
    databaseURL: "https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tests-fd938"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// API Setup - שימוש בגרסה היציבה ביותר
const API_KEY = "AIzaSyDXexsbNZ-uMT-oIuxyIJQyF9rMmU9ObiI";
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

let questions = [];

async function generateQuestion() {
    const topic = document.getElementById('main-topic').value;
    const concepts = document.getElementById('concepts').value;
    const btn = document.getElementById('btn-gen');

    if(!topic) return alert("נא להזין נושא");
    
    btn.disabled = true;
    btn.innerHTML = 'בונה שאלה... ⏳';

    const prompt = `צור שאלת בגרות בתקשורת על "${topic}" הכוללת את המושגים: ${concepts}. החזר JSON נקי בלבד ללא טקסט מסביב: {"context":"רקע","question":"שאלה"}`;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
            })
        });

        const data = await response.json();
        
        if (data.error) throw new Error(data.error.message);

        // חילוץ JSON נקי - המנגנון החסין
        let rawText = data.candidates[0].content.parts[0].text;
        rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
        
        const q = JSON.parse(rawText);
        questions.push(q);
        
        renderUI(q, questions.length);
        
        btn.disabled = false;
        btn.innerHTML = '✨ צור שאלה נוספת';
        document.getElementById('btn-save').style.display = 'block';

    } catch (e) {
        console.error("Error:", e);
        alert("שגיאה: " + e.message);
        btn.disabled = false;
        btn.innerHTML = '✨ נסה שוב';
    }
}

function renderUI(q, num) {
    const div = document.createElement('div');
    div.className = "q-preview";
    div.innerHTML = `<strong>שאלה ${num}</strong><p>${q.context}</p><p class="fw-bold">${q.question}</p>`;
    document.getElementById('display-area').prepend(div);
}

function saveToFirebase() {
    const title = document.getElementById('exam-title').value || "מבחן ללא שם";
    const ref = db.ref('exams').push();
    ref.set({ title, questions, createdAt: Date.now() }).then(() => {
        const id = ref.key;
        const url = window.location.href.replace('exam-create.html', 'exam-take.html') + '?id=' + id;
        document.getElementById('final-link').value = url;
        document.getElementById('link-section').style.display = 'block';
    });
}

function copyText() {
    const inp = document.getElementById('final-link');
    inp.select();
    navigator.clipboard.writeText(inp.value);
    alert("הקישור הועתק!");
}
</script>
</body>
</html>
