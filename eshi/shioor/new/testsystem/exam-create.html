<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יצירת מבחן — תקשורת וחברה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
/* כאן נשמר כל ה-CSS המקורי שלך (Newspaper Style) */
:root{--accent:#8B1A1A;--paper:#f5f0e8;--ink:#1a1208;--border:#c8b89a;--muted:#7a6a52;--gold:#c9a84c;--green:#1a5c1a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);}
#login-overlay{position:fixed;inset:0;background:rgba(26,18,8,.88);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--paper);border:3px solid var(--ink);box-shadow:7px 7px 0 var(--ink);padding:44px 40px;max-width:420px;width:92%;text-align:center;}
.lm-top{font-family:'Frank Ruhl Libre',serif;border-top:4px double var(--ink);border-bottom:4px double var(--ink);padding:12px 0;margin-bottom:28px;}
.lm-top h1{font-size:22px;font-weight:900;}
.lm-top p{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:2px;}
.lf{margin-bottom:16px;text-align:right;}
.lf label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;letter-spacing:1px;}
.lf input{width:100%;padding:12px 14px;border:2px solid var(--ink);font-family:'Heebo',sans-serif;font-size:15px;background:white;outline:none;}
.btn-login{width:100%;padding:14px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;}
.btn-login:hover{background:var(--accent);}
.login-err{color:var(--accent);font-size:13px;margin-top:12px;display:none;}
.reg-link{margin-top:18px;font-size:12px;color:var(--muted);}
.reg-link a{color:var(--accent);}
header{background:var(--ink);color:var(--paper);border-bottom:4px solid var(--gold);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.hdr-brand h1{font-family:'Frank Ruhl Libre',serif;font-size:19px;font-weight:900;}
.hdr-brand p{font-size:11px;color:var(--gold);letter-spacing:1.5px;margin-top:2px;}
.teacher-pill{background:rgba(201,168,76,.18);border:1px solid var(--gold);padding:6px 14px;font-size:13px;font-weight:700;color:var(--gold);}
.btn-out{background:transparent;border:1.5px solid rgba(245,240,232,.3);color:var(--paper);padding:7px 16px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.container{max-width:1100px;margin:0 auto;padding:28px 20px;}
.steps{display:flex;gap:0;margin-bottom:32px;border:2px solid var(--ink);overflow:hidden;}
.step{flex:1;padding:12px 16px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--muted);background:white;border-left:1px solid var(--border);transition:.2s;}
.step:last-child{border-left:none;}
.step.active{background:var(--ink);color:var(--paper);}
.step.done{background:var(--green);color:white;}
.step-num{font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:900;display:block;margin-bottom:2px;}
.card{background:white;border:2px solid var(--ink);box-shadow:4px 4px 0 var(--border);padding:28px;margin-bottom:24px;}
.card-title{font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:900;border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:20px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:2px solid var(--border);font-family:'Heebo',sans-serif;font-size:14px;background:var(--paper);outline:none;color:var(--ink);}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--ink);}
.fg textarea{resize:vertical;min-height:70px;line-height:1.6;}
.tag-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.tag{padding:5px 12px;border:2px solid var(--border);font-size:12px;cursor:pointer;background:white;transition:.15s;color:var(--muted);}
.tag:hover{border-color:var(--ink);color:var(--ink);}
.tag.sel{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.chapter-toggle{display:flex;border:2px solid var(--ink);margin-bottom:20px;overflow:hidden;}
.ct-btn{flex:1;padding:11px;border:none;background:white;font-family:'Frank Ruhl Libre',serif;font-size:14px;font-weight:700;cursor:pointer;border-left:1px solid var(--border);color:var(--muted);transition:.2s;}
.ct-btn:last-child{border-left:none;}
.ct-btn.active{background:var(--ink);color:var(--paper);}
.btn-primary{background:var(--accent);color:white;border:none;padding:13px 28px;font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.btn-primary:hover{background:#6b1010;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{background:white;color:var(--ink);border:2px solid var(--ink);padding:11px 24px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-green{background:var(--green);color:white;border:none;padding:13px 28px;font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:700;cursor:pointer;}
.gen-question{background:var(--paper);border:2px solid var(--border);border-right:5px solid var(--gold);padding:20px;margin-bottom:16px;position:relative;}
.gen-q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.gen-q-num{font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:900;color:var(--accent);}
.gen-q-pts{font-size:12px;color:var(--muted);font-weight:700;}
.gen-context{background:white;border-right:4px solid var(--gold);padding:12px 14px;font-size:13px;line-height:1.8;margin-bottom:14px;}
.gen-context-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--gold);margin-bottom:6px;text-transform:uppercase;}
.gen-sub{display:flex;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.7;}
.gen-sub .pts{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;min-width:50px;}
.gen-sub .letter{font-weight:700;min-width:16px;}
.del-btn{position:absolute;top:12px;left:12px;background:none;border:1px solid #fee2e2;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;color:#ef4444;}
.del-btn:hover{background:#fee2e2;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.status-msg{padding:10px 16px;font-size:13px;font-weight:700;margin-bottom:16px;display:none;}
.status-loading{background:#fff8e1;border:1px solid var(--gold);color:#7a5a10;}
.status-error{background:#fff0f0;border:1px solid var(--accent);color:var(--accent);}
.status-ok{background:#f0fff4;border:1px solid var(--green);color:var(--green);}
.exam-summary{background:var(--ink);color:var(--paper);padding:20px 24px;margin-bottom:24px;}
.exam-summary h3{font-family:'Frank Ruhl Libre',serif;font-size:18px;margin-bottom:12px;color:var(--gold);}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;}
.sum-box{text-align:center;}
.sum-num{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;color:var(--gold);}
.sum-lbl{font-size:10px;color:rgba(245,240,232,.6);letter-spacing:1px;margin-top:2px;}
.share-box{background:#fff8e1;border:2px solid var(--gold);padding:18px 20px;margin-top:20px;}
.share-box h4{font-family:'Frank Ruhl Libre',serif;font-size:15px;color:#7a5a10;margin-bottom:10px;}
.share-row{display:flex;gap:8px;}
.share-input{flex:1;padding:10px 14px;border:2px solid var(--gold);font-family:monospace;font-size:13px;background:white;outline:none;}
.btn-copy{padding:10px 18px;background:var(--gold);color:var(--ink);border:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}
.edit-mode{background:#fff9f0;border:2px solid var(--gold);padding:16px;margin-bottom:12px;}
.edit-mode label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.edit-ta{width:100%;border:2px solid var(--border);padding:10px 12px;font-family:'Heebo',sans-serif;font-size:13px;line-height:1.7;background:white;resize:vertical;min-height:80px;outline:none;color:var(--ink);}
.edit-ta:focus{border-color:var(--ink);}
.edit-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.btn-edit-action{padding:7px 16px;border:2px solid var(--ink);font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:white;}
.btn-edit-action:hover{background:var(--paper);}
.btn-edit-action.replace{background:var(--accent);color:white;border-color:var(--accent);}
.btn-edit-action.replace:hover{background:#6b1010;}
.btn-edit-action.save{background:var(--green);color:white;border-color:var(--green);}
footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);letter-spacing:1px;border-top:2px solid var(--border);margin-top:20px;}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <div class="lm-top">
      <h1>יצירת מבחן</h1>
      <p>תקשורת וחברה | כניסת מורה</p>
    </div>
    <div class="lf"><label>טלפון</label><input type="tel" id="inp-phone" placeholder="05XXXXXXXX" dir="ltr"></div>
    <div class="lf"><label>סיסמה</label><input type="password" id="inp-pass" placeholder="סיסמה אישית"></div>
    <button class="btn-login" onclick="doLogin()">כניסה ←</button>
    <div class="login-err" id="login-err"></div>
    <div class="reg-link">עדיין לא רשומים? <a href="../teacher-register.html">לחץ כאן</a></div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="hdr-brand">
      <h1>📝 יצירת מבחן דיגיטלי</h1>
      <p>תקשורת וחברה | בעזרת AI</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="teacher-pill" id="teacher-name">—</div>
      <button class="btn-out" onclick="location.reload()">יציאה</button>
    </div>
  </header>

  <div class="container">
    <div class="steps">
      <div class="step active" id="step-1"><span class="step-num">1</span>הגדרות</div>
      <div class="step" id="step-2"><span class="step-num">2</span>יצירת שאלות</div>
      <div class="step" id="step-3"><span class="step-num">3</span>בדיקה ואישור</div>
      <div class="step" id="step-4"><span class="step-num">4</span>שליחה לכיתה</div>
    </div>

    <div id="panel-1">
      <div class="card">
        <div class="card-title">📋 הגדרות המבחן</div>
        <div class="form-row">
          <div class="fg"><label>שם המבחן</label><input type="text" id="exam-title" placeholder="למשל: מבחן מסגור וסדר יום"></div>
          <div class="fg"><label>כיתה</label><input type="text" id="exam-class" placeholder="למשל: יא׳2"></div>
        </div>
        <div class="fg"><label>הוראות לתלמיד (אופציונלי)</label><textarea id="exam-instructions" placeholder="למשל: ענו על כל השאלות. הסתמכו על החומר שנלמד."></textarea></div>
      </div>
      <div class="card">
        <div class="card-title">🏗 בניית שאלות</div>
        <div class="fg">
          <label>פרקים לכלול</label>
          <div class="chapter-toggle">
            <button class="ct-btn active" id="ct-A" onclick="toggleChapter('A')">פרק א׳<br><small style="font-family:Heebo;font-weight:400;font-size:11px;">23 נק׳ × 2</small></button>
            <button class="ct-btn active" id="ct-B" onclick="toggleChapter('B')">פרק ב׳<br><small style="font-family:Heebo;font-weight:400;font-size:11px;">13 נק׳ × 3</small></button>
            <button class="ct-btn active" id="ct-C" onclick="toggleChapter('C')">פרק ג׳<br><small style="font-family:Heebo;font-weight:400;font-size:11px;">7.5 נק׳ × 2</small></button>
          </div>
        </div>
        <div class="fg"><label>נושא מרכזי</label><input type="text" id="main-topic" placeholder="למשל: תקשורת בזמן מלחמה"></div>
        <div class="fg">
          <label>מושגים לכלול</label>
          <div class="tag-group" id="concept-tags">
             <span class="tag" onclick="toggleTag(this)">סדר יום</span>
             <span class="tag" onclick="toggleTag(this)">מסגור</span>
             <span class="tag" onclick="toggleTag(this)">פייק ניוז</span>
             <span class="tag" onclick="toggleTag(this)">ספירלת השתיקה</span>
             <span class="tag" onclick="toggleTag(this)">רשות רביעית</span>
          </div>
          <input type="text" id="extra-concepts" placeholder="מושגים נוספים — הפרד בפסיק" style="margin-top:8px;">
        </div>
        <div class="fg"><label>הוראות נוספות לבוט</label><textarea id="bot-instructions" placeholder="למשל: השתמש באירועים מהחודש האחרון..."></textarea></div>
      </div>
      <button class="btn-primary" onclick="goToStep2()">המשך ליצירת שאלות ←</button>
    </div>

    <div id="panel-2" style="display:none;">
      <div class="status-msg" id="status-msg"></div>
      <div id="questions-container"></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
        <button class="btn-primary" id="btn-gen" onclick="generateNextQuestion()">✨ צור שאלה נוספת</button>
        <button class="btn-secondary" onclick="goBack()">← חזרה</button>
      </div>
      <div id="proceed-btn" style="display:none;">
        <div class="card" style="border-color:var(--green);">
          <div style="font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;margin-bottom:12px;color:var(--green);">✓ המבחן מוכן לבדיקה</div>
          <button class="btn-green" onclick="goToStep3()">עבור לבדיקה ואישור ←</button>
        </div>
      </div>
    </div>
    </div>
</div>

<script>
// הגדרות Firebase המקוריות שלך
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

// הגדרות Gemini
const GEMINI_API_KEY = "AIzaSyDXexsbNZ-uMT-oIuxyIJQyF9rMmU9ObiI";
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

let teacherID='', teacherName='', generatedQuestions=[], examId='';
let activeChapters={A:true,B:true,C:true};
let chapterCounts={A:0,B:0,C:0};
const chapterTargets={A:4,B:6,C:5};

function doLogin(){
  const phone=document.getElementById('inp-phone').value.trim();
  const pass=document.getElementById('inp-pass').value.trim();
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!phone||!pass){err.textContent='נא למלא טלפון וסיסמה';err.style.display='block';return;}
  err.textContent='מתחבר...';err.style.display='block';
  db.ref('teachers').once('value').then(function(snap){
    var fk='',fd=null;
    snap.forEach(function(ch){
      if(fk) return;
      var t=ch.val();
      if(t.phone===phone && t.password===pass && t.status==='approved'){fk=ch.key;fd=t;}
    });
    if(!fk){err.textContent='טלפון/סיסמה שגויים';err.style.display='block';return;}
    teacherID=fk;
    teacherName=fd.name||((fd.firstName||'')+' '+(fd.lastName||'')).trim();
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('teacher-name').textContent='👤 '+teacherName;
  });
}

function toggleChapter(ch){
  activeChapters[ch]=!activeChapters[ch];
  document.getElementById('ct-'+ch).classList.toggle('active',activeChapters[ch]);
}

function getSelectedConcepts(){
  var tags=Array.from(document.querySelectorAll('#concept-tags .tag.sel')).map(function(t){return t.textContent.trim();});
  var extra=document.getElementById('extra-concepts').value.trim();
  if(extra) extra.split(',').forEach(function(s){s=s.trim();if(s)tags.push(s);});
  return tags;
}

function showStatus(msg,type){
  var el=document.getElementById('status-msg');
  el.textContent=msg;el.className='status-msg '+type;el.style.display='block';
}
function hideStatus(){document.getElementById('status-msg').style.display='none';}

function setStep(n){
  [1,2,3,4].forEach(function(i){
    document.getElementById('panel-'+i).style.display=i===n?'block':'none';
    var s=document.getElementById('step-'+i);
    s.classList.remove('active','done');
    if(i<n)s.classList.add('done');
    if(i===n)s.classList.add('active');
  });
}

function goToStep2(){
  var title=document.getElementById('exam-title').value.trim();
  var topic=document.getElementById('main-topic').value.trim();
  if(!title||!topic){alert('נא למלא שם מבחן ונושא');return;}
  setStep(2);
  generatedQuestions=[];
  chapterCounts={A:0,B:0,C:0};
  document.getElementById('questions-container').innerHTML='';
  document.getElementById('proceed-btn').style.display='none';
  generateNextQuestion();
}

function getNextChapter(){
  var order=['A','B','C'];
  for(var i=0;i<order.length;i++){
    var ch=order[i];
    if(activeChapters[ch] && chapterCounts[ch]<chapterTargets[ch]) return ch;
  }
  return null;
}

function buildPrompt(chapter,topic,concepts,extra,idx){
  var conceptStr=concepts.length?concepts.join(', '):'לפי שיקול דעתך';
  var p='';
  if(chapter==='A'){
    p=`צור שאלת פרק ראשון לבגרות תקשורת וחברה (23 נקודות). שאלה מספר ${idx+1}. נושא: ${topic}. כתוב קטע רקע אקטואלי (6-8 משפטים). שדות: context, source, subA(7pts), subB(4pts), subC(12pts). מושגים: ${conceptStr}.`;
  } else if(chapter==='B'){
    p=`צור שאלת פרק שני (13 נקודות). שאלה מספר ${idx+1}. נושא: ${topic}. קטע רקע (4-5 משפטים). שדות: context, source, subA(6pts), subB(7pts). מושגים: ${conceptStr}.`;
  } else {
    p=`צור שאלת פרק שלישי (7.5 נקודות). נושא: ${topic}. שאלת הגדרה קצרה. מושגים: ${conceptStr}.`;
  }
  return p;
}

async function generateNextQuestion(){
  var chapter=getNextChapter();
  if(!chapter){
    showStatus('כל השאלות נוצרו!','status-ok');
    document.getElementById('proceed-btn').style.display='block';
    document.getElementById('btn-gen').style.display='none';
    return;
  }
  
  var topic=document.getElementById('main-topic').value.trim();
  var concepts=getSelectedConcepts();
  var extra=document.getElementById('bot-instructions').value.trim();
  var btn=document.getElementById('btn-gen');
  btn.disabled=true;
  btn.innerHTML='יוצר שאלה... <span class="spinner"></span>';
  showStatus('הבוט יוצר שאלה ב-Gemini...','status-loading');

  var prompt=buildPrompt(chapter,topic,concepts,extra,chapterCounts[chapter]);

  try {
    const response = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: "אתה מחולל שאלות בגרות בתקשורת. החזר JSON נקי בלבד ללא Markdown." }] },
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { response_mime_type: "application/json" }
      })
    });

    if (!response.ok) throw new Error("API Error");

    const data = await response.json();
    const q = JSON.parse(data.candidates[0].content.parts[0].text);
    
    q._chapter=chapter;
    q._id='q'+Date.now();
    generatedQuestions.push(q);
    chapterCounts[chapter]++;
    renderQuestion(q,generatedQuestions.length);
    hideStatus();
    btn.disabled=false;
    btn.innerHTML='✨ צור שאלה נוספת';
  } catch(e) {
    showStatus('שגיאה ביצירה: וודא שהקובץ רץ משרת (לא כקובץ מקומי)','status-error');
    btn.disabled=false;
  }
}

function renderQuestion(q,num){
  var container=document.getElementById('questions-container');
  var div=document.createElement('div');
  div.className='gen-question';
  div.id='qq-'+q._id;
  div.innerHTML= `<h4>שאלה ${num} - פרק ${q._chapter}</h4><p>${q.context || ''}</p>`;
  container.appendChild(div);
}
</script>
