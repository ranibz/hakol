<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל מבחנים - סביבת עבודה מודרנית</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Frank+Ruhl+Libre:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card-bg: #ffffff; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: #1e293b; padding-top: 20px; }
        .main-card { background: var(--card-bg); border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 30px; }
        h1 { font-family: 'Frank Ruhl Libre', serif; font-weight: 700; color: #1e3a8a; }
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .step-item { flex: 1; text-align: center; font-size: 14px; font-weight: 600; color: #94a3b8; z-index: 1; }
        .step-item.active { color: var(--primary); }
        .btn-primary { background-color: var(--primary); border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-2px); }
        .question-preview { border-right: 4px solid var(--primary); background: #f1f5f9; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .spinner-border { width: 1.2rem; height: 1.2rem; margin-left: 8px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 900px;">
    <div class="text-center mb-5">
        <h1>מחולל המבחנים החכם</h1>
        <p class="text-muted">פלטפורמת יצירה מבוססת Gemini 1.5 Flash</p>
    </div>

    <div class="main-card">
        <h4 class="mb-4">⚙️ הגדרות המבחן</h4>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">שם המבחן</label>
                <input type="text" id="exam-title" class="form-control" placeholder="למשל: מבחן מסגור - יא תקשורת">
            </div>
            <div class="col-md-6">
                <label class="form-label">נושא אקטואלי</label>
                <input type="text" id="main-topic" class="form-control" placeholder="למשל: תקשורת ופייק ניוז במלחמה">
            </div>
            <div class="col-12">
                <label class="form-label">מושגים שחובה לכלול (הפרד בפסיק)</label>
                <input type="text" id="concepts" class="form-control" value="סדר יום, מסגור, פייק ניוז">
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button id="btn-gen" class="btn btn-primary w-100" onclick="generateQuestion()">✨ צור שאלה ראשונה</button>
            <button id="btn-save" class="btn btn-success w-100" style="display:none;" onclick="saveToFirebase()">שמור ושלח לתלמידים</button>
        </div>
    </div>

    <div id="questions-area"></div>
</div>

<script>
// הגדרות Firebase שלך (אל תשנה אותן)
const firebaseConfig = {
    apiKey: "AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",
    databaseURL: "https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tests-fd938"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// הגדרות Gemini (המפתח והכתובת המעודכנת)
const GEMINI_API_KEY = "AIzaSyDXexsbNZ-uMT-oIuxyIJQyF9rMmU9ObiI";
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

let questions = [];

async function generateQuestion() {
    const topic = document.getElementById('main-topic').value;
    const concepts = document.getElementById('concepts').value;
    const btn = document.getElementById('btn-gen');

    if(!topic) { alert("נא להזין נושא"); return; }

    btn.disabled = true;
    btn.innerHTML = 'ה-AI בונה שאלה... <span class="spinner-border spinner-border-sm"></span>';

    const prompt = `אתה מורה לתקשורת. צור שאלת בגרות על ${topic} המשלבת את המושגים: ${concepts}. החזר JSON בלבד עם השדות: context (קטע רקע), question (השאלה), answer (מחוון).`;

    try {
        const response = await fetch(GEMINI_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                system_instruction: { parts: [{ text: "החזר JSON נקי בלבד ללא Markdown." }] },
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { response_mime_type: "application/json" }
            })
        });

        const data = await response.json();
        const q = JSON.parse(data.candidates[0].content.parts[0].text);
        
        questions.push(q);
        renderQuestion(q);
        
        btn.disabled = false;
        btn.innerHTML = '✨ צור שאלה נוספת';
        document.getElementById('btn-save').style.display = 'block';

    } catch (e) {
        console.error(e);
        alert("שגיאה ביצירה. וודא שהקובץ רץ משרת אינטרנט ולא מהמחשב המקומי.");
        btn.disabled = false;
        btn.innerHTML = '✨ נסה שוב';
    }
}

function renderQuestion(q) {
    const area = document.getElementById('questions-area');
    const div = document.createElement('div');
    div.className = "main-card question-preview";
    div.innerHTML = `
        <h5>${q.context.substring(0, 50)}...</h5>
        <p>${q.question}</p>
        <small class="text-primary">מחוון: ${q.answer}</small>
    `;
    area.prepend(div);
}

function saveToFirebase() {
    const title = document.getElementById('exam-title').value;
    const examData = { title, questions, timestamp: Date.now() };
    
    db.ref('exams').push(examData).then(() => {
        alert("המבחן נשמר ב-Firebase!");
    });
}
</script>

</body>
</html>
