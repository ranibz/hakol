<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המחולל החכם — גרסה סופית</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Frank+Ruhl+Libre:wght@700&display=swap">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); padding-top: 20px; color: #1e293b; }
        .main-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 25px; border: none; }
        h1 { font-family: 'Frank Ruhl Libre', serif; font-weight: 700; color: #1e3a8a; }
        .btn-primary { background-color: var(--primary); border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .question-preview { border-right: 4px solid var(--primary); background: #f1f5f9; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        #share-box { display: none; background: #ecfdf5; border: 2px solid #10b981; padding: 15px; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 900px;">
    <div class="text-center mb-5">
        <h1>המחולל המבחנים החכם</h1>
        <p class="text-muted">יצירת מבחן בגרות מבוססת Gemini 1.5 Flash (גרסה יציבה)</p>
    </div>

    <div class="main-card">
        <h4 class="mb-4">⚙️ הגדרות המבחן</h4>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">שם המבחן</label>
                <input type="text" id="exam-title" class="form-control" placeholder="למשל: מבחן תקשורת — יא">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">נושא אקטואלי</label>
                <input type="text" id="main-topic" class="form-control" placeholder="למשל: תקשורת ופייק ניוז">
            </div>
            <div class="col-12">
                <label class="form-label fw-bold">מושגים (הפרד בפסיק)</label>
                <input type="text" id="concepts" class="form-control" value="מסגור, סדר יום, פייק ניוז">
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button id="btn-gen" class="btn btn-primary w-100 p-3 fw-bold" onclick="generateQuestion()">✨ צור שאלה ב-AI</button>
            <button id="btn-save" class="btn btn-success w-100" style="display:none;" onclick="saveToFirebase()">💾 שמור והפץ לתלמידים</button>
        </div>
        
        <div id="share-box">
            <h6 class="text-success mb-2">✓ המבחן נשמר! קישור לתלמידים:</h6>
            <div class="input-group">
                <input type="text" id="student-link" class="form-control" readonly>
                <button class="btn btn-outline-success" onclick="copyLink()">העתק</button>
            </div>
        </div>
    </div>
    <div id="questions-area"></div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",
    databaseURL: "https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tests-fd938"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ה-URL המדויק שגוגל דורשת
const API_KEY = "AIzaSyDXexsbNZ-uMT-oIuxyIJQyF9rMmU9ObiI";
const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

let questions = [];

async function generateQuestion() {
    const topic = document.getElementById('main-topic').value;
    const concepts = document.getElementById('concepts').value;
    const btn = document.getElementById('btn-gen');

    if(!topic) { alert("נא להזין נושא"); return; }

    btn.disabled = true;
    btn.innerHTML = 'בונה שאלה... <span class="spinner-border spinner-border-sm"></span>';

    // המבנה המדויק שמונע שגיאת 400
    const payload = {
        contents: [{
            parts: [{
                text: `אתה מורה לתקשורת. צור שאלת בגרות על "${topic}" הכוללת את המושגים: ${concepts}. החזר JSON נקי בלבד עם השדות: context, question, requirements.`
            }]
        }],
        generationConfig: {
            response_mime_type: "application/json"
        }
    };

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.candidates && data.candidates[0].content) {
            let rawText = data.candidates[0].content.parts[0].text;
            const q = JSON.parse(rawText);
            
            questions.push(q);
            renderQuestion(q, questions.length);
            
            btn.disabled = false;
            btn.innerHTML = '✨ צור שאלה נוספת';
            document.getElementById('btn-save').style.display = 'block';
        } else {
            throw new Error("Response structure error");
        }
    } catch (e) {
        console.error("Gemini Error:", e);
        alert("תקלה בתקשורת. נסה שוב.");
        btn.disabled = false;
        btn.innerHTML = '✨ נסה שוב';
    }
}

function renderQuestion(q, num) {
    const area = document.getElementById('questions-area');
    const div = document.createElement('div');
    div.className = "main-card question-preview";
    div.innerHTML = `<h5>שאלה ${num}</h5><p>${q.context}</p><p class="fw-bold">${q.question}</p>`;
    area.prepend(div);
}

function saveToFirebase() {
    const title = document.getElementById('exam-title').value || "מבחן ללא שם";
    const newRef = db.ref('exams').push();
    newRef.set({ title, questions, createdAt: Date.now() }).then(() => {
        const examId = newRef.key;
        const baseUrl = window.location.href.split('exam-create.html')[0];
        document.getElementById('student-link').value = baseUrl + 'exam-take.html?id=' + examId;
        document.getElementById('share-box').style.display = 'block';
    });
}

function copyLink() {
    const input = document.getElementById('student-link');
    input.select();
    navigator.clipboard.writeText(input.value);
    alert("הקישור הועתק!");
}
</script>
</body>
</html>
