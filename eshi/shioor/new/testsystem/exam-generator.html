<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחולל שאלות מהיר - Gemini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background: #fdfdfd; padding: 20px; font-family: 'Assistant', sans-serif; }
        .gen-box { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="gen-box">
    <h3>יצירת שאלת בגרות ממוקדת</h3>
    <p class="text-muted">הכנס מושג ותקבל שאלה מותאמת מיידית</p>
    
    <div class="input-group mb-3">
        <input type="text" id="single-concept" class="form-control" placeholder="הכנס מושג (למשל: הבניית מציאות)">
        <button class="btn btn-dark" onclick="generateSingle()">צור עכשיו</button>
    </div>

    <div id="result-area" class="mt-4"></div>
</div>

<script>
    const GEMINI_API_KEY = "AIzaSyDXexsbNZ-uMT-oIuxyIJQyF9rMmU9ObiI";

    async function generateSingle() {
        const concept = document.getElementById('single-concept').value;
        const resultDiv = document.getElementById('result-area');
        
        resultDiv.innerHTML = "מייצר... ⏳";

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `צור שאלת בגרות בתקשורת על המושג: ${concept}. החזר JSON עם שדות: question, rubric.` }] }],
                    generationConfig: { response_mime_type: "application/json" }
                })
            });
            
            const data = await res.json();
            const raw = JSON.parse(data.candidates[0].content.parts[0].text);
            
            resultDiv.innerHTML = `
                <div class="alert alert-secondary">
                    <h5>השאלה:</h5>
                    <p>${raw.question}</p>
                    <hr>
                    <h6>מחוון לבדיקה:</h6>
                    <small>${raw.rubric}</small>
                </div>
            `;
        } catch (e) {
            resultDiv.innerHTML = "שגיאה בייצור השאלה.";
        }
    }
</script>
</body>
</html>
