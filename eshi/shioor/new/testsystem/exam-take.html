<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ביצוע מבחן — תקשורת וחברה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; padding: 20px; }
        .exam-page { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .q-block { border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 25px; }
        textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; min-height: 120px; }
    </style>
</head>
<body>
<div class="exam-page">
    <h2 id="exam-title" class="mb-4">טוען מבחן...</h2>
    <div id="questions-container"></div>
    <button class="btn btn-primary w-100 p-3" onclick="submitExam()">✅ שלח מבחן לבדיקה</button>
</div>

<script>
const firebaseConfig = { /* זהה להגדרות למעלה */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const examId = params.get('id');

if (examId) {
    db.ref('exams/' + examId).once('value').then(snap => {
        const data = snap.val();
        document.getElementById('exam-title').innerText = data.title;
        renderExam(data.questions);
    });
}

function renderExam(qs) {
    const container = document.getElementById('questions-container');
    qs.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.innerHTML = `<h4>שאלה ${i+1}</h4><p class="bg-light p-3">${q.context}</p><p class="fw-bold">${q.question}</p><textarea id="ans-${i}" placeholder="כתוב את תשובתך כאן..."></textarea>`;
        container.appendChild(div);
    });
}

function submitExam() {
    alert("תשובותיך נשלחו לרני בן זאב! בהצלחה.");
}
</script>
</body>
</html>
