<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבחן — תקשורת וחברה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--accent:#8B1A1A;--paper:#f5f0e8;--ink:#1a1208;--border:#c8b89a;--muted:#7a6a52;--gold:#c9a84c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(26,18,8,.88);z-index:999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-box{background:var(--paper);border:3px solid var(--ink);box-shadow:7px 7px 0 var(--ink);padding:40px 36px;max-width:440px;width:92%;}
.modal-box h2{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900;margin-bottom:6px;}
.modal-box p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.mf input,.mf select{width:100%;padding:11px 14px;border:2px solid var(--border);font-family:'Heebo',sans-serif;font-size:14px;background:white;outline:none;color:var(--ink);}
.mf input:focus,.mf select:focus{border-color:var(--ink);}
.modal-err{color:var(--accent);font-size:12px;margin-bottom:10px;display:none;}
.btn-enter{width:100%;padding:13px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;}
.btn-enter:hover{background:var(--accent);}

/* PROGRESS */
.pbar{position:sticky;top:0;background:var(--ink);color:var(--paper);padding:9px 20px;display:flex;align-items:center;gap:12px;z-index:100;border-bottom:3px solid var(--accent);}
#plbl{font-family:'Frank Ruhl Libre',serif;font-size:13px;min-width:100px;white-space:nowrap;}
.ptrack{flex:1;height:5px;background:rgba(255,255,255,.15);border-radius:3px;}
.pfill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s;}
#ppct{font-size:11px;color:#aaa;min-width:34px;text-align:left;}
#bname{font-size:13px;font-weight:700;}
#bcls{font-size:10px;color:#aaa;}

/* HEADER */
.mhead{background:var(--ink);color:var(--paper);padding:14px 24px;border-bottom:4px solid var(--accent);}
.mhead h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(16px,4vw,24px);}
.mhead .sub{font-size:11px;color:var(--gold);margin-top:3px;letter-spacing:1px;}

/* MAIN */
#mainpage{max-width:800px;margin:0 auto;padding:28px 18px 70px;}

/* INSTRUCTIONS BOX */
.instr-box{background:white;border-right:5px solid var(--gold);padding:16px 20px;margin-bottom:28px;font-size:13px;line-height:1.8;}
.instr-title{font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;margin-bottom:8px;}

/* CHAPTER */
.chapter-header{background:var(--ink);color:var(--paper);padding:12px 20px;margin-bottom:20px;font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.chapter-header .pts{font-size:12px;color:var(--gold);font-family:'Heebo',sans-serif;}
.chapter-sub{font-size:13px;color:var(--paper);background:rgba(255,255,255,.1);padding:8px 20px;margin-bottom:20px;font-family:'Heebo',sans-serif;border-bottom:2px solid var(--accent);}

/* QUESTION */
.q-block{background:white;border:1px solid var(--border);margin-bottom:20px;}
.q-top{background:var(--accent);color:white;padding:10px 18px;font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;display:flex;justify-content:space-between;}
.q-top .q-pts{font-size:12px;opacity:.8;font-family:'Heebo',sans-serif;}
.q-context{border-right:4px solid var(--gold);background:#fff9f0;padding:14px 16px;font-size:13px;line-height:1.85;margin:16px 16px 0;}
.q-context-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--gold);margin-bottom:6px;text-transform:uppercase;}
.q-subs{padding:16px;}
.q-sub{margin-bottom:20px;}
.q-sub-header{display:flex;gap:10px;font-size:14px;font-weight:700;margin-bottom:8px;line-height:1.7;}
.q-sub-header .letter{color:var(--accent);min-width:20px;}
.q-sub-header .pts{font-size:11px;color:var(--muted);font-weight:400;white-space:nowrap;}
.q-sub-text{font-size:14px;line-height:1.7;margin-bottom:10px;color:var(--ink);}
.ws-ta{width:100%;border:2px solid var(--border);padding:10px 12px;font-family:'Heebo',sans-serif;font-size:14px;line-height:1.7;background:#fafaf8;resize:none;overflow:hidden;min-height:100px;color:var(--ink);}
.ws-ta:focus{outline:none;border-color:var(--ink);}
.mic-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.mic-btn{background:none;border:1.5px solid var(--border);padding:6px 14px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'Heebo',sans-serif;}
.mic-btn.recording{background:#fee2e2;border-color:#f00;color:#c00;}

/* NAVIGATION */
.nav-row{display:flex;justify-content:space-between;margin-top:32px;gap:12px;}
.btn-nav{background:var(--ink);color:white;border:none;padding:12px 28px;font-family:'Frank Ruhl Libre',serif;font-size:15px;cursor:pointer;}
.btn-nav:hover{background:var(--accent);}
.btn-submit{background:var(--accent);color:white;border:none;padding:14px;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;width:100%;margin-top:24px;letter-spacing:.5px;}
.btn-submit:hover{background:#6b1010;}

/* SUCCESS */
#success-page{display:none;text-align:center;padding:60px 20px;max-width:600px;margin:0 auto;}
.success-icon{font-size:72px;margin-bottom:20px;}
#success-page h2{font-family:'Frank Ruhl Libre',serif;font-size:30px;color:var(--accent);margin-bottom:12px;}
#success-page p{font-size:15px;color:var(--muted);line-height:1.8;}

/* ERROR */
#error-page{display:none;text-align:center;padding:80px 20px;}
#error-page h2{font-family:'Frank Ruhl Libre',serif;font-size:24px;color:var(--accent);margin-bottom:12px;}

footer{text-align:center;padding:16px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);}
</style>
</head>
<body>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h2 id="modal-title">כניסה למבחן</h2>
    <p id="modal-sub">תקשורת וחברה — מלאו את הפרטים</p>
    <div class="mf"><label>שם פרטי</label><input type="text" id="inp-fn" placeholder="שם פרטי"></div>
    <div class="mf"><label>שם משפחה</label><input type="text" id="inp-ln" placeholder="שם משפחה"></div>
    <div class="mf"><label>אימייל</label><input type="email" id="inp-email" placeholder="example@school.il" dir="ltr"></div>
    <div class="mf"><label>כיתה</label>
      <select id="inp-grade">
        <option value="">בחר כיתה</option>
        <option>י׳1</option><option>י׳2</option><option>י׳3</option>
        <option>יא׳1</option><option>יא׳2</option><option>יא׳3</option>
        <option>יב׳1</option><option>יב׳2</option><option>יב׳3</option>
      </select>
    </div>
    <div class="mf" id="field-code"><label>קוד מורה</label><input type="text" id="inp-code" placeholder="קוד שקיבלת מהמורה" dir="ltr"></div>
    <div class="modal-err" id="modal-err"></div>
    <button class="btn-enter" onclick="enterExam()">כניסה למבחן ←</button>
  </div>
</div>

<!-- PROGRESS -->
<div class="pbar" id="pbar" style="display:none;">
  <div><div id="bname"></div><div id="bcls"></div></div>
  <div id="plbl">שאלה 1</div>
  <div class="ptrack"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <div id="ppct">0%</div>
</div>

<!-- HEADER -->
<div class="mhead" id="mhead" style="display:none;">
  <h1 id="exam-title-display">מבחן</h1>
  <div class="sub" id="exam-sub">תקשורת וחברה</div>
</div>

<div id="mainpage" style="display:none;">
  <div id="exam-content"></div>
  <div id="success-page">
    <div class="success-icon">✅</div>
    <h2>המבחן נשלח בהצלחה!</h2>
    <p>תשובותיך נשמרו.<br>המורה יעיין בהן ויחזיר משוב.</p>
  </div>
  <div id="error-page">
    <h2>שגיאה בטעינת המבחן</h2>
    <p>אנא פנה למורה</p>
  </div>
</div>

<footer>פיתוח: רני בן זאב | hakolbakaf.co.il</footer>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

const params=new URLSearchParams(location.search);
const examId=params.get('id');
const urlCode=params.get('code');
if(urlCode && urlCode.trim()){document.getElementById('inp-code').value=urlCode;document.getElementById('field-code').style.display='none';}

let examData=null, student={}, micRec=null, currentQ=0, answers={};

// Load exam
if(!examId){
  document.getElementById('modal').style.display='none';
  document.getElementById('mainpage').style.display='block';
  document.getElementById('error-page').style.display='block';
} else {
  db.ref('exams/'+examId).once('value').then(snap=>{
    examData=snap.val();
    if(!examData){
      document.getElementById('modal').style.display='none';
      document.getElementById('mainpage').style.display='block';
      document.getElementById('error-page').style.display='block';
      return;
    }
    document.getElementById('modal-title').textContent=examData.title||'מבחן';
    document.getElementById('modal-sub').textContent='תקשורת וחברה — '+examData.class;
  });
}

function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

function enterExam(){
  const fn=document.getElementById('inp-fn').value.trim();
  const ln=document.getElementById('inp-ln').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  const grade=document.getElementById('inp-grade').value;
  const code=document.getElementById('inp-code').value.trim();
  const effectiveCode=code||(urlCode&&urlCode.trim()?urlCode:'');
  const err=document.getElementById('modal-err');
  if(!fn||!ln||!email||!grade||!effectiveCode){err.textContent='נא למלא את כל השדות';err.style.display='block';return;}
  db.ref('teacher_codes/'+effectiveCode).once('value').then(snap=>{
    const teacherID=snap.val()||'';
    const displayCode=effectiveCode.includes('_')?effectiveCode.split('_')[0]:effectiveCode;
    student={name:fn+' '+ln,firstName:fn,lastName:ln,email,class:grade,classCode:displayCode,teacherID};
    document.getElementById('modal').style.display='none';
    document.getElementById('pbar').style.display='flex';
    document.getElementById('mhead').style.display='block';
    document.getElementById('mainpage').style.display='block';
    document.getElementById('exam-title-display').textContent=examData?.title||'מבחן';
    document.getElementById('bname').textContent=fn+' '+ln;
    document.getElementById('bcls').textContent=grade;
    renderExam();
  });
}

function renderExam(){
  const qs=examData.questions||[];
  const container=document.getElementById('exam-content');
  container.innerHTML='';

  // Group by chapter
  const chapters={};
  qs.forEach((q,i)=>{
    const ch=q.chapter||q._chapter||'א';
    if(!chapters[ch]) chapters[ch]=[];
    chapters[ch].push({...q,_idx:i});
  });

  const chOrder=['א','ב','ג'];
  const chLabels={'א':'ראשון','ב':'שני','ג':'שלישי'};
  const chPts={'א':46,'ב':39,'ג':15};
  const chInstr={
    'א':'בפרק זה ענו על שתיים מבין השאלות (לכל שאלה — 23 נקודות).',
    'ב':'בפרק זה ענו על שלוש מבין השאלות (לכל שאלה — 13 נקודות).',
    'ג':'בפרק זה ענו על שתיים מבין השאלות (לכל שאלה — 7.5 נקודות).'
  };

  let qNum=0;
  chOrder.forEach(ch=>{
    if(!chapters[ch]) return;
    const chDiv=document.createElement('div');
    chDiv.innerHTML=`
      <div class="chapter-header">
        <span>פרק ${chLabels[ch]} (${chPts[ch]} נקודות)</span>
        <span class="pts">${chPts[ch]} נק׳</span>
      </div>
      <div class="chapter-sub">${chInstr[ch]}</div>`;
    container.appendChild(chDiv);

    chapters[ch].forEach(q=>{
      qNum++;
      const block=createQuestionBlock(q,qNum);
      container.appendChild(block);
    });
  });

  // Instructions
  if(examData.instructions){
    const iBox=document.createElement('div');
    iBox.className='instr-box';
    iBox.innerHTML=`<div class="instr-title">📋 הוראות</div>${examData.instructions}`;
    container.insertBefore(iBox,container.firstChild);
  }

  // Submit
  const submitDiv=document.createElement('div');
  submitDiv.innerHTML=`<button class="btn-submit" onclick="submitExam()">שליחת המבחן ✓</button>`;
  container.appendChild(submitDiv);

  updateProgress();
}

function createQuestionBlock(q,num){
  const div=document.createElement('div');
  div.className='q-block';
  const subs=[q.subA,q.subB,q.subC].filter(Boolean);
  const total=subs.reduce((s,x)=>s+(x.points||0),0);
  const letters=['א','ב','ג'];

  let html=`<div class="q-top"><span>שאלה ${num}</span><span class="q-pts">${total} נקודות</span></div>`;

  if(q.context){
    html+=`<div class="q-context"><div class="q-context-label">📰 קרא/י את הקטע הבא</div>${q.context}`;
    if(q.source) html+=`<div style="font-size:11px;color:#888;margin-top:8px;">(${q.source})</div>`;
    html+=`</div>`;
  }

  html+=`<div class="q-subs">`;
  subs.forEach((s,i)=>{
    const taId=`ans_q${q._idx}_${i}`;
    const micId=`mic_q${q._idx}_${i}`;
    html+=`<div class="q-sub">
      <div class="q-sub-header">
        <div class="letter">${letters[i]}.</div>
        <div style="flex:1">
          <div class="q-sub-text">${s.text}</div>
          <div class="pts">(${s.points} נקודות)</div>
        </div>
      </div>
      <div class="mic-row"><button class="mic-btn" id="${micId}" onclick="mic('${taId}',this)">🎙 הכתבה</button></div>
      <textarea class="ws-ta" id="${taId}" placeholder="כתבו תשובתכם כאן..." oninput="ar(this);updateProgress()" onpaste="return false"></textarea>
    </div>`;
  });
  html+=`</div>`;
  div.innerHTML=html;
  return div;
}

function updateProgress(){
  const qs=examData?.questions||[];
  const total=qs.length;
  let answered=0;
  qs.forEach((q,qi)=>{
    const subs=[q.subA,q.subB,q.subC].filter(Boolean);
    subs.forEach((s,si)=>{
      const ta=document.getElementById(`ans_q${qi}_${si}`);
      if(ta&&ta.value.trim()) answered++;
    });
  });
  const pct=total>0?Math.round(answered/qs.length/3*100):0;
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('plbl').textContent=`${answered} תשובות`;
}

function mic(tid,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('הדפדפן אינו תומך בהכתבה');return;}
  if(micRec){micRec.stop();micRec=null;btn.classList.remove('recording');btn.innerHTML='🎙 הכתבה';return;}
  const rec=new SR();rec.lang='he-IL';rec.continuous=true;rec.interimResults=false;
  rec.onresult=e=>{const ta=document.getElementById(tid);ta.value+=Array.from(e.results).slice(e.resultIndex).map(r=>r[0].transcript).join('');ar(ta);updateProgress();};
  rec.onend=()=>{micRec=null;btn.classList.remove('recording');btn.innerHTML='🎙 הכתבה';};
  rec.start();micRec=rec;btn.classList.add('recording');btn.innerHTML='⏹ עצור';
}

function collectAnswers(){
  const qs=examData?.questions||[];
  const ans={};
  qs.forEach((q,qi)=>{
    const subs=[q.subA,q.subB,q.subC].filter(Boolean);
    const letters=['a','b','c'];
    subs.forEach((s,si)=>{
      const ta=document.getElementById(`ans_q${qi}_${si}`);
      ans[`q${qi+1}_${letters[si]}`]=ta?ta.value.trim():'';
    });
  });
  return ans;
}

function submitExam(){
  if(!confirm('לשלוח את המבחן? לא ניתן לערוך לאחר השליחה.')) return;
  const answers=collectAnswers();
  const data={
    student,
    teacherID:student.teacherID||'',
    examId,
    examTitle:examData.title,
    answers,
    submittedAt:Date.now()
  };
  db.ref('exam_submissions/'+examId).push(data).then(()=>{
    document.getElementById('exam-content').style.display='none';
    document.getElementById('success-page').style.display='block';
    document.getElementById('pfill').style.width='100%';
    document.getElementById('ppct').textContent='100%';
  }).catch(e=>alert('שגיאה בשליחה: '+e.message));
}
</script>
</body>
</html>
