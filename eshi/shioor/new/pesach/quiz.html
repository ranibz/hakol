async function resolveTeacherID(classCode) {
  if (!classCode) return null;
  const snap = await db.ref('teacher_codes').once('value');
  const all = snap.val() || {};
  let found = null;
  Object.keys(all).forEach(key => {
    if (found) return;
    if (key.startsWith(classCode + '_')) found = all[key];
  });
  return found;
}

let cur = 0, score = 0, answered = false;
let studentName = '', studentClass = '', classCode = '', teacherID = null;

function startQuiz() {
  studentName = document.getElementById('inp-name').value.trim();
  studentClass = document.getElementById('inp-class').value.trim();
  classCode = document.getElementById('inp-code').value.trim();
  if (!studentName || !studentClass) { document.getElementById('modal-err').style.display = 'block'; return; }
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  if (classCode) resolveTeacherID(classCode).then(tid => { teacherID = tid; });
  renderQ();
}

function renderQ() {
  const d = QUESTIONS[cur];
  const labels = ['א', 'ב', 'ג', 'ד'];
  document.getElementById('prog-fill').style.width = ((cur / QUESTIONS.length) * 100) + '%';
  document.getElementById('prog-label').textContent = (cur + 1) + ' / ' + QUESTIONS.length;

  document.getElementById('q-wrap').innerHTML = `
    <div class="q-card">
      <div class="source-block">
        <div class="source-label">מהגדה של פסח</div>
        <div class="source-quote">${d.source}</div>
        <div class="source-origin">${d.origin}</div>
      </div>
      <div class="concept-block">
        <span class="concept-pill-label">${d.concept}</span>
        <div class="concept-text">${d.concept_text}</div>
      </div>
      <div class="question-body">
        <div class="q-intro">שאלה</div>
        <p class="q-text">${d.q}</p>
        <div class="options">
          ${d.opts.map((o,i) => `
            <button class="opt" onclick="pick(${i})">
              <span class="mk">${labels[i]}</span>
              <span>${o}</span>
            </button>`).join('')}
        </div>
        <div class="explanation" id="expl"></div>
        <div style="text-align:left">
          <button class="btn-next" id="btn-next" onclick="advance()">
            ${cur < QUESTIONS.length - 1 ? 'שאלה הבאה ←' : 'לתוצאות ←'}
          </button>
        </div>
      </div>
    </div>`;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const d = QUESTIONS[cur];
  document.querySelectorAll('.opt').forEach(o => o.classList.add('locked'));
  const opts = document.querySelectorAll('.opt');
  opts[d.ans].classList.add('correct');
  opts[d.ans].querySelector('.mk').textContent = '✓';
  if (i !== d.ans) { opts[i].classList.add('wrong'); opts[i].querySelector('.mk').textContent = '✗'; }
  else score++;
  const expl = document.getElementById('expl');
  expl.innerHTML = d.ex; expl.style.display = 'block';
  document.getElementById('btn-next').style.display = 'inline-block';
}

function advance() {
  cur++; answered = false;
  if (cur >= QUESTIONS.length) { showResult(); return; }
  renderQ();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'block';
  const pct = Math.round((score / QUESTIONS.length) * 100);
  document.getElementById('r-score').textContent = score + '/10';
  document.getElementById('r-pct').textContent = pct + '% תשובות נכונות';
  const msgs = [
    [0,3,"כל יציאה ממצרים מתחילה בצעד אחד — נסו שוב!"],
    [4,6,"הבן השואל! מכירים מושגים, אבל יש עוד מה לגלות."],
    [7,8,"\"ואפילו כולנו חכמים\" — ניתוח מרשים של הטקסט."],
    [9,10,"חכם! שולטים במלאכת הנרטיב התקשורתי של ההגדה."]
  ];
  let msg = msgs[0][2];
  for (const [a,b,m] of msgs) if (score>=a && score<=b) { msg=m; break; }
  document.getElementById('r-msg').textContent = msg;
  const concepts = QUESTIONS.map(q => q.concept.split(' — ')[0]);
  const unique = [...new Set(concepts)];
  document.getElementById('r-concepts').innerHTML = unique.map(c => `<span class="ctag">${c}</span>`).join('');
  saveResult(score, pct);
}

async function saveResult(sc, pct) {
  const status = document.getElementById('save-status');
  status.textContent = 'שומר תוצאות...';
  const tid = teacherID || classCode || 'guest';
  try {
    await db.ref('tests/pesach-quiz').push({
      name: studentName, class: studentClass,
      classCode: classCode || '', teacherID: tid,
      score: sc, percent: pct, total: QUESTIONS.length,
      timestamp: new Date().toISOString()
    });
    status.textContent = 'התוצאות נשמרו בהצלחה ✓';
    status.className = 'save-status ok';
  } catch(e) {
    status.textContent = 'שגיאה בשמירה — בדקו חיבור לרשת';
    status.className = 'save-status err-s';
  }
}

function restart() {
  cur = 0; score = 0; answered = false;
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  renderQ();
