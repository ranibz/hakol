<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>סאטירה פוליטית — סביבת מורה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--paper:#f5f0e8;--ink:#1a1208;--accent:#8B1A1A;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;direction:rtl}
#modal{position:fixed;inset:0;background:rgba(26,18,8,.88);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal-box{background:var(--paper);border:3px solid var(--ink);padding:28px 24px;max-width:400px;width:100%;box-shadow:8px 8px 0 var(--ink)}
.modal-title{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900;text-align:center;margin-bottom:4px}
.modal-sub{font-size:11px;text-align:center;opacity:.55;letter-spacing:2px;margin-bottom:18px;border-bottom:1px solid var(--ink);padding-bottom:10px}
.mf{margin-bottom:14px}
.mf label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:4px;color:var(--accent)}
.mf input{width:100%;border:1.5px solid var(--ink);background:var(--paper);font-family:'Heebo',sans-serif;font-size:14px;padding:9px 12px}
.mf input:focus{outline:2px solid var(--accent)}
#modal-err{color:var(--accent);font-size:13px;margin-bottom:8px;min-height:18px}
.modal-btn{width:100%;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:700;letter-spacing:2px;padding:12px;cursor:pointer;box-shadow:var(--shadow-sm);margin-bottom:10px;transition:background .15s}
.modal-btn:hover{background:var(--accent)}
.register-link{text-align:center;margin-top:8px;font-size:13px}
.register-link a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent)}
.masthead{text-align:center;padding:14px 20px 10px;border-top:5px solid var(--ink);border-bottom:5px solid var(--ink);margin-bottom:8px}
.masthead::before,.masthead::after{content:'';display:block;border-top:1px solid var(--ink)}
.masthead::before{margin-bottom:6px}.masthead::after{margin-top:6px}
.platform-name{font-size:10px;letter-spacing:5px;text-transform:uppercase;opacity:.5;margin-bottom:2px}
.masthead-title{font-family:'Frank Ruhl Libre',serif;font-size:clamp(18px,4vw,30px);font-weight:900;letter-spacing:2px}
.masthead-sub{font-size:12px;opacity:.6;letter-spacing:2px;margin-top:3px}
#dashboard{display:none}
.container{max-width:980px;margin:0 auto;padding:0 14px 50px}
.toolbar{background:#fffef9;border:1.5px solid var(--ink);padding:12px 14px;margin:14px 0;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:var(--shadow-sm)}
.toolbar input,.toolbar select{border:1.5px solid var(--ink);background:var(--paper);font-family:'Heebo',sans-serif;font-size:13px;padding:7px 10px;min-width:140px}
.toolbar-btn{background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:8px 16px;cursor:pointer;transition:background .15s}
.toolbar-btn:hover{background:var(--accent)}
.count-badge{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--ink);color:var(--paper)}
th{padding:9px 10px;font-family:'Frank Ruhl Libre',serif;font-weight:700;letter-spacing:.5px;text-align:right;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--ink);cursor:pointer;transition:background .12s}
tbody tr:hover{background:#fffef9}
td{padding:8px 10px;vertical-align:top}
.topic-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border:1px solid;background:#f5e8e8;color:#8B1A1A;border-color:#8B1A1A}
.grade-pill.graded{color:#1a5c1a;font-weight:700}
.grade-pill.ungraded{color:#888}
.expand-row{display:none;background:#fffef9}
.expand-row.open{display:table-row}
.expand-cell{padding:16px;border-bottom:2px solid var(--ink)}
.expand-inner{max-width:760px}
.ans-item{margin-bottom:14px;border-right:3px solid var(--accent);padding-right:10px}
.ans-q{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:3px;text-transform:uppercase}
.ans-text{font-size:13px;line-height:1.75;white-space:pre-wrap}
.section-sep{border:none;border-top:1px solid var(--ink);margin:14px 0}
.fp-title{font-family:'Frank Ruhl Libre',serif;font-size:14px;font-weight:700;margin-bottom:10px;letter-spacing:1px}
.fp-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;margin-bottom:8px}
.fp-row input[type=number]{width:90px;border:1.5px solid var(--ink);background:var(--paper);font-family:'Heebo',sans-serif;font-size:14px;padding:7px 10px}
.fp-row textarea{flex:1;min-width:200px;border:1.5px solid var(--ink);background:var(--paper);font-family:'Heebo',sans-serif;font-size:13px;padding:8px 10px;resize:vertical;min-height:60px;direction:rtl}
.save-btn{background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:8px 18px;cursor:pointer;transition:background .15s;box-shadow:var(--shadow-sm)}
.save-btn:hover{background:#1a5c1a}
.saved-notice{font-size:12px;color:#1a5c1a;font-weight:700;margin-right:10px;display:none}
footer{text-align:center;font-family:'Frank Ruhl Libre',serif;font-size:11px;letter-spacing:3px;opacity:.4;border-top:1px solid var(--ink);padding-top:14px;margin-top:24px}
</style>
</head>
<body>
<div id="modal">
  <div class="modal-box">
    <div class="modal-title">🔐 סביבת מורה</div>
    <div class="modal-sub">סאטירה פוליטית</div>
    <div class="mf"><label>טלפון</label><input type="tel" id="inp-phone" placeholder="0501234567" style="direction:ltr;text-align:left"></div>
    <div class="mf"><label>סיסמה אישית</label><input type="password" id="inp-pass" placeholder="סיסמה"></div>
    <div id="modal-err"></div>
    <button class="modal-btn" onclick="teacherLogin()">כניסה ←</button>
    <div class="register-link"><a href="../teacher-register.html">עדיין לא רשומים? הרשמה כאן</a></div>
  </div>
</div>
<div class="masthead">
  <div class="platform-name">hakolbakaf.co.il · סביבת מורה</div>
  <div class="masthead-title">סאטירה פוליטית — הגשות</div>
  <div class="masthead-sub">צפייה בתשובות · מתן ציונים · ייצוא CSV</div>
</div>
<div id="dashboard">
<div class="container">
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍 חיפוש לפי שם..." oninput="renderTable()">
    <select id="filter-topic" onchange="renderTable()">
      <option value="">— כל הנושאים —</option>
    </select>
    <select id="filter-class" onchange="renderTable()">
      <option value="">כל הכיתות</option>
    </select>
    <button class="toolbar-btn" onclick="exportCSV()">ייצוא CSV ⬇</button>
    <span class="count-badge" id="count-badge"></span>
  </div>
  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr><th>נושא</th><th>שם</th><th>מייל</th><th>שכבה</th><th>תאריך</th><th>ציון</th></tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <footer>פיתוח: רני בן זאב · גליל מערבי · hakolbakaf.co.il</footer>
</div>
</div>
<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();
const TOPICS={
  'satira':'סאטירה פוליטית',
  'ownership':'בעלות צולבת',
  'determinism':'דטרמיניזם טכנולוגי',
  'msagur':'מסגור תקשורתי',
  'symbolic_annihilation':'הכחדה סימבולית',
  'uses_and_gratifications':'שימושים וסיפוקים',
  'violence':'תיאוריות אלימות',
  'gender':'ייצוג מגדרי',
  'stereotype':'סטריאוטיפים',
  'denotation':'דנוטציה וקונוטציה',
  'reyting':'רייטינג',
  'praklit':'עיתונאי פרקליט ושומר סף'
};
const FIELD_LABELS={
  satira_definition:   'הגדרת סאטירה',
  satira_identification:'זיהוי סאטירה במערכון',
  polysemy_def:        'הגדרת פוליסמיות',
  polysemy_analysis:   'פוליסמיות — ניתוח הפרשנויות',
  polysemy_reason:     'פוליסמיות — סיבת הפרשנויות השונות',
  position_choice:     'בחירת עמדה',
  position_reason:     'נימוק הבחירה',
  position_pro:        'יתרון הבחירה',
  position_con:        'מחיר הבחירה',
  framing_liebskind:   'מסגור — ליבסקינד',
  framing_response:    'מסגור — התגובה',
  framing_conclusion:  'מסגור — מסקנה'
};
let teacherID='',allData=[];
function teacherLogin(){
  const phone=document.getElementById('inp-phone').value.trim();
  const pass=document.getElementById('inp-pass').value.trim();
  const err=document.getElementById('modal-err');
  if(!phone||!pass){err.textContent='נא למלא טלפון וסיסמה';return;}
  db.ref('teachers').once('value').then(snap=>{
    let foundKey='';
    snap.forEach(child=>{const t=child.val();if(t.password===pass&&t.phone===phone&&t.status==='approved')foundKey=child.key;});
    if(!foundKey){err.textContent='סיסמה שגויה או משתמש לא מאושר';return;}
    teacherID=foundKey;
    document.getElementById('modal').style.display='none';
    document.getElementById('dashboard').style.display='block';
    buildTopicFilter();
    loadData();
  });
}
function buildTopicFilter(){
  const sel=document.getElementById('filter-topic');
  Object.entries(TOPICS).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v;sel.appendChild(o);});
}
function loadData(){
  const promises=Object.keys(TOPICS).map(topic=>
    db.ref('tests/'+topic).once('value').then(snap=>{
      const raw=snap.val()||{};
      return Object.entries(raw).map(([k,v])=>({key:k,_topic:topic,_topicLabel:TOPICS[topic],...v}));
    })
  );
  Promise.all(promises).then(results=>{
    allData=results.flat().filter(d=>d.student&&d.student.teacherID===teacherID);
    allData.sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));
    renderTable();
  });
}
function renderTable(){
  const search=document.getElementById('search-input').value.toLowerCase();
  const topic=document.getElementById('filter-topic').value;
  const cls=document.getElementById('filter-class').value;
  const base=topic?allData.filter(d=>d._topic===topic):allData;
  const classes=[...new Set(base.map(d=>d.student?.class).filter(Boolean))].sort();
  const sel=document.getElementById('filter-class');
  const cur=sel.value;
  sel.innerHTML='<option value="">כל הכיתות</option>';
  classes.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(c===cur)o.selected=true;sel.appendChild(o);});
  const filtered=base.filter(d=>{
    const name=(d.student?.name||'').toLowerCase();
    return(!search||name.includes(search))&&(!cls||d.student?.class===cls);
  });
  document.getElementById('count-badge').textContent=filtered.length+' הגשות';
  const tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  filtered.forEach(d=>{
    const dt=d.submittedAt?new Date(d.submittedAt).toLocaleString('he-IL'):'-';
    const fb=d.feedback||{};
    const graded=fb.grade!==undefined&&fb.grade!==null&&fb.grade!=='';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="topic-badge">${d._topicLabel||d._topic}</span></td>
      <td style="font-weight:700">${d.student?.name||'-'}</td>
      <td style="direction:ltr;font-size:12px">${d.student?.email||'-'}</td>
      <td>${d.student?.class||'-'}</td>
      <td style="font-size:12px;white-space:nowrap">${dt}</td>
      <td><span class="grade-pill ${graded?'graded':'ungraded'}">${graded?'✅ '+fb.grade:'—'}</span></td>`;
    tbody.appendChild(tr);
    const expandTr=document.createElement('tr');
    expandTr.className='expand-row';
    expandTr.id='exp-'+d.key;
    const answers=d.answers||{};
    const ansHtml=Object.entries(FIELD_LABELS).map(([k,label])=>{
      const v=answers[k];if(!v)return'';
      return`<div class="ans-item"><div class="ans-q">${label}</div><div class="ans-text">${v}</div></div>`;
    }).join('');
    const existGrade=graded?fb.grade:'';
    const existComment=fb.comment||'';
    expandTr.innerHTML=`<td colspan="6" class="expand-cell"><div class="expand-inner">
      <div>${ansHtml}</div>
      <hr class="section-sep">
      <div class="fp-title">הערכת מורה</div>
      <div class="fp-row">
        <input type="number" id="grade-${d.key}" min="0" max="100" placeholder="ציון 0-100" value="${existGrade}">
        <textarea id="comment-${d.key}" placeholder="הערה לתלמיד...">${existComment}</textarea>
      </div>
      <button class="save-btn" onclick="saveFeedback('${d.key}','${d._topic}')">שמור הערכה ✓</button>
      <span class="saved-notice" id="saved-${d.key}">✓ נשמר</span>
    </div></td>`;
    tbody.appendChild(expandTr);
    tr.addEventListener('click',()=>{
      const exp=document.getElementById('exp-'+d.key);
      const isOpen=exp.classList.contains('open');
      document.querySelectorAll('.expand-row.open').forEach(r=>r.classList.remove('open'));
      document.querySelectorAll('tbody tr.expanded').forEach(r=>r.classList.remove('expanded'));
      if(!isOpen){exp.classList.add('open');tr.classList.add('expanded');}
    });
  });
}
function saveFeedback(key,topic){
  const grade=parseInt(document.getElementById('grade-'+key).value);
  const comment=document.getElementById('comment-'+key).value.trim();
  if(isNaN(grade)||grade<0||grade>100){alert('ציון לא תקין (0-100)');return;}
  db.ref('tests/'+(topic||'satira')+'/'+key+'/feedback').update({grade,comment,gradedAt:Date.now(),gradedBy:teacherID}).then(()=>{
    const rec=allData.find(d=>d.key===key);
    if(rec)rec.feedback={grade,comment};
    const s=document.getElementById('saved-'+key);
    s.style.display='inline';setTimeout(()=>{s.style.display='none';},2500);
    renderTable();
  });
}
function exportCSV(){
  const topic=document.getElementById('filter-topic').value;
  const cls=document.getElementById('filter-class').value;
  const base=topic?allData.filter(d=>d._topic===topic):allData;
  const data=cls?base.filter(d=>d.student?.class===cls):base;
  const fieldKeys=Object.keys(FIELD_LABELS);
  const headers=['שם','מייל','שכבה','קוד כיתה','נושא','תאריך','ציון','הערה',...Object.values(FIELD_LABELS)];
  const rows=data.map(d=>{
    const dt=d.submittedAt?new Date(d.submittedAt).toLocaleString('he-IL'):'-';
    const fb=d.feedback||{};
    return[d.student?.name||'',d.student?.email||'',d.student?.class||'',d.student?.classCode||'',
      d._topicLabel||'',dt,fb.grade!==undefined?fb.grade:'',fb.comment||'',
      ...fieldKeys.map(k=>(d.answers?.[k]||'').replace(/\n/g,' '))
    ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  const csv='\uFEFF'+headers.map(h=>'"'+h+'"').join(',')+'\n'+rows.join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='satira-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
</script>
</body>
</html>
