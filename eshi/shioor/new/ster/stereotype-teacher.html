<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סטריאוטיפים בתקשורת — ממשק מורה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--paper-dark:#e8e0cc;--ink:#1a1208;--ink-light:#6b5d45;--accent:#8b1a1a;--blue:#2563af;--green:#2d7a2d;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;line-height:1.7;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,18,8,.055) 27px,rgba(26,18,8,.055) 28px);}
.modal-overlay{position:fixed;inset:0;background:rgba(26,18,8,.93);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink);max-width:400px;width:100%;padding:36px;}
.modal-head{background:var(--ink);color:var(--paper);text-align:center;padding:14px 20px;margin:-36px -36px 24px;}
.modal-head h2{font-family:'Frank Ruhl Libre',serif;font-size:24px;font-weight:900;}
.modal-head p{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-top:3px;}
.m-field{margin-bottom:14px;}
.m-field label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-light);margin-bottom:4px;}
.m-field input{width:100%;padding:11px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;color:var(--ink);box-shadow:var(--shadow-sm);outline:none;}
.m-field input:focus{border-color:var(--accent);}
.m-btn{width:100%;padding:12px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);transition:all .15s;}
.m-btn:hover{background:var(--accent);}
.m-err{color:var(--accent);font-size:12px;margin-top:8px;text-align:center;display:none;}
.register-link{text-align:center;margin-top:14px;font-size:12px;color:var(--ink-light);}
.register-link a{color:var(--accent);font-weight:700;text-decoration:none;}
.masthead{background:var(--ink);color:var(--paper);border-bottom:6px double var(--paper-dark);text-align:center;padding:18px 20px;}
.masthead h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(20px,4vw,36px);font-weight:900;line-height:1;}
.teacher-line{font-size:12px;color:#ccc;margin-top:6px;letter-spacing:1px;}
.teacher-line strong{color:white;}
.page{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:13px 16px;}
.ctrl-input{padding:8px 12px;border:2px solid var(--ink);background:var(--paper);font-family:'Heebo',sans-serif;font-size:13px;color:var(--ink);outline:none;min-width:140px;}
.ctrl-input:focus{border-color:var(--accent);}
.ctrl-select{padding:8px 12px;border:2px solid var(--ink);background:var(--paper);font-family:'Heebo',sans-serif;font-size:13px;color:var(--ink);outline:none;}
.ctrl-btn{padding:8px 16px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.ctrl-btn:hover{background:var(--accent);}
.ctrl-btn.csv{background:var(--green);}
.ctrl-btn.csv:hover{background:#1a5c1a;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:14px;text-align:center;}
.stat-num{font-family:'Frank Ruhl Libre',serif;font-size:32px;font-weight:900;color:var(--accent);line-height:1;}
.stat-num.blue{color:var(--blue);}
.stat-num.green{color:var(--green);}
.stat-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-light);margin-top:4px;}
.loading{text-align:center;padding:40px;color:var(--ink-light);font-size:14px;}
table{width:100%;border-collapse:collapse;background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);}
thead th{background:var(--ink);color:var(--paper);padding:10px 13px;text-align:right;font-size:11px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--paper-dark);cursor:pointer;transition:background .15s;}
tbody tr:hover{background:#fff8f0;}
tbody td{padding:10px 13px;font-size:13px;vertical-align:middle;}
.expand-row{cursor:default!important;}
.expand-row:hover{background:transparent!important;}
.expand-inner{padding:18px 20px;background:var(--paper-dark);border-top:2px solid var(--ink);}
.feedback-panel{margin-top:14px;border:2px solid var(--accent);background:#fff5f5;padding:14px 16px;}
.feedback-panel h5{font-family:'Frank Ruhl Libre',serif;font-size:15px;color:var(--accent);margin-bottom:10px;border-bottom:1px solid #ddd;padding-bottom:6px;}
.fb-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.fb-label{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--ink-light);min-width:50px;}
.fb-grade{width:70px;padding:7px 10px;border:2px solid var(--ink);font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700;text-align:center;background:white;outline:none;}
.fb-comment{flex:1;padding:8px 11px;border:2px solid var(--ink);font-family:'Heebo',sans-serif;font-size:13px;background:white;resize:none;min-height:60px;outline:none;}
.fb-save{padding:9px 20px;background:var(--accent);color:white;border:none;font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #1a1208;}
.fb-save:hover{opacity:.85;}
.fb-saved{padding:9px 16px;background:var(--green);color:white;font-size:13px;font-weight:700;display:none;}
.grade-badge{display:inline-block;color:white;font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:900;padding:2px 9px;}
.exp-block{background:white;border:2px solid var(--ink);padding:14px 16px;margin-bottom:10px;border-right:4px solid var(--accent);}
.exp-block h5{font-family:'Frank Ruhl Libre',serif;font-size:14px;color:var(--accent);margin-bottom:6px;}
.exp-block p{font-size:13px;color:var(--ink-light);line-height:1.65;}
.exp-sort{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.sort-tag{font-size:11px;padding:3px 9px;border:1px solid;font-weight:700;}
.sort-tag.stereo{border-color:var(--accent);color:var(--accent);background:#fff0f0;}
.sort-tag.not{border-color:var(--green);color:var(--green);background:#f0fff0;}
.no-results{text-align:center;padding:40px;color:var(--ink-light);}
.topic-badge{display:inline-block;font-size:10px;padding:2px 7px;background:var(--blue);color:white;font-weight:700;margin-right:6px;vertical-align:middle;}
</style>
</head>
<body>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h2>כניסת מורה</h2><p>סטריאוטיפים בתקשורת</p></div>
    <div class="m-field">
      <label>טלפון</label>
      <input type="tel" id="inp-phone" placeholder="מספר טלפון" style="direction:ltr" autocomplete="off">
    </div>
    <div class="m-field">
      <label>סיסמה אישית</label>
      <input type="password" id="inp-pass" placeholder="הסיסמה שבחרתם בהרשמה" autocomplete="off">
    </div>
    <button class="m-btn" onclick="teacherLogin()">כניסה לצפייה בהגשות ←</button>
    <div class="m-err" id="modal-err"></div>
    <div class="register-link"><a href="../teacher-register.html">עדיין לא רשומים? לחץ כאן להרשמה</a></div>
  </div>
</div>

<div class="masthead">
  <h1>סטריאוטיפים בתקשורת — הגשות תלמידים</h1>
  <div class="teacher-line">מורה: <strong id="t-name">—</strong> &nbsp;|&nbsp; הגשות: <strong id="t-count">—</strong></div>
</div>

<div class="page">
  <div class="controls">
    <input class="ctrl-input" id="search-input" placeholder="🔍 חיפוש לפי שם..." oninput="renderTable()">
    <select class="ctrl-select" id="filter-topic" onchange="renderTable()">
      <option value="">— בחר נושא —</option>
      <option value="stereotype">סטריאוטיפים</option>
      <option value="ownership">בעלות צולבת</option>
      <option value="determinism">דטרמיניזם טכנולוגי</option>
      <option value="msagur">מסגור תקשורתי</option>
      <option value="reyting">רייטינג</option>
      <option value="konotazia">קונוטציה</option>
      <option value="praklit">עיתונאי פרקליט ושומר סף</option>
      <option value="denotation">דנוטציה וקונוטציה</option>
    </select>
    <select class="ctrl-select" id="filter-class" onchange="renderTable()">
      <option value="">כל הכיתות</option>
    </select>
    <button class="ctrl-btn" onclick="loadData()">↺ רענן</button>
    <button class="ctrl-btn csv" onclick="exportCSV()">ייצוא CSV ⬇</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">סה"כ הגשות</div></div>
    <div class="stat"><div class="stat-num blue" id="s-classes">0</div><div class="stat-label">כיתות</div></div>
    <div class="stat"><div class="stat-num green" id="s-today">0</div><div class="stat-label">הגשות היום</div></div>
  </div>
  <div id="content"><div class="loading">ממתין לכניסה...</div></div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let teacherID='', allData=[];

const TOPICS={
  'stereotype':'סטריאוטיפים',
  'ownership':'בעלות צולבת',
  'determinism':'דטרמיניזם טכנולוגי',
  'msagur':'מסגור תקשורתי',
  'reyting':'רייטינג',
  'konotazia':'קונוטציה',
  'praklit':'עיתונאי פרקליט ושומר סף',
  'denotation':'דנוטציה וקונוטציה'
};

function teacherLogin(){
  const pass=document.getElementById('inp-pass').value.trim();
  const phone=document.getElementById('inp-phone').value.trim();
  const err=document.getElementById('modal-err');
  err.style.display='none';
  if(!pass||!phone){err.textContent='נא למלא טלפון וסיסמה';err.style.display='block';return;}
  const btn=document.querySelector('.m-btn');btn.textContent='מאמת...';btn.disabled=true;
  db.ref('teachers').once('value').then(snap=>{
    let foundKey='';
    snap.forEach(child=>{
      const t=child.val();
      if(t.password===pass && t.phone===phone && t.status==='approved') foundKey=child.key;
    });
    if(!foundKey){
      err.textContent='סיסמה שגויה או משתמש לא מאושר';err.style.display='block';
      btn.textContent='כניסה לצפייה בהגשות ←';btn.disabled=false;return;
    }
    teacherID=foundKey;
    db.ref('teachers/'+teacherID).once('value').then(ts=>{
      const t=ts.val()||{};
      const name=(t.firstName&&t.lastName)?t.firstName+' '+t.lastName:(t.name||teacherID);
      document.getElementById('t-name').textContent=name;
    });
    document.getElementById('modal').style.display='none';
    loadData();
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('modal').style.display!=='none')teacherLogin();});

function loadData(){
  document.getElementById('content').innerHTML='<div class="loading">טוען...</div>';
  const promises=Object.keys(TOPICS).map(topic=>
    db.ref('tests/'+topic).once('value').then(snap=>{
      const raw=snap.val()||{};
      return Object.entries(raw).map(([k,v])=>({key:k,_topic:topic,_topicLabel:TOPICS[topic],...v}));
    })
  );
  Promise.all(promises).then(results=>{
    allData=results.flat().filter(d=>d.student&&d.student.teacherID===teacherID);
    allData.sort((a,b)=>b.submittedAt-a.submittedAt);
    updateStats();renderTable();
  });
}

function updateStats(){
  const today=new Date().toDateString();
  const classes=new Set(allData.map(d=>d.student?.class).filter(Boolean));
  document.getElementById('s-total').textContent=allData.length;
  document.getElementById('t-count').textContent=allData.length;
  document.getElementById('s-classes').textContent=classes.size;
  document.getElementById('s-today').textContent=allData.filter(d=>new Date(d.submittedAt).toDateString()===today).length;
}

function renderTable(){
  const search=document.getElementById('search-input').value.toLowerCase();
  const topicFilter=document.getElementById('filter-topic').value;
  const cls=document.getElementById('filter-class').value;

  const relevantData=topicFilter?allData.filter(d=>d._topic===topicFilter):allData;

  // עדכון dropdown כיתות דינמית
  const classes=[...new Set(relevantData.map(d=>d.student?.class).filter(Boolean))].sort();
  const sel=document.getElementById('filter-class');
  const currentCls=sel.value;
  sel.innerHTML='<option value="">כל הכיתות</option>';
  classes.forEach(c=>sel.innerHTML+=`<option${c===currentCls?' selected':''}>${c}</option>`);

  const filtered=relevantData.filter(d=>{
    const name=(d.student?.name||'').toLowerCase();
    return (!search||name.includes(search))&&(!cls||d.student?.class===cls);
  });

  if(!filtered.length){document.getElementById('content').innerHTML='<div class="no-results">אין הגשות תואמות.</div>';return;}

  let html='<table><thead><tr><th>#</th><th>שם</th><th>כיתה</th><th>נושא</th><th>ציון</th><th>שעת הגשה</th><th></th></tr></thead><tbody>';
  filtered.forEach((d,i)=>{
    const dt=new Date(d.submittedAt);
    const time=dt.toLocaleDateString('he-IL')+' '+dt.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const gb=d.feedback&&d.feedback.grade!==undefined
      ?`<span class="grade-badge" style="background:var(--green)">${d.feedback.grade}</span>`
      :'<span class="grade-badge" style="background:#aaa;font-size:11px">לא הוערך</span>';
    html+=`<tr onclick="toggleExpand('${d.key}')">
      <td style="color:var(--ink-light)">${i+1}</td>
      <td style="font-weight:700">${d.student?.name||'—'}</td>
      <td>${d.student?.class||'—'}</td>
      <td><span class="topic-badge">${d._topicLabel}</span></td>
      <td>${gb}</td>
      <td style="direction:ltr;text-align:right;font-size:12px;color:var(--ink-light)">${time}</td>
      <td style="color:var(--ink-light)">▾</td>
    </tr>
    <tr class="expand-row" id="exp-${d.key}" style="display:none"><td colspan="7"><div class="expand-inner">${buildExpand(d)}</div></td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('content').innerHTML=html;
}

function buildExpand(d){
  const a=d.answers||{};
  const LABELS={
    sort_explanation:'הסבר על אמירה קשה לסיווג',
    clip_description:'תיאור קליפ עם סטריאוטיפ מגדרי',
    clip_analysis:'ניתוח: מי הרוויח?',
    clip_alternative:'קליפ אלטרנטיבי',
    identity_stereo:'קבוצה, הסטריאוטיפ והאמת האישית',
    identity_missing:'מה הסטריאוטיפ מחמיץ',
  };
  const sortEntries=Object.entries(a).filter(([k])=>k.startsWith('sort_')&&!k.startsWith('sort_exp'));
  const sortHTML=sortEntries.length?`<div class="exp-block"><h5>מיון אמירות</h5><div class="exp-sort">
    ${sortEntries.map(([k,v])=>`<span class="sort-tag ${v==='סטריאוטיפ'?'stereo':'not'}">${k.replace('sort_','')}${v?': '+v:''}</span>`).join('')}
  </div></div>`:'' ;
  const textHTML=Object.entries(LABELS).map(([k,label])=>a[k]?`<div class="exp-block"><h5>${label}</h5><p>${a[k]}</p></div>`:'').join('');
  const fb=d.feedback||{};
  const emailLine=d.student?.email?`<div style="font-size:12px;color:var(--ink-light);margin-bottom:10px;direction:ltr;text-align:right">📧 ${d.student.email}</div>`:'';
  const savedNote=fb.grade!==undefined?`<div style="margin-bottom:8px;font-size:13px;color:var(--green)">✅ הוערך ${new Date(fb.gradedAt).toLocaleDateString('he-IL')} — ציון: <strong>${fb.grade}</strong>${fb.comment?' | '+fb.comment:''}</div>`:'';
  const feedbackPanel=`<div class="feedback-panel">
    <h5>✏️ הערכת מורה</h5>
    ${savedNote}
    <div class="fb-row"><span class="fb-label">ציון:</span><input class="fb-grade" id="fg-${d.key}" type="number" min="0" max="100" placeholder="0–100" value="${fb.grade!==undefined?fb.grade:''}"></div>
    <div class="fb-row"><span class="fb-label">הערה:</span><textarea class="fb-comment" id="fc-${d.key}" placeholder="הערה אישית לתלמיד...">${fb.comment||''}</textarea></div>
    <div class="fb-row"><button class="fb-save" onclick="saveFeedback('${d.key}')">💾 שמור הערכה</button><span class="fb-saved" id="fs-${d.key}">✓ נשמר!</span></div>
  </div>`;
  return emailLine+(sortHTML+textHTML||'<p style="color:var(--ink-light);font-size:13px">אין תשובות</p>')+feedbackPanel;
}

function saveFeedback(key){
  const topic=allData.find(d=>d.key===key)?._topic||'stereotype';
  const grade=document.getElementById('fg-'+key).value;
  const comment=document.getElementById('fc-'+key).value.trim();
  if(grade===''||isNaN(grade)){alert('יש להזין ציון');return;}
  const btn=document.querySelector('#exp-'+key+' .fb-save');
  btn.disabled=true;btn.textContent='שומר...';
  db.ref('tests/'+topic+'/'+key+'/feedback').update({grade:parseInt(grade),comment,gradedAt:Date.now(),gradedBy:teacherID})
    .then(()=>{
      const saved=document.getElementById('fs-'+key);
      saved.style.display='inline-block';
      btn.textContent='💾 שמור הערכה';btn.disabled=false;
      const idx=allData.findIndex(d=>d.key===key);
      if(idx>-1)allData[idx].feedback={grade:parseInt(grade),comment,gradedAt:Date.now()};
      setTimeout(()=>saved.style.display='none',3000);
    }).catch(()=>{btn.textContent='💾 שמור הערכה';btn.disabled=false;alert('שגיאה — נסו שנית');});
}

function toggleExpand(key){
  const row=document.getElementById('exp-'+key);if(!row)return;
  const open=row.style.display!=='none';
  document.querySelectorAll('.expand-row').forEach(r=>r.style.display='none');
  if(!open)row.style.display='';
}

function exportCSV(){
  if(!allData.length)return;
  const topicFilter=document.getElementById('filter-topic').value;
  const cls=document.getElementById('filter-class').value;
  const search=document.getElementById('search-input').value.toLowerCase();
  const relevantData=topicFilter?allData.filter(d=>d._topic===topicFilter):allData;
  const filtered=relevantData.filter(d=>{
    const name=(d.student?.name||'').toLowerCase();
    return (!search||name.includes(search))&&(!cls||d.student?.class===cls);
  });
  const LABELS={sort_explanation:'הסבר מיון',clip_description:'תיאור קליפ',clip_analysis:'ניתוח',clip_alternative:'אלטרנטיבה',identity_stereo:'זהות וסטריאוטיפ',identity_missing:'מה מוחמץ'};
  const hdrs=['שם','מייל','שכבה','קוד','נושא','תאריך','ציון','הערת מורה',...Object.values(LABELS)];
  const rows=filtered.map(d=>{
    const a=d.answers||{};
    const dt=new Date(d.submittedAt).toLocaleString('he-IL');
    const fb=d.feedback||{};
    return[d.student?.name,d.student?.email||'',d.student?.class,d.student?.classCode,d._topicLabel,dt,fb.grade!==undefined?fb.grade:'לא הוערך',fb.comment||'',...Object.keys(LABELS).map(k=>a[k]||'')];
  });
  const csv='\uFEFF'+[hdrs,...rows].map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='stereotype-submissions.csv';a.click();
}
</script>
</body>
</html>
