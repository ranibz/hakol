<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ספירלת השתיקה — סביבת המורה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--paper-dark:#e8e0cc;--ink:#1a1208;--ink-light:#6b5d45;--accent:#c9a84c;--green:#2d7a2d;--red:#8b1a1a;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,18,8,.055) 27px,rgba(26,18,8,.055) 28px);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink);padding:36px;width:100%;max-width:400px;}
.modal-head{background:var(--ink);color:var(--accent);text-align:center;padding:14px 20px;margin:-36px -36px 24px;}
.modal-head h2{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-light);margin-bottom:4px;}
.mf input{width:100%;padding:11px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;outline:none;}
.mbtn{width:100%;padding:12px;background:var(--ink);color:var(--accent);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
.merr{display:none;color:var(--red);font-size:13px;margin-bottom:10px;}
.masthead{background:var(--ink);color:var(--paper);border-bottom:4px solid var(--accent);}
.mhi{max-width:1000px;margin:0 auto;padding:0 24px;}
.mht{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #444;font-size:11px;letter-spacing:1.5px;opacity:.6;}
.mhti{text-align:center;padding:18px 0 10px;}
.mhti h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(20px,4vw,36px);font-weight:900;}
.mhti p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-top:5px;}
.mhr{height:3px;background:var(--accent);margin-bottom:6px;}
.page{max-width:1000px;margin:0 auto;padding:28px 20px 70px;}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;padding:14px 18px;background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);}
.ci{padding:8px 12px;border:2px solid var(--ink);font-family:'Heebo',sans-serif;font-size:13px;background:white;outline:none;}
.cb{padding:8px 16px;background:var(--ink);color:var(--accent);border:none;font-family:'Frank Ruhl Libre',serif;font-size:14px;font-weight:700;cursor:pointer;}
.cb.sec{background:var(--paper-dark);color:var(--ink);}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.stat{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:14px 18px;flex:1;min-width:120px;text-align:center;}
.stat-n{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;color:var(--accent);}
.stat-l{font-size:11px;letter-spacing:1px;color:var(--ink-light);}
.none{text-align:center;padding:40px;color:var(--ink-light);}
table{width:100%;border-collapse:collapse;background:white;border:2px solid var(--ink);}
th{background:var(--ink);color:var(--accent);font-family:'Frank Ruhl Libre',serif;padding:10px 14px;font-size:13px;text-align:right;}
tr:hover td{background:#fdf8f0;}
td{padding:10px 14px;border-bottom:1px solid var(--paper-dark);font-size:13px;cursor:pointer;}
.grade-badge{display:inline-block;padding:3px 10px;font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:700;color:white;}
.xrow td{background:var(--paper-dark)!important;cursor:default;}
.xi{padding:16px;font-size:13px;}
.ans-block{background:white;border:1px solid var(--ink);padding:10px 14px;margin-bottom:8px;border-right:3px solid var(--accent);}
.ans-lbl{font-size:11px;letter-spacing:1px;color:var(--ink-light);font-weight:700;margin-bottom:3px;}
.fb-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;}
.fb-inp{padding:8px 10px;border:2px solid var(--ink);font-family:'Heebo',sans-serif;font-size:13px;flex:1;min-width:200px;outline:none;}
.fb-grade{width:80px;padding:8px;border:2px solid var(--ink);font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700;text-align:center;outline:none;}
.fb-save{padding:8px 16px;background:var(--green);color:white;border:none;font-family:'Frank Ruhl Libre',serif;font-size:14px;font-weight:700;cursor:pointer;}
.fb-saved{display:none;color:var(--green);font-size:13px;font-weight:700;}
.reg-link{font-size:12px;color:var(--ink-light);text-decoration:underline;margin-right:auto;}
</style>
</head>
<body>
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-head"><h2>סביבת המורה</h2><div style="font-size:11px;letter-spacing:2px;opacity:.6;margin-top:3px;">ספירלת השתיקה</div></div>
    <div class="mf"><label>מספר טלפון</label><input id="inp-phone" type="tel" placeholder="05xxxxxxxx" autocomplete="off" style="direction:ltr"></div>
    <div class="mf"><label>סיסמה אישית</label><input id="inp-pass" type="password" placeholder="הסיסמה שבחרתם בהרשמה"></div>
    <div class="merr" id="merr"></div>
    <button class="mbtn" onclick="teacherLogin()">כניסה לצפייה בהגשות ←</button>
    <div style="text-align:center;margin-top:14px;"><a href="../teacher-register.html" class="reg-link">הרשמה / שכחתי סיסמה</a></div>
  </div>
</div>

<header class="masthead" id="mhead" style="display:none">
  <div class="mhi">
    <div class="mht"><span>סביבת המורה • תקשורת ועיתונות</span><span id="t-code"></span></div>
    <div class="mhti"><h1>ספירלת השתיקה — הגשות</h1><p>סביבת המורה</p></div>
    <div class="mhr"></div>
  </div>
</header>

<div class="page" id="mainpage" style="display:none">
  <div class="toolbar">
    <select id="filter-topic" onchange="renderTable()" style="padding:7px 10px;border:2px solid var(--ink);font-family:'Heebo',sans-serif;font-size:13px;background:white;margin-left:8px;">
      <option value="">— כל הנושאים —</option>
      <option value="spiral">ספירלת השתיקה</option>
      <option value="agenda">סדר יום תקשורתי</option>
      <option value="satira">סאטירה</option>
      <option value="rating">רייטינג</option>
      <option value="journalist">עיתונאי פרקליט</option>
      <option value="childhood">אובדן הילדות</option>
      <option value="freedom">חופש ביטוי</option>
      <option value="exclusion">הדרה</option>
      <option value="models">מודלים</option>
      <option value="msagur">מסגור</option>
      <option value="fakenews">פייק ניוז</option>
      <option value="newspaper">עריכת עיתון</option>
      <option value="dilemma">דילמה</option>
      <option value="globalization">גלובליזציה</option>
    </select>
    <input class="ci" id="filter-class" placeholder="סנן לפי כיתה..." oninput="renderTable()">
    <input class="ci" id="filter-name" placeholder="חיפוש שם..." oninput="renderTable()">
    <button class="cb" onclick="exportCSV()">📊 ייצא CSV</button>
    <button class="cb sec" onclick="loadData()">↺ רענן</button>
  </div>
  <div class="stats" id="stats"></div>
  <div id="content"><div class="none">טוען...</div></div>
</div>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app"};
firebase.initializeApp(FC);
const db=firebase.database();

let teacherID='',allData=[];

function teacherLogin(){
  const pass=document.getElementById('inp-pass').value.trim();
  const phone=document.getElementById('inp-phone').value.trim();
  const err=document.getElementById('merr');
  err.style.display='none';
  if(!pass||!phone){err.textContent='נא למלא טלפון וסיסמה';err.style.display='block';return;}
  const btn=document.querySelector('.mbtn');btn.textContent='מאמת...';btn.disabled=true;
  db.ref('teachers').once('value').then(snap=>{
    let foundKey='';
    snap.forEach(child=>{const t=child.val();if(t.password===pass&&t.phone===phone&&t.status==='approved')foundKey=child.key;});
    if(foundKey){
      teacherID=foundKey;
      if(document.getElementById('t-code'))document.getElementById('t-code').textContent=phone;
      document.getElementById('modal').style.display='none';
      document.getElementById('mhead').style.display='block';
      document.getElementById('mainpage').style.display='block';
      loadData();
    } else {
      err.textContent='סיסמה שגויה או משתמש לא מאושר.';err.style.display='block';
      btn.textContent='כניסה לצפייה בהגשות ←';btn.disabled=false;
    }
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('modal').style.display!=='none')teacherLogin();});

function loadData(){
  document.getElementById('content').innerHTML='<div class="none">טוען...</div>';
  const TOPICS={
    'spiral':'ספירלת השתיקה',
    'agenda':'סדר יום תקשורתי',
    'satira':'סאטירה',
    'rating':'רייטינג',
    'journalist':'עיתונאי פרקליט ושומר סף',
    'childhood':'אובדן הילדות',
    'freedom':'חופש הביטוי',
    'exclusion':'הדרה בתקשורת',
    'models':'מודלים של תקשורת',
    'globalization':'גלובליזציה',
    'msagur':'מסגור תקשורתי',
    'fakenews':'פייק ניוז',
    'newspaper':'עריכת עיתון',
    'dilemma':'דילמה עיתונאית',
    'ownership':'בעלות צולבת',
    'determinism':'דטרמיניזם טכנולוגי',
    'konotazia':'קונוטציה',
    'denotation':'דנוטציה וקונוטציה',
    'fiske':'מודל פיסק'
  };
  const promises=Object.keys(TOPICS).map(topic=>
    db.ref('tests/'+topic).once('value').then(snap=>{
      const raw=snap.val()||{};
      return Object.entries(raw).map(([k,d])=>({key:k,_topic:topic,_topicLabel:TOPICS[topic],...d}));
    })
  );
  Promise.all(promises).then(results=>{
    allData=results.flat()
      .filter(d=>d.student&&d.student.teacherID===teacherID)
      .sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));
    updateStats();renderTable();
  });
}

function updateStats(){
  const today=new Date().toDateString();
  const classes=new Set(allData.map(d=>d.student.class));
  const graded=allData.filter(d=>d.feedback&&d.feedback.grade!==undefined).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${allData.length}</div><div class="stat-l">הגשות</div></div>
    <div class="stat"><div class="stat-n">${classes.size}</div><div class="stat-l">כיתות</div></div>
    <div class="stat"><div class="stat-n">${graded}</div><div class="stat-l">הוערכו</div></div>
    <div class="stat"><div class="stat-n">${allData.filter(d=>new Date(d.submittedAt).toDateString()===today).length}</div><div class="stat-l">היום</div></div>`;
}

function renderTable(){
  const topic=document.getElementById('filter-topic')?document.getElementById('filter-topic').value:'';
  const cls=document.getElementById('filter-class').value.trim().toLowerCase();
  const name=document.getElementById('filter-name').value.trim().toLowerCase();
  const rows=allData.filter(d=>
    (!topic||d._topic===topic)&&
    (!cls||(d.student.class||'').toLowerCase().includes(cls))&&
    (!name||(d.student.name||'').toLowerCase().includes(name))
  );
  if(!rows.length){document.getElementById('content').innerHTML='<div class="none">אין הגשות תואמות.</div>';return;}
  let html='<table><thead><tr><th>#</th><th>שם</th><th>כיתה</th><th>נושא</th><th>ציון</th><th>שעת הגשה</th><th></th></tr></thead><tbody>';
  rows.forEach((d,i)=>{
    const dt=new Date(d.submittedAt);
    const time=dt.toLocaleDateString('he-IL')+' '+dt.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const gb=d.feedback&&d.feedback.grade!==undefined?`<span class="grade-badge" style="background:var(--green)">${d.feedback.grade}</span>`:'<span class="grade-badge" style="background:#aaa;font-size:11px">לא הוערך</span>';
    html+=`<tr onclick="togX('${d.key}')"><td style="color:var(--ink-light)">${i+1}</td><td style="font-weight:700">${d.student.name}</td><td>${d.student.class}</td><td style="font-size:12px;color:var(--ink-light)">${d._topicLabel||''}</td><td>${gb}</td><td style="direction:ltr;text-align:right;font-size:12px;color:var(--ink-light)">${time}</td><td style="color:var(--ink-light)">▾</td></tr>
    <tr class="xrow" id="xr-${d.key}" style="display:none"><td colspan="7"><div class="xi">${buildX(d)}</div></td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('content').innerHTML=html;
}

function buildX(d){
  const ans=d.answers||{};
  const labels={
    t1_scene:'סצנה נבחרת',t1_situation:'תיאור המצב',t1_why:'נימוק לשתיקה',t1_result:'תוצאה',
    t2_scene:'נושא תקשורתי',t2_example:'ביטוי בתקשורת',t2_majority:'תפיסת הרוב',t2_hidden:'הדעה שהוסתרה',t2_effect:'השפעה',
    t3_network:'רשת חברתית',t3_boost:'מנגנון חיזוק',t3_spiral:'ספירלת השתיקה',
    t4_position:'עמדה',t4_solution:'הצעת פתרון'
  };
  let html='';
  Object.entries(labels).forEach(([k,l])=>{
    if(ans[k])html+=`<div class="ans-block"><div class="ans-lbl">${l}</div>${ans[k]}</div>`;
  });
  const fb=d.feedback||{};
  html+=`<div class="fb-row">
    <input class="fb-grade" id="fg-${d.key}" type="number" min="0" max="100" placeholder="ציון" value="${fb.grade!==undefined?fb.grade:''}">
    <input class="fb-inp" id="fc-${d.key}" type="text" placeholder="הערה אישית..." value="${fb.comment||''}">
    <button class="fb-save" onclick="saveFeedback('${d.key}')">💾 שמור הערכה</button>
    <span class="fb-saved" id="fs-${d.key}">✓ נשמר!</span>
  </div>`;
  return html;
}

function togX(key){
  const row=document.getElementById('xr-'+key);
  const isOpen=row.style.display!=='none';
  document.querySelectorAll('.xrow').forEach(r=>r.style.display='none');
  if(!isOpen)row.style.display='table-row';
}

function saveFeedback(key){
  const grade=document.getElementById('fg-'+key).value;
  const comment=document.getElementById('fc-'+key).value.trim();
  if(!grade)return;
  db.ref('tests/'+(allData.find(r=>r.key===key)?._topic||'spiral')+'/'+key+'/feedback')
    .set({grade:parseInt(grade),comment,gradedAt:Date.now(),gradedBy:teacherID})
    .then(()=>{document.getElementById('fs-'+key).style.display='inline';setTimeout(()=>document.getElementById('fs-'+key).style.display='none',2500);});
}

function exportCSV(){
  const rows=[['שם','כיתה','נושא','ציון','הערה','תאריך']];
  allData.forEach(d=>{
    const fb=d.feedback||{};
    const dt=new Date(d.submittedAt).toLocaleDateString('he-IL');
    rows.push([d.student.name,d.student.class,d._topicLabel||d._topic,fb.grade||'',fb.comment||'',dt]);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='spiral-submissions.csv';a.click();
}
</script>
</body>
</html>
