<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בעלות צולבת — סביבת מורה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#f5f0e8;color:#1a1208;direction:rtl;}
.masthead{background:#1a1208;color:#f5f0e8;text-align:center;padding:14px 20px 10px;border-bottom:4px solid #c9a84c;}
.masthead h1{font-family:'Frank Ruhl Libre',serif;font-size:1.8rem;font-weight:900;}
.masthead-sub{font-size:.78rem;color:#aaa;}
.container{max-width:1000px;margin:0 auto;padding:24px 16px 60px;}
.toolbar{background:white;border:2px solid #1a1208;box-shadow:4px 4px 0 #1a1208;border-radius:2px;padding:14px 18px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.toolbar input,.toolbar select{padding:8px 12px;border:2px solid #1a1208;border-radius:2px;font-family:'Heebo',sans-serif;font-size:.88rem;background:#f5f0e8;}
.toolbar input:focus,.toolbar select:focus{outline:none;background:white;}
.btn{padding:8px 16px;border:2px solid #1a1208;border-radius:2px;font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;background:#1a1208;color:#f5f0e8;transition:all .15s;}
.btn:hover{background:#333;}
.btn.csv{background:#c9a84c;color:#1a1208;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:white;border:2px solid #1a1208;box-shadow:3px 3px 0 #1a1208;border-radius:2px;padding:12px;text-align:center;}
.stat-num{font-family:'Frank Ruhl Libre',serif;font-size:2rem;font-weight:900;}
.stat-label{font-size:.75rem;color:#555;margin-top:2px;}
table{width:100%;border-collapse:collapse;background:white;border:2px solid #1a1208;box-shadow:4px 4px 0 #1a1208;}
thead tr{background:#1a1208;color:#f5f0e8;}
th{padding:10px 12px;font-size:.82rem;font-weight:700;text-align:right;}
td{padding:10px 12px;font-size:.83rem;border-bottom:1px solid #e5e7eb;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9f6f0;}
.badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:.75rem;font-weight:700;}
.badge.graded{background:#dcfce7;color:#15803d;border:1px solid #16a34a;}
.badge.pending{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db;}
.expand-btn{background:none;border:none;cursor:pointer;font-size:.82rem;color:#1a1208;text-decoration:underline;}
.expand-row{display:none;}
.expand-row td{background:#f9f6f0;padding:16px 20px;}
.expand-row.open{display:table-row;}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
@media(max-width:600px){.answers-grid{grid-template-columns:1fr;}}
.ans-box{background:white;border:1px solid #d1d5db;border-radius:2px;padding:10px 12px;}
.ans-label{font-size:.72rem;font-weight:700;color:#555;margin-bottom:4px;}
.ans-val{font-size:.85rem;line-height:1.6;color:#1a1208;}
.feedback-panel{background:white;border:2px solid #c9a84c;border-radius:2px;padding:14px 16px;margin-top:12px;}
.feedback-panel h4{font-family:'Frank Ruhl Libre',serif;font-weight:900;margin-bottom:10px;}
.feedback-panel input,.feedback-panel textarea{width:100%;padding:8px 10px;border:2px solid #1a1208;border-radius:2px;font-family:'Heebo',sans-serif;font-size:.88rem;margin-bottom:8px;background:#f5f0e8;}
.feedback-panel textarea{resize:vertical;min-height:60px;}
.save-btn{background:#16a34a;color:white;border:2px solid #1a1208;border-radius:2px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;font-size:.88rem;}
.save-btn:hover{background:#15803d;}
.existing-feedback{background:#f0fdf4;border:1px solid #16a34a;border-radius:2px;padding:10px 12px;margin-bottom:10px;font-size:.85rem;}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:white;border:3px solid #1a1208;box-shadow:6px 6px 0 #1a1208;border-radius:2px;padding:28px 24px;max-width:380px;width:100%;}
.modal h2{font-family:'Frank Ruhl Libre',serif;font-size:1.3rem;font-weight:900;margin-bottom:16px;text-align:center;}
.modal input{width:100%;padding:10px 12px;border:2px solid #1a1208;border-radius:2px;font-family:'Heebo',sans-serif;font-size:.95rem;margin-bottom:10px;background:#f5f0e8;}
.modal-btn{width:100%;background:#1a1208;color:#f5f0e8;border:none;border-radius:2px;padding:12px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;}
.modal-err{color:#dc2626;font-size:.82rem;margin-bottom:8px;display:none;}
.register-link{text-align:center;margin-top:12px;font-size:.82rem;}
.register-link a{color:#1a1208;font-weight:700;}
</style>
</head>
<body>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>👩‍🏫 כניסת מורה</h2>
    <div class="modal-err" id="modal-err"></div>
    <input type="tel" id="inp-phone" placeholder="טלפון" style="direction:ltr">
    <input type="password" id="inp-pass" placeholder="סיסמה אישית">
    <button class="modal-btn" onclick="teacherLogin()">כניסה ←</button>
    <div class="register-link"><a href="../teacher-register.html">עדיין לא רשומים? לחץ כאן להרשמה</a></div>
  </div>
</div>

<div class="masthead">
  <h1>בעלות צולבת — סביבת מורה</h1>
  <div class="masthead-sub">צפייה בהגשות · ציונים · CSV</div>
</div>

<div class="container">
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍 חיפוש לפי שם..." oninput="renderTable()">
    <select id="filter-topic" onchange="renderTable()">
      <option value="">— בחר נושא —</option>
      <option value="ownership">בעלות צולבת</option>
      <option value="msagur">מסגור תקשורתי</option>
      <option value="reyting">רייטינג</option>
      <option value="konotazia">ציון וקונוטציה</option>
      <option value="praklit">עיתונאי פרקליט ושומר סף</option>
    </select>
    <select id="filter-class" onchange="renderTable()">
      <option value="">כל הכיתות</option>
    </select>
    <button class="btn csv" onclick="exportCSV()">ייצוא CSV ⬇</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">הגשות</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-graded">0</div><div class="stat-label">הוערכו</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-avg">—</div><div class="stat-label">ממוצע ציון</div></div>
  </div>

  <table id="main-table">
    <thead><tr>
      <th>שם</th><th>מייל</th><th>שכבה</th><th>תאריך</th><th>ציון</th><th>פעולות</th>
    </tr></thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",
  databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = firebase.database();

let allData = [];
let teacherCode = '';
let teacherID = '';

function teacherLogin(){
  const pass  = document.getElementById('inp-pass').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const err   = document.getElementById('modal-err');
  if(!pass||!phone){err.textContent='נא למלא טלפון וסיסמה';err.style.display='block';return;}
  db.ref('teachers').once('value').then(snap=>{
    let foundKey='';
    snap.forEach(child=>{
      const t=child.val();
      if(t.password===pass && t.phone===phone && t.status==='approved') foundKey=child.key;
    });
    if(!foundKey){err.textContent='סיסמה שגויה או משתמש לא מאושר';err.style.display='block';return;}
    teacherID=foundKey;
    document.getElementById('modal').style.display='none';
    loadData();
  });
}

function loadData(){
  const TOPICS = {
    'ownership': 'בעלות צולבת',
    'msagur': 'מסגור תקשורתי',
    'reyting': 'רייטינג',
    'konotazia': 'ציון וקונוטציה',
    'praklit': 'עיתונאי פרקליט ושומר סף'
  };
  const promises = Object.keys(TOPICS).map(topic =>
    db.ref('tests/'+topic).once('value').then(snap=>{
      const raw=snap.val()||{};
      return Object.entries(raw).map(([k,v])=>({key:k, _topic:topic, _topicLabel:TOPICS[topic], ...v}));
    })
  );
  Promise.all(promises).then(results=>{
    // הגשות חדשות — רק של המורה הזה. הגשות ישנות (בלי teacherID) — הכל
    allData = results.flat().filter(d => d.student?.teacherID === teacherID);
    renderTable();
  });
}

function renderTable(){
  const search = document.getElementById('search-input').value.toLowerCase();
  const cls    = document.getElementById('filter-class').value;
  const topic  = document.getElementById('filter-topic').value;
  const tbody  = document.getElementById('table-body');

  // עדכן תפריט כיתות לפי הנושא הנבחר
  const relevantData = topic ? allData.filter(d=>d._topic===topic) : allData;
  const classes=[...new Set(relevantData.map(d=>d.student?.class).filter(Boolean))].sort();
  const sel=document.getElementById('filter-class');
  const currentCls=sel.value;
  sel.innerHTML='<option value="">כל הכיתות</option>';
  classes.forEach(c=>sel.innerHTML+=`<option${c===currentCls?' selected':''}>${c}</option>`);

  const filtered = relevantData.filter(d=>{
    const name=(d.student?.name||'').toLowerCase();
    const matchName = !search||name.includes(search);
    const matchCls  = !cls||d.student?.class===cls;
    return matchName&&matchCls;
  });
  // stats
  document.getElementById('stat-total').textContent=filtered.length;
  const graded=filtered.filter(d=>d.feedback?.grade!==undefined);
  document.getElementById('stat-graded').textContent=graded.length;
  if(graded.length){
    const avg=graded.reduce((s,d)=>s+Number(d.feedback.grade),0)/graded.length;
    document.getElementById('stat-avg').textContent=Math.round(avg);
  } else document.getElementById('stat-avg').textContent='—';

  tbody.innerHTML='';
  filtered.forEach(d=>{
    const hasGrade = d.feedback?.grade!==undefined;
    const date = d.submittedAt?new Date(d.submittedAt).toLocaleDateString('he-IL'):'—';
    const tr = document.createElement('tr');
    tr.innerHTML=`
      <td>${d.student?.name||'—'}</td>
      <td style="direction:ltr;text-align:left;">${d.student?.email||'—'}</td>
      <td>${d.student?.class||'—'}</td>
      <td>${date}</td>
      <td><span class="badge ${hasGrade?'graded':'pending'}">${hasGrade?d.feedback.grade:'לא הוערך'}</span></td>
      <td><button class="expand-btn" onclick="toggleExpand('${d.key}')">פתח ▼</button></td>
    `;
    tbody.appendChild(tr);
    // expand row
    const extr = document.createElement('tr');
    extr.className='expand-row';
    extr.id='exp-'+d.key;
    const a=d.answers||{};
    extr.innerHTML=`<td colspan="6">
      <div class="answers-grid">
        <div class="ans-box"><div class="ans-label">כלי תקשורת שנבחר</div><div class="ans-val">${a.media_chosen||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">פירוט בעלות</div><div class="ans-val">${a.q1_ownership||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">סיבת הבחירה</div><div class="ans-val">${a.q1_reason||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">דוגמת ניגוד עניינים שנבחרה</div><div class="ans-val">${a.case_chosen||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">מה יעשה העיתונאי?</div><div class="ans-val">${a.journalist_action||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">הסבר ניגוד עניינים</div><div class="ans-val">${a.q2_explain||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">צנזורה פנימית</div><div class="ans-val">${a.q2_selfcensor||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">שני כלי תקשורת — קשר</div><div class="ans-val">${a.q3_two_media||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">סוג אינטרס</div><div class="ans-val">${a.interest_type||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">כתבה שלא תתפרסם</div><div class="ans-val">${a.q3_missing_story||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">עמדה לגבי חוק</div><div class="ans-val">${a.law_position||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">נימוק + דוגמה</div><div class="ans-val">${a.q4_reason||'—'}</div></div>
        <div class="ans-box"><div class="ans-label">הגנה כצרכן</div><div class="ans-val">${a.q4_consumer||'—'}</div></div>
      </div>
      <div class="feedback-panel">
        <h4>📝 הערכת מורה</h4>
        ${d.feedback?`<div class="existing-feedback">ציון קיים: <strong>${d.feedback.grade}</strong>${d.feedback.comment?' | הערה: '+d.feedback.comment:''}</div>`:''}
        <input type="number" id="grade-${d.key}" placeholder="ציון 0–100" min="0" max="100" value="${d.feedback?.grade||''}">
        <textarea id="comment-${d.key}" placeholder="הערה (אופציונלי)">${d.feedback?.comment||''}</textarea>
        <button class="save-btn" onclick="saveFeedback('${d.key}')">שמור הערכה ✓</button>
      </div>
    </td>`;
    tbody.appendChild(extr);
  });
}

function toggleExpand(key){
  const row=document.getElementById('exp-'+key);
  row.classList.toggle('open');
}

function saveFeedback(key){
  const grade=document.getElementById('grade-'+key).value;
  const comment=document.getElementById('comment-'+key).value;
  if(grade===''){alert('נא להזין ציון');return;}
  const topic=allData.find(d=>d.key===key)?._topic||document.getElementById('filter-topic').value;
  db.ref('tests/'+topic+'/'+key+'/feedback').set({
    grade:Number(grade), comment, gradedAt:new Date().toISOString()
  }).then(()=>{
    const idx=allData.findIndex(d=>d.key===key);
    if(idx>-1) allData[idx].feedback={grade:Number(grade),comment};
    renderTable();
    document.getElementById('exp-'+key).classList.add('open');
  });
}

function exportCSV(){
  const rows=[['שם','מייל','שכבה','קוד','תאריך','ציון','הערת מורה',
    'כלי תקשורת שנבחר','פירוט בעלות','דוגמת ניגוד עניינים','מה יעשה העיתונאי','צנזורה פנימית',
    'שני כלי תקשורת','סוג אינטרס','כתבה שלא תצא','עמדה חוק','נימוק']];
  allData.forEach(d=>{
    const a=d.answers||{};
    rows.push([
      d.student?.name||'', d.student?.email||'', d.student?.class||'', d.student?.classCode||'',
      d.submittedAt?new Date(d.submittedAt).toLocaleDateString('he-IL'):'',
      d.feedback?.grade??'', d.feedback?.comment||'',
      a.media_chosen||'', a.q1_ownership||'', a.case_chosen||'', a.journalist_action||'', a.q2_selfcensor||'',
      a.q3_two_media||'', a.interest_type||'', a.q3_missing_story||'', a.law_position||'', a.q4_reason||''
    ]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const topic=document.getElementById('filter-topic').value||'export';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=topic+'_'+new Date().toLocaleDateString('he-IL').replace(/\//g,'-')+'.csv';
  a.click();
}
</script>
</body>
</html>
