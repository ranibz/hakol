<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הציונים שלי — תקשורת ועיתונות</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--paper-dark:#e8e0cc;--ink:#1a1208;--ink-light:#6b5d45;--accent:#8b1a1a;--blue:#2563af;--green:#2d7a2d;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;line-height:1.7;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,18,8,.055) 27px,rgba(26,18,8,.055) 28px);}
.masthead{background:var(--ink);color:var(--paper);border-bottom:6px double var(--paper-dark);}
.mhi{max-width:700px;margin:0 auto;padding:0 20px;}
.mht{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #444;font-size:11px;opacity:.6;}
.mhti{text-align:center;padding:18px 0 12px;}
.mhti h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(20px,4vw,40px);font-weight:900;}
.mhti p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--paper-dark);margin-top:4px;}
.mhr{height:3px;background:var(--paper-dark);margin-bottom:8px;}
.page{max-width:700px;margin:0 auto;padding:28px 16px 60px;}
.modal-wrap{position:fixed;inset:0;background:rgba(26,18,8,.93);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbox{background:var(--paper);border:3px solid var(--ink);box-shadow:var(--shadow);max-width:380px;width:100%;padding:32px;}
.mbox h2{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900;margin-bottom:6px;text-align:center;}
.mbox .sub{font-size:13px;color:var(--ink-light);text-align:center;margin-bottom:20px;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-light);margin-bottom:4px;}
.mf input{width:100%;padding:10px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;outline:none;}
.mbtn{width:100%;padding:11px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
.mbtn:hover{background:var(--accent);}
.merr{color:var(--accent);font-size:13px;font-weight:700;text-align:center;margin-top:8px;display:none;}
.summary-bar{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:16px 20px;margin-bottom:20px;display:flex;gap:24px;flex-wrap:wrap;align-items:center;}
.sum-item{text-align:center;}
.sum-n{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;}
.sum-l{font-size:11px;color:var(--ink-light);}
.grade-card{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:20px 22px;margin-bottom:12px;border-right:5px solid var(--ink);}
.gc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.gc-name{font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:900;}
.gc-meta{font-size:12px;color:var(--ink-light);margin-top:2px;}
.grade-circle{width:64px;height:64px;border:3px solid var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Frank Ruhl Libre',serif;font-size:26px;font-weight:900;flex-shrink:0;}
.gc-pending{color:var(--ink-light);font-size:13px;padding:8px 12px;background:var(--paper-dark);border-right:3px solid var(--ink-light);}
.gc-feedback{background:#f0faf0;border:2px solid var(--green);padding:10px 14px;margin-top:10px;}
.gc-fb-lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--green);margin-bottom:4px;text-transform:uppercase;}
.gc-fb-text{font-size:14px;line-height:1.75;}
.ans-acc{border:1px solid var(--paper-dark);margin-top:10px;}
.ans-head{padding:9px 14px;cursor:pointer;display:flex;justify-content:space-between;font-size:13px;font-weight:700;background:var(--paper-dark);}
.ans-head:hover{background:var(--paper);}
.ans-body{display:none;padding:12px 14px;}
.ans-acc.open .ans-body{display:block;}
.ans-row{margin-bottom:8px;}
.ans-q{font-size:11px;font-weight:700;color:var(--ink-light);text-transform:uppercase;letter-spacing:.5px;}
.ans-v{font-size:13px;line-height:1.7;margin-top:2px;}
.loading{text-align:center;padding:40px;color:var(--ink-light);font-size:15px;}
footer{text-align:center;margin-top:40px;padding-top:12px;border-top:3px double var(--ink);font-size:12px;color:var(--ink-light);}
</style>
</head>
<body>
<div class="modal-wrap" id="modal">
  <div class="mbox">
    <h2>⭐ הציונים שלי</h2>
    <div class="sub">כל המטלות שלך במקום אחד</div>
    <div class="mf">
      <label>כתובת מייל</label>
      <input id="inp-email" type="email" placeholder="your@email.com" style="direction:ltr;text-align:left;" onkeydown="if(event.key==='Enter')lookup()">
    </div>
    <button class="mbtn" onclick="lookup()">הצג ציונים ←</button>
    <div class="merr" id="merr">לא נמצאו הגשות לכתובת זו.</div>
  </div>
</div>

<header class="masthead">
  <div class="mhi">
    <div class="mht"><span>הציונים שלי • תקשורת ועיתונות</span><span>גליל מערבי</span></div>
    <div class="mhti">
      <h1>⭐ הציונים שלי</h1>
      <p>כל המטלות • תקשורת ועיתונות</p>
    </div>
    <div class="mhr"></div>
  </div>
</header>

<div class="page" id="page" style="display:none"></div>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

const TOPICS={
  'dilemma':    'דילמה עיתונאית',
  'ownership':  'בעלות צולבת',
  'determinism':'דטרמיניזם טכנולוגי',
  'msagur':     'מסגור תקשורתי',
  'reyting':    'רייטינג',
  'konotazia':  'קונוטציה',
  'denotation': 'דנוטציה וקונוטציה',
  'praklit':    'עיתונאי פרקליט ושומר סף'
};

const COLORS={
  'dilemma':'#8b1a1a','ownership':'#2563af','determinism':'#6b21a8',
  'msagur':'#2d7a2d','reyting':'#7a4f1a','konotazia':'#1a6b6b',
  'denotation':'#b45309','praklit':'#1e3a8a'
};

function lookup(){
  const email=document.getElementById('inp-email').value.trim().toLowerCase();
  if(!email)return;
  document.getElementById('merr').style.display='none';
  const btn=document.querySelector('.mbtn');
  btn.textContent='טוען...';btn.disabled=true;

  const promises=Object.keys(TOPICS).map(topic=>
    db.ref('tests/'+topic).once('value').then(snap=>{
      const res=[];
      snap.forEach(c=>{
        const d=c.val();d._key=c.key;d._topic=topic;d._topicLabel=TOPICS[topic];
        if((d.student?.email||'').toLowerCase()===email) res.push(d);
      });
      return res;
    })
  );

  Promise.all(promises).then(results=>{
    btn.textContent='הצג ציונים ←';btn.disabled=false;
    const found=results.flat();
    if(!found.length){document.getElementById('merr').style.display='block';return;}
    document.getElementById('modal').style.display='none';
    document.getElementById('page').style.display='block';
    found.sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));

    const graded=found.filter(d=>d.grade!==undefined);
    const avg=graded.length?Math.round(graded.reduce((s,d)=>s+(+d.grade),0)/graded.length):null;

    const summaryHtml=`<div class="summary-bar">
      <div class="sum-item"><div class="sum-n">${found.length}</div><div class="sum-l">מטלות שהוגשו</div></div>
      <div class="sum-item"><div class="sum-n" style="color:var(--green)">${graded.length}</div><div class="sum-l">עם ציון</div></div>
      ${avg!==null?`<div class="sum-item"><div class="sum-n" style="color:var(--blue)">${avg}</div><div class="sum-l">ממוצע</div></div>`:''}
    </div>`;

    const cardsHtml=found.map(d=>{
      const s=d.student||{};
      const date=d.submittedAt?new Date(d.submittedAt).toLocaleString('he-IL'):'—';
      const ans=d.answers||{};
      const color=COLORS[d._topic]||'var(--ink)';
      const ansHtml=Object.entries(ans).map(([q,v])=>`
        <div class="ans-row">
          <div class="ans-q">${q.replace(/_/g,' ')}</div>
          <div class="ans-v">${v||'(ריק)'}</div>
        </div>`).join('');
      const gradeHtml=d.grade!==undefined
        ?`<div class="grade-circle">${d.grade}</div>`
        :`<div class="grade-circle" style="color:var(--ink-light);font-size:13px;text-align:center">ממתין</div>`;
      const fbHtml=d.feedback
        ?`<div class="gc-feedback"><div class="gc-fb-lbl">💬 הערת המורה</div><div class="gc-fb-text">${d.feedback}</div></div>`
        :d.grade===undefined?`<div class="gc-pending">המטלה הוגשה — הציון יעודכן בקרוב.</div>`:'';
      return `<div class="grade-card" style="border-right-color:${color}">
        <div class="gc-top">
          <div>
            <div class="gc-name" style="color:${color}">${d._topicLabel}</div>
            <div class="gc-meta">${s.class||''} | ${date}</div>
          </div>
          ${gradeHtml}
        </div>
        ${fbHtml}
        <div class="ans-acc" id="aa_${d._key}">
          <div class="ans-head" onclick="document.getElementById('aa_${d._key}').classList.toggle('open')">📋 הצג את תשובותי <span>▼</span></div>
          <div class="ans-body">${ansHtml}</div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('page').innerHTML=summaryHtml+cardsHtml+
      '<footer>גליל מערבי • תקשורת ועיתונות</footer>';
  }).catch(()=>{
    btn.textContent='הצג ציונים ←';btn.disabled=false;
    document.getElementById('merr').textContent='שגיאה בטעינה — נסה שנית.';
    document.getElementById('merr').style.display='block';
  });
}
</script>
</body>
</html>
