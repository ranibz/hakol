<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הציונים שלי — מודל פיסק</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--paper-dark:#e8e0cc;--ink:#1a1208;--ink-light:#6b5d45;--accent:#8b1a1a;--blue:#2563af;--green:#2d7a2d;--warm:#7a4f1a;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;line-height:1.7;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,18,8,.055) 27px,rgba(26,18,8,.055) 28px);}
.overlay{position:fixed;inset:0;background:rgba(26,18,8,.93);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbox{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink);max-width:380px;width:100%;padding:36px;}
.mhead{background:var(--ink);color:var(--paper);text-align:center;padding:14px 20px;margin:-36px -36px 24px;}
.mhead h2{font-family:'Frank Ruhl Libre',serif;font-size:24px;font-weight:900;}
.mhead p{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-top:3px;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-light);margin-bottom:4px;}
.mf input{width:100%;padding:11px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;outline:none;}
.mbtn{width:100%;padding:12px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
.mbtn:hover{background:var(--accent);}
.merr{color:var(--accent);font-size:13px;font-weight:700;margin-top:8px;text-align:center;display:none;}
.masthead{background:var(--ink);color:var(--paper);border-bottom:6px double var(--paper-dark);}
.mhi{max-width:860px;margin:0 auto;padding:0 20px;}
.mht{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #444;font-size:11px;letter-spacing:1px;opacity:.6;}
.mhti{text-align:center;padding:14px 0 10px;}
.mhti h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(22px,5vw,42px);font-weight:900;line-height:1;}
.mhti p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--paper-dark);margin-top:4px;}
.mhr{height:3px;background:var(--paper-dark);margin-bottom:8px;}
.page{max-width:860px;margin:0 auto;padding:28px 16px 60px;}
/* SUBMISSION CARD */
.sub-card{background:white;border:2px solid var(--ink);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
.sub-card-head{display:flex;align-items:center;gap:20px;padding:18px 22px;border-bottom:2px solid var(--paper-dark);cursor:pointer;user-select:none;}
.sub-card-head:hover{background:var(--paper);}
.grade-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900;flex-shrink:0;border:3px solid;}
.gc-graded{background:#d4edda;color:#1a5c1a;border-color:#1a5c1a;}
.gc-none{background:#f0f0f0;color:#888;border-color:#ccc;font-size:13px;}
.sub-meta{flex:1;}
.sub-meta .sm-date{font-size:12px;color:var(--ink-light);}
.sub-meta .sm-code{font-size:12px;color:var(--ink-light);margin-top:2px;}
.sub-meta .sm-grade-lbl{font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:900;margin-top:4px;}
.sub-meta .sm-grade-lbl.graded{color:var(--green);}
.sub-meta .sm-grade-lbl.none{color:#888;}
.sub-expand{color:var(--ink-light);font-size:14px;transition:transform .2s;}
.sub-card.open .sub-expand{transform:rotate(180deg);}
.sub-body{display:none;padding:20px 24px;border-top:2px solid var(--paper-dark);}
.sub-card.open .sub-body{display:block;}
/* GRADE PANEL */
.grade-panel-big{display:flex;align-items:center;gap:20px;background:#f0faf0;border:2px solid var(--green);padding:18px 22px;margin-bottom:18px;flex-wrap:wrap;}
.grade-big{font-family:'Frank Ruhl Libre',serif;font-size:56px;font-weight:900;color:var(--green);line-height:1;}
.grade-info{}
.grade-info .gi-bar{height:8px;border-radius:4px;background:#ccc;width:200px;margin:8px 0;overflow:hidden;}
.grade-info .gi-fill{height:100%;background:var(--green);transition:width .5s;}
.grade-info .gi-comment{font-size:14px;color:#333;font-style:italic;margin-top:4px;}
.grade-info .gi-date{font-size:12px;color:var(--ink-light);margin-top:4px;}
.pending-box{background:#fff8f0;border:2px solid var(--warm);padding:14px 18px;margin-bottom:16px;font-size:14px;color:var(--warm);font-weight:700;}
/* ANSWERS */
.ans-section h4{font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:900;margin-bottom:12px;border-bottom:2px solid var(--paper-dark);padding-bottom:6px;}
.ans-item{margin-bottom:10px;}
.ans-q{font-size:12px;font-weight:700;color:var(--warm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.ans-v{font-size:14px;background:var(--paper);border:1px solid var(--paper-dark);padding:10px 14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.empty-state{text-align:center;padding:60px 20px;font-family:'Frank Ruhl Libre',serif;font-size:20px;color:var(--ink-light);}
footer{text-align:center;margin-top:40px;padding-top:14px;border-top:3px double var(--ink);font-size:12px;color:var(--ink-light);}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="mbox">
    <div class="mhead"><h2>⭐ הציונים שלי</h2><p>מודל פיסק</p></div>
    <div class="mf"><label>כתובת מייל</label><input id="inp-email" type="email" placeholder="your@email.com" style="direction:ltr;text-align:left;" onkeydown="if(event.key==='Enter')lookup()"></div>
    <div class="mf"><label>קוד מורה</label><input id="inp-code" type="text" placeholder="הקוד שקיבלת מהמורה" onkeydown="if(event.key==='Enter')lookup()"></div>
    <button class="mbtn" onclick="lookup()">הצג ציונים ←</button>
    <div class="merr" id="merr"></div>
  </div>
</div>

<header class="masthead" id="mhead" style="display:none">
  <div class="mhi">
    <div class="mht"><span>הציונים שלי • מודל פיסק</span><span>גליל מערבי</span></div>
    <div class="mhti"><h1>⭐ הציונים שלי</h1><p id="student-lbl">—</p></div>
    <div class="mhr"></div>
  </div>
</header>
<div class="page" id="mainpage" style="display:none">
  <div id="content"></div>
  <footer>גליל מערבי • תקשורת ועיתונות • מודל פיסק</footer>
</div>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

function lookup(){
  const email=document.getElementById('inp-email').value.trim().toLowerCase();
  const code=document.getElementById('inp-code').value.trim().toLowerCase();
  if(!email||!code){showErr('יש למלא מייל וקוד');return;}
  document.querySelector('.mbtn').textContent='מחפש...';
  db.ref('tests/fiske').once('value').then(snap=>{
    const raw=snap.val()||{};
    const results=Object.entries(raw)
      .filter(([,d])=>d&&d.student&&
        (d.student.email||'').toLowerCase()===email&&
        (d.student.classCode||'').toLowerCase()===code)
      .map(([k,d])=>({key:k,...d}))
      .sort((a,b)=>b.submittedAt-a.submittedAt);
    document.getElementById('overlay').style.display='none';
    document.getElementById('mhead').style.display='block';
    document.getElementById('mainpage').style.display='block';
    document.getElementById('student-lbl').textContent=results[0]?.student?.name||email;
    renderResults(results);
  }).catch(()=>{showErr('שגיאת חיבור');document.querySelector('.mbtn').textContent='הצג ציונים ←';});
}
function showErr(m){const e=document.getElementById('merr');e.textContent=m;e.style.display='block';}

function renderResults(results){
  const c=document.getElementById('content');
  if(!results.length){c.innerHTML='<div class="empty-state">לא נמצאו הגשות עבור כתובת המייל והקוד שהוזנו.</div>';return;}
  c.innerHTML=results.map((d,i)=>{
    const fb=d.feedback||{};
    const graded=fb.grade!==undefined;
    const date=d.submittedAt?new Date(d.submittedAt).toLocaleDateString('he-IL'):'—';
    const circle=graded
      ?`<div class="grade-circle gc-graded">${fb.grade}</div>`
      :`<div class="grade-circle gc-none">טרם<br>הוערך</div>`;
    const gradeLbl=graded
      ?`<div class="sm-grade-lbl graded">ציון: ${fb.grade}</div>`
      :`<div class="sm-grade-lbl none">ממתין להערכה</div>`;
    const gradePanel=graded?`
      <div class="grade-panel-big">
        <div class="grade-big">${fb.grade}</div>
        <div class="grade-info">
          <div class="gi-bar"><div class="gi-fill" style="width:${fb.grade}%"></div></div>
          ${fb.comment?`<div class="gi-comment">"${escH(fb.comment)}"</div>`:''}
          ${fb.gradedAt?`<div class="gi-date">הוערך: ${new Date(fb.gradedAt).toLocaleDateString('he-IL')}</div>`:''}
        </div>
      </div>`:`<div class="pending-box">⏳ המטלה טרם הוערכה על-ידי המורה — בדקו שוב מאוחר יותר.</div>`;
    const ans=d.answers||{};
    const ansHtml=Object.entries(ans).map(([q,v])=>`
      <div class="ans-item">
        <div class="ans-q">${q.replace(/_/g,' ')}</div>
        <div class="ans-v">${escH(v||'(ריק)')}</div>
      </div>`).join('');
    return `
    <div class="sub-card" id="card-${i}">
      <div class="sub-card-head" onclick="toggleCard(${i})">
        ${circle}
        <div class="sub-meta">
          <div class="sm-date">📅 הוגש: ${date}</div>
          <div class="sm-code">קוד: ${d.student?.classCode||'—'}</div>
          ${gradeLbl}
        </div>
        <div class="sub-expand">▼</div>
      </div>
      <div class="sub-body">
        ${gradePanel}
        <div class="ans-section">
          <h4>📝 התשובות שלי</h4>
          ${ansHtml}
        </div>
      </div>
    </div>`;
  }).join('');
  // auto-open first
  if(results.length===1)toggleCard(0);
}
function toggleCard(i){document.getElementById('card-'+i).classList.toggle('open');}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
