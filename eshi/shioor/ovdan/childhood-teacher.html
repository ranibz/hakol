<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אובדן הילדות — ממשק מורה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--paper-dark:#e8e0cc;--ink:#1a1208;--ink-light:#6b5d45;--accent:#8b1a1a;--blue:#2563af;--green:#2d7a2d;--warm:#7a4f1a;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;line-height:1.7;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,18,8,.055) 27px,rgba(26,18,8,.055) 28px);}
.modal-overlay{position:fixed;inset:0;background:rgba(26,18,8,.93);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink);max-width:400px;width:100%;padding:36px;}
.modal-head{background:var(--ink);color:var(--paper);text-align:center;padding:14px 20px;margin:-36px -36px 24px;}
.modal-head h2{font-family:'Frank Ruhl Libre',serif;font-size:24px;font-weight:900;}
.modal-head p{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-top:3px;}
.m-field{margin-bottom:14px;}
.m-field label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-light);margin-bottom:4px;}
.m-field input{width:100%;padding:11px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;color:var(--ink);box-shadow:var(--shadow-sm);outline:none;}
.m-field input:focus{border-color:var(--accent);}
.m-btn{width:100%;padding:12px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);transition:all .15s;}
.m-btn:hover{background:var(--accent);}
.m-err{color:var(--accent);font-size:12px;margin-top:8px;text-align:center;display:none;}
.m-reg{text-align:center;margin-top:14px;font-size:12px;color:var(--ink-light);}
.m-reg a{color:var(--accent);font-weight:700;text-decoration:none;}
.masthead{background:var(--ink);color:var(--paper);border-bottom:6px double var(--paper-dark);text-align:center;padding:18px 20px;}
.masthead h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(20px,4vw,36px);font-weight:900;line-height:1;}
.teacher-line{font-size:12px;color:#ccc;margin-top:6px;letter-spacing:1px;}
.teacher-line strong{color:white;}
.page{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:13px 16px;}
.ctrl-input{padding:8px 12px;border:2px solid var(--ink);background:var(--paper);font-family:'Heebo',sans-serif;font-size:13px;color:var(--ink);outline:none;min-width:160px;}
.ctrl-input:focus{border-color:var(--accent);}
.ctrl-btn{padding:8px 16px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.ctrl-btn:hover{background:var(--accent);}
.ctrl-btn.sec{background:var(--paper-dark);color:var(--ink);border:2px solid var(--ink);}
.ctrl-btn.sec:hover{background:var(--paper);}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:14px;text-align:center;}
.stat-num{font-family:'Frank Ruhl Libre',serif;font-size:32px;font-weight:900;color:var(--accent);line-height:1;}
.stat-num.blue{color:var(--blue);}
.stat-num.green{color:var(--green);}
.stat-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-light);margin-top:4px;}
.loading{text-align:center;padding:40px;color:var(--ink-light);font-size:14px;}
table{width:100%;border-collapse:collapse;background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);}
thead th{background:var(--ink);color:var(--paper);padding:10px 13px;text-align:right;font-size:11px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--paper-dark);cursor:pointer;transition:background .15s;}
tbody tr:hover{background:#fff8f0;}
tbody td{padding:10px 13px;font-size:13px;vertical-align:middle;}
.expand-row{cursor:default!important;}
.expand-row:hover{background:transparent!important;}
.expand-inner{padding:18px 20px;background:var(--paper-dark);border-top:2px solid var(--ink);}
.exp-block{background:white;border:2px solid var(--ink);padding:13px 16px;margin-bottom:8px;border-right:4px solid var(--accent);}
.exp-block.blue{border-right-color:var(--blue);}
.exp-block.green{border-right-color:var(--green);}
.exp-block.warm{border-right-color:var(--warm);}
.exp-block h5{font-family:'Frank Ruhl Libre',serif;font-size:14px;color:var(--accent);margin-bottom:5px;}
.exp-block.blue h5{color:var(--blue);}
.exp-block.green h5{color:var(--green);}
.exp-block.warm h5{color:var(--warm);}
.exp-block p{font-size:13px;color:var(--ink-light);line-height:1.6;}
.memory-timeline{display:flex;flex-direction:column;gap:5px;margin-top:6px;}
.mt-item{display:flex;gap:10px;align-items:center;background:var(--paper);padding:7px 10px;border:1px solid var(--ink);}
.mt-age{background:var(--ink);color:var(--paper);font-family:'Frank Ruhl Libre',serif;font-size:12px;font-weight:900;padding:3px 8px;white-space:nowrap;}
.mt-text{font-size:12px;color:var(--ink-light);}
.score-badge{background:var(--accent);color:white;font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:13px;padding:3px 10px;display:inline-block;}
.score-badge.mid{background:var(--warm);}
.score-badge.low{background:var(--green);}
.no-results{text-align:center;padding:40px;color:var(--ink-light);}
</style>
</head>
<body>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h2>כניסת מורה</h2><p>אובדן הילדות</p></div>
    <div class="m-field"><label>סיסמה אישית</label><input id="inp-pass" type="password" placeholder="הסיסמה שבחרתם בהרשמה"></div>
    <div class="m-field"><label>קוד כיתה</label><input id="inp-code" type="text" placeholder="הקוד שנתתם לתלמידים"></div>
    <button class="m-btn" onclick="teacherLogin()">כניסה לצפייה בהגשות ←</button>
    <div class="m-err" id="m-err"></div>
    <div class="m-reg">עדיין לא רשומים? <a href="../teacher-register.html">בקשת רישום</a></div>
  </div>
</div>

<div class="masthead">
  <h1>אובדן הילדות — הגשות תלמידים</h1>
  <div class="teacher-line">קוד: <strong id="t-code">—</strong> &nbsp;|&nbsp; הגשות: <strong id="t-count">—</strong></div>
</div>

<div class="page">
  <div class="controls">
    <input class="ctrl-input" id="filter-class" placeholder="סנן לפי כיתה..." oninput="renderTable()">
    <input class="ctrl-input" id="filter-name" placeholder="חיפוש שם..." oninput="renderTable()">
    <button class="ctrl-btn sec" onclick="loadData()">↺ רענן</button>
    <button class="ctrl-btn sec" onclick="exportCSV()">⬇ CSV</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">סה"כ הגשות</div></div>
    <div class="stat"><div class="stat-num blue" id="s-classes">0</div><div class="stat-label">כיתות</div></div>
    <div class="stat"><div class="stat-num green" id="s-today">0</div><div class="stat-label">הגשות היום</div></div>
    <div class="stat"><div class="stat-num" id="s-avg-score" style="color:var(--warm)">—</div><div class="stat-label">ממוצע ציון מסכים</div></div>
  </div>
  <div id="content"><div class="loading">ממתין לכניסה...</div></div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
let teacherCode='',allData=[];

function teacherLogin(){
  const pass=document.getElementById('inp-pass').value.trim();
  const code=document.getElementById('inp-code').value.trim();
  const err=document.getElementById('m-err');
  err.style.display='none';
  if(!pass||!code){err.textContent='יש למלא סיסמה וקוד.';err.style.display='block';return;}
  const btn=document.querySelector('.m-btn');btn.textContent='מאמת...';btn.disabled=true;
  db.ref('teachers').once('value',snap=>{
    let found=false;
    snap.forEach(c=>{const t=c.val();if(t.password===pass&&t.status==='approved')found=true;});
    if(found){
      teacherCode=code;
      document.getElementById('t-code').textContent=code;
      document.getElementById('modal').style.display='none';
      loadData();
    } else {
      err.textContent='סיסמה שגויה או משתמש לא מאושר.';err.style.display='block';
      btn.textContent='כניסה לצפייה בהגשות ←';btn.disabled=false;
    }
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('modal').style.display!=='none')teacherLogin();});

function loadData(){
  document.getElementById('content').innerHTML='<div class="loading">טוען...</div>';
  db.ref('tests/childhood').once('value',snap=>{
    allData=[];
    snap.forEach(c=>{const d=c.val();if(d.student&&d.student.classCode===teacherCode)allData.push({key:c.key,...d});});
    allData.sort((a,b)=>b.submittedAt-a.submittedAt);
    updateStats();renderTable();
  });
}

function updateStats(){
  const today=new Date().toDateString();
  const classes=new Set(allData.map(d=>d.student.class));
  const scores=allData.map(d=>parseInt((d.answers||{}).screen_theft_score||0)).filter(s=>!isNaN(s));
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10:'—';
  document.getElementById('s-total').textContent=allData.length;
  document.getElementById('t-count').textContent=allData.length;
  document.getElementById('s-classes').textContent=classes.size;
  document.getElementById('s-today').textContent=allData.filter(d=>new Date(d.submittedAt).toDateString()===today).length;
  document.getElementById('s-avg-score').textContent=avg;
}

function renderTable(){
  const cls=document.getElementById('filter-class').value.trim().toLowerCase();
  const name=document.getElementById('filter-name').value.trim().toLowerCase();
  const rows=allData.filter(d=>(!cls||d.student.class.toLowerCase().includes(cls))&&(!name||d.student.name.toLowerCase().includes(name)));
  if(!rows.length){document.getElementById('content').innerHTML='<div class="no-results">אין הגשות תואמות.</div>';return;}
  let html='<table><thead><tr><th>#</th><th>שם</th><th>כיתה</th><th>ציון מסכים</th><th>ציון מורה</th><th>שעת הגשה</th><th></th></tr></thead><tbody>';
  rows.forEach((d,i)=>{
    const a=d.answers||{};
    const score=parseInt(a.screen_theft_score||0);
    const dt=new Date(d.submittedAt);
    const time=dt.toLocaleDateString('he-IL')+' '+dt.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const scoreClass=score>=8?'':'score-badge '+(score>=5?'mid':'low');
    const tgb=d.feedback&&d.feedback.grade!==undefined?`<span class="teacher-grade-badge" style="background:var(--green)">${d.feedback.grade}</span>`:'<span class="teacher-grade-badge" style="background:#aaa;font-size:11px">לא הוערך</span>';
    html+=`<tr onclick="toggleExpand('${d.key}')">
      <td style="color:var(--ink-light)">${i+1}</td>
      <td style="font-weight:700">${d.student.name}</td>
      <td>${d.student.class}</td>
      <td><span class="score-badge ${score>=8?'':score>=5?'mid':'low'}">${score}/10</span></td>
      <td>${tgb}</td>
      <td style="direction:ltr;text-align:right;font-size:12px;color:var(--ink-light)">${time}</td>
      <td style="color:var(--ink-light)">▾</td>
    </tr>
    <tr class="expand-row" id="exp-${d.key}" style="display:none"><td colspan="7"><div class="expand-inner">${buildExpand(d)}</div></td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('content').innerHTML=html;
}

function buildExpand(d){
  const a=d.answers||{};
  const memHTML=(a.memory_7||a.memory_9||a.memory_11)?`
    <div class="exp-block">
      <h5>ציר זמן — חשיפה מוקדמת</h5>
      <div class="memory-timeline">
        ${a.memory_7?`<div class="mt-item"><div class="mt-age">גיל 7–8</div><div class="mt-text">${a.memory_7}</div></div>`:''}
        ${a.memory_9?`<div class="mt-item"><div class="mt-age">גיל 9–10</div><div class="mt-text">${a.memory_9}</div></div>`:''}
        ${a.memory_11?`<div class="mt-item"><div class="mt-age">גיל 11–12</div><div class="mt-text">${a.memory_11}</div></div>`:''}
      </div>
    </div>`:'';
  const QS=[
    {k:'how_reached',label:'כיצד הגיעו לתוכן',cls:''},
    {k:'what_lost',label:'מה הילד איבד',cls:'blue'},
    {k:'authority_impact',label:'השפעה על סמכות מבוגרים',cls:'warm'},
    {k:'responsibility_order',label:'סדר אחריות',cls:'green'},
    {k:'responsibility_explain',label:'הסבר סדר האחריות',cls:'green'},
    {k:'no_phone_childhood',label:'ילדות ללא מסכים',cls:''},
    {k:'screen_theft_explain',label:`ציון ${a.screen_theft_score||'—'}/10 — הסבר`,cls:''},
    {k:'future_parent',label:'החלטות כהורה עתידי',cls:'warm'},
  ];
  const qHTML=QS.filter(q=>a[q.k]).map(q=>`
    <div class="exp-block ${q.cls}"><h5>${q.label}</h5><p>${a[q.k]}</p></div>`).join('');
  const fb=d.feedback||{};
  const emailLine=d.student.email?`<div style="font-size:12px;color:var(--ink-light);margin-bottom:10px;direction:ltr;text-align:right">📧 ${d.student.email}</div>`:'';
  const savedNote=fb.grade!==undefined?`<div style="margin-bottom:8px;font-size:13px;color:var(--green)">✅ הוערך ${new Date(fb.gradedAt).toLocaleDateString('he-IL')} — ציון: <strong>${fb.grade}</strong>${fb.comment?' | '+fb.comment:''}</div>`:'';
  const feedbackPanel=`<div class="feedback-panel">
    <h5>✏️ הערכת מורה</h5>
    ${savedNote}
    <div class="fb-row"><span class="fb-label">ציון:</span><input class="fb-grade" id="fg-${d.key}" type="number" min="0" max="100" placeholder="0–100" value="${fb.grade!==undefined?fb.grade:''}"></div>
    <div class="fb-row"><span class="fb-label">הערה:</span><textarea class="fb-comment" id="fc-${d.key}" placeholder="הערה אישית לתלמיד...">${fb.comment||''}</textarea></div>
    <div class="fb-row"><button class="fb-save" onclick="saveFeedback('${d.key}')">💾 שמור הערכה</button><span class="fb-saved" id="fs-${d.key}">✓ נשמר!</span></div>
  </div>`;
  return emailLine+(memHTML+qHTML||'<p style="color:var(--ink-light);font-size:13px">אין תשובות</p>')+feedbackPanel;
}
function saveFeedback(key){
  const grade=document.getElementById('fg-'+key).value;
  const comment=document.getElementById('fc-'+key).value.trim();
  if(grade===''||isNaN(grade)){alert('יש להזין ציון');return;}
  const btn=document.querySelector('#exp-'+key+' .fb-save');
  btn.disabled=true;btn.textContent='שומר...';
  db.ref('tests/childhood/'+key+'/feedback').set({grade:parseInt(grade),comment,gradedAt:Date.now(),gradedBy:teacherCode})
    .then(()=>{
      const saved=document.getElementById('fs-'+key);
      saved.style.display='inline-block';
      btn.textContent='💾 שמור הערכה';btn.disabled=false;
      const idx=allData.findIndex(d=>d.key===key);
      if(idx>-1)allData[idx].feedback={grade:parseInt(grade),comment,gradedAt:Date.now()};
      setTimeout(()=>saved.style.display='none',3000);
    }).catch(()=>{btn.textContent='💾 שמור הערכה';btn.disabled=false;alert('שגיאה — נסו שנית');});
}

function toggleExpand(key){
  const row=document.getElementById('exp-'+key);if(!row)return;
  const open=row.style.display!=='none';
  document.querySelectorAll('.expand-row').forEach(r=>r.style.display='none');
  if(!open)row.style.display='';
}

function exportCSV(){
  if(!allData.length)return;
  const QS={memory_7:'גיל 7-8',memory_9:'גיל 9-10',memory_11:'גיל 11-12',how_reached:'כיצד הגיע לתוכן',what_lost:'מה אבד',authority_impact:'סמכות מבוגרים',responsibility_order:'סדר אחריות',responsibility_explain:'הסבר אחריות',no_phone_childhood:'ילדות ללא מסכים',screen_theft_score:'ציון מסכים',screen_theft_explain:'הסבר ציון',future_parent:'הורה עתידי'};
  const hdrs=['שם','מייל','שכבה','קוד','תאריך','ציון מורה','הערת מורה',...Object.values(QS)];
  const rows=allData.map(d=>{
    const a=d.answers||{};
    const dt=new Date(d.submittedAt).toLocaleString('he-IL');
    const fb=d.feedback||{};return[d.student.name,d.student.email||'',d.student.class,d.student.classCode,dt,fb.grade!==undefined?fb.grade:'לא הוערך',fb.comment||'',...Object.keys(QS).map(k=>a[k]||'')];
  });
  const csv='\uFEFF'+[hdrs,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='childhood-submissions.csv';a.click();
}
</script>
</body>
</html>
