<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הדרה בתקשורת — ממשק מורה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--paper-dark:#e8e0cc;--ink:#1a1208;--ink-light:#6b5d45;--accent:#8b1a1a;--blue:#2563af;--green:#2d7a2d;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;line-height:1.7;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,18,8,.055) 27px,rgba(26,18,8,.055) 28px);}
.modal-overlay{position:fixed;inset:0;background:rgba(26,18,8,.93);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink);max-width:400px;width:100%;padding:36px;}
.modal-head{background:var(--ink);color:var(--paper);text-align:center;padding:14px 20px;margin:-36px -36px 24px;}
.modal-head h2{font-family:'Frank Ruhl Libre',serif;font-size:24px;font-weight:900;}
.modal-head p{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-top:3px;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-light);margin-bottom:4px;}
.mf input{width:100%;padding:11px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;color:var(--ink);box-shadow:var(--shadow-sm);outline:none;}
.mf input:focus{border-color:var(--accent);}
.mbtn{width:100%;padding:12px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);transition:all .15s;}
.mbtn:hover{background:var(--accent);}
.merr{color:var(--accent);font-size:12px;margin-top:8px;text-align:center;display:none;}
.mreg{text-align:center;margin-top:14px;font-size:12px;color:var(--ink-light);}
.mreg a{color:var(--accent);font-weight:700;text-decoration:none;}
.masthead{background:var(--ink);color:var(--paper);border-bottom:6px double var(--paper-dark);text-align:center;padding:18px 20px;}
.masthead h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(20px,4vw,36px);font-weight:900;line-height:1;}
.tline{font-size:12px;color:#ccc;margin-top:6px;letter-spacing:1px;}
.tline strong{color:white;}
.page{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:13px 16px;}
.ci{padding:8px 12px;border:2px solid var(--ink);background:var(--paper);font-family:'Heebo',sans-serif;font-size:13px;color:var(--ink);outline:none;min-width:160px;}
.ci:focus{border-color:var(--accent);}
.cb{padding:8px 16px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.cb:hover{background:var(--accent);}
.cb.sec{background:var(--paper-dark);color:var(--ink);border:2px solid var(--ink);}
.cb.sec:hover{background:var(--paper);}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:14px;text-align:center;}
.sn{font-family:'Frank Ruhl Libre',serif;font-size:32px;font-weight:900;color:var(--accent);line-height:1;}
.sn.b{color:var(--blue);}
.sn.g{color:var(--green);}
.sl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-light);margin-top:4px;}
.loading{text-align:center;padding:40px;color:var(--ink-light);font-size:14px;}
table{width:100%;border-collapse:collapse;background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);}
thead th{background:var(--ink);color:var(--paper);padding:10px 13px;text-align:right;font-size:11px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--paper-dark);cursor:pointer;transition:background .15s;}
tbody tr:hover{background:#fff8f0;}
tbody td{padding:10px 13px;font-size:13px;vertical-align:middle;}
.xrow{cursor:default!important;}
.xrow:hover{background:transparent!important;}
.xi{padding:18px 20px;background:var(--paper-dark);border-top:2px solid var(--ink);}
.feedback-panel{margin-top:14px;border:2px solid var(--accent);background:#fff5f5;padding:14px 16px;}
.feedback-panel h5{font-family:'Frank Ruhl Libre',serif;font-size:15px;color:var(--accent);margin-bottom:10px;border-bottom:1px solid #ddd;padding-bottom:6px;}
.fb-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.fb-label{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--ink-light);min-width:50px;}
.fb-grade{width:70px;padding:7px 10px;border:2px solid var(--ink);font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700;text-align:center;background:white;outline:none;}
.fb-comment{flex:1;padding:8px 11px;border:2px solid var(--ink);font-family:'Heebo',sans-serif;font-size:13px;background:white;resize:none;min-height:60px;outline:none;}
.fb-save{padding:9px 20px;background:var(--accent);color:white;border:none;font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #1a1208;}
.fb-save:hover{opacity:.85;}
.fb-saved{padding:9px 16px;background:var(--green);color:white;font-size:13px;font-weight:700;display:none;}
.grade-badge{display:inline-block;color:white;font-family:'Frank Ruhl Libre',serif;font-size:13px;font-weight:900;padding:2px 9px;}
.xb{background:white;border:2px solid var(--ink);padding:13px 16px;margin-bottom:8px;border-right:4px solid var(--accent);}
.xb.xbl{border-right-color:var(--blue);}
.xb.xbg{border-right-color:var(--green);}
.xb h5{font-family:'Frank Ruhl Libre',serif;font-size:14px;color:var(--accent);margin-bottom:5px;}
.xb.xbl h5{color:var(--blue);}
.xb.xbg h5{color:var(--green);}
.xb p{font-size:13px;color:var(--ink-light);line-height:1.6;}
.cvtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.cvt{font-size:10px;padding:2px 8px;border:1px solid;font-weight:700;}
.cvt.heg{border-color:var(--accent);color:var(--accent);background:#fff0f0;}
.cvt.plu{border-color:var(--green);color:var(--green);background:#f0fff0;}
.cvt.neu{border-color:var(--blue);color:var(--blue);background:#f0f4ff;}
.none{text-align:center;padding:40px;color:var(--ink-light);}
</style>
</head>
<body>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h2>כניסת מורה</h2><p>הדרה בתקשורת</p></div>
    <div class="mf"><label>סיסמה אישית</label><input id="inp-pass" type="password" placeholder="הסיסמה שבחרתם בהרשמה"></div>
    <div class="mf"><label>קוד כיתה</label><input id="inp-code" type="text" placeholder="הקוד שנתתם לתלמידים"></div>
    <button class="mbtn" onclick="tLogin()">כניסה לצפייה בהגשות ←</button>
    <div class="merr" id="merr"></div>
    <div class="mreg">עדיין לא רשומים? <a href="../teacher-register.html">בקשת רישום</a></div>
  </div>
</div>

<div class="masthead">
  <h1>הדרה בתקשורת — הגשות תלמידים</h1>
  <div class="tline">קוד: <strong id="tcode">—</strong> &nbsp;|&nbsp; הגשות: <strong id="tcount">—</strong></div>
</div>

<div class="page">
  <div class="controls">
    <input class="ci" id="fcls" placeholder="סנן לפי כיתה..." oninput="renderT()">
    <input class="ci" id="fname" placeholder="חיפוש שם..." oninput="renderT()">
    <button class="cb sec" onclick="loadD()">↺ רענן</button>
    <button class="cb sec" onclick="expCSV()">⬇ CSV</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="sn" id="stotal">0</div><div class="sl">סה"כ הגשות</div></div>
    <div class="stat"><div class="sn b" id="scls">0</div><div class="sl">כיתות</div></div>
    <div class="stat"><div class="sn g" id="stoday">0</div><div class="sl">הגשות היום</div></div>
  </div>
  <div id="content"><div class="loading">ממתין לכניסה...</div></div>
</div>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();
let tCode='',allD=[];

function tLogin(){
  const pass=document.getElementById('inp-pass').value.trim();
  const code=document.getElementById('inp-code').value.trim();
  const err=document.getElementById('merr');
  err.style.display='none';
  if(!pass||!code){err.textContent='יש למלא סיסמה וקוד.';err.style.display='block';return;}
  const btn=document.querySelector('.mbtn');btn.textContent='מאמת...';btn.disabled=true;
  db.ref('teachers').once('value',snap=>{
    let ok=false;
    snap.forEach(c=>{const t=c.val();if(t.password===pass&&t.status==='approved')ok=true;});
    if(ok){
      tCode=code;
      document.getElementById('tcode').textContent=code;
      document.getElementById('modal').style.display='none';
      loadD();
    } else {
      err.textContent='סיסמה שגויה או משתמש לא מאושר.';err.style.display='block';
      btn.textContent='כניסה לצפייה בהגשות ←';btn.disabled=false;
    }
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('modal').style.display!=='none')tLogin();});

function loadD(){
  document.getElementById('content').innerHTML='<div class="loading">טוען...</div>';
  db.ref('tests/exclusion').once('value',snap=>{
    allD=[];
    snap.forEach(c=>{const d=c.val();if(d.student&&d.student.classCode===tCode)allD.push({key:c.key,...d});});
    allD.sort((a,b)=>b.submittedAt-a.submittedAt);
    updStats();renderT();
  });
}
function updStats(){
  const today=new Date().toDateString();
  const cls=new Set(allD.map(d=>d.student.class));
  document.getElementById('stotal').textContent=allD.length;
  document.getElementById('tcount').textContent=allD.length;
  document.getElementById('scls').textContent=cls.size;
  document.getElementById('stoday').textContent=allD.filter(d=>new Date(d.submittedAt).toDateString()===today).length;
}
function renderT(){
  const cls=document.getElementById('fcls').value.trim().toLowerCase();
  const name=document.getElementById('fname').value.trim().toLowerCase();
  const rows=allD.filter(d=>(!cls||d.student.class.toLowerCase().includes(cls))&&(!name||d.student.name.toLowerCase().includes(name)));
  if(!rows.length){document.getElementById('content').innerHTML='<div class="none">אין הגשות תואמות.</div>';return;}
  let html='<table><thead><tr><th>#</th><th>שם</th><th>כיתה</th><th>ציון</th><th>שעת הגשה</th><th></th></tr></thead><tbody>';
  rows.forEach((d,i)=>{
    const dt=new Date(d.submittedAt);
    const time=dt.toLocaleDateString('he-IL')+' '+dt.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const gb=d.feedback&&d.feedback.grade!==undefined?`<span class="grade-badge" style="background:var(--green)">${d.feedback.grade}</span>`:'<span class="grade-badge" style="background:#aaa;font-size:11px">לא הוערך</span>';
    html+=`<tr onclick="togX('${d.key}')">
      <td style="color:var(--ink-light)">${i+1}</td>
      <td style="font-weight:700">${d.student.name}</td>
      <td>${d.student.class}</td>
      <td>${gb}</td>
      <td style="direction:ltr;text-align:right;font-size:12px;color:var(--ink-light)">${time}</td>
      <td style="color:var(--ink-light)">▾</td>
    </tr>
    <tr class="xrow" id="xr-${d.key}" style="display:none"><td colspan="6"><div class="xi">${buildX(d)}</div></td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('content').innerHTML=html;
}
function buildX(d){
  const a=d.answers||{};
  let cvHTML='';
  if(a.card_verdicts){
    try{
      const cv=JSON.parse(a.card_verdicts);
      const tags=Object.values(cv).map(v=>`<span class="cvt ${v.verdict||'neu'}" title="${v.text}">${v.text.substring(0,22)}… <em>${{heg:'הגמוניה',plu:'פלורליזם',neu:'לא בטוח','':'—'}[v.verdict||'']}</em></span>`).join('');
      cvHTML=`<div class="xb"><h5>סיווג דוגמאות</h5><div class="cvtags">${tags}</div></div>`;
    }catch(e){}
  }
  const QS=[
    {k:'classify_explanation',l:'הסבר סיווג קשה',c:''},
    {k:'excluded_group',l:'קבוצה מודרת + דוגמה',c:'xbl'},
    {k:'exclusion_reason',l:'סיבת ההדרה',c:''},
    {k:'pluralism_change',l:'מה ישתנה עם פלורליזם',c:'xbg'},
    {k:'personal_experience',l:'חוויה אישית',c:''},
    {k:'position',l:'עמדה: הגמוניה מול פלורליזם',c:'xbl'},
    {k:'action_proposal',l:'הצעות לשינוי',c:'xbg'},
  ];
  const qHTML=QS.filter(q=>a[q.k]).map(q=>`<div class="xb ${q.c}"><h5>${q.l}</h5><p>${a[q.k]}</p></div>`).join('');
  const fb=d.feedback||{};
  const emailLine=d.student.email?`<div style="font-size:12px;color:var(--ink-light);margin-bottom:10px;direction:ltr;text-align:right">📧 ${d.student.email}</div>`:'';
  const savedNote=fb.grade!==undefined?`<div style="margin-bottom:8px;font-size:13px;color:var(--green)">✅ הוערך ${new Date(fb.gradedAt).toLocaleDateString('he-IL')} — ציון: <strong>${fb.grade}</strong>${fb.comment?' | '+fb.comment:''}</div>`:'';
  const feedbackPanel=`<div class="feedback-panel">
    <h5>✏️ הערכת מורה</h5>
    ${savedNote}
    <div class="fb-row"><span class="fb-label">ציון:</span><input class="fb-grade" id="fg-${d.key}" type="number" min="0" max="100" placeholder="0–100" value="${fb.grade!==undefined?fb.grade:''}"></div>
    <div class="fb-row"><span class="fb-label">הערה:</span><textarea class="fb-comment" id="fc-${d.key}" placeholder="הערה אישית לתלמיד...">${fb.comment||''}</textarea></div>
    <div class="fb-row"><button class="fb-save" onclick="saveFeedback('${d.key}')">💾 שמור הערכה</button><span class="fb-saved" id="fs-${d.key}">✓ נשמר!</span></div>
  </div>`;
  return emailLine+(cvHTML+qHTML||'<p style="color:var(--ink-light);font-size:13px">אין תשובות</p>')+feedbackPanel;
}
function saveFeedback(key){
  const grade=document.getElementById('fg-'+key).value;
  const comment=document.getElementById('fc-'+key).value.trim();
  if(grade===''||isNaN(grade)){alert('יש להזין ציון');return;}
  const btn=document.querySelector('#xr-'+key+' .fb-save');
  btn.disabled=true;btn.textContent='שומר...';
  db.ref('tests/exclusion/'+key+'/feedback').set({grade:parseInt(grade),comment,gradedAt:Date.now(),gradedBy:tCode})
    .then(()=>{
      const saved=document.getElementById('fs-'+key);
      saved.style.display='inline-block';
      btn.textContent='💾 שמור הערכה';btn.disabled=false;
      const idx=allD.findIndex(d=>d.key===key);
      if(idx>-1)allD[idx].feedback={grade:parseInt(grade),comment,gradedAt:Date.now()};
      setTimeout(()=>saved.style.display='none',3000);
    }).catch(()=>{btn.textContent='💾 שמור הערכה';btn.disabled=false;alert('שגיאה — נסו שנית');});
}
function togX(key){
  const r=document.getElementById('xr-'+key);if(!r)return;
  const open=r.style.display!=='none';
  document.querySelectorAll('.xrow').forEach(x=>x.style.display='none');
  if(!open)r.style.display='';
}
function expCSV(){
  if(!allD.length)return;
  const QS={classify_explanation:'הסבר סיווג',excluded_group:'קבוצה מודרת',exclusion_reason:'סיבת הדרה',pluralism_change:'שינוי פלורליזם',personal_experience:'חוויה אישית',position:'עמדה',action_proposal:'הצעות לשינוי'};
  const hdrs=['שם','מייל','שכבה','קוד','תאריך','ציון','הערת מורה',...Object.values(QS)];
  const rows=allD.map(d=>{
    const a=d.answers||{};
    const dt=new Date(d.submittedAt).toLocaleString('he-IL');
    const fb=d.feedback||{};return[d.student.name,d.student.email||'',d.student.class,d.student.classCode,dt,fb.grade!==undefined?fb.grade:'לא הוערך',fb.comment||'',...Object.keys(QS).map(k=>a[k]||'')];
  });
  const csv='\uFEFF'+[hdrs,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='exclusion-submissions.csv';a.click();
}
</script>
</body>
</html>
