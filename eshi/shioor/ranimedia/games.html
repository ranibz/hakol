<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranimedia — משחקים לפי זירות</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
:root{
  --dark:#0d1117;--dark2:#161b22;--dark3:#21262d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --gold:#f9a825;--gold2:#ffca28;--orange:#ffa657;
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;
  --z1:#7c4dff;--z2:#1565c0;--z3:#c62828;--z4:#6a1b9a;
  --z5:#0277bd;--z6:#558b2f;--z7:#ad1457;--z8:#2e7d32;--z9:#e65100;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Rubik',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}

/* ── STARS ── */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.stars::before,.stars::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 8%, rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 45% 55%,rgba(249,168,37,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 6%  75%, rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 85%,rgba(88,166,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 45%,rgba(249,168,37,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 52% 15%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 62%,rgba(188,140,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 95% 70%,rgba(255,255,255,.3) 0%,transparent 100%);
  background-size:600px 600px;
}
.stars::after{background-size:900px 900px;animation:tw 12s ease-in-out infinite alternate;opacity:.35;}
@keyframes tw{0%{opacity:.2;}100%{opacity:.55;}}

/* ── SCREEN GUARD ── */
#guardScreen{
  position:fixed;inset:0;z-index:100;
  background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;
}
#guardScreen.hidden{display:none;}

/* ── HEADER ── */
header{
  position:relative;z-index:2;
  padding:20px 28px 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;
  max-width:1100px;margin:0 auto;width:100%;
}
.header-brand{
  font-family:'Rubik Mono One',monospace;
  font-size:clamp(18px,4vw,26px);
  background:linear-gradient(135deg,var(--gold2),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(249,168,37,.3));
}
.header-right{display:flex;align-items:center;gap:12px;}
.teacher-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--dark2);border:1px solid var(--border);
  border-radius:30px;padding:6px 14px 6px 8px;
}
.t-ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--orange));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#1a0f00;}
.t-name{font-size:13px;font-weight:600;}
.t-school{font-size:10px;color:var(--text3);}
.back-to-portal{
  background:transparent;border:1px solid var(--border2);color:var(--text2);
  padding:8px 16px;border-radius:10px;font-family:'Rubik',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:6px;
}
.back-to-portal:hover{border-color:var(--gold);color:var(--gold);}

/* ── HERO ── */
.hero{
  position:relative;z-index:2;
  text-align:center;
  padding:40px 20px 20px;
  max-width:700px;margin:0 auto;
}
.hero-trophy{font-size:56px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.hero-title{
  font-family:'Rubik Mono One',monospace;
  font-size:clamp(22px,5vw,38px);
  background:linear-gradient(135deg,#fff 0%,var(--gold2) 60%,var(--orange) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.2;margin-bottom:10px;
}
.hero-sub{font-size:14px;color:var(--text2);line-height:1.6;}

/* CLASS SELECT BAR */
.class-bar{
  position:relative;z-index:2;
  max-width:480px;margin:20px auto 32px;
  padding:0 20px;
}
.class-bar-inner{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:16px;padding:16px 20px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.class-bar-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.class-input{
  flex:1;min-width:120px;padding:9px 14px;
  background:var(--dark3);border:1px solid var(--border);
  border-radius:10px;color:var(--text);
  font-family:'Rubik',sans-serif;font-size:14px;
  outline:none;transition:all .2s;
}
.class-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(249,168,37,.12);}
.class-chips-wrap{display:flex;gap:6px;flex-wrap:wrap;width:100%;}
.cls-chip{background:var(--dark3);border:1px solid var(--border2);color:var(--text2);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;}
.cls-chip:hover,.cls-chip.on{background:rgba(249,168,37,.12);border-color:var(--gold);color:var(--gold2);}

/* ── GRID ── */
.zones-section{
  position:relative;z-index:2;
  max-width:1100px;margin:0 auto;
  padding:0 20px 60px;
}
.zones-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}
@media(max-width:720px){.zones-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:440px){.zones-grid{grid-template-columns:1fr;}}

/* ── ZONE CARD ── */
.zone-card{
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  transition:all .28s cubic-bezier(.22,1,.36,1);
  position:relative;cursor:pointer;
}
.zone-card:not(.locked):hover{
  transform:translateY(-7px);
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}
.zone-card.locked{cursor:default;opacity:.55;}

/* color bar top */
.zone-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:4px;background:var(--zc);
  transition:height .3s;
}
.zone-card:not(.locked):hover::before{height:6px;}

/* glow on hover */
.zone-card:not(.locked):hover{
  border-color:var(--zc);
  box-shadow:0 20px 50px rgba(0,0,0,.5), 0 0 0 1px var(--zc);
}

.card-body{padding:28px 20px 22px;}
.zone-num-badge{
  display:inline-flex;align-items:center;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:3px 12px;
  font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:16px;
}
.zone-icon{font-size:42px;display:block;margin-bottom:14px;transition:transform .3s;}
.zone-card:not(.locked):hover .zone-icon{transform:scale(1.15) rotate(-5deg);}
.zone-name{font-size:clamp(15px,2.5vw,18px);font-weight:900;color:var(--text);margin-bottom:6px;line-height:1.3;}
.zone-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:18px;}

/* buttons */
.card-btns{display:flex;gap:8px;flex-wrap:wrap;}
.btn-live{
  flex:1;padding:10px 12px;
  background:var(--zc);
  color:white;border:none;border-radius:10px;
  font-family:'Rubik',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:5px;
  min-width:80px;
}
.btn-live:hover{filter:brightness(1.2);transform:translateY(-2px);}
.btn-async{
  padding:10px 12px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);border-radius:10px;
  font-family:'Rubik',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.btn-async:hover{border-color:var(--zc);color:var(--text);}

.soon-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(13,17,23,.7);backdrop-filter:blur(2px);
  border-radius:20px;
}
.soon-pill{
  background:var(--dark3);border:1px solid var(--border2);
  color:var(--text3);padding:6px 18px;border-radius:20px;
  font-size:12px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;
}

/* ── SHARE MODAL ── */
.modal-bg{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:22px;width:100%;max-width:460px;
  overflow:hidden;
  transform:translateY(20px);transition:transform .3s;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
}
.modal-bg.open .modal{transform:none;}
.modal-head{
  padding:22px 22px 18px;border-bottom:1px solid var(--border);
  text-align:center;
}
.modal-head.live-h{background:linear-gradient(160deg,#0a1a00,#142800);}
.modal-head.async-h{background:linear-gradient(160deg,#001020,#001c38);}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.35);color:var(--green);padding:4px 13px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.pulse-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.6);opacity:.4;}}
.modal-title{font-family:'Rubik Mono One',monospace;font-size:clamp(16px,4vw,24px);color:var(--gold2);letter-spacing:2px;margin:4px 0;}
.modal-sub{font-size:12px;color:var(--text2);}
.modal-body{padding:20px 22px;}
.link-box{background:var(--dark3);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.link-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);font-weight:700;margin-bottom:7px;}
.link-row{display:flex;align-items:center;gap:8px;}
.link-url{flex:1;font-family:'Rubik Mono One',monospace;font-size:11px;color:var(--blue);word-break:break-all;line-height:1.5;}
.copy-btn{background:var(--dark2);border:1px solid var(--border2);color:var(--text2);padding:7px 13px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'Rubik',sans-serif;}
.copy-btn:hover{border-color:var(--blue);color:var(--blue);}
.copy-btn.copied{border-color:var(--green);color:var(--green);}
.wa-btn{width:100%;padding:11px;background:linear-gradient(135deg,#25d366,#128c7e);color:white;border:none;border-radius:10px;font-family:'Rubik',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;transition:all .2s;}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(37,211,102,.3);}

/* players */
.players-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:30px;}
.p-chip{background:var(--dark3);border:1px solid var(--border2);color:var(--text);padding:4px 10px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:4px;}
.p-score{font-family:'Rubik Mono One',monospace;font-size:10px;color:var(--gold);}
.modal-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.m-box{background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.m-val{font-family:'Rubik Mono One',monospace;font-size:18px;}
.m-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:2px;}

.timer-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.t-opt{background:var(--dark3);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'Rubik',sans-serif;}
.t-opt:hover,.t-opt.on{background:rgba(88,166,255,.12);border-color:var(--blue);color:var(--blue);}

.btn-start-modal{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),#2ea043);color:white;border:none;border-radius:10px;font-family:'Rubik',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:7px;}
.btn-start-modal:hover:not(:disabled){transform:translateY(-2px);}
.btn-start-modal:disabled{opacity:.4;cursor:default;transform:none;}
.btn-close-modal{width:100%;padding:9px;background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:10px;font-family:'Rubik',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-close-modal:hover{border-color:var(--red);color:var(--red);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark2);border:1px solid var(--border2);color:var(--text);padding:11px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.4);transition:transform .3s ease;z-index:200;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
</style>
</head>
<body>
<div class="stars"></div>

<!-- ══ GUARD (נטען לפני Firebase) ══ -->
<div id="guardScreen">
  <div style="font-size:48px;margin-bottom:16px;">🔒</div>
  <div style="font-family:'Rubik Mono One',monospace;font-size:20px;color:var(--gold2);margin-bottom:10px;">Ranimedia</div>
  <div style="font-size:14px;color:var(--text2);">בודק הרשאות...</div>
</div>

<!-- ══ HEADER ══ -->
<header>
  <div class="header-brand">Ranimedia</div>
  <div class="header-right">
    <div class="teacher-pill">
      <div class="t-ava" id="hAva">?</div>
      <div>
        <div class="t-name" id="hName">—</div>
        <div class="t-school" id="hSchool">—</div>
      </div>
    </div>
    <a href="teacher-portal.html" class="back-to-portal">← פורטל</a>
  </div>
</header>

<!-- ══ HERO ══ -->
<div class="hero">
  <span class="hero-trophy">🏆</span>
  <div class="hero-title">אלוף הזירות</div>
  <div class="hero-sub">בחרו זירה, שלחו קישור לתלמידים<br>וצפו בתוצאות בזמן אמת</div>
</div>

<!-- ══ CLASS BAR ══ -->
<div class="class-bar">
  <div class="class-bar-inner">
    <div class="class-bar-label">כיתה:</div>
    <input class="class-input" id="classInput" type="text" placeholder="למשל: י1" maxlength="20" oninput="onClassType()">
    <div class="class-chips-wrap" id="classChips"></div>
  </div>
</div>

<!-- ══ ZONES GRID ══ -->
<div class="zones-section">
  <div class="zones-grid" id="zonesGrid"></div>
</div>

<!-- ══ SHARE MODAL ══ -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head" id="modalHead">
      <div class="live-badge" id="modalBadge"><span class="pulse-dot"></span> חי עכשיו</div>
      <div class="modal-title" id="modalTitle">—</div>
      <div class="modal-sub" id="modalSub">—</div>
    </div>
    <div class="modal-body">
      <div class="link-box">
        <div class="link-lbl">קישור לתלמידים</div>
        <div class="link-row">
          <div class="link-url" id="modalUrl">—</div>
          <button class="copy-btn" id="modalCopy" onclick="copyModalLink()">העתק</button>
        </div>
        <button class="wa-btn" onclick="sendWA()">💬 שלח בוואטסאפ</button>
      </div>

      <!-- live extras -->
      <div id="liveExtras">
        <div class="modal-meta">
          <div class="m-box"><div class="m-val" id="mPlayers">0</div><div class="m-lbl">שחקנים</div></div>
          <div class="m-box"><div class="m-val" id="mStatus">ממתין</div><div class="m-lbl">סטטוס</div></div>
        </div>
        <div class="players-row" id="playersRow"></div>
        <button class="btn-start-modal" id="btnStartGame" onclick="startLiveNow()">🚀 התחל משחק!</button>
      </div>

      <!-- async extras -->
      <div id="asyncExtras" style="display:none;">
        <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);font-weight:700;margin-bottom:8px;">זמן פתוח</div>
        <div class="timer-opts">
          <div class="t-opt on" data-h="24" onclick="setTimer(this)">24 שעות</div>
          <div class="t-opt" data-h="48" onclick="setTimer(this)">48 שעות</div>
          <div class="t-opt" data-h="72" onclick="setTimer(this)">3 ימים</div>
          <div class="t-opt" data-h="168" onclick="setTimer(this)">שבוע</div>
        </div>
      </div>

      <button class="btn-close-modal" onclick="endSession()">סגור סשן</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══ FIREBASE ══ */
firebase.initializeApp({
  apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",
  databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"tests-fd938"
});
const db=firebase.database();
const ROOT=db.ref('aluf_hazirot');

/* ══ ZONES ══ */
const ZONES=[
  {id:1,name:'מציאות תקשורתית', icon:'🧩',desc:'מסגור, סטריאוטיפים ואג׳נדה תקשורתית',   color:'#7c4dff',file:'zira1-game.html',  ready:true},
  {id:2,name:'גלובליזציה',       icon:'🌍',desc:'גלוקליזציה, אימפריאליזם תרבותי וזהות',  color:'#1e88e5',file:'globalization-game.html',ready:true},
  {id:3,name:'חדשות וצילום',     icon:'📷',desc:'עריכת עיתון, צילום וחדשות פייק',        color:'#e53935',file:'zira3-game.html',  ready:true},
  {id:4,name:'הומור וסאטירה',    icon:'🎭',desc:'סאטירה, פרודיה וביקורת חברתית',         color:'#8e24aa',file:'zira4-game.html',  ready:true},
  {id:5,name:'תרבות דיגיטלית',  icon:'📱',desc:'רשתות חברתיות, אינפלואנסרים ופרסום',    color:'#0288d1',file:'zira5-game.html',  ready:true},
  {id:6,name:'תוכניות ריאליטי',  icon:'👁️',desc:'מציצנות, ריאליטי ותרבות הצפייה',        color:'#558b2f',file:'zira6-game.html',  ready:true},
  {id:7,name:'קליפים מוסיקליים', icon:'🎵',desc:'קליפ, אמן, מסר ויזואלי ומוסיקה',        color:'#c2185b',file:'zira7-game.html',  ready:true},
  {id:8,name:'תקשורת וספורט',   icon:'⚽',desc:'ספורט כמדיה, גיבורים וסיקור ספורטיבי',   color:'#2e7d32',file:'zira8-game.html',  ready:true},
  {id:9,name:'פרסום',            icon:'🛍️',desc:'מסרים שיווקיים, קהלים ואסטרטגיה',        color:'#e64a19',file:'zira9-game.html',  ready:true},
];

/* ══ STATE ══ */
let teacher=null;
let currentClass='';
let activeSession=null; // {ref, mode, zoneId}

/* ══ GUARD — בדוק מורה מזוהה ══ */
window.addEventListener('DOMContentLoaded',()=>{
  // חפש מורה ב-sessionStorage (מהפורטל)
  const stored=sessionStorage.getItem('ranimedia_teacher');
  if(stored){
    try{teacher=JSON.parse(stored);}catch(e){}
  }
  if(teacher&&teacher.name){
    initPage();
  } else {
    // הצג מסך חסום עם כפתור חזרה
    document.getElementById('guardScreen').innerHTML=`
      <div style="font-size:56px;margin-bottom:16px;">🔒</div>
      <div style="font-family:'Rubik Mono One',monospace;font-size:22px;color:var(--gold2);margin-bottom:10px;">Ranimedia</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.7;">
        הגישה לדף זה דרך פורטל המורה בלבד.<br>
        אנא התחברו כדי לגשת למשחקים.
      </div>
      <a href="teacher-portal.html" style="
        background:linear-gradient(135deg,#f9a825,#ffca28);
        color:#1a0f00;padding:13px 28px;border-radius:12px;
        font-family:'Rubik',sans-serif;font-size:15px;font-weight:900;
        text-decoration:none;display:inline-block;
        box-shadow:0 4px 18px rgba(249,168,37,.4);
      ">כניסה לפורטל המורה ←</a>`;
  }
});

function initPage(){
  document.getElementById('guardScreen').classList.add('hidden');
  document.getElementById('hAva').textContent=teacher.name.charAt(0);
  document.getElementById('hName').textContent=teacher.name;
  document.getElementById('hSchool').textContent=teacher.school;
  renderZones();
  loadChips();
}

/* ══ ZONES ══ */
function renderZones(){
  document.getElementById('zonesGrid').innerHTML=ZONES.map(z=>`
    <div class="zone-card ${z.ready?'':'locked'}" style="--zc:${z.color}">
      <div class="card-body">
        <div class="zone-num-badge">זירה ${z.id}</div>
        <span class="zone-icon">${z.icon}</span>
        <div class="zone-name">${z.name}</div>
        <div class="zone-desc">${z.desc}</div>
        ${z.ready?`
        <div class="card-btns">
          <button class="btn-live" style="background:${z.color}" onclick="openZone(${z.id},'live')">
            ⚡ חי
          </button>
          <button class="btn-async" onclick="openZone(${z.id},'async')">
            🕐 חופשי
          </button>
        </div>`:''}
      </div>
      ${!z.ready?`<div class="soon-overlay"><div class="soon-pill">בקרוב</div></div>`:''}
    </div>`).join('');
}

/* ══ CLASS ══ */
function onClassType(){
  currentClass=document.getElementById('classInput').value.trim();
  document.querySelectorAll('.cls-chip').forEach(c=>c.classList.toggle('on',c.dataset.v===currentClass));
}
function pickClass(v){
  currentClass=v;
  document.getElementById('classInput').value=v;
  document.querySelectorAll('.cls-chip').forEach(c=>c.classList.toggle('on',c.dataset.v===v));
}
function loadChips(){
  const k='game_chips_'+teacher.key;
  const hist=JSON.parse(localStorage.getItem(k)||'[]');
  document.getElementById('classChips').innerHTML=
    hist.map(v=>`<div class="cls-chip" data-v="${v}" onclick="pickClass('${v}')">${v}</div>`).join('');
}
function saveChip(v){
  const k='game_chips_'+teacher.key;
  let h=JSON.parse(localStorage.getItem(k)||'[]');
  h=[v,...h.filter(x=>x!==v)].slice(0,8);
  localStorage.setItem(k,JSON.stringify(h));
  loadChips();
}

/* ══ OPEN ZONE ══ */
function openZone(zid,mode){
  if(!currentClass){
    // הבלטת שדה הכיתה
    const inp=document.getElementById('classInput');
    inp.style.borderColor='var(--red)';inp.focus();
    setTimeout(()=>inp.style.borderColor='',2000);
    showToast('📋 נא לבחור כיתה תחילה','err');
    return;
  }
  const z=ZONES.find(x=>x.id===zid);
  saveChip(currentClass);

  const sid=san(teacher.school)+'_'+san(currentClass)+'_z'+z.id+'_'+(mode==='async'?'async_':'')+Date.now().toString(36);
  const ref=ROOT.child('games/'+sid);
  ref.set({
    type:'game',teacher:teacher.name,school:teacher.school,
    class:currentClass,zira:z.id,ziraName:z.name,mode,
    status:mode==='live'?'waiting':'open',
    currentQ:-1,
    expiresAt:mode==='async'?Date.now()+86400000:null,
    createdAt:Date.now()
  });

  activeSession={ref,mode,zoneId:z.id,zoneName:z.name,zoneFile:z.file,zoneColor:z.color};

  // build URL — absolute URL with current domain
  const base=location.origin+location.pathname.replace(/[^\/]*$/,'');
  const url=base+z.file+'?session='+sid;

  // fill modal
  document.getElementById('modalHead').className='modal-head '+(mode==='live'?'live-h':'async-h');
  document.getElementById('modalBadge').style.display=mode==='live'?'inline-flex':'none';
  document.getElementById('modalTitle').textContent=currentClass;
  document.getElementById('modalSub').textContent=z.icon+' זירה '+z.id+': '+z.name+' • '+teacher.school;
  document.getElementById('modalUrl').textContent=url;

  if(mode==='live'){
    document.getElementById('liveExtras').style.display='block';
    document.getElementById('asyncExtras').style.display='none';
    document.getElementById('btnStartGame').disabled=false;
    document.getElementById('btnStartGame').textContent='🚀 התחל משחק!';
    document.getElementById('mPlayers').textContent='0';
    document.getElementById('mStatus').textContent='ממתין';
    document.getElementById('playersRow').innerHTML='';
    // watch players
    ref.child('players').on('value',snap=>{
      const ps=Object.values(snap.val()||{});
      document.getElementById('mPlayers').textContent=ps.length;
      document.getElementById('playersRow').innerHTML=ps
        .sort((a,b)=>b.score-a.score)
        .map(p=>`<div class="p-chip">${p.name}<span class="p-score">${p.score||0}</span></div>`)
        .join('');
    });
  } else {
    document.getElementById('liveExtras').style.display='none';
    document.getElementById('asyncExtras').style.display='block';
  }

  document.getElementById('modalBg').classList.add('open');
  showToast('✅ קישור מוכן לשליחה','ok');
}

function startLiveNow(){
  if(!activeSession)return;
  activeSession.ref.update({status:'playing',currentQ:0,startedAt:Date.now()});
  document.getElementById('mStatus').textContent='משחק';
  document.getElementById('btnStartGame').disabled=true;
  document.getElementById('btnStartGame').textContent='🎮 המשחק רץ...';
  showToast('🚀 המשחק התחיל!','ok');
}

function setTimer(el){
  document.querySelectorAll('.t-opt').forEach(o=>o.classList.remove('on'));
  el.classList.add('on');
  activeSession&&activeSession.ref.update({expiresAt:Date.now()+parseInt(el.dataset.h)*3600000});
}

function endSession(){
  if(!confirm('לסגור את הסשן?'))return;
  if(activeSession){
    activeSession.ref.update({status:'done',endedAt:Date.now()});
    activeSession.ref.child('players').off();
    activeSession=null;
  }
  closeModal();
  showToast('הסשן הסתיים','ok');
}

/* ══ MODAL ══ */
function closeModal(e){
  if(e&&e.target!==document.getElementById('modalBg'))return;
  document.getElementById('modalBg').classList.remove('open');
}

/* ══ SHARE ══ */
function copyModalLink(){
  const url=document.getElementById('modalUrl').textContent;
  navigator.clipboard.writeText(url).then(()=>{
    const b=document.getElementById('modalCopy');
    b.textContent='הועתק ✓';b.classList.add('copied');
    setTimeout(()=>{b.textContent='העתק';b.classList.remove('copied');},2200);
  });
}
function sendWA(){
  const url=document.getElementById('modalUrl').textContent;
  window.open('https://wa.me/?text='+encodeURIComponent('לחצו על הקישור לכניסה למשחק:\n'+url),'_blank');
}

/* ══ UTILS ══ */
function san(s){return(s||'').replace(/[.#$/[\]\s]/g,'_');}
let _tt=null;
function showToast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show '+(type||'');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
