<!DOCTYPE html>
<!-- teacher-central.html · v2.1.0 · 2026-07-23 · סינון לפי כיתה תחילה ואז מטלה (רשימת המטלות נגזרת מהכיתה שנבחרה) | רמזור מעורבות, תצוגת הגשה מסודרת, בדיקה מהירה, תובנות כיתה -->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סביבת מורה — כל המטלות</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--ink:#1a1208;--accent:#8B1A1A;--gold:#c9a84c;--muted:#6b5f50;--border:#c8b89a;--card:#fffdf7;--green:#1a5c1a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}

/* LOGIN */
#login-overlay{position:fixed;inset:0;background:rgba(26,18,8,.88);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.login-box{background:var(--card);border:3px solid var(--ink);box-shadow:7px 7px 0 var(--ink);padding:44px 40px;max-width:420px;width:92%;text-align:center;}
.lm-top{font-family:'Frank Ruhl Libre',serif;border-top:4px double var(--ink);border-bottom:4px double var(--ink);padding:12px 0;margin-bottom:28px;}
.lm-top h1{font-size:24px;font-weight:900;letter-spacing:1px;}
.lm-top p{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:2px;text-transform:uppercase;}
.lf{margin-bottom:16px;text-align:right;}
.lf label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.lf input{width:100%;padding:12px 14px;border:2px solid var(--ink);font-family:'Heebo',sans-serif;font-size:15px;background:var(--paper);outline:none;}
.lf input:focus{box-shadow:2px 2px 0 var(--ink);}
.btn-login{width:100%;padding:14px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-login:hover{background:var(--accent);}
.login-err{color:var(--accent);font-size:13px;margin-top:12px;display:none;}
.reg-link{margin-top:18px;font-size:12px;color:var(--muted);}
.reg-link a{color:var(--accent);}

/* HEADER */
header{background:var(--ink);color:var(--paper);border-bottom:4px solid var(--gold);}
.hdr-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:12px;flex-wrap:wrap;}
.hdr-brand h1{font-family:'Frank Ruhl Libre',serif;font-size:19px;font-weight:900;}
.hdr-brand p{font-size:11px;color:var(--gold);letter-spacing:1.5px;margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.teacher-pill{background:rgba(201,168,76,.18);border:1px solid var(--gold);padding:6px 14px;font-size:13px;font-weight:700;color:var(--gold);}
.btn-out{background:transparent;border:1.5px solid rgba(245,240,232,.3);color:var(--paper);padding:7px 16px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-out:hover{background:rgba(245,240,232,.1);}

/* STATS */
.stats-row{background:var(--ink);border-bottom:3px solid var(--gold);padding:12px 24px;}
.stats-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);}
@media(max-width:700px){.stats-inner{grid-template-columns:repeat(3,1fr);}}
.stat-box{text-align:center;padding:10px 6px;border-left:1px solid rgba(245,240,232,.1);}
.stat-box:last-child{border-left:none;}
.stat-num{font-family:'Frank Ruhl Libre',serif;font-size:26px;font-weight:900;color:var(--gold);line-height:1;}
.stat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.5);margin-top:3px;}

/* TOOLBAR */
.toolbar{background:var(--card);border-bottom:2px solid var(--border);padding:12px 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(26,18,8,.07);}
.toolbar-inner{max-width:1100px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.toolbar input,.toolbar select{padding:9px 12px;border:2px solid var(--border);font-family:'Heebo',sans-serif;font-size:13px;background:var(--paper);outline:none;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--ink);}
.toolbar input{flex:1;min-width:180px;}
.view-toggle{display:flex;border:2px solid var(--border);}
.vbtn{padding:7px 14px;border:none;background:var(--paper);font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);}
.vbtn.active{background:var(--ink);color:var(--paper);}
.cnt{background:var(--accent);color:white;padding:7px 14px;font-size:12px;font-weight:800;white-space:nowrap;}
.btn-csv{background:var(--ink);color:var(--paper);border:none;padding:9px 18px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-csv:hover{background:var(--accent);}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:24px;}

/* GROUPED */
.topic-group{margin-bottom:24px;box-shadow:3px 3px 0 var(--border);}
.topic-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--ink);color:var(--paper);cursor:pointer;user-select:none;gap:12px;flex-wrap:wrap;}
.topic-header:hover{background:#2d1e10;}
.topic-title{font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;}
.topic-badge{background:var(--gold);color:var(--ink);padding:3px 10px;font-size:11px;font-weight:800;}
.topic-meta{font-size:11px;color:rgba(245,240,232,.6);display:flex;gap:12px;flex-wrap:wrap;}
.topic-body{display:none;border:2px solid var(--border);border-top:none;}
.topic-body.open{display:block;}

/* STUDENT CARD */
.sub-card{border-bottom:1px solid var(--border);background:var(--card);}
.sub-card:last-child{border-bottom:none;}
.sub-card-header{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;flex-wrap:wrap;}
.sub-card-header:hover{background:#f5efe0;}
.sub-avatar{width:36px;height:36px;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:900;flex-shrink:0;}
.sub-name{font-weight:800;font-size:14px;flex:1;min-width:100px;}
.sub-class{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);padding:3px 10px;font-size:11px;font-weight:700;color:#7a6020;white-space:nowrap;}
.sub-date{font-size:11px;color:var(--muted);white-space:nowrap;}
.grade-pill{padding:4px 11px;font-size:11px;font-weight:800;white-space:nowrap;}
.grade-pill.has{background:var(--green);color:white;}
.grade-pill.none{background:rgba(26,18,8,.08);color:var(--muted);}
.expand-arr{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.expand-arr.open{transform:rotate(180deg);}

.sub-body{display:none;padding:16px 18px;border-top:1px solid var(--border);background:#faf6ee;}
.sub-body.open{display:block;}

.answers-sec{background:var(--card);border:2px solid var(--border);border-right:4px solid var(--gold);padding:14px 16px;margin-bottom:16px;}
.answers-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.answer-row{margin-bottom:9px;padding-bottom:9px;border-bottom:1px dashed var(--border);}
.answer-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.answer-key{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:3px;}
.answer-val{font-size:13px;line-height:1.6;}

.feedback-sec{display:grid;grid-template-columns:80px 1fr auto;gap:8px;align-items:center;}
.fb-sec-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;grid-column:1/-1;}
.inp-grade{width:100%;padding:9px;border:2px solid var(--border);font-family:'Heebo',sans-serif;font-size:15px;text-align:center;background:var(--paper);outline:none;}
.inp-grade:focus{border-color:var(--ink);}
.inp-fb{width:100%;padding:9px 12px;border:2px solid var(--border);font-family:'Heebo',sans-serif;font-size:13px;background:var(--paper);outline:none;}
.inp-fb:focus{border-color:var(--ink);}
.btn-save{padding:9px 20px;background:var(--ink);color:var(--paper);border:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-save:hover{background:var(--accent);}
.saved-ok{font-size:12px;color:var(--green);font-weight:700;display:none;margin-top:6px;grid-column:1/-1;}

/* ===== רמזור מעורבות ===== */
.eng-dot{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;white-space:nowrap;}
.eng-ok{background:#e8f6ec;color:#166534;border:1px solid #bbe6c8;}
.eng-mid{background:#fdf6e3;color:#92400e;border:1px solid #f2ddb0;}
.eng-low{background:#fdeaea;color:#9f1239;border:1px solid #f5c2c2;}
.eng-na{background:#f1efe9;color:#8b8578;border:1px solid var(--border);}

/* ===== מקטעי הגשה מסודרים ===== */
.sec-block{margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--border);}
.sec-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.sec-h{font-size:11px;font-weight:800;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.sec-h .sec-ic{font-size:14px;}
.qa{margin-bottom:10px;}
.qa-q{font-size:12px;font-weight:800;color:var(--ink);margin-bottom:3px;}
.qa-a{font-size:13px;line-height:1.7;background:var(--paper);border-right:3px solid var(--border);padding:8px 11px;white-space:pre-wrap;}
.eng-grid{display:flex;flex-wrap:wrap;gap:7px;}
.eng-chip{font-size:11.5px;font-weight:700;padding:4px 10px;border:1px solid var(--border);background:var(--paper);border-radius:4px;}
.eng-chip b{font-weight:900;}
.eng-chip.full{border-color:#bbe6c8;background:#f2fbf5;color:#166534;}
.eng-chip.part{border-color:#f2ddb0;background:#fefbf2;color:#92400e;}
.eng-chip.miss{border-color:#f5c2c2;background:#fdf2f2;color:#9f1239;}
.big-score{font-size:20px;font-weight:900;color:var(--ink);}

/* ===== בדיקה מהירה ===== */
.qr-overlay{position:fixed;inset:0;background:rgba(26,18,8,.82);z-index:9998;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px);}
.qr-overlay.open{display:flex;}
.qr-box{background:var(--card,#fff);max-width:820px;width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.4);}
.qr-top{background:var(--ink);color:var(--paper);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.qr-top .qr-nm{font-weight:900;font-size:17px;}
.qr-top .qr-meta{font-size:12px;opacity:.75;}
.qr-top .qr-pos{margin-right:auto;font-size:12px;opacity:.8;}
.qr-top button{background:rgba(255,255,255,.16);border:none;color:var(--paper);width:34px;height:34px;font-size:17px;cursor:pointer;font-weight:800;}
.qr-top button:hover{background:rgba(255,255,255,.3);}
.qr-top button:disabled{opacity:.28;cursor:default;}
.qr-body{padding:18px 20px;overflow:auto;flex:1;}
.qr-foot{border-top:2px solid var(--border);padding:12px 20px;display:grid;grid-template-columns:90px 1fr auto auto;gap:9px;align-items:center;background:var(--paper);}
.qr-foot input[type=number]{padding:9px;border:2px solid var(--border);text-align:center;font-family:'Heebo',sans-serif;font-size:15px;}
.qr-foot input[type=text]{padding:9px 12px;border:2px solid var(--border);font-family:'Heebo',sans-serif;font-size:13px;}
.qr-foot button{padding:10px 18px;border:none;font-family:'Heebo',sans-serif;font-weight:800;font-size:13px;cursor:pointer;}
.qr-save{background:var(--ink);color:var(--paper);}
.qr-savenext{background:var(--green,#166534);color:#fff;}

/* ===== תובנות כיתה ===== */
.ins-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.ins-card{background:var(--card,#fff);border:1px solid var(--border);padding:16px 18px;}
.ins-card h3{font-size:13px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:0 0 12px;}
.bar-row{display:grid;grid-template-columns:74px 1fr 42px;gap:9px;align-items:center;margin-bottom:8px;font-size:12px;}
.bar-track{background:var(--paper);height:16px;border:1px solid var(--border);}
.bar-fill{height:100%;background:var(--ink);}
.bar-fill.g{background:#3f8f57;}.bar-fill.y{background:#c9962f;}.bar-fill.r{background:#b4364c;}
.ins-num{font-weight:900;text-align:left;}
.ins-list{font-size:12.5px;line-height:1.9;}
.ins-list li{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed var(--border);padding:3px 0;}
.ins-empty{color:var(--muted);font-size:12.5px;}

/* FLAT TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;background:var(--card);border:2px solid var(--ink);box-shadow:3px 3px 0 var(--border);}
thead{background:var(--ink);color:var(--paper);}
thead th{padding:11px 14px;font-family:'Frank Ruhl Libre',serif;font-size:13px;text-align:right;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:#f5efe0;}
tbody td{padding:10px 14px;font-size:13px;vertical-align:middle;}
.td-topic{font-weight:800;font-size:11px;color:var(--accent);white-space:nowrap;}
.td-name{font-weight:700;}
.td-cls{font-size:11px;font-weight:800;color:#7a6020;}
.td-date{font-size:11px;color:var(--muted);white-space:nowrap;}
.td-ans{max-width:260px;font-size:12px;line-height:1.5;}
.td-fb{min-width:200px;}
.fb-row{display:flex;gap:5px;align-items:center;}
.ti-grade{width:56px;padding:5px 7px;border:2px solid var(--border);font-family:'Heebo',sans-serif;font-size:13px;text-align:center;background:var(--paper);}
.ti-fb{flex:1;padding:5px 9px;border:2px solid var(--border);font-family:'Heebo',sans-serif;font-size:12px;background:var(--paper);}
.ti-save{padding:5px 11px;background:var(--ink);color:var(--paper);border:none;font-size:12px;font-weight:700;cursor:pointer;}
.ti-save:hover{background:var(--accent);}
.t-saved-ok{font-size:11px;color:var(--green);font-weight:700;display:none;margin-top:3px;}

.msg-box{text-align:center;padding:60px 20px;color:var(--muted);}
.msg-box p{font-family:'Frank Ruhl Libre',serif;font-size:18px;}
.msg-box span{display:block;font-size:11px;letter-spacing:2px;margin-top:8px;text-transform:uppercase;}
footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);letter-spacing:1px;border-top:2px solid var(--border);margin-top:20px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <div class="lm-top">
      <h1>סביבת מורה מרכזית</h1>
      <p>תקשורת וחברה — כל המטלות</p>
    </div>
    <div class="lf">
      <label>טלפון</label>
      <input type="tel" id="inp-phone" placeholder="05XXXXXXXX" dir="ltr" autocomplete="off">
    </div>
    <div class="lf">
      <label>סיסמה</label>
      <input type="password" id="inp-pass" placeholder="סיסמה אישית" autocomplete="off">
    </div>
    <button class="btn-login" onclick="doLogin()">כניסה ←</button>
    <div class="login-err" id="login-err"></div>
    <div class="reg-link">עדיין לא רשומים? <a href="../../teacher-register.html">לחץ כאן</a></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<header>
  <div class="hdr-inner">
    <div class="hdr-brand">
      <h1>📋 סביבת מורה — כל המטלות</h1>
      <p>תקשורת וחברה | נתוני הגשות בזמן אמת</p>
    </div>
    <div class="hdr-right">
      <div class="teacher-pill" id="teacher-name">—</div>
      <button class="btn-out" onclick="doLogout()">יציאה</button>
    </div>
  </div>
</header>

<div class="stats-row">
  <div class="stats-inner">
    <div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">הגשות</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-topics">0</div><div class="stat-lbl">נושאים</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-classes">0</div><div class="stat-lbl">כיתות</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-graded">0</div><div class="stat-lbl">עם ציון</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-avg">—</div><div class="stat-lbl">ממוצע ציון</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-pending">0</div><div class="stat-lbl">ממתינים</div></div>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-inner">
    <input type="text" id="search-input" placeholder="🔍 חיפוש לפי שם תלמיד..." oninput="applyFilter()">
    <select id="filter-class" onchange="onClassChange()"><option value="">🏫 כל הכיתות</option></select>
    <select id="filter-topic" onchange="applyFilter()"><option value="">📋 כל המטלות</option></select>
    <select id="filter-eng" onchange="applyFilter()">
      <option value="">🚦 כל רמות המעורבות</option>
      <option value="ok">🟢 עברו את הלמידה</option>
      <option value="mid">🟡 חלקי</option>
      <option value="low">🔴 דילגו</option>
      <option value="na">⚪ ללא נתוני מעורבות</option>
    </select>
    <div class="view-toggle">
      <button class="vbtn active" id="vbtn-grouped" onclick="setView('grouped')">לפי נושא</button>
      <button class="vbtn" id="vbtn-flat" onclick="setView('flat')">טבלה</button>
      <button class="vbtn" id="vbtn-insights" onclick="setView('insights')">📊 תובנות</button>
    </div>
    <div class="cnt" id="cnt">0 הגשות</div>
    <button class="btn-csv" onclick="startQuickReview()">⚡ בדיקה מהירה</button>
    <button class="btn-csv" onclick="exportCSV()">⬇ CSV</button>
  </div>
</div>

<main id="content">
  <div class="msg-box"><p>⏳ טוען נתונים...</p><span>אנא המתן</span></div>
</main>
<footer>פיתוח: רני בן זאב | סביבת מורה מרכזית</footer>
</div>

<!-- בדיקה מהירה -->
<div class="qr-overlay" id="qrOverlay">
  <div class="qr-box">
    <div class="qr-top">
      <button onclick="qrMove(-1)" id="qrPrev" title="הקודם">‹</button>
      <button onclick="qrMove(1)" id="qrNext" title="הבא">›</button>
      <div>
        <div class="qr-nm" id="qrName">—</div>
        <div class="qr-meta" id="qrMeta">—</div>
      </div>
      <div class="qr-pos" id="qrPos">—</div>
      <button onclick="closeQuickReview()" title="סגירה">×</button>
    </div>
    <div class="qr-body" id="qrBody"></div>
    <div class="qr-foot">
      <input type="number" id="qrGrade" placeholder="ציון" min="0" max="100">
      <input type="text" id="qrFb" placeholder="הערה / פידבק...">
      <button class="qr-save" onclick="qrSave(false)">💾 שמור</button>
      <button class="qr-savenext" onclick="qrSave(true)">שמור והבא ›</button>
    </div>
  </div>
</div>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();
let teacherID='',teacherName='',allData=[],currentView='grouped';
let qrList=[],qrIdx=0;

/* ===== רמזור מעורבות ===== */
const ENG_KEYS=['הקראה','עוגני קריאה','מושגים שנפתחו','בדיקת מושגים','משחק מיון','טבלת השוואה','חידון סיום'];
const isEngKey=k=>ENG_KEYS.some(e=>k.includes(e));
const isGradeKey=k=>k.includes('ציון');
const isOpenKey=k=>k.includes('שאלה פתוחה')||k.includes('תשובה פתוחה');
const isOpinionKey=k=>k.includes('טור דעה');

function fracVal(v){
  const s=String(v);
  const m=s.match(/(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)/);
  if(m&&Number(m[2])>0)return Math.min(1,Number(m[1])/Number(m[2]));
  if(s.includes('לא הושלמה'))return 0;
  if(s.includes('הושלמה'))return 1;
  return null;
}
function engagement(d){
  if(!d.answers||typeof d.answers!=='object')return null;
  const vals=[];
  Object.entries(d.answers).forEach(([k,v])=>{if(isEngKey(k)){const f=fracVal(v);if(f!==null)vals.push(f);}});
  if(!vals.length)return null;
  const pct=Math.round(vals.reduce((s,x)=>s+x,0)/vals.length*100);
  return {pct,level:pct>=85?'ok':pct>=50?'mid':'low'};
}
function engBadge(d){
  const e=engagement(d);
  if(!e)return `<span class="eng-dot eng-na" title="ההגשה אינה כוללת נתוני מעורבות">⚪ —</span>`;
  const ic=e.level==='ok'?'🟢':e.level==='mid'?'🟡':'🔴';
  const txt=e.level==='ok'?'עבר':e.level==='mid'?'חלקי':'דילג';
  return `<span class="eng-dot eng-${e.level}" title="השלמת שלבי הלמידה: ${e.pct}%">${ic} ${txt} ${e.pct}%</span>`;
}
function engLevelOf(d){const e=engagement(d);return e?e.level:'na';}

/* ===== תצוגת הגשה מסודרת ===== */
function renderAnswersStructured(d){
  if(!d.answers||typeof d.answers!=='object'){
    return d.text?`<div class="sec-block"><div class="qa-a">${escH(d.text)}</div></div>`:'';
  }
  const ent=Object.entries(d.answers).filter(([,v])=>v!==''&&v!=null);
  if(!ent.length)return '';
  const gr=ent.filter(([k])=>isGradeKey(k));
  const op=ent.filter(([k])=>isOpenKey(k));
  const opin=ent.filter(([k])=>isOpinionKey(k));
  const eng=ent.filter(([k])=>isEngKey(k));
  const rest=ent.filter(([k])=>!isGradeKey(k)&&!isOpenKey(k)&&!isOpinionKey(k)&&!isEngKey(k));
  let h='';
  if(gr.length)h+=`<div class="sec-block"><div class="sec-h"><span class="sec-ic">🎯</span>ציון אוטומטי</div>`+
    gr.map(([k,v])=>`<div class="qa"><div class="qa-q">${escH(k)}</div><div class="big-score">${escH(String(v))}</div></div>`).join('')+`</div>`;
  if(op.length)h+=`<div class="sec-block"><div class="sec-h"><span class="sec-ic">✍️</span>תשובות פתוחות</div>`+
    op.map(([k,v])=>`<div class="qa"><div class="qa-q">${escH(k)}</div><div class="qa-a">${escH(String(v))}</div></div>`).join('')+`</div>`;
  if(opin.length)h+=`<div class="sec-block"><div class="sec-h"><span class="sec-ic">🗞️</span>טור דעה</div>`+
    opin.map(([k,v])=>`<div class="qa"><div class="qa-q">${escH(k.replace('טור דעה — ',''))}</div><div class="qa-a">${escH(String(v))}</div></div>`).join('')+`</div>`;
  if(eng.length)h+=`<div class="sec-block"><div class="sec-h"><span class="sec-ic">🚦</span>דוח מעורבות — שלבי הלמידה</div><div class="eng-grid">`+
    eng.map(([k,v])=>{const f=fracVal(v);const c=f===null?'':f>=1?'full':f>=.5?'part':'miss';
      return `<span class="eng-chip ${c}">${escH(k.replace('שלב תיאוריה — ','')) }: <b>${escH(String(v))}</b></span>`;}).join('')+`</div></div>`;
  if(rest.length)h+=`<div class="sec-block"><div class="sec-h"><span class="sec-ic">📎</span>נוסף</div>`+
    rest.map(([k,v])=>`<div class="qa"><div class="qa-q">${escH(k)}</div><div class="qa-a">${escH(String(v))}</div></div>`).join('')+`</div>`;
  return h;
}

function doLogin(){
  const phone=document.getElementById('inp-phone').value.trim();
  const pass=document.getElementById('inp-pass').value.trim();
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!phone||!pass){err.textContent='נא למלא טלפון וסיסמה';err.style.display='block';return;}
  err.textContent='מתחבר...';err.style.display='block';
  db.ref('teachers').once('value').then(snap=>{
    let fk='',fd=null;
    snap.forEach(ch=>{if(fk)return;const t=ch.val();if(t.phone===phone&&t.password===pass&&t.status==='approved'){fk=ch.key;fd=t;}});
    if(!fk){err.textContent='טלפון/סיסמה שגויים או המשתמש לא מאושר';err.style.display='block';return;}
    teacherID=fk;
    teacherName=fd.name||((fd.firstName||'')+' '+(fd.lastName||'')).trim();
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('teacher-name').textContent='👤 '+teacherName;
    loadAllData();
  });
}

function doLogout(){
  teacherID='';teacherName='';allData=[];
  document.getElementById('app').style.display='none';
  document.getElementById('login-overlay').style.display='flex';
  document.getElementById('inp-phone').value='';
  document.getElementById('inp-pass').value='';
}

function loadAllData(){
  document.getElementById('content').innerHTML='<div class="msg-box"><p>⏳ שואב נתונים...</p><span>אנא המתן</span></div>';
  db.ref('tests').once('value').then(snap=>{
    const val=snap.val()||{};
    const topics=Object.keys(val);
    if(!topics.length){document.getElementById('content').innerHTML='<div class="msg-box"><p>אין נתונים עדיין</p></div>';return;}
    allData=[];
    topics.forEach(topic=>{
      Object.entries(val[topic]||{}).forEach(([key,v])=>{
        if(v?.student?.teacherID===teacherID)allData.push({key,_topic:topic,...v});
      });
    });
    allData.sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));
    fillClassFilter();
    onClassChange();
  });
}

function updateStats(data){
  const graded=data.filter(d=>d.feedback?.grade!=null);
  const avg=graded.length?Math.round(graded.reduce((s,d)=>s+Number(d.feedback.grade),0)/graded.length):null;
  document.getElementById('stat-total').textContent=data.length;
  document.getElementById('stat-topics').textContent=[...new Set(data.map(d=>d._topic))].length;
  document.getElementById('stat-classes').textContent=[...new Set(data.map(d=>d.student?.class).filter(Boolean))].length;
  document.getElementById('stat-graded').textContent=graded.length;
  document.getElementById('stat-avg').textContent=avg??'—';
  document.getElementById('stat-pending').textContent=data.filter(d=>d.feedback?.grade==null).length;
}

function onClassChange(){
  const cls=document.getElementById('filter-class').value;
  const rel=cls?allData.filter(d=>(d.student?.class||'')===cls):allData;
  const topics=[...new Set(rel.map(d=>d._topic))].sort();
  const sel=document.getElementById('filter-topic');
  const prev=sel.value;
  sel.innerHTML='<option value="">📋 כל המטלות</option>';
  topics.forEach(t=>sel.innerHTML+=`<option${t===prev?' selected':''} value="${t}">${t}</option>`);
  applyFilter();
}
function fillClassFilter(){
  const cls=[...new Set(allData.map(d=>d.student?.class).filter(Boolean))].sort();
  const sel=document.getElementById('filter-class');
  const prev=sel.value;
  sel.innerHTML='<option value="">🏫 כל הכיתות</option>';
  cls.forEach(c=>sel.innerHTML+=`<option${c===prev?' selected':''}>${c}</option>`);
}

function getFiltered(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const topic=document.getElementById('filter-topic').value;
  const cls=document.getElementById('filter-class').value;
  const eng=document.getElementById('filter-eng')?.value||'';
  return allData.filter(d=>{
    const name=(d.student?.name||'').toLowerCase();
    return(!q||name.includes(q))&&(!topic||d._topic===topic)&&(!cls||d.student?.class===cls)
      &&(!eng||engLevelOf(d)===eng);
  });
}

function applyFilter(){
  const f=getFiltered();
  document.getElementById('cnt').textContent=f.length+' הגשות';
  updateStats(f);
  if(currentView==='insights')renderInsights(f);
  else if(currentView==='flat')renderFlat(f);
  else renderGrouped(f);
}

function setView(v){
  currentView=v;
  document.getElementById('vbtn-grouped').classList.toggle('active',v==='grouped');
  document.getElementById('vbtn-flat').classList.toggle('active',v==='flat');
  document.getElementById('vbtn-insights').classList.toggle('active',v==='insights');
  applyFilter();
}

function renderGrouped(filtered){
  if(!filtered.length){document.getElementById('content').innerHTML='<div class="msg-box"><p>לא נמצאו הגשות</p></div>';return;}
  const byTopic={};
  filtered.forEach(d=>{if(!byTopic[d._topic])byTopic[d._topic]=[];byTopic[d._topic].push(d);});
  let html='';
  Object.entries(byTopic).forEach(([topic,items])=>{
    const graded=items.filter(d=>d.feedback?.grade!=null);
    const avg=graded.length?Math.round(graded.reduce((s,d)=>s+Number(d.feedback.grade),0)/graded.length):null;
    const classes=[...new Set(items.map(d=>d.student?.class).filter(Boolean))].join(', ');
    const tid='tg-'+topic.replace(/[^a-z0-9]/gi,'_');
    html+=`<div class="topic-group">
      <div class="topic-header" onclick="toggleGroup('${tid}')">
        <div class="topic-title"><span class="topic-badge">${items.length}</span>${escH(topic)}</div>
        <div class="topic-meta">
          <span>✅ ${graded.length} עם ציון</span>
          ${avg!==null?`<span>ממוצע: ${avg}</span>`:''}
          ${classes?`<span>כיתות: ${escH(classes)}</span>`:''}
          <span>▾</span>
        </div>
      </div>
      <div class="topic-body open" id="${tid}">
        ${items.map(d=>renderCard(d)).join('')}
      </div>
    </div>`;
  });
  document.getElementById('content').innerHTML=html;
}

function toggleGroup(id){
  const el=document.getElementById(id);if(el)el.classList.toggle('open');
}

function renderCard(d){
  const name=escH(d.student?.name||((d.student?.firstName||'')+' '+(d.student?.lastName||'')).trim()||'—');
  const cls=escH(d.student?.class||'—');
  const date=d.submittedAt?new Date(d.submittedAt).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
  const grade=d.feedback?.grade??'';
  const fb=escH(d.feedback?.text||d.feedback?.comment||'');
  const initial=name.replace(/&[^;]+;/g,'')[0]||'?';
  const hasGrade=grade!=='';
  const cid='c'+d.key.replace(/[^a-z0-9]/gi,'_');
  const aid='a'+d.key.replace(/[^a-z0-9]/gi,'_');

  const ans=renderAnswersStructured(d);

  return `<div class="sub-card">
    <div class="sub-card-header" onclick="toggleCard('${cid}','${aid}')">
      <div class="sub-avatar">${initial}</div>
      <div class="sub-name">${name}</div>
      <div class="sub-class">${cls}</div>
      ${engBadge(d)}
      <div class="sub-date">${date}</div>
      <div class="grade-pill ${hasGrade?'has':'none'}">${hasGrade?grade+' ציון':'ללא ציון'}</div>
      <div class="expand-arr" id="${aid}">▾</div>
    </div>
    <div class="sub-body" id="${cid}">
      ${ans?`<div class="answers-sec"><div class="answers-title">הגשת התלמיד</div>${ans}
        <div style="margin-top:10px;"><button class="btn-save" onclick="openQuickReviewFor('${escH(d.key)}')">⚡ פתח בבדיקה מהירה</button></div></div>`:''}
      <div class="feedback-sec">
        <div class="fb-sec-title">ציון ומשוב</div>
        <input class="inp-grade" type="number" id="grade-${escH(d.key)}" value="${grade}" placeholder="ציון" min="0" max="100">
        <input class="inp-fb" type="text" id="fb-${escH(d.key)}" value="${fb}" placeholder="הערה / פידבק...">
        <button class="btn-save" onclick="saveFeedback('${escH(d.key)}','${escH(d._topic)}')">💾 שמור</button>
        <div class="saved-ok" id="saved-${escH(d.key)}">✓ נשמר בהצלחה</div>
      </div>
    </div>
  </div>`;
}

function toggleCard(bodyId,arrId){
  const b=document.getElementById(bodyId);const a=document.getElementById(arrId);
  if(!b)return;b.classList.toggle('open');if(a)a.classList.toggle('open');
}

function renderFlat(filtered){
  if(!filtered.length){document.getElementById('content').innerHTML='<div class="msg-box"><p>לא נמצאו הגשות</p></div>';return;}
  const rows=filtered.map(d=>{
    const name=escH(d.student?.name||((d.student?.firstName||'')+' '+(d.student?.lastName||'')).trim()||'—');
    const cls=escH(d.student?.class||'—');
    const date=d.submittedAt?new Date(d.submittedAt).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    const grade=d.feedback?.grade??'';
    const fb=escH(d.feedback?.text||d.feedback?.comment||'');
    let ans='';
    if(d.answers&&typeof d.answers==='object')ans=Object.entries(d.answers).filter(([,v])=>v).map(([k,v])=>`<b>${escH(k)}:</b> ${escH(String(v))}`).join('<br>');
    else if(d.text)ans=escH(d.text);
    return `<tr>
      <td class="td-topic">${escH(d._topic)}</td>
      <td class="td-name">${name}</td>
      <td class="td-cls">${cls}</td>
      <td>${engBadge(d)}</td>
      <td class="td-date">${date}</td>
      <td class="td-ans">${ans||'—'}</td>
      <td class="td-fb">
        <div class="fb-row">
          <input class="ti-grade" type="number" id="grade-${escH(d.key)}" value="${grade}" placeholder="ציון">
          <input class="ti-fb" type="text" id="fb-${escH(d.key)}" value="${fb}" placeholder="פידבק...">
          <button class="ti-save" onclick="saveFeedback('${escH(d.key)}','${escH(d._topic)}')">💾</button>
        </div>
        <div class="t-saved-ok" id="saved-${escH(d.key)}">✓ נשמר</div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>נושא</th><th>שם</th><th>כיתה</th><th>🚦 מעורבות</th><th>תאריך</th><th>תשובות</th><th>ציון ופידבק</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

/* ===== 📊 תובנות כיתה ===== */
function renderInsights(f){
  const el=document.getElementById('content');
  if(!f.length){el.innerHTML='<div class="msg-box"><p>לא נמצאו הגשות</p></div>';return;}
  const bar=(lbl,n,tot,cl)=>`<div class="bar-row"><span>${lbl}</span><div class="bar-track"><div class="bar-fill ${cl||''}" style="width:${tot?Math.round(n/tot*100):0}%"></div></div><span class="ins-num">${n}</span></div>`;

  // מעורבות
  const lv={ok:0,mid:0,low:0,na:0};
  f.forEach(d=>lv[engLevelOf(d)]++);
  const engHtml=`<div class="ins-card"><h3>🚦 מעורבות בלמידה</h3>
    ${bar('🟢 עברו',lv.ok,f.length,'g')}${bar('🟡 חלקי',lv.mid,f.length,'y')}${bar('🔴 דילגו',lv.low,f.length,'r')}${bar('⚪ ללא נתון',lv.na,f.length)}
    ${lv.low?`<div style="margin-top:10px;font-size:12px;color:#9f1239;font-weight:700;">⚠ ${lv.low} תלמידים כמעט לא עברו על החומר</div>`:''}</div>`;

  // התפלגות ציונים
  const gr=f.filter(d=>d.feedback?.grade!=null).map(d=>Number(d.feedback.grade));
  const buckets=[['0–59',0],['60–69',0],['70–79',0],['80–89',0],['90–100',0]];
  gr.forEach(g=>{const i=g<60?0:g<70?1:g<80?2:g<90?3:4;buckets[i][1]++;});
  const gradeHtml=`<div class="ins-card"><h3>📈 התפלגות ציונים</h3>
    ${gr.length?buckets.map(b=>bar(b[0],b[1],gr.length,b[0]==='0–59'?'r':b[0]==='60–69'?'y':'g')).join('')
      :'<div class="ins-empty">עדיין לא ניתנו ציונים</div>'}
    ${gr.length?`<div style="margin-top:8px;font-size:12.5px;">ממוצע: <b>${Math.round(gr.reduce((s,x)=>s+x,0)/gr.length)}</b> · חציון: <b>${[...gr].sort((a,b)=>a-b)[Math.floor(gr.length/2)]}</b></div>`:''}</div>`;

  // ציוני המבדק האוטומטי
  const auto=[];
  f.forEach(d=>{if(d.answers)Object.entries(d.answers).forEach(([k,v])=>{if(isGradeKey(k)){const fr=fracVal(v);if(fr!==null)auto.push(fr);}});});
  const autoHtml=`<div class="ins-card"><h3>🎯 מבדק אוטומטי</h3>${auto.length?
    `<div style="font-size:26px;font-weight:900;">${Math.round(auto.reduce((s,x)=>s+x,0)/auto.length*100)}%</div>
     <div style="font-size:12px;color:var(--muted);">ממוצע הצלחה ברב-ברירה (${auto.length} הגשות)</div>`
    :'<div class="ins-empty">אין נתוני מבדק אוטומטי</div>'}</div>`;

  // לפי כיתה
  const byCls={};
  f.forEach(d=>{const c=d.student?.class||'—';(byCls[c]=byCls[c]||[]).push(d);});
  const clsHtml=`<div class="ins-card"><h3>🏫 לפי כיתה</h3><ul class="ins-list">${
    Object.entries(byCls).sort().map(([c,items])=>{
      const g=items.filter(d=>d.feedback?.grade!=null);
      const a=g.length?Math.round(g.reduce((s,d)=>s+Number(d.feedback.grade),0)/g.length):null;
      return `<li><span><b>${escH(c)}</b> · ${items.length} הגשות</span><span>${a!==null?'ממוצע '+a:'ללא ציונים'}</span></li>`;
    }).join('')}</ul></div>`;

  // ממתינים לבדיקה
  const pend=f.filter(d=>d.feedback?.grade==null);
  const pendHtml=`<div class="ins-card"><h3>⏳ ממתינים לבדיקה (${pend.length})</h3>${pend.length?
    `<ul class="ins-list">${pend.slice(0,12).map(d=>`<li><span>${escH(d.student?.name||'—')}</span><span>${escH(d.student?.class||'')}</span></li>`).join('')}</ul>
     ${pend.length>12?`<div style="font-size:12px;color:var(--muted);margin-top:6px;">ועוד ${pend.length-12}…</div>`:''}
     <div style="margin-top:10px;"><button class="btn-save" onclick="startQuickReview()">⚡ התחל בדיקה מהירה</button></div>`
    :'<div class="ins-empty">הכול נבדק 🎉</div>'}</div>`;

  el.innerHTML=`<div class="ins-wrap">${engHtml}${gradeHtml}${autoHtml}${clsHtml}${pendHtml}</div>`;
}

/* ===== ⚡ בדיקה מהירה ===== */
function startQuickReview(){
  qrList=getFiltered();
  if(!qrList.length)return alert('אין הגשות להצגה');
  const firstPend=qrList.findIndex(d=>d.feedback?.grade==null);
  qrIdx=firstPend>=0?firstPend:0;
  document.getElementById('qrOverlay').classList.add('open');
  qrRender();
}
function openQuickReviewFor(key){
  qrList=getFiltered();
  const i=qrList.findIndex(d=>d.key===key);
  qrIdx=i>=0?i:0;
  document.getElementById('qrOverlay').classList.add('open');
  qrRender();
}
function closeQuickReview(){document.getElementById('qrOverlay').classList.remove('open');}
function qrMove(step){
  const n=qrIdx+step;
  if(n<0||n>=qrList.length)return;
  qrIdx=n;qrRender();
}
function qrRender(){
  const d=qrList[qrIdx];if(!d)return;
  const name=d.student?.name||((d.student?.firstName||'')+' '+(d.student?.lastName||'')).trim()||'—';
  const date=d.submittedAt?new Date(d.submittedAt).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
  document.getElementById('qrName').textContent=name;
  document.getElementById('qrMeta').innerHTML=`${escH(d.student?.class||'—')} · ${escH(d._topic)} · ${date}`;
  document.getElementById('qrPos').textContent=(qrIdx+1)+' / '+qrList.length;
  document.getElementById('qrPrev').disabled=qrIdx===0;
  document.getElementById('qrNext').disabled=qrIdx===qrList.length-1;
  document.getElementById('qrBody').innerHTML=`<div style="margin-bottom:12px;">${engBadge(d)}</div>`+(renderAnswersStructured(d)||'<div class="ins-empty">אין תשובות</div>');
  document.getElementById('qrGrade').value=d.feedback?.grade??'';
  document.getElementById('qrFb').value=d.feedback?.text||d.feedback?.comment||'';
  document.getElementById('qrBody').scrollTop=0;
}
function qrSave(next){
  const d=qrList[qrIdx];if(!d)return;
  const grade=document.getElementById('qrGrade').value.trim();
  const text=document.getElementById('qrFb').value.trim();
  const upd={};
  if(grade!=='')upd.grade=Number(grade);
  if(text)upd.text=text;
  const after=()=>{
    const o=allData.find(x=>x.key===d.key);if(o)o.feedback={...(o.feedback||{}),...upd};
    d.feedback={...(d.feedback||{}),...upd};
    if(next&&qrIdx<qrList.length-1){qrIdx++;qrRender();}
    else if(next){closeQuickReview();}
    updateStats(getFiltered());
  };
  if(!Object.keys(upd).length){after();return;}
  db.ref('tests/'+d._topic+'/'+d.key+'/feedback').update(upd).then(after);
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('qrOverlay').classList.contains('open'))return;
  if(e.target.tagName==='INPUT'&&e.key!=='Escape')return;
  if(e.key==='ArrowLeft')qrMove(1);
  if(e.key==='ArrowRight')qrMove(-1);
  if(e.key==='Escape')closeQuickReview();
});

function saveFeedback(key,topic){
  const grade=document.getElementById('grade-'+key)?.value.trim();
  const text=document.getElementById('fb-'+key)?.value.trim();
  const upd={};
  if(grade!=='')upd.grade=Number(grade);
  if(text)upd.text=text;
  if(!Object.keys(upd).length)return;
  db.ref('tests/'+topic+'/'+key+'/feedback').update(upd).then(()=>{
    const ind=document.getElementById('saved-'+key);
    if(ind){ind.style.display='block';setTimeout(()=>ind.style.display='none',2500);}
    const d=allData.find(x=>x.key===key);
    if(d)d.feedback={...(d.feedback||{}),...upd};
  });
}

function exportCSV(){
  const f=getFiltered();
  if(!f.length)return alert('אין נתונים לייצוא');
  const rows=f.map(d=>{
    const name=d.student?.name||((d.student?.firstName||'')+' '+(d.student?.lastName||'')).trim();
    const cls=d.student?.class||'';
    const date=d.submittedAt?new Date(d.submittedAt).toLocaleString('he-IL'):'';
    const grade=d.feedback?.grade??'';
    const fb=d.feedback?.text||d.feedback?.comment||'';
    const e=engagement(d);
    const eng=e?(e.level==='ok'?'עבר':e.level==='mid'?'חלקי':'דילג')+' '+e.pct+'%':'—';
    return[d._topic,name,cls,eng,date,grade,fb].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',');
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(['נושא,שם,כיתה,מעורבות,תאריך,ציון,פידבק',...rows].join('\n'));
  a.download='teacher_'+Date.now()+'.csv';a.click();
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('inp-pass').addEventListener('keyup',e=>{if(e.key==='Enter')doLogin();});
</script>
