<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ההגשות שלי — דנוטציה וקונוטציה</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root{--paper:#f5f0e8;--paper-dark:#e8e0cc;--ink:#1a1208;--ink-light:#6b5d45;--accent:#4a1a6b;--green:#2d7a2d;--warm:#7a4f1a;--red:#8b1a1a;--shadow:4px 4px 0 #1a1208;--shadow-sm:2px 2px 0 #1a1208;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Heebo',sans-serif;line-height:1.7;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(26,18,8,.055) 27px,rgba(26,18,8,.055) 28px);}
.modal-overlay{position:fixed;inset:0;background:rgba(26,18,8,.93);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink);max-width:380px;width:100%;padding:36px;}
.modal-head{background:var(--ink);color:var(--paper);text-align:center;padding:14px 20px;margin:-36px -36px 24px;}
.modal-head h2{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900;}
.modal-head p{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-top:3px;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-light);margin-bottom:4px;}
.mf input{width:100%;padding:11px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;color:var(--ink);outline:none;}
.mf input:focus{border-color:var(--accent);}
.mbtn{width:100%;padding:12px;background:var(--ink);color:var(--paper);border:none;font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
.mbtn:hover{background:var(--accent);}
.mbtn:disabled{background:#999;cursor:default;}
.masthead{background:var(--ink);color:var(--paper);border-bottom:6px double var(--paper-dark);}
.mhi{max-width:760px;margin:0 auto;padding:0 24px;}
.mht{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #444;font-size:11px;letter-spacing:1.5px;opacity:.6;}
.mhti{text-align:center;padding:20px 0 12px;}
.mhti h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(20px,4vw,38px);font-weight:900;}
.mhti p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--paper-dark);margin-top:5px;}
.mhr{height:3px;background:var(--paper-dark);margin-bottom:8px;}
.sbadge{display:flex;justify-content:center;gap:24px;padding-bottom:10px;font-size:12px;color:#ccc;}
.sbadge strong{font-family:'Frank Ruhl Libre',serif;font-size:14px;color:white;}
.page{max-width:760px;margin:0 auto;padding:28px 20px 70px;}
.loading{text-align:center;padding:40px;color:var(--ink-light);font-size:15px;}
.no-subs{background:white;border:2px solid var(--ink);padding:30px;text-align:center;font-size:15px;color:var(--ink-light);}
/* submission card */
.sub-card{background:white;border:2px solid var(--ink);box-shadow:var(--shadow-sm);margin-bottom:16px;overflow:hidden;}
.sub-head{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;user-select:none;transition:background .15s;}
.sub-head:hover{background:var(--paper-dark);}
.sub-date{font-size:12px;color:var(--ink-light);flex:1;}
.sub-grade-wrap{text-align:left;}
.grade-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900;border:3px solid var(--ink);flex-shrink:0;}
.grade-circle.graded{background:var(--green);color:white;border-color:var(--green);}
.grade-circle.pending{background:var(--paper-dark);color:var(--ink-light);font-size:12px;text-align:center;line-height:1.3;}
.sub-title{font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:900;color:var(--accent);}
.sub-toggle{color:var(--ink-light);font-size:16px;transition:transform .25s;}
.sub-toggle.open{transform:rotate(180deg);}
.sub-body{display:none;border-top:2px solid var(--paper-dark);padding:18px 20px;}
.sub-body.open{display:block;}
/* feedback box */
.fb-result{background:linear-gradient(135deg,#f5f0ff,#e8e0ff);border:3px solid var(--accent);padding:18px 22px;margin-bottom:16px;}
.fb-result h4{font-family:'Frank Ruhl Libre',serif;font-size:18px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.grade-big{font-family:'Frank Ruhl Libre',serif;font-size:48px;font-weight:900;color:var(--accent);line-height:1;}
.grade-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-light);margin-top:2px;}
.grade-row{display:flex;align-items:flex-end;gap:16px;margin-bottom:10px;}
.comment-box{background:white;border:2px solid var(--accent);padding:12px 16px;font-size:14px;color:#333;line-height:1.7;border-right:4px solid var(--accent);}
.no-fb{background:var(--paper-dark);border:2px solid var(--ink);padding:14px 18px;font-size:13px;color:var(--ink-light);margin-bottom:14px;}
/* answers */
.ans-section h5{font-family:'Frank Ruhl Libre',serif;font-size:15px;color:var(--ink-light);margin-bottom:10px;border-bottom:1px solid var(--paper-dark);padding-bottom:5px;}
.ans-item{background:var(--paper-dark);padding:10px 14px;margin-bottom:7px;border-right:3px solid var(--accent);}
.ans-item label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--ink-light);display:block;margin-bottom:3px;}
.ans-item p{font-size:13px;color:var(--ink);line-height:1.6;}
footer{text-align:center;margin-top:48px;padding-top:14px;border-top:3px double var(--ink);font-size:12px;color:var(--ink-light);}
</style>
</head>
<body>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head"><h2>ההגשות שלי</h2><p>דנוטציה וקונוטציה</p></div>
    <div class="mf"><label>כתובת מייל</label><input id="inp-email" type="email" placeholder="your@email.com" autocomplete="off" style="direction:ltr;text-align:left;width:100%;padding:11px 13px;border:2px solid var(--ink);background:white;font-family:'Heebo',sans-serif;font-size:15px;color:var(--ink);outline:none;"></div>
    <div class="mf"><label>קוד מורה</label><input id="inp-code" type="text" placeholder="הקוד שקיבלת מהמורה" autocomplete="off"></div>
    <button class="mbtn" id="enter-btn" onclick="loadMyGrades()" disabled>הצג את הגשותי ←</button>
  </div>
</div>

<header class="masthead" id="mhead" style="display:none">
  <div class="mhi">
    <div class="mht"><span>ההגשות שלי • תקשורת ועיתונות</span><span>גליל מערבי</span></div>
    <div class="mhti"><h1>ההגשות שלי</h1><p>דנוטציה וקונוטציה</p></div>
    <div class="mhr"></div>
    <div class="sbadge"><span id="bname-wrap">—</span><span id="bemail-wrap" style="direction:ltr;font-size:12px;opacity:.7"></span></div>
  </div>
</header>

<div class="page" id="mainpage" style="display:none">
  <div id="content"><div class="loading">⏳ טוען הגשות...</div></div>
</div>
<footer style="max-width:760px;margin:0 auto 20px;padding:14px 20px 0;border-top:3px double var(--ink);text-align:center;font-size:12px;color:var(--ink-light);">גליל מערבי • תקשורת ועיתונות • דנוטציה וקונוטציה</footer>

<script>
const FC={apiKey:"AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",authDomain:"tests-fd938.firebaseapp.com",databaseURL:"https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",projectId:"tests-fd938"};
firebase.initializeApp(FC);
const db=firebase.database();

['inp-email','inp-code'].forEach(id=>{document.getElementById(id).addEventListener('input',()=>{document.getElementById('enter-btn').disabled=!(document.getElementById('inp-email').value.trim()&&document.getElementById('inp-code').value.trim());});});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!document.getElementById('enter-btn').disabled&&document.getElementById('modal').style.display!=='none')loadMyGrades();});

let myName='',myClass='',myCode='';

function loadMyGrades(){
  const myEmail=document.getElementById('inp-email').value.trim().toLowerCase();
  const myCode=document.getElementById('inp-code').value.trim();
  if(!myEmail||!myCode)return;
  document.getElementById('enter-btn').disabled=true;
  document.getElementById('enter-btn').textContent='מחפש...';

  db.ref('tests/denotation').once('value',function(snap){
    const subs=[];
    snap.forEach(function(child){
      const d=child.val();
      if(d.student&&
         d.student.classCode===myCode&&
         (d.student.email||'').toLowerCase()===myEmail){
        subs.push(Object.assign({key:child.key},d));
      }
    });

    document.getElementById('modal').style.display='none';
    document.getElementById('mhead').style.display='block';
    document.getElementById('mainpage').style.display='block';

    if(!subs.length){
      document.getElementById('bname-wrap').textContent='';
      document.getElementById('bemail-wrap').textContent=myEmail;
      document.getElementById('content').innerHTML='<div class="no-subs">לא נמצאו הגשות עבור <strong>'+myEmail+'</strong>.<br><br>וודאו שהמייל וקוד המורה זהים לאלה שהזנתם בהגשה.</div>';
      return;
    }
    const s=subs[0].student;
    document.getElementById('bname-wrap').textContent=s.name||(s.firstName+' '+s.lastName)||'';
    document.getElementById('bemail-wrap').textContent=myEmail;
    subs.sort(function(a,b){return b.submittedAt-a.submittedAt;});
    renderSubs(subs);
  }).catch(function(){
    document.getElementById('enter-btn').disabled=false;
    document.getElementById('enter-btn').textContent='הצג את הגשותי ←';
    alert('שגיאה בטעינה — נסו שנית');
  });
}

const QS_LABELS={
  a1_denotation:'א1 — ניתוח דנוטטיבי',
  a2_elements:'א2 — אלמנטים שנבחרו',
  a2_elements_explain:'א2 — הסבר האלמנטים',
  b1_connotation_first:'ב1 — קונוטציה ראשונה',
  b1_connotation_why:'ב1 — קשר לבחירות הצלם',
  b2_photo_choice:'ב2 — תמונה שנבחרה',
  b2_photo_compare:'ב2 — השוואת תמונות',
  c1_my_denotation:'ג1 — דנוטציה מחיי',
  c1_my_connotation:'ג1 — קונוטציה מחיי',
  c1_takeaway:'ג1 — מה אקח מהשיעור',
};

function renderSubs(subs){
  let html='';
  subs.forEach((d,i)=>{
    const dt=new Date(d.submittedAt);
    const dateStr=dt.toLocaleDateString('he-IL')+' '+dt.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const fb=d.feedback||{};
    const hasGrade=fb.grade!==undefined;
    const gradeCircle=hasGrade
      ?`<div class="grade-circle graded">${fb.grade}</div>`
      :`<div class="grade-circle pending">טרם<br>הוערך</div>`;

    const fbSection=hasGrade?`
      <div class="fb-result">
        <h4>⭐ הערכת המורה</h4>
        <div class="grade-row">
          <div><div class="grade-big">${fb.grade}</div><div class="grade-label">מתוך 100</div></div>
          ${getGradeBar(fb.grade)}
        </div>
        ${fb.comment?`<div class="comment-box">💬 ${fb.comment}</div>`:''}
        <div style="font-size:11px;color:var(--ink-light);margin-top:8px">הוערך: ${new Date(fb.gradedAt).toLocaleDateString('he-IL')}</div>
      </div>`
      :`<div class="no-fb">⏳ המורה טרם הוסיף הערכה לגשה זו. בדקו שוב מאוחר יותר.</div>`;

    const answers=Object.entries(QS_LABELS)
      .filter(([k])=>d.answers&&d.answers[k])
      .map(([k,l])=>`<div class="ans-item"><label>${l}</label><p>${d.answers[k]}</p></div>`)
      .join('');

    html+=`
    <div class="sub-card">
      <div class="sub-head" onclick="togSub(${i})">
        ${gradeCircle}
        <div style="flex:1">
          <div class="sub-title">הגשה ${subs.length-i}</div>
          <div class="sub-date">${dateStr}</div>
        </div>
        <div class="sub-toggle" id="tog-${i}">▾</div>
      </div>
      <div class="sub-body" id="sb-${i}">
        ${fbSection}
        <div class="ans-section">
          <h5>התשובות שלי</h5>
          ${answers||'<p style="color:var(--ink-light);font-size:13px">אין תשובות שמורות</p>'}
        </div>
      </div>
    </div>`;
  });
  document.getElementById('content').innerHTML=html;
}

function getGradeBar(grade){
  const color=grade>=85?'var(--green)':grade>=70?'#2563af':grade>=55?'var(--warm)':'var(--red)';
  return `<div style="flex:1;padding-bottom:8px">
    <div style="height:14px;background:var(--paper-dark);border:2px solid var(--ink);border-radius:0;overflow:hidden;">
      <div style="height:100%;width:${grade}%;background:${color};transition:width 1s ease;"></div>
    </div>
    <div style="font-size:11px;color:var(--ink-light);margin-top:3px">${grade>=85?'מצוין':grade>=70?'טוב':grade>=55?'סביר':'יש לשפר'}</div>
  </div>`;
}

function togSub(i){
  const body=document.getElementById('sb-'+i);
  const tog=document.getElementById('tog-'+i);
  const isOpen=body.classList.contains('open');
  document.querySelectorAll('.sub-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.sub-toggle').forEach(t=>t.classList.remove('open'));
  if(!isOpen){body.classList.add('open');tog.classList.add('open');}
}
</script>
</body>
</html>
