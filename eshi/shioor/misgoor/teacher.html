<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח מורה — מסגור</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#111; --paper:#f7f3ee; --cream:#ede8e1;
  --red:#c0392b; --red-bg:#fdecea;
  --blue:#1a3a6b; --blue-bg:#e8eef8;
  --gold:#b8860b; --gold-bg:#fdf6e3;
  --green:#1b5e20; --green-bg:#e8f5e9;
  --purple:#4a148c; --purple-bg:#f3e5f5;
  --shadow:4px 4px 0 rgba(0,0,0,.82);
  --shadow-sm:3px 3px 0 rgba(0,0,0,.75);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;}

/* ── HEADER ── */
.hdr{background:var(--ink);color:#fff;padding:0;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 32px;border-bottom:1px solid rgba(255,255,255,.12);font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.45);}
.hdr-chip{background:var(--gold);color:var(--ink);padding:3px 14px;font-size:10px;font-weight:700;letter-spacing:2px;border-radius:2px;}
.hdr-main{padding:28px 32px;}
.hdr-kicker{font-size:10px;letter-spacing:3px;color:var(--gold);font-weight:700;margin-bottom:8px;}
.hdr-h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.5rem,4vw,2.4rem);font-weight:900;line-height:1.2;}
.hdr-sub{font-size:.88rem;color:rgba(255,255,255,.5);margin-top:6px;}

/* ── WRAP ── */
.wrap{max-width:900px;margin:0 auto;padding:36px 22px 80px;}

/* ── LOGIN CARD ── */
.login-card{
  background:#fff;border:2px solid var(--ink);border-radius:16px;
  box-shadow:var(--shadow);overflow:hidden;margin-bottom:32px;
}
.login-card-head{
  background:var(--ink);color:#fff;padding:18px 24px;
  display:flex;align-items:center;gap:12px;
}
.login-card-head h2{font-family:'Frank Ruhl Libre',serif;font-size:1.2rem;font-weight:900;}
.login-body{padding:24px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
.login-field{flex:1;min-width:200px;}
.login-field label{display:block;font-size:.82rem;font-weight:700;margin-bottom:6px;color:#333;}
.login-field input{
  width:100%;padding:12px 16px;
  border:2px solid var(--ink);border-radius:10px;
  box-shadow:var(--shadow-sm);
  font-family:'Heebo',sans-serif;font-size:1rem;
  font-family:monospace;letter-spacing:2px;
  transition:border-color .2s;
}
.login-field input:focus{outline:none;border-color:var(--purple);}
.btn-load{
  padding:12px 28px;
  background:var(--ink);color:#fff;
  border:2px solid var(--ink);border-radius:10px;
  box-shadow:var(--shadow-sm);
  font-family:'Heebo',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-load:hover{background:#333;transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
.login-msg{width:100%;font-size:.88rem;color:var(--red);font-weight:600;display:none;margin-top:-4px;}

/* ── RESULTS HEADER ── */
.results-bar{
  display:none;
  background:#fff;border:2px solid var(--ink);border-radius:12px;
  box-shadow:var(--shadow-sm);padding:16px 22px;margin-bottom:24px;
  align-items:center;gap:20px;flex-wrap:wrap;
}
.results-bar.vis{display:flex;}
.rb-code{
  font-family:monospace;font-size:1.1rem;font-weight:700;
  background:var(--ink);color:var(--gold);
  padding:4px 14px;border-radius:6px;letter-spacing:2px;
}
.rb-count{font-size:.88rem;color:#555;}
.rb-count strong{color:var(--ink);font-size:1.1rem;}
.btn-export{
  margin-right:auto;
  padding:9px 20px;
  background:var(--green-bg);color:var(--green);
  border:2px solid var(--green);border-radius:8px;
  box-shadow:2px 2px 0 var(--green);
  font-family:'Heebo',sans-serif;font-weight:700;font-size:.85rem;
  cursor:pointer;transition:all .15s;
}
.btn-export:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--green);}
.btn-reload{
  padding:9px 16px;
  background:#fff;
  border:2px solid var(--ink);border-radius:8px;
  box-shadow:2px 2px 0 var(--ink);
  font-family:'Heebo',sans-serif;font-weight:700;font-size:.85rem;
  cursor:pointer;transition:all .15s;
}
.btn-reload:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink);}

/* ── LOADING ── */
.loading{text-align:center;padding:48px 24px;color:#888;font-size:.95rem;display:none;}
.spinner{
  width:36px;height:36px;border:3px solid #ddd;
  border-top-color:var(--ink);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STUDENT CARDS ── */
.students-grid{display:flex;flex-direction:column;gap:20px;}

.student-card{
  background:#fff;border:2px solid var(--ink);border-radius:14px;
  box-shadow:var(--shadow-sm);overflow:hidden;
}
.sc-head{
  padding:14px 20px;border-bottom:2px solid var(--ink);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;cursor:pointer;
  background:var(--cream);
  transition:background .15s;
}
.sc-head:hover{background:#e5e0d8;}
.sc-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.sc-name{font-family:'Frank Ruhl Libre',serif;font-size:1.15rem;font-weight:900;}
.sc-pill{
  padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:700;
  border:1px solid rgba(0,0,0,.2);background:rgba(0,0,0,.06);
}
.sc-time{font-size:.75rem;color:#888;margin-right:auto;}
.sc-arrow{font-size:.8rem;transition:transform .3s;color:#666;}
.sc-head.open .sc-arrow{transform:rotate(180deg);}

.sc-body{display:none;padding:20px;}
.sc-body.open{display:block;}

/* answer blocks */
.ans-section{margin-bottom:20px;}
.ans-section-title{
  font-size:.72rem;letter-spacing:2px;font-weight:700;color:#888;
  margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid #eee;text-transform:uppercase;
}
.ans-row{
  display:grid;grid-template-columns:180px 1fr;gap:0;
  border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;
  margin-bottom:8px;
}
.ans-key{
  background:var(--cream);padding:10px 14px;
  font-size:.78rem;font-weight:700;color:#555;
  border-left:1px solid #e0e0e0;
  display:flex;align-items:flex-start;
}
.ans-val{
  padding:10px 14px;font-size:.88rem;color:#222;
  line-height:1.6;white-space:pre-wrap;word-break:break-word;
}
.ans-val.empty{color:#bbb;font-style:italic;}
@media(max-width:560px){.ans-row{grid-template-columns:1fr;}.ans-key{border-left:none;border-bottom:1px solid #e0e0e0;}}

/* match result display */
.match-display{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.match-zone{
  border:1px solid #ddd;border-radius:8px;padding:8px 12px;
  font-size:.8rem;background:#fafafa;flex:1;min-width:120px;
}
.match-zone-lbl{font-weight:700;margin-bottom:4px;font-size:.75rem;}
.match-zone-items{display:flex;flex-direction:column;gap:3px;}
.match-tag{font-size:.75rem;background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:12px;display:inline-block;}

/* empty state */
.empty-state{
  text-align:center;padding:60px 24px;
  border:2px dashed rgba(0,0,0,.15);border-radius:14px;
  color:#aaa;display:none;
}
.empty-state.vis{display:block;}
.empty-icon{font-size:3rem;margin-bottom:12px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <span class="hdr-chip">לוח מורה</span>
    <span>מסגור — תקשורת ומדיה</span>
    <span>תשפ"ו</span>
  </div>
  <div class="hdr-main">
    <div class="hdr-kicker">👩‍🏫 ממשק מורה</div>
    <h1 class="hdr-h1">צפייה בעבודות תלמידים</h1>
    <p class="hdr-sub">הזן את קוד הכיתה שלך כדי לראות את כל העבודות שהוגשו</p>
  </div>
</div>

<div class="wrap">

  <!-- LOGIN -->
  <div class="login-card">
    <div class="login-card-head">
      <span style="font-size:1.4rem">🔑</span>
      <h2>כניסה עם קוד כיתה</h2>
    </div>
    <div class="login-body">
      <div class="login-field">
        <label>קוד הכיתה שלך</label>
        <input type="text" id="codeInput" placeholder="cohen-10b"
          onkeydown="if(event.key==='Enter')loadSubmissions()">
      </div>
      <button class="btn-load" onclick="loadSubmissions()">טען עבודות ←</button>
      <div class="login-msg" id="loginMsg">קוד לא נמצא או שגיאה — נסה שוב</div>
    </div>
  </div>

  <!-- RESULTS BAR -->
  <div class="results-bar" id="resultsBar">
    <span>קוד כיתה:</span>
    <span class="rb-code" id="rbCode"></span>
    <span class="rb-count">נמצאו <strong id="rbCount">0</strong> עבודות</span>
    <button class="btn-reload" onclick="loadSubmissions()">🔄 רענן</button>
    <button class="btn-export" onclick="exportCSV()">📥 ייצוא CSV</button>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    טוען עבודות...
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📭</div>
    <p>אין עדיין עבודות עם הקוד הזה.<br>שלח את הקוד לתלמידים וחכה שיגישו.</p>
  </div>

  <!-- STUDENTS -->
  <div class="students-grid" id="studentsGrid"></div>

</div>

<!-- Firebase compat CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>

/* ══════════════════════════════════════
   🔴 הכנס כאן את הפרטים מה-Firebase Console
   Project Settings → Your apps → SDK setup
══════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyCCHvn_ulmiyM56DuslNzNC0Ge6a8i2vhY",
  authDomain:        "tests-fd938.firebaseapp.com",
  databaseURL:       "https://tests-fd938-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "tests-fd938",
  storageBucket:     "tests-fd938.firebasestorage.app",
  messagingSenderId: "586813097412",
  appId:             "1:586813097412:web:39a71b3e0ea03573509091"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let currentCode = '';
let allSubmissions = [];

/* ══════════════════════════════════════
   LOAD SUBMISSIONS
══════════════════════════════════════ */
async function loadSubmissions() {
  const code = document.getElementById('codeInput').value.trim().toLowerCase();
  const msg  = document.getElementById('loginMsg');
  msg.style.display = 'none';

  if (!code) { msg.textContent = 'יש להזין קוד כיתה'; msg.style.display = 'block'; return; }

  // show loading
  document.getElementById('loadingEl').style.display = 'block';
  document.getElementById('studentsGrid').innerHTML = '';
  document.getElementById('emptyState').classList.remove('vis');
  document.getElementById('resultsBar').classList.remove('vis');

  try {
    const snap = await db.ref('tests/מסגור')
      .orderByChild('student/classCode')
      .equalTo(code)
      .once('value');

    document.getElementById('loadingEl').style.display = 'none';
    currentCode = code;

    // המר snapshot לרשימה (מהחדש לישן)
    const raw = [];
    snap.forEach(child => raw.push({ id: child.key, ...child.val() }));
    raw.reverse(); // Firebase מחזיר לפי סדר מפתח — הופכים לחדש ראשון

    // סימון כפילויות — לפי שם + כיתה
    const countMap = new Map();
    raw.forEach(sub => {
      const s = sub.student || {};
      const key = (s.name||'').trim().toLowerCase() + '|' + (s.class||'').trim();
      countMap.set(key, (countMap.get(key) || 0) + 1);
    });

    // מספר הגשה לכל תלמיד (מהחדשה לישנה)
    const indexMap = new Map();
    allSubmissions = raw.map(sub => {
      const s = sub.student || {};
      const key = (s.name||'').trim().toLowerCase() + '|' + (s.class||'').trim();
      const total = countMap.get(key);
      const idx   = (indexMap.get(key) || 0) + 1;
      indexMap.set(key, idx);
      return {
        ...sub,
        _isDuplicate: total > 1,
        _submissionIndex: idx,   // 1 = אחרונה
        _totalSubmissions: total
      };
    });

    const dupStudents = [...countMap.values()].filter(v => v > 1).length;

    document.getElementById('rbCode').textContent  = code;
    document.getElementById('rbCount').textContent =
      `${allSubmissions.length} הגשות` +
      (dupStudents > 0 ? ` — ${dupStudents} תלמידים הגישו יותר מפעם אחת` : '');
    document.getElementById('resultsBar').classList.add('vis');

    if (allSubmissions.length === 0) {
      document.getElementById('emptyState').classList.add('vis');
      return;
    }

    renderStudents(allSubmissions);

  } catch(err) {
    console.error(err);
    document.getElementById('loadingEl').style.display = 'none';
    msg.textContent = 'שגיאה בטעינה: ' + err.message;
    msg.style.display = 'block';
  }
}

/* ══════════════════════════════════════
   RENDER STUDENT CARDS
══════════════════════════════════════ */
function renderStudents(submissions) {
  const grid = document.getElementById('studentsGrid');
  grid.innerHTML = '';

  submissions.forEach((sub, idx) => {
    const s = sub.student || {};
    const a = sub.answers  || {};
    const ts = sub.submittedAt ? new Date(sub.submittedAt) : null;
    const timeStr = ts ? ts.toLocaleString('he-IL') : '—';

    const isDup   = sub._isDuplicate;
    const subIdx  = sub._submissionIndex;  // 1 = אחרונה
    const total   = sub._totalSubmissions;

    const dupBadge = isDup
      ? `<span class="sc-pill" style="background:${subIdx===1?'#fff9c4':'var(--red-bg)'};color:${subIdx===1?'#b8860b':'var(--red)'};border-color:${subIdx===1?'#b8860b':'var(--red)'}">
          ${subIdx===1 ? '⭐ הגשה אחרונה' : `הגשה ${subIdx} מתוך ${total}`}
        </span>`
      : '';

    // group answers into sections
    const conceptKeys = Object.keys(a).filter(k =>
      ['מסגור','הבניית','סדר יום','הגמוניה','שאלת חשיבה'].some(p => k.startsWith(p)));
    const editorKeys = Object.keys(a).filter(k => k.startsWith('עורך'));
    const matchKeys  = Object.keys(a).filter(k => k.startsWith('משחק'));
    const otherKeys  = Object.keys(a).filter(k =>
      !conceptKeys.includes(k) && !editorKeys.includes(k) && !matchKeys.includes(k));

    const card = document.createElement('div');
    card.className = 'student-card';
    card.innerHTML = `
      <div class="sc-head" onclick="toggleCard(this)">
        <div class="sc-meta">
          <span class="sc-name">${esc(s.name || '—')}</span>
          <span class="sc-pill">כיתה ${esc(s.class || '—')}</span>
          ${dupBadge}
          <span class="sc-pill" style="background:var(--gold-bg);color:var(--gold);border-color:var(--gold)">
            ${Object.keys(a).length} תשובות
          </span>
        </div>
        <span class="sc-time">${timeStr}</span>
        <span class="sc-arrow">▼</span>
      </div>
      <div class="sc-body">
        ${renderSection('א׳ — מושגי מפתח', conceptKeys, a)}
        ${renderSection('ב׳ — עורך הכותרת', editorKeys, a)}
        ${renderMatchSection(a)}
        ${otherKeys.length ? renderSection('נוסף', otherKeys, a) : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderSection(title, keys, answers) {
  if (!keys.length) return '';
  const rows = keys.map(k => {
    const v = answers[k] || '';
    return `<div class="ans-row">
      <div class="ans-key">${esc(k)}</div>
      <div class="ans-val ${v ? '' : 'empty'}">${v ? esc(v) : 'לא נענה'}</div>
    </div>`;
  }).join('');
  return `<div class="ans-section">
    <div class="ans-section-title">${title}</div>
    ${rows}
  </div>`;
}

function renderMatchSection(answers) {
  const raw = answers['משחק שיוך - תוצאות'];
  const reflection = answers['משחק שיוך - הרהור'] || '';
  const extra = answers['משחק שיוך - קונוטציה משלי'] || '';

  let matchHTML = '';
  if (raw) {
    try {
      const data = JSON.parse(raw);
      const zones = Object.entries(data).map(([zone, chips]) => `
        <div class="match-zone">
          <div class="match-zone-lbl">${esc(zone)}</div>
          <div class="match-zone-items">
            ${chips.length ? chips.map(c => `<span class="match-tag">${esc(c)}</span>`).join('') : '<span style="color:#bbb;font-size:.75rem">—</span>'}
          </div>
        </div>`).join('');
      matchHTML = `<div class="match-display">${zones}</div>`;
    } catch(e) { matchHTML = `<div class="ans-val">${esc(raw)}</div>`; }
  }

  if (!matchHTML && !reflection && !extra) return '';
  return `<div class="ans-section">
    <div class="ans-section-title">ג׳ — משחק שיוך</div>
    ${matchHTML ? `<div class="ans-row" style="grid-template-columns:180px 1fr">
      <div class="ans-key">תוצאות שיוך</div>
      <div class="ans-val">${matchHTML}</div>
    </div>` : ''}
    ${reflection ? `<div class="ans-row">
      <div class="ans-key">הרהור</div>
      <div class="ans-val">${esc(reflection)}</div>
    </div>` : ''}
    ${extra ? `<div class="ans-row">
      <div class="ans-key">קונוטציה משלי</div>
      <div class="ans-val">${esc(extra)}</div>
    </div>` : ''}
  </div>`;
}

function toggleCard(head) {
  head.classList.toggle('open');
  head.nextElementSibling.classList.toggle('open');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════
   EXPORT CSV
══════════════════════════════════════ */
function exportCSV() {
  if (!allSubmissions.length) return;

  // collect all unique answer keys
  const allKeys = new Set();
  allSubmissions.forEach(s => Object.keys(s.answers || {}).forEach(k => allKeys.add(k)));
  const keys = [...allKeys];

  const header = ['שם','כיתה','קוד כיתה','זמן הגשה', ...keys];
  const rows = allSubmissions.map(s => {
    const st = s.student || {};
    const a  = s.answers  || {};
    const ts = s.submittedAt ? new Date(sub.submittedAt).toLocaleString('he-IL') : '';
    return [
      st.name || '', st.class || '', st.classCode || '', ts,
      ...keys.map(k => (a[k] || '').replace(/\n/g,' '))
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });

  const bom = '\uFEFF'; // UTF-8 BOM for Excel
  const csv = bom + [header.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `עבודות_${currentCode}_${new Date().toLocaleDateString('he-IL').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

</script>
</body>
</html>
