        * { box-sizing: border-box; font-family: 'Rubik', sans-serif; }
        body { background: #1a1a2e; color: white; padding: 40px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }

        .card { background: #16213e; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .card h2 { margin-top: 0; color: #00d9ff; }
        button { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; border: none; padding: 15px 30px; 
            border-radius: 10px; font-size: 1.1rem; cursor: pointer;
            margin: 5px; transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .log { background: #0f0f23; border-radius: 10px; padding: 15px; 
               max-height: 300px; overflow-y: auto; font-family: monospace; 
               font-size: 0.9rem; white-space: pre-wrap; }
        .success { color: #00ff88; }
        .error { color: #ff6b6b; }
        .info { color: #00d9ff; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .stat { background: #0f3460; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-num { font-size: 2rem; font-weight: bold; color: #00d9ff; }
    </style>

// Update stats

document.getElementById('statTeachers').textContent = Object.keys(firebaseData.teachers_list || {}).length;
document.getElementById('statStudents').textContent = Object.keys(firebaseData.students_list || {}).length;

function log(msg, type = '') {
    const logEl = document.getElementById('log');
    const time = new Date().toLocaleTimeString('he-IL');
    logEl.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
    logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
    document.getElementById('log').innerHTML = '';
}

async function api(path, opts = {}) {
    const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
        ...opts,
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': opts.prefer || 'return=minimal'
        }
    });
    if (!r.ok) {
        const err = await r.text();
        throw new Error(err);
    }
    const text = await r.text();
    return text ? JSON.parse(text) : null;
}

async function testConnection() {
    log('🔌 בודק חיבור ל-Supabase...', 'info');
    try {
        await api('admins?limit=1');
        log('✅ החיבור תקין!', 'success');
    } catch (e) {
        log('❌ שגיאה בחיבור: ' + e.message, 'error');
    }
}

async function migrateAll() {
    log('🚀 מתחיל העברת נתונים...', 'info');
    
    try {
        // 1. Admins
        log('📋 מעביר מנהלים...', 'info');
        for (const [id, admin] of Object.entries(firebaseData.admins || {})) {
            await api('admins', {
                method: 'POST',
                prefer: 'resolution=merge-duplicates',
                body: JSON.stringify({ id, name: admin.name, pass: admin.pass })
            });
            log(`  ✓ ${admin.name}`, 'success');
        }
        
        // 2. Teachers
        log('👨‍🏫 מעביר מורים...', 'info');
        for (const [id, teacher] of Object.entries(firebaseData.teachers_list || {})) {
            await api('teachers', {
                method: 'POST',
                prefer: 'resolution=merge-duplicates',
                body: JSON.stringify({
                    id: teacher.id || id,
                    name: teacher.name,
                    pass: teacher.pass || '',
                    classes: teacher.classes || []
                })
            });
            log(`  ✓ ${teacher.name}`, 'success');
        }
        
        // 3. Students
        log('👨‍🎓 מעביר תלמידים...', 'info');
        for (const [id, student] of Object.entries(firebaseData.students_list || {})) {
            await api('gmar_students', {
                method: 'POST',
                prefer: 'resolution=merge-duplicates',
                body: JSON.stringify({
                    id: student.id || id,
                    name: student.name,
                    cls: student.cls || '',
                    drive_link: student.driveLink || ''
                })
            });
            log(`  ✓ ${student.name}`, 'success');
        }
        
        // 4. Student Data
        log('📝 מעביר נתוני עבודות...', 'info');
        for (const [studentId, data] of Object.entries(firebaseData.student_data || {})) {
            const cleanData = { ...data };
            delete cleanData._savedAt;
            delete cleanData['input-student-id'];
            
            await api('gmar_data', {
                method: 'POST',
                prefer: 'resolution=merge-duplicates',
                body: JSON.stringify({
                    student_id: studentId,
                    data: cleanData,
                    saved_at: data._savedAt || new Date().toISOString()
                })
            });
            log(`  ✓ נתונים של ${studentId}`, 'success');
        }
        
        log('🎉 ההעברה הושלמה בהצלחה!', 'success');
        
    } catch (e) {
        log('❌ שגיאה: ' + e.message, 'error');
        console.error(e);
    }
}
