<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח מורה – תיקי הפקה וידאוקאסט</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --accent: #2563eb;
            --accent2: #10b981;
            --accent3: #6366f1;
            --text: #e6edf3;
            --text-muted: #7d8590;
            --y11: #10b981;
            --y12: #6366f1;
            --danger: #ef4444;
            --warn: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            direction: rtl;
        }

        /* ─── Header ─── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-brand { display: flex; align-items: center; gap: 14px; }
        .header-icon {
            width: 42px; height: 42px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .header h1 { font-size: 1.25rem; font-weight: 700; }
        .header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        /* ─── Login overlay ─── */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(13,17,23,0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 999;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 48px;
            width: 360px;
            text-align: center;
        }
        .login-card .icon { font-size: 2.5rem; margin-bottom: 16px; }
        .login-card h2 { font-size: 1.4rem; margin-bottom: 6px; }
        .login-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
        .login-input {
            width: 100%; padding: 12px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 14px;
            text-align: right;
        }
        .login-input:focus { outline: none; border-color: var(--accent); }
        .btn-login {
            width: 100%; padding: 12px;
            background: var(--accent);
            color: white; border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem; font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #1d4ed8; }
        .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 10px; display: none; }

        /* ─── Main layout ─── */
        .main { padding: 30px 40px; }

        /* ─── Stats bar ─── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            display: flex; align-items: center; gap: 16px;
        }
        .stat-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .stat-icon.blue  { background: rgba(37,99,235,0.15); color: var(--accent); }
        .stat-icon.green { background: rgba(16,185,129,0.15); color: var(--y11); }
        .stat-icon.purple{ background: rgba(99,102,241,0.15); color: var(--y12); }
        .stat-icon.amber { background: rgba(245,158,11,0.15); color: var(--warn); }
        .stat-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
        .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }

        /* ─── Controls ─── */
        .controls {
            display: flex; gap: 12px; align-items: center;
            margin-bottom: 24px; flex-wrap: wrap;
        }
        .search-box {
            flex: 1; min-width: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text);
            font-family: inherit; font-size: 0.95rem;
        }
        .search-box:focus { outline: none; border-color: var(--accent); }
        .btn-refresh {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px;
            transition: border-color 0.2s;
        }
        .btn-refresh:hover { border-color: var(--accent); }
        .btn-csv {
            background: var(--accent2);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-csv:hover { opacity: 0.9; }

        /* ─── Groups grid ─── */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .group-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.15s;
        }
        .group-card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .group-card-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: flex-start; justify-content: space-between;
        }
        .group-code {
            font-size: 0.72rem; font-weight: 600;
            background: var(--surface2);
            color: var(--text-muted);
            padding: 3px 8px; border-radius: 5px;
            letter-spacing: 0.5px;
            font-family: monospace;
            margin-bottom: 6px;
            display: inline-block;
        }
        .group-name { font-size: 1.1rem; font-weight: 700; }
        .group-topic { font-size: 0.82rem; color: var(--text-muted); margin-top: 3px; }

        .group-year-badge {
            font-size: 0.75rem; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
            white-space: nowrap;
        }
        .badge-y11 { background: rgba(16,185,129,0.15); color: var(--y11); }
        .badge-y12 { background: rgba(99,102,241,0.15); color: var(--y12); }
        .badge-none { background: var(--surface2); color: var(--text-muted); }

        .group-members {
            padding: 14px 20px;
            display: flex; flex-direction: column; gap: 8px;
            border-bottom: 1px solid var(--border);
        }
        .member-row {
            display: flex; align-items: center; gap: 10px;
        }
        .member-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .member-name { font-size: 0.88rem; }
        .member-empty { color: var(--text-muted); font-style: italic; font-size: 0.82rem; }

        .group-footer {
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .saved-at { font-size: 0.75rem; color: var(--text-muted); }
        .btn-expand {
            background: none; border: 1px solid var(--border);
            color: var(--text); padding: 6px 14px;
            border-radius: 7px; cursor: pointer;
            font-family: inherit; font-size: 0.82rem;
            display: flex; align-items: center; gap: 6px;
            transition: border-color 0.2s;
        }
        .btn-expand:hover { border-color: var(--accent); color: var(--accent); }

        /* ─── Expanded detail panel ─── */
        .group-detail {
            display: none;
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            background: var(--surface2);
        }
        .group-detail.open { display: block; }
        .detail-section { margin-bottom: 14px; }
        .detail-label {
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted); margin-bottom: 5px;
        }
        .detail-value {
            font-size: 0.88rem; line-height: 1.6;
            background: var(--surface);
            padding: 10px 14px; border-radius: 8px;
            border: 1px solid var(--border);
            white-space: pre-wrap; word-break: break-word;
        }
        .detail-value.empty { color: var(--text-muted); font-style: italic; }
        .progress-bar-wrap {
            background: var(--surface); border-radius: 20px;
            height: 8px; overflow: hidden; margin-top: 4px;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 20px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.5s ease;
        }
        .progress-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

        /* ─── Empty & loading states ─── */
        .state-msg {
            text-align: center; padding: 80px 20px;
            color: var(--text-muted);
        }
        .state-msg i { font-size: 3rem; margin-bottom: 16px; display: block; }
        .state-msg p { font-size: 1rem; }

        .spinner { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Toast ─── */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1a2332; border: 1px solid var(--border);
            color: var(--text); padding: 12px 24px; border-radius: 30px;
            font-size: 0.9rem; font-weight: 600;
            display: none; align-items: center; gap: 8px;
            z-index: 9999; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .toast.show { display: flex; }

        @media (max-width: 768px) {
            .header { padding: 14px 18px; }
            .main { padding: 16px; }
            .stats-bar { grid-template-columns: 1fr 1fr; }
            .groups-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Login overlay -->
<div class="overlay" id="overlay">
    <div class="login-card">
        <div class="icon">🎬</div>
        <h2>לוח מורה</h2>
        <p>בית חינוך גליל מערבי</p>
        <input class="login-input" type="password" id="pw-input" placeholder="סיסמת מורה..." onkeydown="if(event.key==='Enter') doLogin()">
        <button class="btn-login" onclick="doLogin()">כניסה</button>
        <div class="login-error" id="login-error">סיסמה שגויה</div>
    </div>
</div>

<!-- Header -->
<header class="header">
    <div class="header-brand">
        <div class="header-icon"><i class="fas fa-film"></i></div>
        <div>
            <h1>לוח מורה – גליל מערבי</h1>
            <p>מגמת וידאוקאסט | בית חינוך גליל מערבי</p>
        </div>
    </div>
    <div class="header-actions">
        <button class="btn-refresh" onclick="loadAllGroups()"><i class="fas fa-rotate-right" id="refresh-icon"></i> רענן</button>
        <button class="btn-csv" onclick="exportCSV()"><i class="fas fa-file-csv"></i> ייצא CSV</button>
    </div>
</header>

<div class="main">

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-icon blue"><i class="fas fa-folder-open"></i></div>
            <div><div class="stat-val" id="stat-total">—</div><div class="stat-label">קבוצות שנשמרו</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon green"><i class="fas fa-seedling"></i></div>
            <div><div class="stat-val" id="stat-y11">—</div><div class="stat-label">פרוייקטון י"א</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon purple"><i class="fas fa-graduation-cap"></i></div>
            <div><div class="stat-val" id="stat-y12">—</div><div class="stat-label">פרויקט גמר י"ב</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon amber"><i class="fas fa-clock"></i></div>
            <div><div class="stat-val" id="stat-today">—</div><div class="stat-label">עדכונים היום</div></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <input class="search-box" type="text" id="search-input" placeholder="🔍  חיפוש לפי קוד קבוצה, שם תלמיד, נושא..." oninput="renderCards()">
    </div>

    <!-- Cards container -->
    <div id="cards-container">
        <div class="state-msg"><i class="fas fa-lock"></i><p>יש להתחבר כדי לצפות בנתונים</p></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Supabase -->
<script>
    // ─── Config ──────────────────────────────────────────────────
    const SCHOOL_PASSWORD = '1234';
    const SCHOOL_PREFIX   = '260489';
    const SCHOOL_NAME     = 'בית חינוך גליל מערבי';

    let currentSchool = { name: SCHOOL_NAME, prefix: SCHOOL_PREFIX };

    // Supabase config
    const SUPABASE_URL = 'https://hykpagdgaeulhghyvcqw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_o4Nff2ctoa1niZthDyMvLQ_e2hQwNuT';

    async function supabase(endpoint, opts = {}) {
        const url = SUPABASE_URL + '/rest/v1/' + endpoint;
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': opts.prefer || 'return=representation'
        };
        const r = await fetch(url, { ...opts, headers });
        if (!r.ok) throw new Error(await r.text());
        const text = await r.text();
        return text ? JSON.parse(text) : null;
    }

    let allGroups = {}; // { code: data }

    // ─── Login ────────────────────────────────────────────────────
    function doLogin() {
        const pw = document.getElementById('pw-input').value.trim();
        if (pw === SCHOOL_PASSWORD) {
            document.getElementById('overlay').style.display = 'none';
            loadAllGroups();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    // ─── Load all groups ──────────────────────────────────────────
    async function loadAllGroups() {
        const icon = document.getElementById('refresh-icon');
        icon.classList.add('spinner');
        document.getElementById('cards-container').innerHTML =
            '<div class="state-msg"><i class="fas fa-spinner spinner"></i><p>טוען נתונים...</p></div>';

        try {
            const result = await supabase('vc_portfolios');
            const prefix = SCHOOL_PREFIX + '_';
            allGroups = {};
            
            if (result && result.length > 0) {
                result.forEach(row => {
                    if (row.code.startsWith(prefix)) {
                        allGroups[row.code] = row.data;
                    }
                });
            }
            
            icon.classList.remove('spinner');
            updateStats();
            renderCards();
        } catch (err) {
            console.error(err);
            icon.classList.remove('spinner');
            document.getElementById('cards-container').innerHTML =
                '<div class="state-msg"><i class="fas fa-triangle-exclamation"></i><p>שגיאה בטעינה מ-Supabase</p></div>';
        }
    }

    // ─── Stats ────────────────────────────────────────────────────
    function updateStats() {
        const codes = Object.keys(allGroups);
        const today = new Date().toISOString().slice(0, 10);
        let y11 = 0, y12 = 0, todayCount = 0;

        codes.forEach(c => {
            const d = allGroups[c];
            if (d.group_year === 'תשפה' || d.group_year === 'תשפו' || d.group_year === 'תשפז') {
                // year exists — don't filter by it
            }
            const yr = d.group_year || '';
            // count by topic or year badge — approximate
            if (d.y11_topic || d.y11_desc) y11++;
            if (d.y12_sa_q1_1 || d.y12_sa_q2_1) y12++;
            if (d._saved_at && d._saved_at.startsWith(today)) todayCount++;
        });

        document.getElementById('stat-total').textContent = codes.length;
        document.getElementById('stat-y11').textContent = y11;
        document.getElementById('stat-y12').textContent = y12;
        document.getElementById('stat-today').textContent = todayCount;
    }

    // ─── Render cards ─────────────────────────────────────────────
    function renderCards() {
        const q = document.getElementById('search-input').value.trim().toLowerCase();
        const codes = Object.keys(allGroups);

        const filtered = codes.filter(code => {
            if (!q) return true;
            const d = allGroups[code];
            const names = [1,2,3,4].map(i => (d[`s${i}_name`] || '').toLowerCase()).join(' ');
            const topic = (d.group_topic || d.y11_topic || '').toLowerCase();
            return code.toLowerCase().includes(q) || names.includes(q) || topic.includes(q);
        });

        if (filtered.length === 0) {
            document.getElementById('cards-container').innerHTML =
                '<div class="state-msg"><i class="fas fa-magnifying-glass"></i><p>לא נמצאו קבוצות תואמות</p></div>';
            return;
        }

        // Sort by saved_at desc
        filtered.sort((a, b) => {
            const ta = allGroups[a]._saved_at || '';
            const tb = allGroups[b]._saved_at || '';
            return tb.localeCompare(ta);
        });

        let html = '<div class="groups-grid">';
        filtered.forEach(code => {
            html += buildCard(code, allGroups[code]);
        });
        html += '</div>';
        document.getElementById('cards-container').innerHTML = html;
    }

    // ─── Build single card ────────────────────────────────────────
    function buildCard(code, d) {
        const names = [1,2,3,4].map(i => d[`s${i}_name`] || '').filter(Boolean);
        const topic = d.group_topic || d.y11_topic || '';
        const year = d.group_year || '';
        const savedAt = d._saved_at ? formatDate(d._saved_at) : 'לא ידוע';

        const yearBadge = year
            ? `<span class="group-year-badge badge-y11">${year}</span>`
            : `<span class="group-year-badge badge-none">לא צוין</span>`;

        // members
        const allSlots = [1,2,3,4];
        const membersHtml = allSlots.map(i => {
            const name = d[`s${i}_name`] || '';
            const initials = name ? name.slice(0,2) : `ת${i}`;
            return `<div class="member-row">
                <div class="member-avatar" style="${name ? 'background:rgba(37,99,235,0.15);color:#60a5fa' : ''}">${initials}</div>
                <span class="${name ? 'member-name' : 'member-empty'}">${name || 'לא הוזן'}</span>
            </div>`;
        }).join('');

        // progress: count filled fields (rough)
        const filledCount = countFilled(d);
        const totalFields = 60;
        const pct = Math.min(100, Math.round((filledCount / totalFields) * 100));

        return `
        <div class="group-card" id="card-${code}">
            <div class="group-card-header">
                <div>
                    <div class="group-code">${code}</div>
                    <div class="group-name">${names[0] || 'קבוצה ללא שם'}</div>
                    <div class="group-topic">${topic || 'נושא לא הוזן'}</div>
                </div>
                ${yearBadge}
            </div>
            <div class="group-members">${membersHtml}</div>
            <div style="padding:14px 20px; border-bottom:1px solid var(--border);">
                <div class="detail-label" style="margin-bottom:6px;">מילוי תיק</div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" style="width:${pct}%"></div>
                </div>
                <div class="progress-label">${pct}% (${filledCount} שדות מולאו)</div>
            </div>
            <div class="group-footer">
                <span class="saved-at"><i class="fas fa-clock" style="opacity:0.5"></i> עדכון אחרון: ${savedAt}</span>
                <div style="display:flex;gap:8px;">
                    <button class="btn-expand" onclick="openPortfolio('${code}')" style="color:#60a5fa;border-color:#2563eb;">
                        <i class="fas fa-folder-open"></i> פתח תיק
                    </button>
                    <button class="btn-expand" onclick="toggleDetail('${code}')">
                        <i class="fas fa-chevron-down" id="chevron-${code}"></i> פרטים
                    </button>
                </div>
            </div>
            <div class="group-detail" id="detail-${code}">
                ${buildDetail(code, d)}
            </div>
        </div>`;
    }

    // ─── Build detail panel ───────────────────────────────────────
    function buildDetail(code, d) {
        const sections = [
            { label: 'נושא העל (י"א)', key: 'y11_topic' },
            { label: 'פירוט נושא', key: 'y11_desc' },
            { label: 'תחקיר תקשורתי', key: 'y11_media_research' },
            { label: 'הקשרים רחבים', key: 'y11_context_research' },
        ];

        let html = '';

        // group section
        html += fieldRow('נושא קבוצתי', d.group_topic);
        html += fieldRow('שנת לימוד', d.group_year);
        html += '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">';

        // י"א
        html += `<div class="detail-label" style="color:var(--y11);margin-bottom:8px;">📗 פרוייקטון י"א</div>`;
        sections.forEach(s => { html += fieldRow(s.label, d[s.key]); });

        // per-student י"א
        for (let i = 1; i <= 4; i++) {
            const name = d[`s${i}_name`] || `תלמיד ${i}`;
            const sub = d[`y11_s3_sub_${i}`];
            if (sub) html += fieldRow(`${name} – תת נושא`, sub);
        }

        html += '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">';

        // י"ב
        html += `<div class="detail-label" style="color:var(--y12);margin-bottom:8px;">📘 פרויקט גמר י"ב</div>`;
        for (let i = 1; i <= 4; i++) {
            const name = d[`s${i}_name`] || `תלמיד ${i}`;
            const q1 = d[`y12_sa_q1_${i}`];
            if (q1) html += fieldRow(`${name} – תחקיר שטח`, q1);
        }

        // distribution links
        html += '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">';
        html += `<div class="detail-label" style="margin-bottom:8px;">🔗 קישורי הפצה</div>`;
        let hasLinks = false;
        for (let i = 1; i <= 4; i++) {
            const name = d[`s${i}_name`] || `תלמיד ${i}`;
            const l11 = d[`dist_y11_l_${i}`];
            const l12 = d[`dist_y12_l_${i}`];
            if (l11) { html += `<div style="font-size:0.83rem;margin-bottom:4px;">${name} (פרוייקטון): <a href="${l11}" target="_blank" style="color:var(--accent)">${l11}</a></div>`; hasLinks=true; }
            if (l12) { html += `<div style="font-size:0.83rem;margin-bottom:4px;">${name} (גמר): <a href="${l12}" target="_blank" style="color:var(--y12)">${l12}</a></div>`; hasLinks=true; }
        }
        if (!hasLinks) html += `<div style="color:var(--text-muted);font-size:0.82rem;font-style:italic;">לא הוזנו קישורים עדיין</div>`;

        return html;
    }

    function fieldRow(label, val) {
        const empty = !val || val.toString().trim() === '';
        return `<div class="detail-section">
            <div class="detail-label">${label}</div>
            <div class="detail-value ${empty ? 'empty' : ''}">${empty ? 'לא מולא' : escHtml(val)}</div>
        </div>`;
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function toggleDetail(code) {
        const panel = document.getElementById(`detail-${code}`);
        const chev  = document.getElementById(`chevron-${code}`);
        const open  = panel.classList.toggle('open');
        chev.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    // ─── Count filled fields ──────────────────────────────────────
    function countFilled(d) {
        return Object.keys(d).filter(k => {
            if (k.startsWith('_')) return false;
            const v = d[k];
            if (typeof v === 'boolean') return v;
            return v && v.toString().trim() !== '';
        }).length;
    }

    // ─── Format date ──────────────────────────────────────────────
    function formatDate(iso) {
        try {
            const d = new Date(iso);
            return d.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' }) +
                   ' ' + d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
        } catch { return iso; }
    }

    // ─── Open portfolio ───────────────────────────────────────────
    function openPortfolio(code) {
        const url = `videocast-supabase.html?group=${encodeURIComponent(code)}`;
        window.open(url, '_blank');
    }

    // ─── Export CSV ───────────────────────────────────────────────
    function exportCSV() {
        const codes = Object.keys(allGroups);
        if (codes.length === 0) { showToast('אין נתונים לייצוא'); return; }

        const rows = [['קוד קבוצה','שם תלמיד 1','שם תלמיד 2','שם תלמיד 3','שם תלמיד 4','נושא','שנה','עדכון אחרון','% מילוי']];
        codes.forEach(code => {
            const d = allGroups[code];
            rows.push([
                code,
                d.s1_name||'', d.s2_name||'', d.s3_name||'', d.s4_name||'',
                d.group_topic||d.y11_topic||'',
                d.group_year||'',
                d._saved_at ? formatDate(d._saved_at) : '',
                Math.min(100, Math.round((countFilled(d)/60)*100)) + '%'
            ]);
        });

        const csv = '\uFEFF' + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `תיקי_הפקה_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        showToast('✓ קובץ CSV יוצא בהצלחה');
    }

    // ─── Toast ────────────────────────────────────────────────────
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
</script>
</body>
</html>
