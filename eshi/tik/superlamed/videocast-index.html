<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תיק הפקה וידאוקאסט</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Heebo', sans-serif;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        html {
            height: -webkit-fill-available;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 5s ease infinite;
            margin-bottom: 10px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header p {
            color: #a0aec0;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 350px;
        }

        .card {
            position: relative;
            width: 100%;
            padding: 35px 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-student {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            box-shadow: 0 10px 30px rgba(238, 90, 36, 0.4);
        }

        .card-teacher {
            background: linear-gradient(135deg, #a55eea 0%, #8854d0 100%);
            box-shadow: 0 10px 30px rgba(136, 84, 208, 0.4);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card p {
            color: rgba(255,255,255,0.85);
            font-size: 0.95rem;
        }

        /* מסכים גדולים */
        @media (min-width: 600px) {
            .header-icon { font-size: 4rem; }
            .header h1 { font-size: 3rem; }
            .header p { font-size: 1.3rem; }
            .cards {
                flex-direction: row;
                max-width: 700px;
                gap: 30px;
            }
            .card {
                padding: 50px 35px;
            }
            .card:hover {
                transform: translateY(-10px);
            }
            .card-icon { font-size: 4rem; }
            .card h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-icon">🎬</div>
        <h1>תיק הפקה וידאוקאסט</h1>
        <p>בית חינוך גליל מערבי</p>
    </div>

    <div class="cards">
        <a href="videocast-supabase.html" class="card card-student">
            <i class="fas fa-clapperboard card-icon"></i>
            <h2>תיק הפקה</h2>
            <p>כניסת תלמידים וקבוצות</p>
        </a>

        <a href="teacher-videocast-supabase.html" class="card card-teacher">
            <i class="fas fa-user-tie card-icon"></i>
            <h2>כניסת מורה</h2>
            <p>לוח בקרה ומעקב</p>
        </a>
    </div>

</body>
</html>
