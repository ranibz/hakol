<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תיק הפקה וידאוקאסט</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Heebo', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* רקע אנימטיבי */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,107,107,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(78,205,196,0.1) 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(199,125,255,0.1) 0%, transparent 40%);
            animation: pulse 15s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 5s ease infinite;
            margin-bottom: 10px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header p {
            color: #a0aec0;
            font-size: 1.3rem;
            font-weight: 400;
        }

        .cards {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            position: relative;
            width: 300px;
            padding: 50px 35px;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 3px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
        }

        .card-student {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            box-shadow: 0 20px 40px rgba(238, 90, 36, 0.4);
        }

        .card-student:hover {
            box-shadow: 0 30px 60px rgba(238, 90, 36, 0.5);
        }

        .card-teacher {
            background: linear-gradient(135deg, #a55eea 0%, #8854d0 100%);
            box-shadow: 0 20px 40px rgba(136, 84, 208, 0.4);
        }

        .card-teacher:hover {
            box-shadow: 0 30px 60px rgba(136, 84, 208, 0.5);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .card p {
            color: rgba(255,255,255,0.85);
            font-size: 1rem;
        }

        .card-arrow {
            margin-top: 20px;
            font-size: 1.5rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        @media (max-width: 700px) {
            .header h1 { font-size: 2.2rem; }
            .header-icon { font-size: 3rem; }
            .cards { flex-direction: column; align-items: center; }
            .card { width: 90%; max-width: 320px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-icon">🎬</div>
        <h1>תיק הפקה וידאוקאסט</h1>
        <p>בית חינוך גליל מערבי</p>
    </div>

    <div class="cards">
        <a href="videocast-supabase.html" class="card card-student">
            <i class="fas fa-clapperboard card-icon"></i>
            <h2>תיק הפקה</h2>
            <p>כניסת תלמידים וקבוצות</p>
            <div class="card-arrow"><i class="fas fa-arrow-left"></i></div>
        </a>

        <a href="teacher-videocast-supabase.html" class="card card-teacher">
            <i class="fas fa-user-tie card-icon"></i>
            <h2>כניסת מורה</h2>
            <p>לוח בקרה ומעקב</p>
            <div class="card-arrow"><i class="fas fa-arrow-left"></i></div>
        </a>
    </div>

</body>
</html>
