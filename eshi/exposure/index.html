<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הפקות מדיה - משולש החשיפה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a25;
            --text: #f0f0f0;
            --text-muted: #888;
            --aperture: #ff6b35;
            --shutter: #4ecdc4;
            --iso: #ffe66d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--aperture), var(--shutter), var(--iso));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.3rem;
            color: var(--text-muted);
            margin-bottom: 50px;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 25px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-decoration: none;
            color: var(--text);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card.admin {
            border-color: var(--aperture);
        }

        .card.admin:hover {
            background: rgba(255,107,53,0.1);
        }

        .card.teacher {
            border-color: var(--shutter);
        }

        .card.teacher:hover {
            background: rgba(78,205,196,0.1);
        }

        .card.student {
            border-color: var(--iso);
        }

        .card.student:hover {
            background: rgba(255,230,109,0.1);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .card.admin .card-icon {
            background: rgba(255,107,53,0.2);
            color: var(--aperture);
        }

        .card.teacher .card-icon {
            background: rgba(78,205,196,0.2);
            color: var(--shutter);
        }

        .card.student .card-icon {
            background: rgba(255,230,109,0.2);
            color: var(--iso);
        }

        .card-content {
            flex: 1;
            text-align: right;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card-arrow {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .card:hover .card-arrow {
            transform: translateX(-5px);
        }

        .footer {
            margin-top: 50px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--shutter);
            text-decoration: none;
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .card {
                padding: 20px;
            }

            .card-icon {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .card-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">📸</div>
    <h1>הפקות מדיה</h1>
    <p class="subtitle">משולש החשיפה - שיעור אינטראקטיבי</p>

    <div class="cards">
        <a href="exposure-admin.html" class="card admin">
            <div class="card-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <div class="card-content">
                <div class="card-title">מנהל מערכת</div>
                <div class="card-desc">ניהול כיתות, תלמידים ומורים</div>
            </div>
            <div class="card-arrow">
                <i class="fas fa-chevron-left"></i>
            </div>
        </a>

        <a href="exposure-teacher.html" class="card teacher">
            <div class="card-icon">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <div class="card-content">
                <div class="card-title">כניסת מורה</div>
                <div class="card-desc">צפייה בציונים והוספת הערות</div>
            </div>
            <div class="card-arrow">
                <i class="fas fa-chevron-left"></i>
            </div>
        </a>

        <a href="exposure-triangle.html" class="card student">
            <div class="card-icon">
                <i class="fas fa-user-graduate"></i>
            </div>
            <div class="card-content">
                <div class="card-title">כניסת תלמיד</div>
                <div class="card-desc">התחלת השיעור האינטראקטיבי</div>
            </div>
            <div class="card-arrow">
                <i class="fas fa-chevron-left"></i>
            </div>
        </a>
    </div>

    <div class="footer">
        בית חינוך גליל מערבי | <a href="https://hakolbakaf.co.il" target="_blank">הכל בכף</a>
        <br>פיתוח: רני בן זאב
    </div>
</div>

</body>
</html>
