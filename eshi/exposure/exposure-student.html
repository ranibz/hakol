<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הפקות מדיה - כניסת תלמיד</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a25;
            --text: #f0f0f0;
            --text-muted: #888;
            --aperture: #ff6b35;
            --shutter: #4ecdc4;
            --iso: #ffe66d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Login Screen */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 2px solid #333;
        }

        .login-card .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .login-card h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--aperture), var(--shutter), var(--iso));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-form input {
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #333;
            background: var(--surface2);
            color: var(--text);
            font-size: 1.1rem;
            font-family: 'Heebo', sans-serif;
            text-align: center;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--shutter);
        }

        .student-preview {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(78,205,196,0.15);
            border: 1px solid var(--shutter);
            border-radius: 12px;
            color: var(--shutter);
        }

        .student-preview .preview-class {
            background: var(--shutter);
            color: var(--bg);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .student-error {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(255,107,107,0.15);
            border: 1px solid #ff6b6b;
            border-radius: 12px;
            color: #ff6b6b;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--aperture), var(--shutter), var(--iso));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .student-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .student-name {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .student-class {
            background: var(--shutter);
            color: var(--bg);
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            border: 1px solid #333;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            margin-right: 20px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--iso);
        }

        /* Task Cards */
        .tasks-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .task-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 25px;
            border-right: 4px solid var(--iso);
            transition: transform 0.2s;
        }

        .task-card:hover {
            transform: translateX(-5px);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .task-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .task-teacher {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .task-desc {
            color: var(--text-muted);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .task-due {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--aperture);
            font-weight: 600;
        }

        .task-due.no-date {
            color: var(--text-muted);
        }

        .start-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--shutter), var(--aperture));
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78,205,196,0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text);
        }

        /* Completed Badge */
        .completed-badge {
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 500px) {
            .task-meta {
                flex-direction: column;
                align-items: stretch;
            }

            .start-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="icon">📸</div>
        <h2>הפקות מדיה</h2>
        <p>הזינו את תעודת הזהות שלכם כדי לראות את המשימות</p>
        
        <div class="login-form">
            <input type="text" id="studentId" placeholder="תעודת זהות (9 ספרות)" maxlength="9" inputmode="numeric">
            <div class="student-preview" id="studentPreview" style="display:none;">
                <i class="fas fa-user-check"></i>
                <span id="studentPreviewName">-</span>
                <span class="preview-class" id="studentPreviewClass">-</span>
            </div>
            <div class="student-error" id="studentError" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span>תלמיד לא נמצא במערכת</span>
            </div>
        </div>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
    <div class="container">
        <header>
            <h1>📸 הפקות מדיה</h1>
            <div class="student-info">
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> יציאה
                </button>
                <span class="student-name" id="studentName"></span>
                <span class="student-class" id="studentClass"></span>
            </div>
        </header>

        <h2 class="section-title"><i class="fas fa-tasks"></i> המשימות שלי</h2>
        
        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>טוען משימות...</p>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://hykpagdgaeulhghyvcqw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_o4Nff2ctoa1niZthDyMvLQ_e2hQwNuT';

let currentStudent = null;

async function supabaseRequest(endpoint, method = 'GET', data = null) {
    const options = {
        method: method,
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        }
    };
    if (data) options.body = JSON.stringify(data);
    const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, options);
    const text = await response.text();
    return text ? JSON.parse(text) : null;
}

async function lookupStudent(idNumber) {
    const preview = document.getElementById('studentPreview');
    const error = document.getElementById('studentError');
    
    const normalizedId = idNumber.padStart(9, '0');
    
    if (idNumber.length < 5) {
        preview.style.display = 'none';
        error.style.display = 'none';
        return;
    }
    
    try {
        const students = await supabaseRequest(`exposure_students?student_id=eq.${normalizedId}`);
        
        if (students && students.length > 0) {
            const student = students[0];
            currentStudent = {
                id: normalizedId,
                name: student.student_name,
                className: student.class_name
            };
            
            document.getElementById('studentPreviewName').textContent = student.student_name;
            document.getElementById('studentPreviewClass').textContent = student.class_name;
            
            preview.style.display = 'flex';
            error.style.display = 'none';
            
            // שמירה והעברה לדשבורד
            localStorage.setItem('exposure_student', JSON.stringify(currentStudent));
            setTimeout(() => showDashboard(), 500);
        } else {
            preview.style.display = 'none';
            error.style.display = 'flex';
            currentStudent = null;
        }
    } catch (err) {
        console.error('Error looking up student:', err);
        preview.style.display = 'none';
        error.style.display = 'flex';
    }
}

function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('studentName').textContent = currentStudent.name;
    document.getElementById('studentClass').textContent = currentStudent.className;
    
    loadTasks();
}

function logout() {
    localStorage.removeItem('exposure_student');
    currentStudent = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('studentId').value = '';
    document.getElementById('studentPreview').style.display = 'none';
}

async function loadTasks() {
    const container = document.getElementById('tasksContainer');
    
    try {
        // טעינת משימות פעילות לכיתה
        const tasks = await supabaseRequest(`exposure_tasks?class_name=eq.${currentStudent.className}&is_active=eq.true&order=created_at.desc`);
        
        // טעינת ציונים קיימים של התלמיד
        const scores = await supabaseRequest(`exposure_scores?student_id=eq.${currentStudent.id}`);
        const completedLessons = scores ? scores.map(s => s.lesson_id || 'exposure-triangle') : [];
        
        if (!tasks || tasks.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-check-circle"></i>
                    <h3>אין משימות פעילות</h3>
                    <p>כל הכבוד! אין לך משימות כרגע</p>
                </div>
            `;
            return;
        }
        
        // טעינת פרטי השיעורים
        const lessons = await supabaseRequest('exposure_lessons');
        const lessonsMap = {};
        if (lessons) {
            lessons.forEach(l => lessonsMap[l.lesson_id] = l);
        }
        
        container.innerHTML = tasks.map(task => {
            const lesson = lessonsMap[task.lesson_id] || { title: 'שיעור', url: 'exposure-triangle.html' };
            const isCompleted = completedLessons.includes(task.lesson_id);
            
            return `
                <div class="task-card">
                    <div class="task-header">
                        <div>
                            <div class="task-title">${task.title}</div>
                            <div class="task-teacher">מאת: ${task.teacher_name}</div>
                        </div>
                    </div>
                    ${task.description ? `<div class="task-desc">${task.description}</div>` : ''}
                    <div class="task-meta">
                        <div class="task-due ${task.due_date ? '' : 'no-date'}">
                            <i class="fas fa-calendar-alt"></i>
                            ${task.due_date ? `הגשה עד: ${formatDate(task.due_date)}` : 'ללא תאריך הגשה'}
                        </div>
                        ${isCompleted ? `
                            <div class="completed-badge">
                                <i class="fas fa-check-circle"></i> הושלם
                            </div>
                        ` : `
                            <button class="start-btn" onclick="startLesson('${lesson.url}')">
                                <i class="fas fa-play"></i> התחל שיעור
                            </button>
                        `}
                    </div>
                </div>
            `;
        }).join('');
    } catch (err) {
        console.error('Error loading tasks:', err);
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-exclamation-triangle"></i>
                <h3>שגיאה בטעינה</h3>
                <p>נסו לרענן את הדף</p>
            </div>
        `;
    }
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('he-IL');
}

function startLesson(url) {
    // שומר את פרטי התלמיד ב-localStorage לפני המעבר
    localStorage.setItem('exposure_student', JSON.stringify(currentStudent));
    window.location.href = url;
}

// האזנה לשינויים בשדה ת.ז.
document.addEventListener('DOMContentLoaded', () => {
    // בדיקת התחברות קודמת
    const saved = localStorage.getItem('exposure_student');
    if (saved) {
        try {
            currentStudent = JSON.parse(saved);
            showDashboard();
        } catch (e) {
            localStorage.removeItem('exposure_student');
        }
    }
    
    const idInput = document.getElementById('studentId');
    if (idInput) {
        let timeout;
        idInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                lookupStudent(e.target.value);
            }, 500);
        });
    }
});
</script>

</body>
</html>
