<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משולש החשיפה - לוח מורה v1.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a25;
            --text: #f0f0f0;
            --text-muted: #888;
            --aperture: #ff6b35;
            --shutter: #4ecdc4;
            --iso: #ffe66d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Login Screen */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--aperture), var(--shutter), var(--iso));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .login-field {
            margin-bottom: 20px;
            text-align: right;
        }

        .login-field label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .login-field input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background: var(--surface2);
            color: var(--text);
            font-family: 'Heebo', sans-serif;
            font-size: 1rem;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--shutter), var(--aperture));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-error {
            color: #ff6b6b;
            margin-top: 15px;
            display: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--aperture), var(--shutter), var(--iso));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-name {
            color: var(--shutter);
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 15px;
            border: 1px solid #333;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
        }

        .logout-btn:hover {
            background: var(--surface2);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .filter-group select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: var(--surface);
            color: var(--text);
            font-family: 'Heebo', sans-serif;
        }

        .refresh-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--shutter);
            color: var(--bg);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: auto;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-top: 3px solid;
        }

        .stat-card.total { border-color: var(--shutter); }
        .stat-card.avg { border-color: var(--iso); }
        .stat-card.excellent { border-color: #2ecc71; }
        .stat-card.needs-work { border-color: var(--aperture); }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
        }

        .stat-card.total .stat-value { color: var(--shutter); }
        .stat-card.avg .stat-value { color: var(--iso); }
        .stat-card.excellent .stat-value { color: #2ecc71; }
        .stat-card.needs-work .stat-value { color: var(--aperture); }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .scores-table {
            width: 100%;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
        }

        .scores-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .scores-table th, .scores-table td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #333;
        }

        .scores-table th {
            background: var(--surface2);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .scores-table tr:hover {
            background: var(--surface2);
        }

        .score-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .score-badge.excellent {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .score-badge.good {
            background: rgba(255,230,109,0.2);
            color: var(--iso);
        }

        .score-badge.needs-work {
            background: rgba(255,107,53,0.2);
            color: var(--aperture);
        }

        .mini-scores {
            display: flex;
            gap: 8px;
        }

        .mini-score {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .mini-score.aperture { background: rgba(255,107,53,0.2); color: var(--aperture); }
        .mini-score.shutter { background: rgba(78,205,196,0.2); color: var(--shutter); }
        .mini-score.iso { background: rgba(255,230,109,0.2); color: var(--iso); }
        .mini-score.challenge { background: rgba(46,204,113,0.2); color: #2ecc71; }

        .note-cell {
            max-width: 200px;
        }

        .note-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 6px;
            background: var(--surface2);
            color: var(--text);
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
            resize: none;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: var(--surface);
            color: var(--text-muted);
            font-family: 'Heebo', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: var(--surface2);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--shutter), var(--aperture));
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Task Form */
        .task-form {
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .task-form h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-form h3 i {
            color: var(--iso);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: var(--surface2);
            color: var(--text);
            font-family: 'Heebo', sans-serif;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background: var(--iso);
            color: var(--bg);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        /* Task Cards */
        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            border-right: 4px solid var(--iso);
        }

        .task-card.inactive {
            opacity: 0.6;
            border-right-color: var(--text-muted);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .task-class {
            background: rgba(78,205,196,0.2);
            color: var(--shutter);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .task-desc {
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-date {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .task-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
        }

        .task-btn.edit {
            background: rgba(255,230,109,0.2);
            color: var(--iso);
        }

        .task-btn.toggle {
            background: rgba(78,205,196,0.2);
            color: var(--shutter);
        }

        .task-btn.delete {
            background: rgba(255,107,53,0.2);
            color: var(--aperture);
        }

        /* Edit Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .modal-header h3 i {
            color: var(--iso);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: var(--iso);
            color: var(--bg);
        }

        .modal-btn.secondary {
            background: var(--surface2);
            color: var(--text);
        }

        @media (max-width: 768px) {
            .scores-table {
                overflow-x: auto;
            }
            
            header {
                flex-direction: column;
                text-align: center;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>📸 משולש החשיפה</h1>
        <p>כניסת מורים</p>
        
        <div class="login-field">
            <label>טלפון</label>
            <input type="tel" id="loginPhone" placeholder="050-1234567">
        </div>
        
        <div class="login-field">
            <label>סיסמה</label>
            <input type="password" id="loginPassword" placeholder="הסיסמה שלך">
        </div>
        
        <button class="login-btn" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> כניסה
        </button>
        
        <div class="login-error" id="loginError">שם משתמש או סיסמה שגויים</div>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
    <div class="container">
        <header>
            <div class="header-title">
                <h1>📸 משולש החשיפה - לוח מורה</h1>
                <p>ניהול משימות וצפייה בציונים</p>
            </div>
            <div class="header-user">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> יציאה
                </button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('tasks')">
                <i class="fas fa-tasks"></i> משימות
            </button>
            <button class="tab-btn" onclick="showTab('scores')">
                <i class="fas fa-chart-bar"></i> ציונים
            </button>
        </div>

        <!-- Tasks Tab -->
        <div class="tab-content active" id="tab-tasks">
            <div class="task-form">
                <h3><i class="fas fa-plus-circle"></i> העלאת משימה חדשה</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>כיתה</label>
                        <select id="taskClass">
                            <!-- יאוכלס דינמית -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>שיעור</label>
                        <select id="taskLesson">
                            <!-- יאוכלס דינמית -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>תאריך הגשה</label>
                        <input type="date" id="taskDueDate">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:15px;">
                    <label>כותרת המשימה</label>
                    <input type="text" id="taskTitle" placeholder="למשל: השלימו את שיעור משולש החשיפה">
                </div>
                <div class="form-group" style="margin-bottom:15px;">
                    <label>תיאור (אופציונלי)</label>
                    <textarea id="taskDesc" placeholder="הוראות נוספות לתלמידים..."></textarea>
                </div>
                <button class="submit-btn" onclick="createTask()">
                    <i class="fas fa-paper-plane"></i> שלח משימה
                </button>
            </div>

            <h3 style="margin-bottom:15px;"><i class="fas fa-list"></i> משימות פעילות</h3>
            <div class="tasks-list" id="tasksList">
                <div class="empty-state">טוען משימות...</div>
            </div>
        </div>

        <!-- Scores Tab -->
        <div class="tab-content" id="tab-scores">
            <div class="controls">
                <div class="filter-group">
                    <label>סינון לפי כיתה:</label>
                    <select id="classFilter" onchange="loadScores()">
                        <!-- יאוכלס דינמית -->
                    </select>
                </div>
                <button class="refresh-btn" onclick="loadScores()">
                    <i class="fas fa-sync-alt"></i> רענון
                </button>
            </div>

            <div class="stats" id="stats">
                <div class="stat-card total">
                    <div class="stat-value" id="statTotal">-</div>
                    <div class="stat-label">סה"כ הגשות</div>
                </div>
                <div class="stat-card avg">
                    <div class="stat-value" id="statAvg">-</div>
                    <div class="stat-label">ממוצע</div>
                </div>
                <div class="stat-card excellent">
                    <div class="stat-value" id="statExcellent">-</div>
                    <div class="stat-label">מצוינים (7+)</div>
                </div>
                <div class="stat-card needs-work">
                    <div class="stat-value" id="statNeedsWork">-</div>
                    <div class="stat-label">לחיזוק (פחות מ-5)</div>
                </div>
            </div>

            <div class="scores-table">
                <table>
                    <thead>
                        <tr>
                            <th>שם</th>
                            <th>כיתה</th>
                            <th>ציון</th>
                            <th>פירוט</th>
                            <th>תאריך</th>
                            <th>הערת מורה</th>
                        </tr>
                    </thead>
                    <tbody id="scoresBody">
                        <tr><td colspan="6" class="empty-state">טוען...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Edit Task Modal -->
<div class="modal-overlay" id="editModal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> עריכת משימה</h3>
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <div class="form-group" style="margin-bottom:15px;">
            <label>כותרת</label>
            <input type="text" id="editTitle">
        </div>
        <div class="form-group" style="margin-bottom:15px;">
            <label>תיאור</label>
            <textarea id="editDesc"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:15px;">
            <label>תאריך הגשה</label>
            <input type="date" id="editDueDate">
        </div>
        <div class="modal-footer">
            <button class="modal-btn secondary" onclick="closeEditModal()">ביטול</button>
            <button class="modal-btn primary" onclick="saveTaskEdit()">
                <i class="fas fa-save"></i> שמור
            </button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://hykpagdgaeulhghyvcqw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_o4Nff2ctoa1niZthDyMvLQ_e2hQwNuT';

let currentTeacher = null;

async function supabaseRequest(endpoint, method = 'GET', data = null) {
    const options = {
        method: method,
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': method === 'PATCH' ? 'return=representation' : ''
        }
    };
    if (data) options.body = JSON.stringify(data);
    const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, options);
    const text = await response.text();
    return text ? JSON.parse(text) : null;
}

async function login() {
    const phone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    
    if (!phone || !password) {
        showLoginError('נא למלא טלפון וסיסמה');
        return;
    }
    
    try {
        // חיפוש מורה לפי טלפון וסיסמה
        const teachers = await supabaseRequest(`exposure_teachers?phone=eq.${phone}&password=eq.${password}`);
        
        if (!teachers || teachers.length === 0) {
            showLoginError('טלפון או סיסמה שגויים');
            return;
        }
        
        currentTeacher = teachers[0];
        
        // שמירה ב-localStorage
        localStorage.setItem('exposure_teacher', JSON.stringify(currentTeacher));
        
        showDashboard();
    } catch (err) {
        console.error('Login error:', err);
        showLoginError('שגיאה בהתחברות');
    }
}

function showLoginError(msg) {
    const errorEl = document.getElementById('loginError');
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
}

function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('userName').textContent = currentTeacher.teacher_name;
    
    // בניית רשימות
    buildClassFilter();
    buildTaskClassSelect();
    loadLessonsSelect();
    loadTasks();
}

function buildClassFilter() {
    const select = document.getElementById('classFilter');
    const classes = currentTeacher.classes || [];
    
    if (classes.length === 0) {
        select.innerHTML = '<option value="">לא שויכו כיתות</option>';
        return;
    }
    
    select.innerHTML = '<option value="">כל הכיתות שלי</option>' + 
        classes.map(c => `<option value="${c}">${c}</option>`).join('');
}

function logout() {
    localStorage.removeItem('exposure_teacher');
    currentTeacher = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPhone').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginError').style.display = 'none';
}

async function loadScores() {
    const tbody = document.getElementById('scoresBody');
    const filterClass = document.getElementById('classFilter').value;
    
    const teacherClasses = currentTeacher.classes || [];
    
    if (teacherClasses.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">לא שויכו לך כיתות. פנה למנהל המערכת.</td></tr>';
        updateStats([]);
        return;
    }
    
    try {
        // בניית פילטר כיתות
        let classFilter;
        if (filterClass) {
            classFilter = `class_name=eq.${filterClass}`;
        } else {
            classFilter = `class_name=in.(${teacherClasses.join(',')})`;
        }
        
        const scores = await supabaseRequest(`exposure_scores?${classFilter}&order=submitted_at.desc`);
        
        if (!scores || scores.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">אין הגשות עדיין</td></tr>';
            updateStats([]);
            return;
        }
        
        updateStats(scores);
        
        tbody.innerHTML = scores.map(s => `
            <tr>
                <td><strong>${s.student_name}</strong></td>
                <td>${s.class_name}</td>
                <td><span class="score-badge ${getScoreClass(s.score)}">${s.score}/8</span></td>
                <td>
                    <div class="mini-scores">
                        <span class="mini-score aperture" title="צמצם">${s.aperture_score || 0}</span>
                        <span class="mini-score shutter" title="תריס">${s.shutter_score || 0}</span>
                        <span class="mini-score iso" title="ISO">${s.iso_score || 0}</span>
                        <span class="mini-score challenge" title="מבדק">${s.challenge_score || 0}</span>
                    </div>
                </td>
                <td>${formatDate(s.submitted_at)}</td>
                <td class="note-cell">
                    <textarea class="note-input" 
                        placeholder="הערה..." 
                        onchange="saveNote(${s.id}, this.value)">${s.teacher_note || ''}</textarea>
                </td>
            </tr>
        `).join('');
    } catch (err) {
        console.error('Error loading scores:', err);
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">שגיאה בטעינה</td></tr>';
    }
}

function getScoreClass(score) {
    if (score >= 7) return 'excellent';
    if (score >= 5) return 'good';
    return 'needs-work';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('he-IL');
}

function updateStats(scores) {
    document.getElementById('statTotal').textContent = scores.length;
    
    if (scores.length === 0) {
        document.getElementById('statAvg').textContent = '-';
        document.getElementById('statExcellent').textContent = '0';
        document.getElementById('statNeedsWork').textContent = '0';
        return;
    }
    
    const avg = scores.reduce((sum, s) => sum + s.score, 0) / scores.length;
    document.getElementById('statAvg').textContent = avg.toFixed(1);
    
    const excellent = scores.filter(s => s.score >= 7).length;
    document.getElementById('statExcellent').textContent = excellent;
    
    const needsWork = scores.filter(s => s.score < 5).length;
    document.getElementById('statNeedsWork').textContent = needsWork;
}

async function saveNote(scoreId, note) {
    try {
        await supabaseRequest(`exposure_scores?id=eq.${scoreId}`, 'PATCH', {
            teacher_note: note
        });
    } catch (err) {
        console.error('Error saving note:', err);
        alert('שגיאה בשמירת הערה');
    }
}

// ===== TABS =====
function showTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(`tab-${tabName}`).classList.add('active');
    event.currentTarget.classList.add('active');
    
    if (tabName === 'tasks') loadTasks();
    if (tabName === 'scores') loadScores();
}

// ===== TASKS =====
function buildTaskClassSelect() {
    const select = document.getElementById('taskClass');
    const classes = currentTeacher.classes || [];
    
    if (classes.length === 0) {
        select.innerHTML = '<option value="">לא שויכו כיתות</option>';
        return;
    }
    
    select.innerHTML = classes.map(c => `<option value="${c}">${c}</option>`).join('');
}

async function loadLessonsSelect() {
    const select = document.getElementById('taskLesson');
    
    try {
        const lessons = await supabaseRequest('exposure_lessons?order=title');
        
        if (!lessons || lessons.length === 0) {
            select.innerHTML = '<option value="">אין שיעורים זמינים</option>';
            return;
        }
        
        select.innerHTML = lessons.map(l => `<option value="${l.lesson_id}" data-url="${l.url}">${l.title}</option>`).join('');
    } catch (err) {
        console.error('Error loading lessons:', err);
        select.innerHTML = '<option value="">שגיאה בטעינה</option>';
    }
}

async function createTask() {
    const className = document.getElementById('taskClass').value;
    const lessonSelect = document.getElementById('taskLesson');
    const lessonId = lessonSelect.value;
    const title = document.getElementById('taskTitle').value.trim();
    const desc = document.getElementById('taskDesc').value.trim();
    const dueDate = document.getElementById('taskDueDate').value;
    
    if (!className || !lessonId || !title) {
        alert('נא לבחור כיתה, שיעור ולהזין כותרת');
        return;
    }
    
    try {
        await supabaseRequest('exposure_tasks', 'POST', {
            teacher_id: currentTeacher.teacher_id,
            teacher_name: currentTeacher.teacher_name,
            class_name: className,
            lesson_id: lessonId,
            title: title,
            description: desc || null,
            due_date: dueDate || null,
            is_active: true
        });
        
        // ניקוי הטופס
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        document.getElementById('taskDueDate').value = '';
        
        alert('המשימה נשלחה בהצלחה!');
        loadTasks();
    } catch (err) {
        console.error('Error creating task:', err);
        alert('שגיאה ביצירת משימה');
    }
}

async function loadTasks() {
    const container = document.getElementById('tasksList');
    const teacherClasses = currentTeacher.classes || [];
    
    if (teacherClasses.length === 0) {
        container.innerHTML = '<div class="empty-state">לא שויכו לך כיתות</div>';
        return;
    }
    
    try {
        const classFilter = `class_name=in.(${teacherClasses.join(',')})`;
        const tasks = await supabaseRequest(`exposure_tasks?${classFilter}&order=created_at.desc`);
        
        if (!tasks || tasks.length === 0) {
            container.innerHTML = '<div class="empty-state">אין משימות עדיין</div>';
            return;
        }
        
        container.innerHTML = tasks.map(t => `
            <div class="task-card ${t.is_active ? '' : 'inactive'}">
                <div class="task-header">
                    <div class="task-title">${t.title}</div>
                    <span class="task-class">${t.class_name}</span>
                </div>
                ${t.description ? `<div class="task-desc">${t.description}</div>` : ''}
                <div class="task-footer">
                    <div class="task-date">
                        ${t.due_date ? `הגשה עד: ${formatDate(t.due_date)}` : 'ללא תאריך הגשה'}
                        <span style="margin-right:15px;">נוצר: ${formatDate(t.created_at)}</span>
                    </div>
                    <div class="task-actions">
                        <button class="task-btn edit" onclick="openEditModal(${t.id}, '${t.title.replace(/'/g, "\\'")}', '${(t.description || '').replace(/'/g, "\\'")}', '${t.due_date || ''}')">
                            <i class="fas fa-edit"></i> ערוך
                        </button>
                        <button class="task-btn toggle" onclick="toggleTask(${t.id}, ${!t.is_active})">
                            ${t.is_active ? '<i class="fas fa-pause"></i> השהה' : '<i class="fas fa-play"></i> הפעל'}
                        </button>
                        <button class="task-btn delete" onclick="deleteTask(${t.id})">
                            <i class="fas fa-trash"></i> מחק
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (err) {
        console.error('Error loading tasks:', err);
        container.innerHTML = '<div class="empty-state">שגיאה בטעינה</div>';
    }
}

async function toggleTask(taskId, newStatus) {
    try {
        await supabaseRequest(`exposure_tasks?id=eq.${taskId}`, 'PATCH', {
            is_active: newStatus
        });
        loadTasks();
    } catch (err) {
        console.error('Error toggling task:', err);
        alert('שגיאה בעדכון');
    }
}

async function deleteTask(taskId) {
    if (!confirm('למחוק את המשימה?')) return;
    
    try {
        await supabaseRequest(`exposure_tasks?id=eq.${taskId}`, 'DELETE');
        loadTasks();
    } catch (err) {
        console.error('Error deleting task:', err);
        alert('שגיאה במחיקה');
    }
}

// ===== EDIT TASK =====
let editingTaskId = null;

function openEditModal(taskId, title, desc, dueDate) {
    editingTaskId = taskId;
    document.getElementById('editTitle').value = title;
    document.getElementById('editDesc').value = desc;
    document.getElementById('editDueDate').value = dueDate;
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    editingTaskId = null;
    document.getElementById('editModal').style.display = 'none';
}

async function saveTaskEdit() {
    if (!editingTaskId) return;
    
    const title = document.getElementById('editTitle').value.trim();
    const desc = document.getElementById('editDesc').value.trim();
    const dueDate = document.getElementById('editDueDate').value;
    
    if (!title) {
        alert('נא להזין כותרת');
        return;
    }
    
    try {
        await supabaseRequest(`exposure_tasks?id=eq.${editingTaskId}`, 'PATCH', {
            title: title,
            description: desc || null,
            due_date: dueDate || null
        });
        
        closeEditModal();
        loadTasks();
        alert('המשימה עודכנה בהצלחה!');
    } catch (err) {
        console.error('Error updating task:', err);
        alert('שגיאה בעדכון');
    }
}

// בדיקת התחברות קודמת
document.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('exposure_teacher');
    if (saved) {
        try {
            currentTeacher = JSON.parse(saved);
            showDashboard();
        } catch (e) {
            localStorage.removeItem('exposure_teacher');
        }
    }
});

// התחברות עם Enter
document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') login();
});
</script>
