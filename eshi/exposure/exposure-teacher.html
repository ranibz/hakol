<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משולש החשיפה - לוח מורה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a25;
            --text: #f0f0f0;
            --text-muted: #888;
            --aperture: #ff6b35;
            --shutter: #4ecdc4;
            --iso: #ffe66d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--aperture), var(--shutter), var(--iso));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .filter-group select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: var(--surface);
            color: var(--text);
            font-family: 'Heebo', sans-serif;
        }

        .refresh-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--shutter);
            color: var(--bg);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: auto;
        }

        .refresh-btn:hover {
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-top: 3px solid;
        }

        .stat-card.total { border-color: var(--shutter); }
        .stat-card.avg { border-color: var(--iso); }
        .stat-card.excellent { border-color: #2ecc71; }
        .stat-card.needs-work { border-color: var(--aperture); }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
        }

        .stat-card.total .stat-value { color: var(--shutter); }
        .stat-card.avg .stat-value { color: var(--iso); }
        .stat-card.excellent .stat-value { color: #2ecc71; }
        .stat-card.needs-work .stat-value { color: var(--aperture); }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .scores-table {
            width: 100%;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
        }

        .scores-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .scores-table th, .scores-table td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #333;
        }

        .scores-table th {
            background: var(--surface2);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .scores-table tr:hover {
            background: var(--surface2);
        }

        .score-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .score-badge.excellent {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .score-badge.good {
            background: rgba(255,230,109,0.2);
            color: var(--iso);
        }

        .score-badge.needs-work {
            background: rgba(255,107,53,0.2);
            color: var(--aperture);
        }

        .mini-scores {
            display: flex;
            gap: 8px;
        }

        .mini-score {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .mini-score.correct {
            background: rgba(78,205,196,0.3);
            color: var(--shutter);
        }

        .mini-score.wrong {
            background: rgba(255,107,107,0.3);
            color: #ff6b6b;
        }

        .note-cell {
            max-width: 200px;
        }

        .note-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: var(--surface2);
            color: var(--text);
            font-family: 'Heebo', sans-serif;
            font-size: 0.9rem;
            resize: none;
        }

        .note-input:focus {
            outline: none;
            border-color: var(--shutter);
        }

        .save-note-btn {
            margin-top: 5px;
            padding: 5px 12px;
            border: none;
            border-radius: 5px;
            background: var(--shutter);
            color: var(--bg);
            font-size: 0.8rem;
            cursor: pointer;
        }

        .save-note-btn:disabled {
            opacity: 0.5;
        }

        .date-cell {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .add-students-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        .add-students-section h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-students-section h2 i {
            color: var(--iso);
        }

        .add-form {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .add-form .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .add-form label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .add-form input, .add-form select {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: var(--surface);
            color: var(--text);
            font-family: 'Heebo', sans-serif;
        }

        .add-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: var(--iso);
            color: var(--bg);
            font-weight: 700;
            cursor: pointer;
        }

        .add-btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .add-form {
                grid-template-columns: 1fr;
            }
            
            .scores-table {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📸 משולש החשיפה - לוח מורה</h1>
        <p>צפייה בציונים והוספת הערות</p>
    </header>

    <div class="controls">
        <div class="filter-group">
            <label>סינון לפי כיתה:</label>
            <select id="classFilter" onchange="loadScores()">
                <option value="">כל הכיתות</option>
                <option value="י1">י'1</option>
                <option value="י2">י'2</option>
                <option value="י3">י'3</option>
                <option value="י4">י'4</option>
                <option value="יא1">י"א 1</option>
                <option value="יא2">י"א 2</option>
                <option value="יא3">י"א 3</option>
                <option value="יא4">י"א 4</option>
                <option value="יב1">י"ב 1</option>
                <option value="יב2">י"ב 2</option>
                <option value="יב3">י"ב 3</option>
                <option value="יב4">י"ב 4</option>
            </select>
        </div>
        <button class="refresh-btn" onclick="loadScores()">
            <i class="fas fa-sync-alt"></i> רענון
        </button>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card total">
            <div class="stat-value" id="statTotal">-</div>
            <div class="stat-label">סה"כ הגשות</div>
        </div>
        <div class="stat-card avg">
            <div class="stat-value" id="statAvg">-</div>
            <div class="stat-label">ממוצע ציון</div>
        </div>
        <div class="stat-card excellent">
            <div class="stat-value" id="statExcellent">-</div>
            <div class="stat-label">מצוינים (7+)</div>
        </div>
        <div class="stat-card needs-work">
            <div class="stat-value" id="statNeedsWork">-</div>
            <div class="stat-label">לחיזוק (פחות מ-5)</div>
        </div>
    </div>

    <div class="scores-table">
        <table>
            <thead>
                <tr>
                    <th>שם</th>
                    <th>כיתה</th>
                    <th>ציון</th>
                    <th>פירוט</th>
                    <th>הערת מורה</th>
                    <th>תאריך</th>
                </tr>
            </thead>
            <tbody id="scoresBody">
                <tr>
                    <td colspan="6" class="loading">
                        <i class="fas fa-spinner fa-spin"></i> טוען...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="add-students-section">
        <h2><i class="fas fa-user-plus"></i> הוספת תלמיד חדש</h2>
        <div class="add-form">
            <div class="field">
                <label>ת.ז.</label>
                <input type="text" id="newStudentId" placeholder="123456789" maxlength="9">
            </div>
            <div class="field">
                <label>שם מלא</label>
                <input type="text" id="newStudentName" placeholder="ישראל ישראלי">
            </div>
            <div class="field">
                <label>כיתה</label>
                <select id="newStudentClass">
                    <option value="">בחרו...</option>
                    <option value="י1">י'1</option>
                    <option value="י2">י'2</option>
                    <option value="י3">י'3</option>
                    <option value="י4">י'4</option>
                    <option value="יא1">י"א 1</option>
                    <option value="יא2">י"א 2</option>
                    <option value="יא3">י"א 3</option>
                    <option value="יא4">י"א 4</option>
                    <option value="יב1">י"ב 1</option>
                    <option value="יב2">י"ב 2</option>
                    <option value="יב3">י"ב 3</option>
                    <option value="יב4">י"ב 4</option>
                </select>
            </div>
            <button class="add-btn" onclick="addStudent()">
                <i class="fas fa-plus"></i> הוסף
            </button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://hykpagdgaeulhghyvcqw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_o4Nff2ctoa1niZthDyMvLQ_e2hQwNuT';

async function supabaseRequest(endpoint, method = 'GET', data = null) {
    const options = {
        method: method,
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': method === 'PATCH' ? 'return=representation' : (method === 'POST' ? 'return=representation' : '')
        }
    };
    if (data) options.body = JSON.stringify(data);
    const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, options);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    return text ? JSON.parse(text) : null;
}

async function loadScores() {
    const classFilter = document.getElementById('classFilter').value;
    const tbody = document.getElementById('scoresBody');
    
    tbody.innerHTML = '<tr><td colspan="6" class="loading"><i class="fas fa-spinner fa-spin"></i> טוען...</td></tr>';
    
    try {
        let endpoint = 'exposure_scores?order=submitted_at.desc';
        if (classFilter) {
            endpoint += `&class_name=eq.${encodeURIComponent(classFilter)}`;
        }
        
        const scores = await supabaseRequest(endpoint);
        
        if (!scores || scores.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i class="fas fa-inbox"></i><br>אין הגשות עדיין</td></tr>';
            updateStats([]);
            return;
        }
        
        updateStats(scores);
        
        tbody.innerHTML = scores.map(s => `
            <tr>
                <td><strong>${s.student_name}</strong></td>
                <td>${s.class_name}</td>
                <td>
                    <span class="score-badge ${s.score >= 7 ? 'excellent' : (s.score >= 5 ? 'good' : 'needs-work')}">
                        ${s.score}/8
                    </span>
                </td>
                <td>
                    <div class="mini-scores">
                        <span class="mini-score ${s.aperture_score ? 'correct' : 'wrong'}" title="צמצם">צ</span>
                        <span class="mini-score ${s.shutter_score ? 'correct' : 'wrong'}" title="תריס">ת</span>
                        <span class="mini-score ${s.iso_score ? 'correct' : 'wrong'}" title="ISO">I</span>
                        <span class="mini-score ${s.challenge_score >= 3 ? 'correct' : 'wrong'}" title="מבדק: ${s.challenge_score}/5">${s.challenge_score}</span>
                    </div>
                </td>
                <td class="note-cell">
                    <textarea class="note-input" id="note-${s.id}" placeholder="הוסף הערה...">${s.teacher_note || ''}</textarea>
                    <button class="save-note-btn" onclick="saveNote(${s.id})">שמור</button>
                </td>
                <td class="date-cell">${formatDate(s.submitted_at)}</td>
            </tr>
        `).join('');
        
    } catch (err) {
        console.error('Error loading scores:', err);
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i class="fas fa-exclamation-triangle"></i><br>שגיאה בטעינה</td></tr>';
    }
}

function updateStats(scores) {
    document.getElementById('statTotal').textContent = scores.length;
    
    if (scores.length > 0) {
        const avg = scores.reduce((sum, s) => sum + s.score, 0) / scores.length;
        document.getElementById('statAvg').textContent = avg.toFixed(1);
        document.getElementById('statExcellent').textContent = scores.filter(s => s.score >= 7).length;
        document.getElementById('statNeedsWork').textContent = scores.filter(s => s.score < 5).length;
    } else {
        document.getElementById('statAvg').textContent = '-';
        document.getElementById('statExcellent').textContent = '0';
        document.getElementById('statNeedsWork').textContent = '0';
    }
}

function formatDate(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString('he-IL') + '<br>' + date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}

async function saveNote(scoreId) {
    const noteInput = document.getElementById(`note-${scoreId}`);
    const btn = noteInput.nextElementSibling;
    const note = noteInput.value.trim();
    
    btn.disabled = true;
    btn.textContent = 'שומר...';
    
    try {
        await supabaseRequest(`exposure_scores?id=eq.${scoreId}`, 'PATCH', { teacher_note: note });
        btn.textContent = '✓ נשמר';
        setTimeout(() => { btn.textContent = 'שמור'; btn.disabled = false; }, 2000);
    } catch (err) {
        console.error('Error saving note:', err);
        alert('שגיאה בשמירה');
        btn.textContent = 'שמור';
        btn.disabled = false;
    }
}

async function addStudent() {
    const id = document.getElementById('newStudentId').value.trim().padStart(9, '0');
    const name = document.getElementById('newStudentName').value.trim();
    const className = document.getElementById('newStudentClass').value;
    
    if (!id || id.length < 5) {
        alert('נא להזין ת.ז. תקינה');
        return;
    }
    if (!name) {
        alert('נא להזין שם');
        return;
    }
    if (!className) {
        alert('נא לבחור כיתה');
        return;
    }
    
    try {
        await supabaseRequest('exposure_students', 'POST', {
            student_id: id,
            student_name: name,
            class_name: className
        });
        
        alert(`התלמיד ${name} נוסף בהצלחה!`);
        document.getElementById('newStudentId').value = '';
        document.getElementById('newStudentName').value = '';
        document.getElementById('newStudentClass').value = '';
        
    } catch (err) {
        console.error('Error adding student:', err);
        if (err.message.includes('409') || err.message.includes('duplicate')) {
            alert('תלמיד עם ת.ז. זו כבר קיים במערכת');
        } else {
            alert('שגיאה בהוספה');
        }
    }
}

// טעינה ראשונית
document.addEventListener('DOMContentLoaded', loadScores);
</script>

</body>
</html>
