<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת רכז — שיבוץ מורים ומשרות</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --primary: #6366f1; --magama: #ecfdf5; --magama-border: #10b981; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); direction: rtl; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* סרגל עליון */
        .login-bar { background: #1e293b; color: white; padding: 15px 30px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 20px 30px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        
        /* טופס שיבוץ */
        .input-card { background: #fff; padding: 35px; border-radius: 30px; border: 2px solid #e2e8f0; margin-bottom: 40px; display: none; }
        
        /* תצוגת שכבות */
        .grade-box { background: #fff; border: 2px solid #cbd5e1; border-radius: 40px; padding: 35px; margin-bottom: 40px; box-shadow: 10px 10px 0px rgba(0,0,0,0.02); }
        .grade-title { font-family: 'Secular One'; font-size: 32px; margin-bottom: 20px; border-bottom: 3px solid #f1f5f9; padding-bottom: 10px; }
        
        /* כותרת שורה דינמית (מה שהגדירה המנהלת) */
        .row-header { font-size: 16px; font-weight: 900; color: #4338ca; margin: 25px 0 10px; background: #f5f3ff; padding: 8px 15px; border-radius: 12px; border-right: 5px solid var(--primary); }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .teacher-card { background: white; border-radius: 20px; padding: 20px; position: relative; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .del-btn { position: absolute; top: 10px; left: 10px; background: #fee2e2; color: #ef4444; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; }
        
        /* סיכום שעות */
        .summary-pill { background: #fff; padding: 25px; border-radius: 100px; border: 3px solid var(--magama-border); display: flex; justify-content: space-around; font-weight: 900; font-size: 22px; margin-top: 20px; color: #065f46; }
        
        input, select { padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; width: 100%; background: #f8fafc; outline: none; font-family: inherit; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: 900; font-size: 16px; transition: 0.2s; }
        .btn-add:hover { background: #4f46e5; transform: translateY(-2px); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", 
            authDomain: "rakevet-65218.firebaseapp.com", 
            databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "rakevet-65218" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const currentDeptName = urlParams.get('dept') || "תקשורת"; // שם המגמה מה-URL
        let deptConfig = null;
        let allEntries = [];
        let isAuthorized = false;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('deptLabel').innerText = currentDeptName;
        });

        // 1. טעינת הגדרות המקצוע (מה שהזינה המנהלת הפדגוגית)
        onValue(ref(db, `config/departments/${currentDeptName}`), (snap) => {
            deptConfig = snap.val();
            if(deptConfig) {
                updateFormOptions();
                updateDisplay();
            } else {
                document.getElementById('dashboard').innerHTML = `
                    <div style="text-align:center; padding:50px; font-size:20px; color:#94a3b8;">
                        המנהלת הפדגוגית טרם הגדירה את מבנה המקצוע עבור <b>${currentDeptName}</b>.
                        <br><small>ודאו שהמגמה הוגדרה בדף הניהול הפדגוגי.</small>
                    </div>`;
            }
        });

        // עדכון האפשרויות בטופס השיבוץ (מורים ומקצועות)
        function updateFormOptions() {
            // עדכון רשימת מורים (רק אלו שסומנו על ידי המנהלת)
            const tSel = document.getElementById('inTeacher');
            tSel.innerHTML = '<option value="">— בחר מורה מהצוות —</option>';
            if(deptConfig.teachers) {
                deptConfig.teachers.forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
            }

            // עדכון רשימת מקצועות (כל מה שמופיע בשורות שהוגדרו)
            const sSel = document.getElementById('inSubject');
            sSel.innerHTML = '<option value="">— בחר מקצוע —</option>';
            if(deptConfig.structure) {
                Object.values(deptConfig.structure).forEach(row => {
                    row.subjects.forEach(subj => {
                        sSel.innerHTML += `<option value="${subj}">${subj}</option>`;
                    });
                });
            }
        }

        // כניסת רכז עם סיסמה
        window.checkPassword = () => {
            if(document.getElementById('passField').value === "1234") {
                isAuthorized = true;
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('login-ui').style.display = 'none';
                updateDisplay();
            } else {
                alert("סיסמה שגויה");
            }
        };

        // הוספת שיבוץ חדש
        window.addEntry = () => {
            if(!isAuthorized) return;
            const entry = {
                dept: currentDeptName,
                year: document.getElementById('inYear').value,
                grade: document.getElementById('inGrade').value,
                subject: document.getElementById('inSubject').value,
                teacher: document.getElementById('inTeacher').value,
                contact: parseFloat(document.getElementById('inContact').value) || 0,
                bonus: parseFloat(document.getElementById('inBonus').value) || 0
            };
            if(entry.teacher && entry.subject) {
                push(ref(db, 'rakevet_v3'), entry);
            } else {
                alert("חובה לבחור מורה ומקצוע");
            }
        };

        window.deleteEntry = (id) => confirm("למחוק שיבוץ זה?") && remove(ref(db, `rakevet_v3/${id}`));

        // האזנה לכל השיבוצים הקיימים
        onValue(ref(db, 'rakevet_v3'), (snap) => {
            allEntries = snap.val() ? Object.keys(snap.val()).map(k => ({id: k, ...snap.val()[k]})) : [];
            updateDisplay();
        });

        // עדכון התצוגה הגרפית
        window.updateDisplay = () => {
            const year = document.getElementById('viewYear').value;
            // סינון רק לשנה הנוכחית ולמגמה הנוכחית
            const filtered = allEntries.filter(e => e.year === year && e.dept === currentDeptName);
            render(filtered, year);
        };

        function render(entries, year) {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = ''; 
            if(!deptConfig || !deptConfig.structure) return;

            const teacherLoads = {};
            let grandTotalContact = 0;
            let grandTotalBonus = 0;

            ['י', 'יא', 'יב'].forEach(g => {
                const gradeData = entries.filter(e => e.grade === g);
                const box = document.createElement('div');
                box.className = 'grade-box';
                let boxHTML = `<h2 class="grade-title">שכבת ${g} — ${year}</h2>`;

                // רינדור דינמי של שורות לפי הגדרת המנהלת הפדגוגית
                Object.keys(deptConfig.structure).forEach(rowKey => {
                    const rowInfo = deptConfig.structure[rowKey];
                    // סינון השיבוצים ששייכים למקצועות של השורה הזו
                    const rowEntries = gradeData.filter(e => rowInfo.subjects.includes(e.subject));
                    
                    boxHTML += `<div class="row-header">${rowInfo.label}</div>`;
                    boxHTML += `<div class="cards-grid">`;
                    boxHTML += renderCards(rowEntries);
                    boxHTML += `</div>`;
                });

                box.innerHTML = boxHTML;
                dash.appendChild(box);

                // חישוב עומסים לסיכום בסוף
                gradeData.forEach(e => {
                    if(!teacherLoads[e.teacher]) teacherLoads[e.teacher] = {c:0, b:0};
                    teacherLoads[e.teacher].c += e.contact;
                    teacherLoads[e.teacher].b += e.bonus;
                    grandTotalContact += e.contact;
                    grandTotalBonus += e.bonus;
                });
            });

            renderSummaries(teacherLoads, grandTotalContact, grandTotalBonus, year);
        }

        function renderCards(list) {
            if(list.length === 0) return `<div style="color:#cbd5e1; padding:15px; font-style:italic;">אין שיבוצים רשומים</div>`;
            return list.map(d => `
                <div class="teacher-card">
                    <h3 style="margin:0 0- 10px 0;">${d.teacher}</h3>
                    <div style="color:var(--primary); font-weight:700; font-size:14px;">${d.subject}</div>
                    <div style="display:flex; justify-content:space-between; margin-top:15px; font-weight:900; background:#f8fafc; padding:8px; border-radius:10px;">
                        <span>מגע: ${d.contact}</span>
                        <span>גמול: ${d.bonus}</span>
                    </div>
                    ${isAuthorized ? `<button class="del-btn" onclick="deleteEntry('${d.id}')">✕</button>` : ''}
                </div>
            `).join('');
        }

        function renderSummaries(load, c, b, year) {
            const area = document.getElementById('summary-area');
            area.innerHTML = `
                <div class="grade-box">
                    <h2 class="grade-title">ריכוז משרות מגמת ${currentDeptName} — ${year}</h2>
                    <table style="width:100%; text-align:right; border-collapse:collapse;">
                        <thead>
                            <tr style="border-bottom:2px solid #eee; color:#64748b;">
                                <th>מורה</th>
                                <th>שעות מגע</th>
                                <th>שעות גמול</th>
                                <th>סה"כ</th>
                            </tr>
                        </thead>
                        <tbody>${Object.keys(load).sort().map(t => `
                            <tr style="border-bottom:1px solid #f1f5f9;">
                                <td style="padding:12px; font-weight:900;">${t}</td>
                                <td>${load[t].c}</td>
                                <td>${load[t].b}</td>
                                <td style="color:var(--primary); font-weight:900;">${(load[t].c + load[t].b).toFixed(1)}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="summary-pill">
                    <span>סה"כ מגע: ${c}</span>
                    <span>סה"כ גמול: ${b}</span>
                    <span style="color:var(--primary)">סה"כ שעות תקן: ${c+b}</span>
                </div>`;
        }
    </script>
</head>
<body>
    <div class="container">
        <!-- סרגל כניסה -->
        <div class="login-bar">
            <span style="font-weight: 800; font-size: 22px;">מגמת: <span id="deptLabel"></span></span>
            <div id="login-ui">
                <input type="password" id="passField" placeholder="סיסמה" style="width:100px; padding:8px; border-radius:8px; border:none;"> 
                <button onclick="checkPassword()" style="background:var(--primary); color:white; border:none; padding:8px 18px; border-radius:8px; cursor:pointer; font-weight:800;">כניסה לשיבוץ</button>
            </div>
        </div>

        <!-- ניווט ושנה -->
        <div class="nav-bar">
            <div>
                <label>צפייה בשנה:</label> 
                <select id="viewYear" onchange="updateDisplay()" style="width:auto; font-weight:700;">
                    <option value="תשפו">תשפ"ו</option>
                    <option value="תשפז" selected>תשפ"ז</option>
                </select>
            </div>
            <div style="font-size:14px; color:#64748b; font-weight:500;">
                הצוות והשורות מנוהלים ע"י המנהלת הפדגוגית
            </div>
        </div>

        <!-- טופס הוספת שיבוץ (מוסתר עד כניסה) -->
        <div id="admin-section" class="input-card">
            <h2 style="margin-top:0;">שיבוץ מורה למשרה</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:15px; align-items:flex-end;">
                <div><label>שנה</label><select id="inYear"><option value="תשפו">תשפ"ו</option><option value="תשפז" selected>תשפ"ז</option></select></div>
                <div><label>שכבה</label><select id="inGrade"><option value="י">י'</option><option value="יא">י"א</option><option value="יב">י"ב</option></select></div>
                <div><label>מורה מהמגמה</label><select id="inTeacher"></select></div>
                <div><label>מקצוע/תחום</label><select id="inSubject"></select></div>
                <div><label>שעות מגע</label><input type="number" id="inContact" value="4" step="0.5"></div>
                <div><label>גמול</label>
                    <select id="inBonus">
                        <option value="0">0</option><option value="1">1</option>
                        <option value="1.5">1.5</option><option value="2">2</option>
                        <option value="2.5">2.5</option><option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <button onclick="addEntry()" class="btn-add">בצע שיבוץ +</button>
            </div>
        </div>

        <!-- לוח התצוגה -->
        <div id="dashboard">טוען הגדרות מהמנהלת הפדגוגית...</div>
        <div id="summary-area"></div>
    </div>
</body>
</html>
