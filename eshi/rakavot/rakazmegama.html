<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת שיבוץ רכז - ניהול רב שנתי</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --primary: #6366f1; --indigo-bg: #f5f3ff; --green-bg: #f0fdf4; --indigo-border: #6366f1; --green-border: #10b981; --admin: #1e293b; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .login-bar { background: var(--admin); color: white; padding: 15px 30px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* סרגל בחירת שנה */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 20px 30px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .year-toggle { background: #f1f5f9; padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 10px; border: 2px solid var(--primary); }
        .year-toggle select { border: none; background: none; font-weight: 900; font-size: 16px; cursor: pointer; color: var(--primary); outline: none; }

        .input-card { background: #fff; padding: 35px; border-radius: 30px; border: 2px solid #e2e8f0; margin-bottom: 40px; display: none; }
        .grade-box { background: #fff; border: 2px solid #cbd5e1; border-radius: 40px; padding: 35px; margin-bottom: 40px; box-shadow: 10px 10px 0px rgba(0,0,0,0.02); }
        .grade-title { font-family: 'Secular One'; font-size: 32px; border-bottom: 3px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px; }
        
        .row-section { padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .row-Indigo { background: var(--indigo-bg); border-right: 8px solid var(--indigo-border); }
        .row-Green { background: var(--green-bg); border-right: 8px solid var(--green-border); }
        .row-label { font-weight: 900; font-size: 18px; margin-bottom: 15px; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .teacher-card { background: white; border-radius: 20px; padding: 20px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .del-btn { position: absolute; top: 10px; left: 10px; background: #fee2e2; color: #ef4444; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        
        input, select { padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; width: 100%; background: #f8fafc; outline: none; font-family: inherit; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: 900; }
        
        #error-screen { display: none; text-align: center; padding: 100px; color: #64748b; }
    </style>
</head>
<body>
    <div id="error-screen"><h1>גישה נדחתה</h1><p>נא להיכנס דרך הקישור האישי.</p></div>

    <div id="main-container" class="container" style="display:none;">
        <div class="login-bar">
            <span style="font-weight: 800; font-size: 24px;">מגמת: <span id="displayDept" style="color:#818cf8;"></span></span>
            <div id="login-ui">
                <input type="password" id="passField" placeholder="סיסמה" style="width:100px; padding:8px; border:none; border-radius:8px;"> 
                <button onclick="checkPassword()" class="btn-add" style="padding:8px 15px; border-radius:8px; font-size:14px;">כניסה לשיבוץ</button>
            </div>
        </div>

        <!-- סרגל צפייה בשנה -->
        <div class="nav-bar">
            <div class="year-toggle">
                <label><b>צפייה בשנת לימודים:</b></label>
                <select id="viewYear" onchange="updateDisplay()">
                    <option value="תשפז" selected>תשפ"ז (הבאה)</option>
                    <option value="תשפו">תשפ"ו (נוכחית)</option>
                </select>
            </div>
            <div style="color:#64748b; font-weight:500;">מערכת ניהול ושיבוץ מורים</div>
        </div>

        <!-- טופס הוספת שיבוץ -->
        <div id="admin-section" class="input-card">
            <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px;">הוספת שיבוץ חדש</h3>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:15px; align-items:flex-end;">
                <div>
                    <label>שנה</label>
                    <select id="inYear">
                        <option value="תשפז" selected>תשפ"ז</option>
                        <option value="תשפו">תשפ"ו</option>
                    </select>
                </div>
                <div><label>שכבה</label><select id="inGrade"><option value="י">י'</option><option value="יא">י"א</option><option value="יב">י"ב</option></select></div>
                <div><label>מורה</label><select id="inTeacher"></select></div>
                <div><label>מקצוע</label><select id="inSubject"></select></div>
                <div><label>מגע</label><input type="number" id="inContact" value="4" step="0.5"></div>
                <div><label>גמול</label><input type="number" id="inBonus" value="0" step="0.5"></div>
                <button onclick="addEntry()" class="btn-add">בצע שיבוץ +</button>
            </div>
        </div>

        <div id="dashboard">טוען נתונים...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const deptUrl = urlParams.get('dept');
        let deptConfig = null, allEntries = [], isAuthorized = false;

        if (!deptUrl) { document.getElementById('error-screen').style.display = 'block'; }
        else { document.getElementById('main-container').style.display = 'block'; document.getElementById('displayDept').innerText = deptUrl; loadData(); }

        function loadData() {
            onValue(ref(db, `config/departments/${deptUrl}`), (snap) => {
                deptConfig = snap.val(); if(deptConfig) updateFormOptions();
                else document.getElementById('dashboard').innerHTML = "המגמה טרם הוגדרה ע\"י המפקחת.";
            });
            onValue(ref(db, 'rakevet_v3'), (snap) => {
                allEntries = snap.val() ? Object.keys(snap.val()).map(k => ({id: k, ...snap.val()[k]})) : [];
                updateDisplay();
            });
        }

        function updateFormOptions() {
            document.getElementById('inTeacher').innerHTML = '<option value="">— מורה —</option>' + (deptConfig.teachers || []).map(t => `<option value="${t}">${t}</option>`).join('');
            const sS = document.getElementById('inSubject'); sS.innerHTML = '<option value="">— מקצוע —</option>';
            if(deptConfig.structure) Object.values(deptConfig.structure).forEach(row => row.subjects.forEach(subj => sS.innerHTML += `<option value="${subj}">${subj}</option>`));
        }

        window.checkPassword = () => { if(document.getElementById('passField').value === "1234") { isAuthorized = true; document.getElementById('admin-section').style.display = 'block'; document.getElementById('login-ui').style.display = 'none'; updateDisplay(); } };

        window.addEntry = () => {
            if(!isAuthorized) return;
            const e = { 
                dept: deptUrl, 
                year: document.getElementById('inYear').value, 
                grade: document.getElementById('inGrade').value, 
                subject: document.getElementById('inSubject').value, 
                teacher: document.getElementById('inTeacher').value, 
                contact: parseFloat(document.getElementById('inContact').value) || 0, 
                bonus: parseFloat(document.getElementById('inBonus').value) || 0 
            };
            if(e.teacher && e.subject) push(ref(db, 'rakevet_v3'), e);
        };

        window.deleteEntry = (id) => confirm("למחוק?") && remove(ref(db, `rakevet_v3/${id}`));

        window.updateDisplay = () => {
            const dash = document.getElementById('dashboard'); dash.innerHTML = '';
            if(!deptConfig || !deptConfig.structure) return;
            
            const selectedYear = document.getElementById('viewYear').value;

            ['י', 'יא', 'יב'].forEach(g => {
                const gradeData = allEntries.filter(e => e.grade === g && e.dept === deptUrl && e.year === selectedYear);
                const box = document.createElement('div'); box.className = 'grade-box'; 
                let html = `<h2 class="grade-title">שכבת ${g} - ${selectedYear}</h2>`;
                
                Object.keys(deptConfig.structure).forEach((rowK, idx) => {
                    const row = deptConfig.structure[rowK], rowE = gradeData.filter(e => row.subjects.includes(e.subject)), color = (idx === 0) ? 'row-Indigo' : (idx === 1) ? 'row-Green' : 'row-section';
                    html += `<div class="row-section ${color}"><div class="row-label">${row.label}</div><div class="cards-grid">` + 
                        (rowE.length ? rowE.map(d => `<div class="teacher-card"><h3>${d.teacher}</h3><div style="color:var(--primary);font-weight:700;">${d.subject}</div><div style="display:flex;justify-content:space-between;margin-top:10px;font-weight:900;"><span>מגע: ${d.contact}</span><span>גמול: ${d.bonus}</span></div>${isAuthorized ? `<button class="del-btn" onclick="deleteEntry('${d.id}')">✕</button>` : ''}</div>`).join('') : '<div style="color:#94a3b8; font-style:italic; padding:10px;">אין שיבוצים</div>') + 
                        `</div></div>`;
                });
                box.innerHTML = html; dash.appendChild(box);
            });
        }
    </script>
</body>
</html>
