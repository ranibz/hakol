<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול פדגוגי — הקמת מגמות</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #10b981; --bg: #f8fafc; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); direction: rtl; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .setup-card { background: white; border-radius: 30px; padding: 40px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .card-title { font-family: 'Secular One'; font-size: 28px; margin-bottom: 25px; color: #1e293b; border-bottom: 3px solid #f1f5f9; padding-bottom: 10px; }
        
        label { display: block; font-weight: 800; margin-bottom: 8px; color: #475569; font-size: 14px; }
        select, input { padding: 14px; border: 2px solid #f1f5f9; border-radius: 15px; width: 100%; margin-bottom: 20px; outline: none; background: #f8fafc; font-size: 16px; }
        select:focus, input:focus { border-color: var(--primary); background: white; }

        .btn { padding: 15px 30px; border-radius: 15px; border: none; cursor: pointer; font-weight: 900; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; margin-top: 10px; }
        
        .form-section { background: #f1f5f9; padding: 25px; border-radius: 20px; margin-bottom: 20px; display: none; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .teacher-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; background: white; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; margin-bottom: 20px; max-height: 150px; overflow-y: auto; }
        .teacher-opt { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }
        
        footer { text-align: center; padding: 40px; color: #94a3b8; font-size: 12px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", authDomain: "rakevet-65218.firebaseapp.com", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app", projectId: "rakevet-65218", appId: "1:1096554736743:web:b2e78ba157117e1c44f8c2" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // 1. טעינת רשימת המנהלות הפדגוגיות מהדאטהבייס (הגדרות המנהלת)
        onValue(ref(db, 'config/pm_list'), (snap) => {
            const list = snap.val() || ["מנהלת פדגוגית 1", "מנהלת פדגוגית 2", "מנהלת פדגוגית 3", "מנהלת פדגוגית 4", "מנהלת פדגוגית 5"];
            const sel = document.getElementById('mgrSelect');
            sel.innerHTML = '<option value="">— בחרי את שמך מהרשימה —</option>';
            list.forEach(name => {
                sel.innerHTML += `<option value="${name}">${name}</option>`;
            });
        });

        // 2. טעינת מאגר המורים הכללי של בית הספר
        onValue(ref(db, 'config/teachers'), (snap) => {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = '';
            if(snap.val()) {
                Object.values(snap.val()).forEach(t => {
                    grid.innerHTML += `<label class="teacher-opt"><input type="checkbox" name="deptT" value="${t.name}"> ${t.name}</label>`;
                });
            }
        });

        // 3. טעינת המקצועות המשויכים למנהלת שנבחרה
        window.loadMySubjects = () => {
            const pmName = document.getElementById('mgrSelect').value;
            if(!pmName) {
                document.getElementById('setup-form').style.display = 'none';
                return;
            }

            onValue(ref(db, 'config/pm_assignments/' + pmName), (snap) => {
                const subjects = snap.val() || [];
                const subSel = document.getElementById('subjectSelect');
                subSel.innerHTML = '<option value="">— בחרי מקצוע להקמה —</option>';
                
                if(subjects.length === 0) {
                    alert("לא נמצאו מקצועות המשויכים אלייך. פני למנהלת ביה\"ס.");
                } else {
                    subjects.forEach(s => subSel.innerHTML += `<option value="${s}">${s}</option>`);
                    document.getElementById('setup-form').style.display = 'block';
                }
            });
        };

        // 4. שמירת הגדרות המגמה
        window.saveDept = () => {
            const deptName = document.getElementById('subjectSelect').value;
            const pmName = document.getElementById('mgrSelect').value;
            const selectedTeachers = Array.from(document.querySelectorAll('input[name="deptT"]:checked')).map(cb => cb.value);
            
            if(!deptName) return alert("חובה לבחור מקצוע");
            if(selectedTeachers.length === 0) return alert("חובה לבחור לפחות מורה אחד לצוות המגמה");

            const data = {
                name: deptName,
                manager: pmName,
                teachers: selectedTeachers,
                row1: { 
                    label: document.getElementById('r1Name').value, 
                    subjects: document.getElementById('r1Subs').value.split(',').map(s => s.trim()) 
                },
                row2: { 
                    label: document.getElementById('r2Name').value, 
                    subjects: document.getElementById('r2Subs').value.split(',').map(s => s.trim()) 
                }
            };

            set(ref(db, 'config/departments/' + deptName), data).then(() => {
                alert("הגדרות המגמה נשמרו בהצלחה! הרכז יכול להתחיל בשיבוץ.");
            });
        };
    </script>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <h1 class="card-title">מרכז בקרה פדגוגי</h1>
        
        <label>1. הזדהות מנהלת פדגוגית:</label>
        <select id="mgrSelect" onchange="loadMySubjects()"></select>

        <div id="setup-form" style="display:none; margin-top:20px; border-top:2px solid #f1f5f9; padding-top:25px;">
            
            <label>2. בחרי מקצוע לניהול והקמה:</label>
            <select id="subjectSelect"></select>

            <label>3. בחרי צוות מורים למגמה זו:</label>
            <div id="teacher-grid" class="teacher-grid"></div>

            <label>4. הגדרת מבנה פדגוגי (שורות ומקצועות):</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="form-section" style="display:block; background:#f0f7ff;">
                    <label>שורה 1: שם קטגוריה</label>
                    <input type="text" id="r1Name" value="ליבה ועיוני">
                    <label>מקצועות בשורה זו (מופרדים בפסיק)</label>
                    <input type="text" id="r1Subs" placeholder="למשל: תקשורת וחברה, עבודת גמר">
                </div>
                <div class="form-section" style="display:block; background:#f0fff4;">
                    <label>שורה 2: שם קטגוריה</label>
                    <input type="text" id="r2Name" value="התמחות והפקה">
                    <label>מקצועות בשורה זו (מופרדים בפסיק)</label>
                    <input type="text" id="r2Subs" placeholder="למשל: רדיו, קולנוע, ניו-מדיה">
                </div>
            </div>

            <button class="btn btn-primary" onclick="saveDept()">שמור הגדרות מגמה ושחרר לשיבוץ רכז ➔</button>
            <a href="coordinator.html" style="display:block; text-align:center; margin-top:20px; color:#64748b; text-decoration:none; font-size:13px; font-weight:700;">➔ מעבר ללוח השיבוץ (לרכזים)</a>
        </div>
    </div>

    <footer>פיתוח מערכת: רני בן זאב | גרסה פדגוגית היררכית 2.0</footer>
</div>

</body>
</html>
