<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול מערכת — Master Admin (גרסת עריכה)</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <style>
        :root { --admin-bg: #0f172a; --primary: #6366f1; --accent: #10b981; --edit: #f59e0b; }
        body { font-family: 'Heebo', sans-serif; background: #f8fafc; color: #1e293b; direction: rtl; padding: 0; margin: 0; }
        .admin-header { background: var(--admin-bg); color: white; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        #login-overlay { position: fixed; inset: 0; background: var(--admin-bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; backdrop-filter: blur(10px); text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .admin-card { background: white; border-radius: 30px; padding: 30px; border: 1px solid #e2e8f0; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card-title { font-family: 'Secular One'; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        input { padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 15px; width: 100%; margin-bottom: 15px; background: #f8fafc; outline: none; }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; transition: 0.2s; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; margin-top: 20px; font-size: 18px; }
        .btn-edit-mode { background: var(--edit) !important; }
        .teacher-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; background: #f1f5f9; padding: 20px; border-radius: 15px; margin-bottom: 20px; max-height: 200px; overflow-y: auto; }
        .teacher-option { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; }
        .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .dept-card { background: white; border-radius: 25px; padding: 25px; border: 1px solid #e2e8f0; position: relative; }
        .teacher-tag { display: inline-block; background: #eef2ff; color: var(--primary); padding: 2px 8px; border-radius: 6px; font-size: 11px; margin: 2px; font-weight: 800; }
        .card-tools { position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; }
        .tool-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 5px; border-radius: 5px; }
        .tool-btn:hover { background: #f1f5f9; }
        footer { text-align: center; padding: 40px; color: #64748b; font-size: 14px; border-top: 1px solid #e2e8f0; margin-top: 50px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", 
            authDomain: "rakevet-65218.firebaseapp.com", 
            databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "rakevet-65218", 
            appId: "1:1096554736743:web:b2e78ba157117e1c44f8c2" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let editingDeptId = null; // משתנה למעקב אחרי עריכה
        let allDepts = {};

        window.tryLogin = () => {
            if(document.getElementById('adminPass').value === "1234") 
                document.getElementById('login-overlay').style.display = 'none';
            else alert("סיסמה שגויה");
        };

        window.addTeacher = () => {
            const name = document.getElementById('tName').value;
            if(name) { push(ref(db, 'config/teachers'), { name, maxHours: document.getElementById('tHours').value }); document.getElementById('tName').value = ''; }
        };

        onValue(ref(db, 'config/teachers'), (snap) => {
            const table = document.getElementById('teachersTable');
            const selector = document.getElementById('teacher-selector');
            table.innerHTML = ''; selector.innerHTML = '';
            if(snap.val()) {
                Object.entries(snap.val()).forEach(([id, t]) => {
                    table.innerHTML += `<tr><td><b>${t.name}</b></td><td>${t.maxHours} ש'</td><td style="color:red; cursor:pointer;" onclick="deleteItem('config/teachers/${id}')">✕</td></tr>`;
                    selector.innerHTML += `<label class="teacher-option"><input type="checkbox" name="deptT" value="${t.name}"> ${t.name}</label>`;
                });
            }
        });

        // פונקציית טעינה לעריכה
        window.loadForEdit = (id) => {
            editingDeptId = id;
            const d = allDepts[id];
            document.getElementById('dName').value = d.name;
            document.getElementById('r1Name').value = d.row1.label;
            document.getElementById('r1Subs').value = d.row1.subjects.join(', ');
            document.getElementById('r2Name').value = d.row2.label;
            document.getElementById('r2Subs').value = d.row2.subjects.join(', ');
            
            // סימון מורים
            document.querySelectorAll('input[name="deptT"]').forEach(cb => {
                cb.checked = (d.teachers || []).includes(cb.value);
            });

            document.getElementById('submitBtn').innerText = "עדכן מגמה קיימת";
            document.getElementById('submitBtn').classList.add('btn-edit-mode');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.saveDept = () => {
            const name = document.getElementById('dName').value;
            const selectedTeachers = Array.from(document.querySelectorAll('input[name="deptT"]:checked')).map(cb => cb.value);
            if(!name) { alert("חובה להזין שם מגמה!"); return; }

            const deptData = {
                name: name,
                teachers: selectedTeachers,
                row1: { label: document.getElementById('r1Name').value, subjects: document.getElementById('r1Subs').value.split(',').map(s => s.trim()) },
                row2: { label: document.getElementById('r2Name').value, subjects: document.getElementById('r2Subs').value.split(',').map(s => s.trim()) }
            };

            if(editingDeptId) {
                // עדכון קיימת
                set(ref(db, 'config/departments/' + editingDeptId), deptData).then(() => {
                    alert("המגמה עודכנה בהצלחה!");
                    resetForm();
                });
            } else {
                // הקמת חדשה
                push(ref(db, 'config/departments'), deptData).then(() => {
                    alert("המגמה הוקמה בהצלחה!");
                    resetForm();
                });
            }
        };

        function resetForm() {
            editingDeptId = null;
            document.getElementById('dName').value = '';
            document.getElementById('submitBtn').innerText = "צור מגמה ושייך צוות +";
            document.getElementById('submitBtn').classList.remove('btn-edit-mode');
            document.querySelectorAll('input[name="deptT"]').forEach(cb => cb.checked = false);
        }

        onValue(ref(db, 'config/departments'), (snap) => {
            const grid = document.getElementById('deptGrid');
            grid.innerHTML = '';
            allDepts = snap.val() || {};
            Object.entries(allDepts).forEach(([id, d]) => {
                const tList = d.teachers || [];
                grid.innerHTML += `
                    <div class="dept-card">
                        <div class="card-tools">
                            <button class="tool-btn" onclick="loadForEdit('${id}')" title="ערוך מגמה">✏️</button>
                            <button class="tool-btn" onclick="deleteItem('config/departments/${id}')" style="color:red" title="מחק מגמה">🗑️</button>
                        </div>
                        <h3 style="font-family:'Secular One'; margin-top:10px;">📁 ${d.name}</h3>
                        <div style="margin:10px 0;">${tList.map(t => `<span class="teacher-tag">${t}</span>`).join('')}</div>
                        <div style="font-size:13px; color:#64748b; margin-bottom:15px;">
                            <b>${d.row1.label}:</b> ${d.row1.subjects.join(', ')}<br>
                            <b>${d.row2.label}:</b> ${d.row2.subjects.join(', ')}
                        </div>
                        <a href="coordinator.html?dept=${encodeURIComponent(d.name)}" 
                           style="display:block; background:var(--admin-bg); color:white; text-align:center; padding:12px; border-radius:12px; text-decoration:none; font-weight:800;">
                           מעבר לשיבוץ רכז ➔
                        </a>
                    </div>`;
            });
        });

        window.deleteItem = (p) => confirm("למחוק?") && remove(ref(db, p));
    </script>
</head>
<body>
    <div id="login-overlay"><div class="login-card"><h1>Master Admin</h1><input type="password" id="adminPass" placeholder="סיסמה" style="text-align:center; margin-bottom:15px;"><br><button class="btn btn-accent" style="width:150px;" onclick="tryLogin()">כניסה</button></div></div>
    <header class="admin-header"><h1>לוח בקרה וניהול — רכז על</h1></header>
    <div class="container">
        <div style="display:grid; grid-template-columns: 1fr 2fr; gap:30px;">
            <div class="admin-card">
                <h2 class="card-title">מאגר מורים כללי</h2>
                <input type="text" id="tName" placeholder="שם המורה">
                <input type="number" id="tHours" value="24"><button class="btn btn-primary" onclick="addTeacher()">הוסף למאגר +</button>
                <table style="width:100%; margin-top:20px; text-align:right;"><thead><tr style="font-size:12px; color:#64748b;"><th>שם</th><th>תקן</th><th></th></tr></thead><tbody id="teachersTable"></tbody></table>
            </div>
            <div class="admin-card">
                <h2 class="card-title">הקמת/עריכת מגמה ומבנה פדגוגי</h2>
                <label>שם המגמה</label><input type="text" id="dName">
                <label><b>בחר צוות מורים למגמה:</b></label><div id="teacher-selector" class="teacher-selector"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div style="background:#f8fafc; padding:20px; border-radius:20px;"><label>שורה 1: שם</label><input type="text" id="r1Name" value="תקשורת וחברה"><label>מקצועות</label><input type="text" id="r1Subs" value="תקשורת למד, תקשורת מבחן"></div>
                    <div style="background:#f8fafc; padding:20px; border-radius:20px;"><label>שורה 2: שם</label><input type="text" id="r2Name" value="הפקות"><label>מקצועות</label><input type="text" id="r2Subs" value="מדיה 3 יח״ל, מדיה 5 יח״ל"></div>
                </div>
                <button id="submitBtn" class="btn btn-accent" onclick="saveDept()">צור מגמה ושייך צוות +</button>
            </div>
        </div>
        <h2 style="font-family:'Secular One'; margin:40px 0 20px;">מגמות פעילות במערכת</h2>
        <div id="deptGrid" class="dept-grid"></div>
    </div>
    <footer>פיתוח מערכת: רני בן זאב</footer>
</body>
</html>
