<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול פדגוגי - ריכוז משרות ות"ש</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p1: #6366f1; --p1-bg: #f5f3ff; --p2: #10b981; --p2-bg: #f0fdf4; --bg: #f1f5f9; --admin: #1e293b; --white: #ffffff; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        #login-screen { text-align: center; padding: 80px 20px; }
        .login-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: inline-block; min-width: 400px; border-top: 8px solid var(--p1); }
        
        #main-interface { display: none; }
        .header { background: var(--admin); color: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; background: #cbd5e1; transition: 0.3s; }
        .tab-btn.active { background: var(--p1); color: white; }

        .setup-row { padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 15px; position: relative; }
        .row-Indigo { border-right: 10px solid var(--p1); background: var(--p1-bg); }
        .row-Green { border-right: 10px solid var(--p2); background: var(--p2-bg); }

        input, select { padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; font-family: inherit; }
        .btn-primary { background: var(--p1); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; }
        .btn-save { background: var(--admin); color: white; width: 100%; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; border: none; }

        /* מוניטור */
        .grade-monitor-box { border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .grade-y { background-color: #f5f3ff; border-right: 10px solid #6366f1; }
        .grade-ya { background-color: #f0fdf4; border-right: 10px solid #10b981; }
        .grade-yb { background-color: #fff7ed; border-right: 10px solid #f97316; }
        
        .monitor-table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; font-size: 14px; }
        .monitor-table th { background: #f8fafc; color: #64748b; padding: 10px; text-align: right; }
        .monitor-table td { padding: 10px; border-bottom: 1px solid #f1f5f9; }

        /* טבלת משרות משודרגת עם ת"ש */
        .job-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .job-table th { background: #1e293b; color: white; padding: 12px; text-align: right; border: 1px solid #334155; }
        .job-table td { padding: 10px; border: 1px solid #eee; background: white; }
        .input-inline { border: 1px solid #ddd; padding: 6px; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: inherit; }
        .num-in { width: 70px; text-align: center; font-weight: bold; color: var(--p1); }
        
        .percentage-bar-bg { background: #eee; border-radius: 10px; height: 10px; width: 100%; margin-top: 5px; overflow: hidden; }
        .percentage-bar-fill { height: 100%; transition: 0.5s; }

        .summary-box { display: flex; justify-content: space-around; background: var(--admin); color: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="container">
    <!-- מסך בחירה -->
    <div id="login-screen">
        <div class="login-card">
            <h2>בחרי את שמך מהרשימה:</h2>
            <select id="pmSelector" style="width: 100%; margin-bottom: 20px;"></select>
            <button onclick="enterSystem()" class="btn-primary" style="width: 100%; padding: 15px;">כניסה למערכת</button>
        </div>
    </div>

    <!-- ממשק ניהול -->
    <div id="main-interface">
        <div class="header">
            <h1>ניהול פדגוגי: <span id="displayName"></span></h1>
            <select id="subjectSelector" onchange="loadSubjectData()" style="min-width: 250px; font-weight: 700;"></select>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('config')">⚙️ הגדרות תשתית</button>
            <button class="tab-btn" onclick="switchTab('monitor')">📊 מעקב רכז ומשרות</button>
        </div>

        <!-- טאב הגדרות -->
        <div id="tab-config" class="tab-content">
            <div class="card">
                <h2>1. צוות המגמה</h2>
                <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:25px;">
                    <div>
                        <label>הוספת מורה למאגר:</label>
                        <div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="newTeacherInput" style="flex:1"><button onclick="addNewTeacher()" class="btn-primary">+</button></div>
                    </div>
                    <div>
                        <div id="teacherPool" style="max-height:200px; overflow-y:auto; border:1px solid #eee; padding:10px; border-radius:12px; background: #f8fafc;"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>2. מבנה שורות (סגול/ירוק)</h2>
                <div id="rowsContainer"></div>
                <button onclick="addNewRow()" class="tab-btn" style="background: #94a3b8; color: white; width: 100%;">+ הוסף שורה חדשה</button>
            </div>
            <div class="card" id="sharingCard" style="display:none;">
                <h2>3. קישור אישי לרכז המגמה</h2>
                <div style="background: #fffbeb; padding:15px; border-radius:15px; border:1px solid #f59e0b;">
                    <input type="text" id="shareUrl" readonly style="width:75%; background:#fff;">
                    <button onclick="copyCoordLink()" class="btn-primary" style="background:#f59e0b;">העתק קישור</button>
                </div>
            </div>
            <button class="btn-save" onclick="saveConfig()">💾 שמור הכל</button>
        </div>

        <!-- טאב מעקב -->
        <div id="tab-monitor" class="tab-content" style="display:none;">
            <div id="monitorContainer"></div>
            
            <div class="summary-box">
                <div>סה"כ מגע: <span id="sumC" style="color:var(--p2); font-size:26px;">0</span></div>
                <div>סה"כ גמול: <span id="sumB" style="color:var(--p2); font-size:26px;">0</span></div>
                <div>סה"כ שעות תקן: <span id="sumT" style="color:var(--p2); font-size:26px;">0</span></div>
            </div>

            <!-- טבלת ריכוז משרות עם עמודת ת"ש -->
            <div class="card">
                <h2 style="color:var(--p1)">ריכוז משרות, ת"ש ועומסים (בסיס 25 שעות)</h2>
                <div style="overflow-x: auto;">
                    <div id="jobTableContainer"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    let MY_NAME = "", MY_DEPTS = [], currentSubject = "";
    let allTeachers = [], selectedTeachers = [], allPlacements = [], deptConfig = null, extraInfo = {};

    // 1. טעינת רשימת מנהלות
    onValue(ref(db, 'school_admin/pedagogical_managers'), snap => {
        const data = snap.val(); const sel = document.getElementById('pmSelector');
        if (!data) return;
        sel.innerHTML = '<option value="">— בחרי שם —</option>';
        Object.values(data).forEach(m => sel.innerHTML += `<option value="${m.name}">${m.name}</option>`);
        window.allPMData = data;
    });

    window.enterSystem = () => {
        const s = document.getElementById('pmSelector').value; if (!s) return;
        MY_NAME = s; const myD = Object.values(window.allPMData).find(m => m.name === s); MY_DEPTS = myD.assigned_depts || [];
        document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-interface').style.display = 'block';
        document.getElementById('displayName').innerText = s;
        const subS = document.getElementById('subjectSelector'); subS.innerHTML = '<option value="">— בחר מקצוע —</option>';
        MY_DEPTS.forEach(d => subS.innerHTML += `<option value="${d}">${d}</option>`);
    };

    onValue(ref(db, 'school_settings/all_teachers'), snap => { allTeachers = snap.val() ? Object.values(snap.val()) : []; renderTeacherPool(); });
    onValue(ref(db, 'school_settings/teacher_extra_info'), snap => { extraInfo = snap.val() || {}; if(currentSubject) renderMonitor(); });
    onValue(ref(db, 'rakevet_v3'), snap => { 
        allPlacements = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})) : []; 
        if(currentSubject) renderMonitor(); 
    });

    window.loadSubjectData = () => {
        currentSubject = document.getElementById('subjectSelector').value; if(!currentSubject) return;
        document.getElementById('sharingCard').style.display = 'block';
        const folder = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
        document.getElementById('shareUrl').value = `${folder}rakazmegama.html?dept=${encodeURIComponent(currentSubject)}`;
        onValue(ref(db, `config/departments/${currentSubject}`), snap => {
            deptConfig = snap.val() || {}; selectedTeachers = deptConfig.teachers || [];
            renderTeacherPool(); renderRows(deptConfig.structure || {}); renderMonitor();
        }, { onlyOnce: true });
    };

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'block'; event.target.classList.add('active');
        if(tab === 'monitor') renderMonitor();
    };

    function renderTeacherPool() {
        document.getElementById('teacherPool').innerHTML = allTeachers.sort().map(t => `<label style="display:block; padding: 6px; border-bottom: 1px solid #eee;"><input type="checkbox" value="${t}" ${selectedTeachers.includes(t)?'checked':''} onchange="updateSelT(this)"> ${t}</label>`).join('');
    }
    window.updateSelT = (cb) => { if(cb.checked) { if(!selectedTeachers.includes(cb.value)) selectedTeachers.push(cb.value); } else selectedTeachers = selectedTeachers.filter(t => t !== cb.value); };
    window.addNewTeacher = () => { const n = document.getElementById('newTeacherInput').value.trim(); if(n) push(ref(db, 'school_settings/all_teachers'), n); document.getElementById('newTeacherInput').value = ''; };

    function renderRows(struct) {
        const cont = document.getElementById('rowsContainer'); cont.innerHTML = '';
        const keys = Object.keys(struct); if(keys.length === 0) addNewRow(); else keys.forEach(k => addRowUI(k, struct[k].label, struct[k].subjects));
    }
    window.addNewRow = () => addRowUI('row_'+Date.now(), '', []);
    function addRowUI(id, label, subjs) {
        const c = document.querySelectorAll('.setup-row').length, color = (c === 0) ? 'row-Indigo' : (c === 1) ? 'row-Green' : '';
        const div = document.createElement('div'); div.className = `setup-row ${color}`; div.id = id;
        div.innerHTML = `<input type="text" class="row-lbl" value="${label}" placeholder="כותרת שורה..." style="width:70%; margin-bottom:12px; font-weight:900;"><br>
            <div style="display:flex; gap:5px;"><input type="text" class="tag-in" placeholder="תת מקצוע..."><button onclick="addTag('${id}')" class="btn-primary">+</button></div>
            <div class="tag-container" id="tags_${id}">${subjs.map(s => `<span class="tag">${s} <button onclick="this.parentElement.remove()">x</button></span>`).join('')}</div>
            <button onclick="this.parentElement.remove()" style="margin-top:10px; color:red; background:none; border:none; cursor:pointer;">✖ מחק</button>`;
        document.getElementById('rowsContainer').appendChild(div);
    }
    window.addTag = (id) => { const inp = document.querySelector(`#${id} .tag-in`); if(!inp.value) return; document.getElementById(`tags_${id}`).innerHTML += `<span class="tag">${inp.value} <button onclick="this.parentElement.remove()">x</button></span>`; inp.value = ''; };
    window.copyCoordLink = () => { document.getElementById("shareUrl").select(); document.execCommand("copy"); alert("הועתק!"); };

    window.saveConfig = () => {
        const data = { teachers: selectedTeachers, structure: {} };
        document.querySelectorAll('.setup-row').forEach((r, i) => {
            const label = r.querySelector('.row-lbl').value;
            const subjects = Array.from(r.querySelectorAll('.tag')).map(t => t.innerText.replace(' x', '').trim());
            if(label) data.structure['row'+(i+1)] = { label, subjects };
        });
        set(ref(db, `config/departments/${currentSubject}`), data).then(() => alert("נשמר!"));
    };

    function renderMonitor() {
        const container = document.getElementById('monitorContainer');
        container.innerHTML = ''; if(!deptConfig || !deptConfig.structure) return;
        const filtered = allPlacements.filter(p => p.dept === currentSubject);
        const grades = [{ id: 'י', label: "שכבת י'", class: 'grade-y' }, { id: 'יא', label: "שכבת י\"א", class: 'grade-ya' }, { id: 'יב', label: "שכבת י\"ב", class: 'grade-yb' }];
        let grandC = 0, grandB = 0; const teacherLoads = {};

        grades.forEach(g => {
            const gradeData = filtered.filter(p => p.grade === g.id);
            if(gradeData.length === 0) return;
            const gradeBox = document.createElement('div'); gradeBox.className = `grade-monitor-box ${g.class}`;
            let html = `<div style="font-size:18px; font-weight:900; margin-bottom:10px;">${g.label}</div>`;
            Object.keys(deptConfig.structure).forEach(rowKey => {
                const rowInfo = deptConfig.structure[rowKey]; const rowData = gradeData.filter(p => rowInfo.subjects.includes(p.subject));
                if(rowData.length > 0) {
                    html += `<div style="font-weight:800; margin:5px 0;">📌 ${rowInfo.label}</div><table class="monitor-table"><thead><tr><th>מורה</th><th>מקצוע</th><th>מגע</th><th>גמול</th></tr></thead><tbody>`;
                    rowData.forEach(p => {
                        grandC += p.contact; grandB += p.bonus;
                        if(!teacherLoads[p.teacher]) teacherLoads[p.teacher] = 0; teacherLoads[p.teacher] += (p.contact + p.bonus);
                        html += `<tr><td><b>${p.teacher}</b></td><td>${p.subject}</td><td>${p.contact}</td><td>${p.bonus}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }
            });
            gradeBox.innerHTML = html; container.appendChild(gradeBox);
        });
        document.getElementById('sumC').innerText = grandC.toFixed(1);
        document.getElementById('sumB').innerText = grandB.toFixed(1);
        document.getElementById('sumT').innerText = (grandC + grandB).toFixed(1);
        renderJobPercentageTable(teacherLoads);
    }

    function renderJobPercentageTable(deptLoads) {
        const container = document.getElementById('jobTableContainer');
        let html = `<table class="job-table">
            <thead><tr>
                <th>שם המורה</th>
                <th>שעות מגמה</th>
                <th>תפקיד נוסף</th>
                <th>שעות תפקיד</th>
                <th>מקצוע נוסף</th>
                <th>שעות ת"ש</th>
                <th>סה"כ שעות</th>
                <th>% משרה</th>
            </tr></thead><tbody>`;
        
        Object.keys(deptLoads).sort().forEach(t => {
            const deptHrs = deptLoads[t] || 0;
            const tInfo = extraInfo[t] || { role: "", hours: 0, extraSubject: "", welfareHours: 0 };
            
            // חישוב סה"כ כולל שעות ת"ש
            const totalHrs = deptHrs + parseFloat(tInfo.hours || 0) + parseFloat(tInfo.welfareHours || 0);
            const percent = Math.min((totalHrs / 25) * 100, 120).toFixed(0);
            const barColor = percent > 100 ? '#ef4444' : percent > 85 ? '#f59e0b' : '#10b981';

            html += `<tr>
                <td><b>${t}</b></td>
                <td style="text-align:center;">${deptHrs.toFixed(1)}</td>
                <td><input type="text" class="input-inline" value="${tInfo.role || ''}" onchange="saveExtra('${t}', 'role', this.value)" placeholder="למשל: רכזת"></td>
                <td><input type="number" step="0.5" class="input-inline num-in" value="${tInfo.hours || 0}" onchange="saveExtra('${t}', 'hours', this.value)"></td>
                <td><input type="text" class="input-inline" value="${tInfo.extraSubject || ''}" onchange="saveExtra('${t}', 'extraSubject', this.value)" placeholder="למשל: תנך"></td>
                <td style="background:#fff7ed;"><input type="number" step="0.5" class="input-inline num-in" value="${tInfo.welfareHours || 0}" onchange="saveExtra('${t}', 'welfareHours', this.value)" style="color:#c2410c;"></td>
                <td style="font-weight:900; text-align:center; background:#f8fafc;">${totalHrs.toFixed(1)}</td>
                <td style="width:140px;">
                    <div style="font-size:11px; font-weight:bold;">${percent}%</div>
                    <div class="percentage-bar-bg"><div class="percentage-bar-fill" style="width:${percent}%; background:${barColor}"></div></div>
                </td>
            </tr>`;
        });
        container.innerHTML = html + `</tbody></table>`;
    }

    window.saveExtra = (teacher, field, value) => {
        const data = {};
        data[field] = (field === 'hours' || field === 'welfareHours') ? parseFloat(value) || 0 : value;
        update(ref(db, `school_settings/teacher_extra_info/${teacher}`), data);
    };
</script>
</body>
</html>
