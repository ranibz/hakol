<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז שליטה מנהלת - סופי ומדויק</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --admin: #1e293b; --primary: #6366f1; --bg: #f1f5f9; --white: #ffffff; --success: #10b981; --danger: #ef4444; 
                --grade-y: #f5f3ff; --grade-ya: #f0fdf4; --grade-yb: #fff7ed; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: var(--admin); color: white; padding: 25px 40px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .year-selector-main select { background: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid var(--primary); }
        .stat-card .val { font-size: 36px; font-weight: 900; color: var(--admin); }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }
        .card { background: var(--white); padding: 25px; border-radius: 30px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .summary-table { width: 100%; border-collapse: collapse; text-align: right; }
        .summary-table td { padding: 18px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .summary-table tr:hover td { background: #eef2ff; color: var(--primary); font-weight: 700; }
        /* Modal */
        #drillModal { display: none; position: fixed; inset: 0; background: rgba(30, 41, 59, 0.85); z-index: 1000; padding: 20px; overflow-y: auto; backdrop-filter: blur(8px); }
        .modal-content { background: #f8fafc; max-width: 1200px; margin: 20px auto; border-radius: 40px; padding: 40px; position: relative; }
        .close-modal { position: absolute; left: 30px; top: 30px; font-size: 24px; cursor: pointer; background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .grade-monitor-box { border-radius: 25px; padding: 25px; margin-bottom: 20px; background: white; border-right: 12px solid #ddd; }
        .grade-y { border-right-color: #6366f1; background-color: #f5f3ff; }
        .grade-ya { border-right-color: #10b981; background-color: #f0fdf4; }
        .grade-yb { border-right-color: #f97316; background-color: #fff7ed; }
        .monitor-table, .job-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; margin-top: 10px; font-size: 14px; }
        .monitor-table th, .job-table th { background: #1e293b; color: white; padding: 12px; text-align: right; }
        .monitor-table td, .job-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .percentage-bar-bg { background: #e2e8f0; border-radius: 10px; height: 10px; width: 100%; overflow: hidden; }
        .percentage-bar-fill { height: 100%; transition: 0.8s; }
        .m-tab { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: 800; background: #e2e8f0; margin-left: 10px; }
        .m-tab.active { background: var(--primary); color: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>מרכז שליטה מנהלת ביה"ס</h1>
        <div class="year-selector-main"><label>שנה:</label><select id="globalYear" onchange="processData()"><option value="תשפז" selected>תשפ"ז</option><option value="תשפו">תשפ"ו</option></select></div>
    </div>
    <div class="grid-stats">
        <div class="stat-card"><h3>סה"כ שעות</h3><div class="val" id="totalSchoolHours">0</div></div>
        <div class="stat-card"><h3>מורים פעילים</h3><div class="val" id="totalTeachersCount">0</div></div>
        <div class="stat-card"><h3>מנהלות פדגוגיות</h3><div class="val" id="totalPMCount">0</div></div>
    </div>
    <div class="main-grid">
        <div class="side-col">
            <div class="card">
                <h2>ניהול</h2>
                <div style="background:#f8fafc; padding:15px; border-radius:15px; border:1px solid #ddd;">
                    <input type="text" id="newTeacherName" placeholder="מורה חדש...">
                    <button onclick="addNewTeacher()" style="background:var(--success); color:white; border:none; width:100%; padding:10px; border-radius:10px; cursor:pointer; margin-bottom:15px;">הוסף +</button>
                    <select id="teacherSelect"></select>
                    <input type="text" id="deptInput" placeholder="מגמות (פסיק)...">
                    <button onclick="addPM()" style="background:var(--primary); color:white; border:none; width:100%; padding:10px; border-radius:10px; cursor:pointer;">שמור מינוי</button>
                </div>
                <div id="pmList" style="margin-top:20px;"></div>
            </div>
        </div>
        <div class="card">
            <h2>ריכוז תקציבי (לחצי על שם לצלילה)</h2>
            <table class="summary-table" id="pmSummaryTable">
                <thead><tr><th style="text-align:right; padding:15px;">מנהלת פדגוגית</th><th style="text-align:right; padding:15px;">מגמות</th><th style="text-align:right; padding:15px;">סה"כ שעות</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="drillModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">✕</span>
        <h1 id="modalTitle" style="font-family:'Secular One'; font-size:36px; margin-bottom:5px;"></h1>
        <div id="modalSubTitle" style="color:var(--primary); font-weight:700; margin-bottom:30px;"></div>
        <div id="deptPickerArea"><div id="deptButtons" style="display:flex; gap:10px; flex-wrap:wrap;"></div></div>
        <div id="monitorDetailArea" style="display:none;">
            <div style="margin-bottom:20px;">
                <button class="m-tab active" id="tabComp" onclick="switchView('compare')">📊 השוואה רב-שנתית</button>
                <button class="m-tab" id="tab2027" onclick="switchView('y2027')">📅 תשפ"ז</button>
                <button class="m-tab" id="tab2026" onclick="switchView('y2026')">📅 תשפ"ו</button>
            </div>
            <div id="view-compare"><table class="job-table" id="comparisonTable"><thead><tr><th>מורה</th><th>תשפ"ו</th><th>תשפ"ז</th><th>שינוי</th></tr></thead><tbody></tbody></table></div>
            <div id="view-y2027" style="display:none;"><div id="monitor-2027"></div><div id="jobs-2027" style="margin-top:20px;"></div></div>
            <div id="view-y2026" style="display:none;"><div id="monitor-2026"></div><div id="jobs-2026" style="margin-top:20px;"></div></div>
            <button onclick="backToDepts()" style="margin-top:30px; padding:10px 20px; cursor:pointer; border:none; border-radius:10px; font-weight:800;">← חזרה</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);
    let allPlacements = [], pms = {}, allTeachers = [], deptToPM = {}, extraInfo = {}, deptConfigs = {};

    onValue(ref(db, 'school_settings/all_teachers'), snap => {
        allTeachers = snap.val() ? Object.values(snap.val()) : [];
        document.getElementById('teacherSelect').innerHTML = '<option value="">— בחר —</option>' + allTeachers.sort().map(t => `<option value="${t}">${t}</option>`).join('');
    });
    onValue(ref(db, 'school_admin/pedagogical_managers'), snap => {
        pms = snap.val() || {}; deptToPM = {};
        Object.values(pms).forEach(p => p.assigned_depts.forEach(d => deptToPM[d.trim()] = p.name));
        renderPMList(); processData();
    });
    onValue(ref(db, 'rakevet_v3'), snap => { allPlacements = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})) : []; processData(); });
    onValue(ref(db, 'school_settings/teacher_extra_info'), snap => extraInfo = snap.val() || {});
    onValue(ref(db, 'config/departments'), snap => deptConfigs = snap.val() || {});

    window.addNewTeacher = () => { const n = document.getElementById('newTeacherName').value.trim(); if(n) push(ref(db, 'school_settings/all_teachers'), n).then(() => document.getElementById('newTeacherName').value = ''); };
    window.addPM = () => { const n = document.getElementById('teacherSelect').value, d = document.getElementById('deptInput').value; if(n && d) push(ref(db, 'school_admin/pedagogical_managers'), { name: n, assigned_depts: d.split(',').map(s => s.trim()) }); document.getElementById('deptInput').value = ''; };
    window.deletePM = (id) => remove(ref(db, `school_admin/pedagogical_managers/${id}`));
    function renderPMList() { document.getElementById('pmList').innerHTML = Object.keys(pms).map(id => `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${pms[id].name}</b><br><small>${pms[id].assigned_depts.join(', ')}</small></div>`).join(''); }

    window.processData = () => {
        const year = document.getElementById('globalYear').value;
        const stats = {}; Object.values(pms).forEach(p => stats[p.name] = { depts: p.assigned_depts, hours: 0 });
        stats["לא שויך"] = { depts: ["אחר"], hours: 0 };
        allPlacements.filter(p => p.year === year).forEach(p => { const total = (parseFloat(p.contact)||0) + (parseFloat(p.bonus)||0); const owner = deptToPM[p.dept?.trim()] || "לא שויך"; if (stats[owner]) stats[owner].hours += total; });
        document.querySelector('#pmSummaryTable tbody').innerHTML = Object.keys(stats).filter(n => n !== "לא שויך" || stats[n].hours > 0).map(name => `<tr onclick="drillDownPM('${name}')"><td><b>${name}</b></td><td>${stats[name].depts.join(', ')}</td><td style="font-weight:900;color:var(--primary);">${stats[name].hours.toFixed(1)} ש"ש</td></tr>`).join('');
        document.getElementById('totalSchoolHours').innerText = Object.values(stats).reduce((a,b)=>a+b.hours, 0).toFixed(1);
        document.getElementById('totalTeachersCount').innerText = new Set(allPlacements.filter(p=>p.year===year).map(p=>p.teacher)).size;
        document.getElementById('totalPMCount').innerText = Object.keys(pms).length;
    };

    window.drillDownPM = (name) => {
        document.getElementById('drillModal').style.display = 'block';
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('deptButtons').innerHTML = (name === "לא שויך" ? [...new Set(allPlacements.filter(p => !deptToPM[p.dept?.trim()]).map(p => p.dept))] : (Object.values(pms).find(p => p.name === name)?.assigned_depts || [])).map(d => `<button onclick="showSubjectDetails('${d}')" style="padding:15px 25px; border-radius:15px; border:2px solid var(--primary); background:white; color:var(--primary); font-weight:900; cursor:pointer;">${d}</button>`).join('');
        document.getElementById('deptPickerArea').style.display = 'block'; document.getElementById('monitorDetailArea').style.display = 'none';
    };

    window.showSubjectDetails = (deptName) => {
        document.getElementById('deptPickerArea').style.display = 'none'; document.getElementById('monitorDetailArea').style.display = 'block';
        renderComparison(deptName);
        renderPrettyMonitor(deptName, 'תשפו', 'monitor-2026', 'jobs-2026');
        renderPrettyMonitor(deptName, 'תש制造', 'monitor-2027', 'jobs-2027'); // תיקון הקלדה
        renderPrettyMonitor(deptName, 'תשפז', 'monitor-2027', 'jobs-2027');
    };

    function renderComparison(deptName) {
        const teachers = [...new Set(allPlacements.filter(p => p.dept === deptName).map(p => p.teacher))];
        document.querySelector('#comparisonTable tbody').innerHTML = teachers.sort().map(t => {
            const h26 = allPlacements.filter(p => p.dept === deptName && p.teacher === t && p.year === 'תשפו').reduce((s, p) => s + (parseFloat(p.contact)||0) + (parseFloat(p.bonus)||0), 0);
            const h27 = allPlacements.filter(p => p.dept === deptName && p.teacher === t && p.year === 'תשפז').reduce((s, p) => s + (parseFloat(p.contact)||0) + (parseFloat(p.bonus)||0), 0);
            const d = h27 - h26; return `<tr><td><b>${t}</b></td><td>${h26.toFixed(1)}</td><td>${h27.toFixed(1)}</td><td style="color:${d>0?'green':'red'}; font-weight:800;">${d>0?'+':''}${d.toFixed(1)}</td></tr>`;
        }).join('');
    }

    function renderPrettyMonitor(deptName, year, monitorId, jobsId) {
        const filtered = allPlacements.filter(p => p.dept === deptName && p.year === year);
        const config = deptConfigs[deptName] || {};
        const mCont = document.getElementById(monitorId); mCont.innerHTML = '';
        const teacherLoads = {};

        ['י','יא','יב'].forEach(g => {
            const gradeData = filtered.filter(p => p.grade === g); if(!gradeData.length) return;
            let html = `<div class="grade-monitor-box grade-${g === 'י' ? 'y' : g === 'יא' ? 'ya' : 'yb'}"><h3>שכבת ${g} - ${year}</h3>`;
            Object.values(config.structure || {}).forEach(row => {
                const rowData = gradeData.filter(p => row.subjects.includes(p.subject));
                if(rowData.length) {
                    html += `<b>📌 ${row.label}</b><table class="monitor-table"><thead><tr><th>מורה</th><th>מקצוע</th><th>מגע</th><th>גמול</th></tr></thead><tbody>`;
                    rowData.forEach(p => { 
                        const total = (parseFloat(p.contact)||0) + (parseFloat(p.bonus)||0);
                        teacherLoads[p.teacher] = (teacherLoads[p.teacher] || 0) + total;
                        html += `<tr><td>${p.teacher}</td><td>${p.subject}</td><td>${p.contact}</td><td>${p.bonus}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }
            });
            mCont.innerHTML += html + `</div>`;
        });

        let jobHtml = `<h2 style="color:var(--admin)">ריכוז משרות (בסיס 25) - ${year}</h2><table class="job-table"><thead><tr><th>מורה</th><th>מגמה</th><th>תפקיד</th><th>שעות תפקיד</th><th>ת"ש</th><th>סה"כ</th><th>%</th></tr></thead><tbody>`;
        Object.keys(teacherLoads).sort().forEach(t => {
            const info = (extraInfo[year] && extraInfo[year][t]) ? extraInfo[year][t] : { role: "", hours: 0, welfareHours: 0 };
            const total = teacherLoads[t] + (parseFloat(info.hours)||0) + (parseFloat(info.welfareHours)||0);
            const p = (total/25*100).toFixed(0);
            jobHtml += `<tr><td><b>${t}</b></td><td>${teacherLoads[t].toFixed(1)}</td><td>${info.role||'-'}</td><td>${info.hours||0}</td><td>${info.welfareHours||0}</td><td style="font-weight:900;">${total.toFixed(1)}</td><td><div class="percentage-bar-bg"><div class="percentage-bar-fill" style="width:${Math.min(p,100)}%;background:${p>100?'red':p>85?'orange':'green'}"></div></div> ${p}%</td></tr>`;
        });
        document.getElementById(jobsId).innerHTML = jobHtml + `</tbody></table>`;
    }

    window.switchView = (v) => {
        document.getElementById('view-compare').style.display = v === 'compare' ? 'block' : 'none';
        document.getElementById('view-y2027').style.display = v === 'y2027' ? 'block' : 'none';
        document.getElementById('view-y2026').style.display = v === 'y2026' ? 'block' : 'none';
        document.querySelectorAll('.m-tab').forEach(b => b.classList.remove('active'));
        if(v === 'compare') document.getElementById('tabComp').classList.add('active');
        if(v === 'y2027') document.getElementById('tab2027').classList.add('active');
        if(v === 'y2026') document.getElementById('tab2026').classList.add('active');
    };
    window.closeModal = () => document.getElementById('drillModal').style.display = 'none';
    window.backToDepts = () => { document.getElementById('deptPickerArea').style.display = 'block'; document.getElementById('monitorDetailArea').style.display = 'none'; };
</script>
</body>
</html>
