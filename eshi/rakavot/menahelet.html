<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז שליטה מנהלת ביה"ס</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --admin: #1e293b; --primary: #6366f1; --bg: #f1f5f9; --white: #ffffff; --success: #10b981; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: var(--admin); color: white; padding: 25px 40px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid var(--primary); }
        .stat-card .val { font-size: 36px; font-weight: 900; color: var(--admin); }
        .main-grid { display: grid; grid-template-columns: 400px 1fr; gap: 30px; align-items: start; }
        .card { background: var(--white); padding: 25px; border-radius: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        h2 { margin-top: 0; font-size: 22px; border-bottom: 3px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 20px; }
        .setup-section { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 12px; box-sizing: border-box; font-family: inherit; }
        .btn-add { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .pm-item { background: #ffffff; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-right: 6px solid var(--primary); position: relative; }
        .del-pm { position: absolute; left: 10px; top: 10px; background: none; border: none; color: #f43f5e; cursor: pointer; font-weight: bold; }
        .summary-table { width: 100%; border-collapse: collapse; text-align: right; margin-top: 10px; }
        .summary-table th { background: #f8fafc; padding: 18px; border-bottom: 2px solid #e2e8f0; color: #475569; font-weight: 800; }
        .summary-table td { padding: 18px; border-bottom: 1px solid #f1f5f9; font-size: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>מרכז שליטה מנהלת ביה"ס</h1>
        <div style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 10px;">ריכוז שעות תקן - תשפ"ז</div>
    </div>

    <div class="grid-stats">
        <div class="stat-card"><h3>סה"כ שעות בביה"ס</h3><div class="val" id="totalSchoolHours">0</div></div>
        <div class="stat-card"><h3>מורים משובצים</h3><div class="val" id="totalTeachersCount">0</div></div>
        <div class="stat-card"><h3>מגמות פעילות</h3><div class="val" id="totalDeptsCount">0</div></div>
        <div class="stat-card"><h3>מנהלות פדגוגיות</h3><div class="val" id="totalPMCount">0</div></div>
    </div>

    <div class="main-grid">
        <div class="side-col">
            <div class="card">
                <h2>1. ניהול מאגר המורים</h2>
                <div class="setup-section" style="background: #ecfdf5; border-color: #10b981;">
                    <input type="text" id="newTeacherName" placeholder="הכנס שם מורה...">
                    <button class="btn-success" onclick="addNewTeacher()">הוסף מורה למאגר +</button>
                </div>
            </div>
            <div class="card">
                <h2>2. מינוי מנהלות פדגוגיות</h2>
                <div class="setup-section">
                    <select id="teacherSelect"></select>
                    <input type="text" id="deptInput" placeholder="שיוך מגמות (למשל: תקשורת, קולנוע)...">
                    <button class="btn-add" onclick="addPM()">שמור מינוי ושיוך מגמות</button>
                </div>
                <div id="pmList"></div>
            </div>
        </div>

        <div class="card">
            <h2>3. ריכוז תקציב שעות לפי מנהלת פדגוגית</h2>
            <table class="summary-table" id="pmSummaryTable">
                <thead>
                    <tr>
                        <th>מנהלת פדגוגית</th>
                        <th>מגמות באחריותה</th>
                        <th>סה"כ שעות מנוצלות</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div style="margin-top: 30px;"><canvas id="chartPMHours" height="100"></canvas></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    let allPlacements = [], pms = {}, allTeachers = [], deptToPM = {}, charts = {};

    window.addNewTeacher = () => {
        const name = document.getElementById('newTeacherName').value.trim();
        if(name) push(ref(db, 'school_settings/all_teachers'), name).then(() => document.getElementById('newTeacherName').value = '');
    };

    onValue(ref(db, 'school_settings/all_teachers'), snap => {
        allTeachers = snap.val() ? Object.values(snap.val()) : [];
        document.getElementById('teacherSelect').innerHTML = '<option value="">— בחר מורה למנהל/ת —</option>' + allTeachers.sort().map(t => `<option value="${t}">${t}</option>`).join('');
    });

    onValue(ref(db, 'school_admin/pedagogical_managers'), snap => {
        pms = snap.val() || {}; 
        deptToPM = {};
        Object.values(pms).forEach(p => { 
            if(p.assigned_depts) {
                p.assigned_depts.forEach(d => {
                    if(d) deptToPM[d.trim()] = p.name;
                });
            }
        });
        renderPMList(); 
        processData();
    });

    onValue(ref(db, 'rakevet_v3'), snap => {
        allPlacements = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})) : [];
        processData();
    });

    window.addPM = () => {
        const name = document.getElementById('teacherSelect').value, deptsStr = document.getElementById('deptInput').value;
        if(name && deptsStr) push(ref(db, 'school_admin/pedagogical_managers'), { name, assigned_depts: deptsStr.split(',').map(d => d.trim()).filter(d => d) });
        document.getElementById('deptInput').value = '';
    };

    window.deletePM = (id) => confirm("מחק מינוי?") && remove(ref(db, `school_admin/pedagogical_managers/${id}`));

    function renderPMList() {
        document.getElementById('pmList').innerHTML = Object.keys(pms).map(id => `<div class="pm-item"><button class="del-pm" onclick="deletePM('${id}')">✖</button><div class="pm-name">${pms[id].name}</div><div class="pm-depts">${pms[id].assigned_depts.join(', ')}</div></div>`).join('');
    }

    window.processData = () => {
        const pmStats = {};
        let grandTotal = 0;
        let teachersSet = new Set();
        let deptsSet = new Set();

        // אתחול המנהלות
        Object.values(pms).forEach(p => {
            pmStats[p.name] = { depts: p.assigned_depts.join(', '), hours: 0 };
        });
        pmStats["לא שויך"] = { depts: "מגמות ללא מפקחת", hours: 0 };

        // עיבוד כל השיבוצים
        allPlacements.forEach(p => {
            const deptName = (p.dept || p.department || "לא ידוע").trim();
            const contact = parseFloat(p.contact) || 0;
            const bonus = parseFloat(p.bonus) || 0;
            const total = contact + bonus;

            const pmOwner = deptToPM[deptName] || "לא שויך";
            if (!pmStats[pmOwner]) pmStats[pmOwner] = { depts: "אחר", hours: 0 };
            
            pmStats[pmOwner].hours += total;
            grandTotal += total;
            if(p.teacher) teachersSet.add(p.teacher);
            deptsSet.add(deptName);
        });

        document.getElementById('totalSchoolHours').innerText = grandTotal.toFixed(1);
        document.getElementById('totalTeachersCount').innerText = teachersSet.size;
        document.getElementById('totalDeptsCount').innerText = deptsSet.size;
        document.getElementById('totalPMCount').innerText = Object.keys(pms).length;

        const tbody = document.querySelector('#pmSummaryTable tbody');
        let html = "";
        Object.keys(pmStats).sort().forEach(name => {
            if (pmStats[name].hours === 0 && name === "לא שויך") return;
            html += `<tr>
                <td style="font-weight:700; color:${name === "לא שויך" ? '#f43f5e' : 'inherit'}">${name}</td>
                <td style="color:#64748b; font-size:13px;">${pmStats[name].depts}</td>
                <td style="font-weight:900; color:var(--primary); font-size:18px;">${pmStats[name].hours.toFixed(1)} <small>ש"ש</small></td>
            </tr>`;
        });
        tbody.innerHTML = html || '<tr><td colspan="3" style="text-align:center;">אין נתוני שיבוץ להצגה</td></tr>';

        updateChart(pmStats);
    };

    function updateChart(pmStats) {
        const labels = Object.keys(pmStats).filter(n => pmStats[n].hours > 0);
        const data = labels.map(l => pmStats[l].hours);
        if(charts['pmChart']) charts['pmChart'].destroy();
        const ctx = document.getElementById('chartPMHours').getContext('2d');
        charts['pmChart'] = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: 'שעות תקן', data: data, backgroundColor: '#6366f1' }] },
            options: { indexAxis: 'y', plugins: { legend: { display: false } } }
        });
    }
</script>
</body>
</html>
