<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז שליטה מנהלת ביה"ס</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --admin: #1e293b; --primary: #6366f1; --bg: #f1f5f9; --white: #ffffff; --success: #10b981; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { background: var(--admin); color: white; padding: 25px 40px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid var(--primary); }
        .stat-card h3 { margin: 0; font-size: 14px; color: #64748b; margin-bottom: 10px; }
        .stat-card .val { font-size: 36px; font-weight: 900; color: var(--admin); }

        .main-grid { display: grid; grid-template-columns: 400px 1fr; gap: 30px; align-items: start; }
        
        .card { background: var(--white); padding: 25px; border-radius: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        h2 { margin-top: 0; font-size: 22px; color: var(--admin); border-bottom: 3px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 20px; }

        .setup-section { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .setup-section label { display: block; font-weight: 700; margin-bottom: 8px; color: #475569; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 12px; box-sizing: border-box; font-family: inherit; }
        
        .btn-add { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-success { background: var(--success); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        .pm-item { background: #ffffff; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-right: 6px solid var(--primary); position: relative; }
        .pm-name { font-weight: 900; color: var(--admin); font-size: 17px; }
        .pm-depts { font-size: 13px; color: #6366f1; margin-top: 4px; font-weight: 500; }
        .del-pm { position: absolute; left: 10px; top: 10px; background: none; border: none; color: #f43f5e; cursor: pointer; font-weight: bold; }

        .table-container { overflow-x: auto; margin-top: 20px; background: white; border-radius: 20px; }
        .master-table { width: 100%; border-collapse: collapse; text-align: right; }
        .master-table th { background: #f8fafc; padding: 15px; color: #64748b; font-weight: 700; border-bottom: 2px solid #e2e8f0; }
        .master-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; }

        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .filter-bar select, .filter-bar input { flex: 1; margin-bottom: 0; }

        .chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>מרכז שליטה מנהלת ביה"ס</h1>
        <div style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 10px;">ניהול מערכת היררכית - תשפ"ז</div>
    </div>

    <div class="grid-stats">
        <div class="stat-card"><h3>סה"כ שעות בביה"ס</h3><div class="val" id="totalSchoolHours">0</div></div>
        <div class="stat-card"><h3>מורים משובצים</h3><div class="val" id="totalTeachersCount">0</div></div>
        <div class="stat-card"><h3>מגמות פעילות</h3><div class="val" id="totalDeptsCount">0</div></div>
        <div class="stat-card"><h3>מנהלות פדגוגיות</h3><div class="val" id="totalPMCount">0</div></div>
    </div>

    <div class="main-grid">
        <div class="side-col">
            <div class="card">
                <h2>1. ניהול מאגר המורים</h2>
                <div class="setup-section" style="background: #ecfdf5; border-color: #10b981;">
                    <label>הוספת מורה חדש למאגר הבית-ספרי:</label>
                    <input type="text" id="newTeacherName" placeholder="הכנס שם מלא של המורה...">
                    <button class="btn-success" onclick="addNewTeacher()">הוסף מורה למאגר +</button>
                </div>
            </div>

            <div class="card">
                <h2>2. ניהול היררכיה וסמכויות</h2>
                <div class="setup-section">
                    <label>בחר מורה למינוי כמנהל/ת פדגוגית:</label>
                    <select id="teacherSelect"></select>
                    
                    <label>שיוך מגמות (למשל: תקשורת, קולנוע):</label>
                    <input type="text" id="deptInput" placeholder="הפרד מגמות בפסיק...">
                    
                    <button class="btn-add" onclick="addPM()">שמור מינוי מנהלת פדגוגית</button>
                </div>
                
                <h3 style="font-size:15px; color:#64748b; margin-bottom:15px;">מנהלות פדגוגיות מוגדרות:</h3>
                <div id="pmList"></div>
            </div>
        </div>

        <div class="card">
            <h2>3. דוחות ופילוחים בזמן אמת</h2>
            
            <div class="filter-bar">
                <select id="filterPM" onchange="processData()"><option value="">כל המנהלות הפדגוגיות</option></select>
                <input type="text" id="filterSearch" placeholder="חפש לפי שם מורה או מגמה..." oninput="processData()">
            </div>
            
            <div class="chart-container">
                <div style="background:#f8fafc; padding:15px; border-radius:20px; border:1px solid #e2e8f0;"><canvas id="chartDeptHours"></canvas></div>
                <div style="background:#f8fafc; padding:15px; border-radius:20px; border:1px solid #e2e8f0;"><canvas id="chartPMHours"></canvas></div>
            </div>

            <div class="table-container">
                <table class="master-table" id="masterTable">
                    <thead>
                        <tr>
                            <th>מנהלת פדגוגית</th>
                            <th>מגמה</th>
                            <th>שם המורה</th>
                            <th>מקצוע</th>
                            <th>סה"כ שעות</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    let allPlacements = [], pms = {}, allTeachers = [], deptToPM = {}, charts = {};

    // 1. הוספת מורה חדש למאגר הכללי
    window.addNewTeacher = () => {
        const name = document.getElementById('newTeacherName').value.trim();
        if(!name) return;
        const newRef = push(ref(db, 'school_settings/all_teachers'));
        set(newRef, name).then(() => {
            document.getElementById('newTeacherName').value = '';
        });
    };

    // 2. טעינת רשימת המורים למאגר
    onValue(ref(db, 'school_settings/all_teachers'), snap => {
        allTeachers = snap.val() ? Object.values(snap.val()) : [];
        const sel = document.getElementById('teacherSelect');
        const currentVal = sel.value;
        sel.innerHTML = '<option value="">— בחר מורה למינוי —</option>' + 
            allTeachers.sort().map(t => `<option value="${t}">${t}</option>`).join('');
        sel.value = currentVal;
    });

    // 3. ניהול מנהלות פדגוגיות (היררכיה)
    onValue(ref(db, 'school_admin/pedagogical_managers'), snap => {
        pms = snap.val() || {};
        deptToPM = {};
        Object.values(pms).forEach(p => { if(p.assigned_depts) p.assigned_depts.forEach(d => deptToPM[d.trim()] = p.name); });
        renderPMList();
        updatePMFilter();
        processData();
    });

    window.addPM = () => {
        const name = document.getElementById('teacherSelect').value;
        const deptsStr = document.getElementById('deptInput').value;
        if(!name || !deptsStr) return alert("בחר מורה והזן מגמות");
        const depts = deptsStr.split(',').map(d => d.trim()).filter(d => d);
        push(ref(db, 'school_admin/pedagogical_managers'), { name, assigned_depts: depts });
        document.getElementById('deptInput').value = '';
    };

    window.deletePM = (id) => confirm("לבטל מינוי מנהלת פדגוגית?") && remove(ref(db, `school_admin/pedagogical_managers/${id}`));

    function renderPMList() {
        const cont = document.getElementById('pmList');
        cont.innerHTML = Object.keys(pms).map(id => `
            <div class="pm-item">
                <button class="del-pm" onclick="deletePM('${id}')">✖</button>
                <div class="pm-name">${pms[id].name}</div>
                <div class="pm-depts">מגמות: ${pms[id].assigned_depts.join(', ')}</div>
            </div>
        `).join('');
    }

    function updatePMFilter() {
        const sel = document.getElementById('filterPM');
        const current = sel.value;
        sel.innerHTML = '<option value="">כל המנהלות הפדגוגיות</option>';
        Object.values(pms).forEach(p => sel.innerHTML += `<option value="${p.name}">${p.name}</option>`);
        sel.value = current;
    }

    // 4. עיבוד נתוני שיבוץ וסטטיסטיקה
    onValue(ref(db, 'rakevet_v3'), snap => {
        allPlacements = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})) : [];
        processData();
    });

    window.processData = () => {
        const pmF = document.getElementById('filterPM').value;
        const sF = document.getElementById('filterSearch').value.toLowerCase();
        
        const filtered = allPlacements.filter(p => {
            const pmName = deptToPM[p.dept] || "לא שויך";
            return (!pmF || pmName === pmF) && (p.teacher.toLowerCase().includes(sF) || p.dept.toLowerCase().includes(sF));
        });

        document.getElementById('totalSchoolHours').innerText = filtered.reduce((s, p) => s + p.contact + p.bonus, 0).toFixed(1);
        document.getElementById('totalTeachersCount').innerText = new Set(filtered.map(p => p.teacher)).size;
        document.getElementById('totalDeptsCount').innerText = new Set(allPlacements.map(p => p.dept)).size;
        document.getElementById('totalPMCount').innerText = Object.keys(pms).length;

        renderMasterTable(filtered);
        renderCharts(filtered);
    };

    function renderMasterTable(data) {
        document.querySelector('#masterTable tbody').innerHTML = data.map(p => `
            <tr>
                <td><span style="color:${deptToPM[p.dept] ? '#6366f1':'#f43f5e'}; font-weight:700;">${deptToPM[p.dept] || 'לא שויך'}</span></td>
                <td><b>${p.dept}</b></td>
                <td>${p.teacher}</td>
                <td>${p.subject}</td>
                <td style="font-weight:900;">${(p.contact + p.bonus).toFixed(1)}</td>
            </tr>
        `).join('');
    }

    function renderCharts(data) {
        const dH = {}, pH = {};
        data.forEach(p => {
            const sum = p.contact + p.bonus;
            dH[p.dept] = (dH[p.dept] || 0) + sum;
            const pm = deptToPM[p.dept] || "לא שויך";
            pH[pm] = (pH[pm] || 0) + sum;
        });
        updateChart('chartDeptHours', 'שעות לפי מגמה', dH, '#6366f1');
        updateChart('chartPMHours', 'שעות לפי מנהלת פדגוגית', pH, '#10b981');
    }

    function updateChart(id, label, dataObj, color) {
        if(charts[id]) charts[id].destroy();
        charts[id] = new Chart(document.getElementById(id), {
            type: 'bar',
            data: { labels: Object.keys(dataObj), datasets: [{ label, data: Object.values(dataObj), backgroundColor: color, borderRadius: 8 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>
