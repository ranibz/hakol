<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז שליטה מנהלת - ממשק מורחב</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --admin: #1e293b; --primary: #6366f1; --bg: #f1f5f9; --white: #ffffff; --success: #10b981; --danger: #ef4444; 
                --grade-y: #f5f3ff; --grade-ya: #f0fdf4; --grade-yb: #fff7ed; }
        
        body { font-family: 'Heebo', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1500px; margin: 0 auto; }
        
        .header { background: var(--admin); color: white; padding: 30px 40px; border-radius: 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .year-selector-main select { background: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; }

        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 35px; }
        .stat-card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); text-align: center; border-top: 6px solid var(--primary); }
        .stat-card .val { font-size: 42px; font-weight: 900; color: var(--admin); }

        /* הגדלת הטור הימני ל-450 פיקסלים */
        .main-grid { display: grid; grid-template-columns: 450px 1fr; gap: 35px; align-items: start; }
        .card { background: var(--white); padding: 30px; border-radius: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        
        h2 { font-family: 'Secular One'; font-size: 26px; margin-top: 0; border-bottom: 3px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 25px; color: var(--admin); }

        /* שדות קלט גדולים ונוחים */
        .setup-section { background: #f8fafc; padding: 25px; border-radius: 25px; border: 1px solid #e2e8f0; }
        .setup-section label { display: block; font-weight: 800; margin-bottom: 10px; color: #475569; font-size: 15px; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #cbd5e1; margin-bottom: 20px; box-sizing: border-box; font-family: inherit; font-size: 16px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; background: white; }
        
        .btn-add { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99,102,241,0.4); }

        .pm-item { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #eee; border-right: 8px solid var(--primary); position: relative; transition: 0.3s; }
        .pm-name { font-size: 19px; font-weight: 900; color: var(--admin); }
        .pm-depts { font-size: 14px; color: #6366f1; margin-top: 8px; line-height: 1.4; }

        /* טבלה ראשית */
        .summary-table { width: 100%; border-collapse: collapse; text-align: right; }
        .summary-table td { padding: 22px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 17px; }
        .summary-table tr:hover td { background: #f5f3ff; color: var(--primary); font-weight: 700; }

        /* מודל Drill Down */
        #drillModal { display: none; position: fixed; inset: 0; background: rgba(30, 41, 59, 0.9); z-index: 1000; padding: 30px; overflow-y: auto; backdrop-filter: blur(10px); }
        .modal-content { background: #f8fafc; max-width: 1250px; margin: 0 auto; border-radius: 45px; padding: 45px; position: relative; }
        .close-modal { position: absolute; left: 35px; top: 35px; font-size: 24px; cursor: pointer; background: white; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: none; }

        .grade-monitor-box { border-radius: 30px; padding: 30px; margin-bottom: 30px; background: white; border-right: 12px solid #ddd; }
        .monitor-table, .job-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .monitor-table th, .job-table th { background: #1e293b; color: white; padding: 18px; text-align: right; font-size: 15px; }
        .monitor-table td, .job-table td { padding: 18px; border-bottom: 1px solid #f1f5f9; }

        .percentage-bar-bg { background: #e2e8f0; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; }
        .m-tab { padding: 15px 30px; border-radius: 18px; border: none; cursor: pointer; font-weight: 800; background: #e2e8f0; margin-left: 12px; font-size: 16px; }
        .m-tab.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="font-family:'Secular One'; font-size: 32px;">מרכז שליטה מנהלת ביה"ס</h1>
        <div class="year-selector-main">
            <label style="font-weight: 700; margin-left: 10px;">שנת לימודים:</label>
            <select id="globalYear" onchange="processData()">
                <option value="תשפז" selected>תשפ"ז (הבאה)</option>
                <option value="תשפו">תשפ"ו (נוכחית)</option>
            </select>
        </div>
    </div>

    <div class="grid-stats">
        <div class="stat-card"><h3>סה"כ שעות תקן</h3><div class="val" id="totalSchoolHours">0</div></div>
        <div class="stat-card"><h3>מורים פעילים</h3><div class="val" id="totalTeachersCount">0</div></div>
        <div class="stat-card"><h3>מנהלות פדגוגיות</h3><div class="val" id="totalPMCount">0</div></div>
    </div>

    <div class="main-grid">
        <!-- טור ניהול מורחב -->
        <div class="side-col">
            <div class="card">
                <h2>1. הגדרות ומינויים</h2>
                <div class="setup-section">
                    <label>הוספת מורה חדש למאגר:</label>
                    <input type="text" id="newTeacherName" placeholder="הקלד שם מורה מלא...">
                    <button class="btn-add" onclick="addNewTeacher()" style="background:var(--success); margin-bottom:25px;">הוסף למאגר ביה"ס +</button>
                    
                    <label>מינוי מנהלת פדגוגית:</label>
                    <select id="teacherSelect"></select>
                    
                    <label>שיוך מגמות (הפרדה בפסיק):</label>
                    <input type="text" id="deptInput" placeholder="למשל: תקשורת, קולנוע, אמנות">
                    
                    <button class="btn-add" onclick="addPM()">שמור מינוי ושיוך סמכויות</button>
                </div>
                <h3 style="font-size:16px; color:#64748b; margin-top:30px; margin-bottom:15px; font-weight: 800;">מנהלות פדגוגיות קיימות:</h3>
                <div id="pmList"></div>
            </div>
        </div>

        <!-- טבלה ראשית -->
        <div class="card">
            <h2>2. ריכוז תקציבי לשנת <span class="selected-year-label"></span></h2>
            <table class="summary-table" id="pmSummaryTable">
                <thead>
                    <tr style="background: #f8fafc;">
                        <th style="text-align:right; padding:20px;">מנהלת פדגוגית</th>
                        <th style="text-align:right; padding:20px;">מגמות באחריותה</th>
                        <th style="text-align:right; padding:20px;">סה"כ שעות</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- חלון ה-Drill Down -->
<div id="drillModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">✕</span>
        <h1 id="modalTitle" style="font-family:'Secular One'; font-size:45px; margin-bottom:5px;"></h1>
        <div id="modalSubTitle" style="color:var(--primary); font-weight:700; margin-bottom:35px; font-size:20px;"></div>
        
        <div id="deptPickerArea">
            <h3 style="margin-bottom:20px;">בחרי מגמה לצפייה בשיבוץ ובמשרות:</h3>
            <div id="deptButtons" style="display:flex; gap:20px; flex-wrap:wrap;"></div>
        </div>

        <div id="monitorDetailArea" style="display:none;">
            <div class="modal-tabs">
                <button class="m-tab active" id="tabComp" onclick="switchView('compare')">📊 השוואה רב-שנתית</button>
                <button class="m-tab" id="tab2027" onclick="switchView('y2027')">📅 שיבוץ תשפ"ז</button>
                <button class="m-tab" id="tab2026" onclick="switchView('y2026')">📅 שיבוץ תשפ"ו</button>
            </div>

            <div id="view-compare">
                <div class="card" style="background:var(--grade-y); border:1px solid var(--grade-y-border);">
                    <h3 style="margin:0;">סיכום מגמתי: <span id="compStats" style="color:var(--primary)"></span></h3>
                </div>
                <table class="comp-table" id="comparisonTable">
                    <thead><tr><th>שם המורה</th><th>שעות תשפ"ו</th><th>שעות תשפ"ז</th><th>שינוי (ש"ש)</th><th>סטטוס</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div id="view-y2027" style="display:none;"><div id="monitor-2027"></div><div id="jobs-2027"></div></div>
            <div id="view-y2026" style="display:none;"><div id="monitor-2026"></div><div id="jobs-2026"></div></div>
            
            <button onclick="backToDepts()" style="margin-top:40px; border:none; background:#cbd5e1; padding:15px 30px; border-radius:15px; cursor:pointer; font-weight:800; font-size:16px;">← חזרה לרשימת המגמות</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    let allPlacements = [], pms = {}, allTeachers = [], deptToPM = {}, extraInfo = {}, deptConfigs = {};
    let currentActiveDept = "";

    onValue(ref(db, 'school_settings/all_teachers'), snap => {
        allTeachers = snap.val() ? Object.values(snap.val()) : [];
        const sel = document.getElementById('teacherSelect');
        sel.innerHTML = '<option value="">— בחר מורה למינוי —</option>' + allTeachers.sort().map(t => `<option value="${t}">${t}</option>`).join('');
    });
    onValue(ref(db, 'school_admin/pedagogical_managers'), snap => {
        pms = snap.val() || {}; deptToPM = {};
        Object.values(pms).forEach(p => { if(p.assigned_depts) p.assigned_depts.forEach(d => deptToPM[d.trim()] = p.name); });
        renderPMList(); processData();
    });
    onValue(ref(db, 'rakevet_v3'), snap => { allPlacements = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})) : []; processData(); });
    onValue(ref(db, 'school_settings/teacher_extra_info'), snap => extraInfo = snap.val() || {});
    onValue(ref(db, 'config/departments'), snap => deptConfigs = snap.val() || {});

    window.addNewTeacher = () => {
        const n = document.getElementById('newTeacherName').value.trim();
        if(n) push(ref(db, 'school_settings/all_teachers'), n).then(() => document.getElementById('newTeacherName').value = '');
    };
    window.addPM = () => {
        const n = document.getElementById('teacherSelect').value, d = document.getElementById('deptInput').value;
        if(n && d) push(ref(db, 'school_admin/pedagogical_managers'), { name: n, assigned_depts: d.split(',').map(s => s.trim()) });
        document.getElementById('deptInput').value = '';
    };
    window.deletePM = (id) => confirm("למחוק מינוי זה?") && remove(ref(db, `school_admin/pedagogical_managers/${id}`));
    
    function renderPMList() {
        document.getElementById('pmList').innerHTML = Object.keys(pms).map(id => `<div class="pm-item"><button onclick="deletePM('${id}')" style="float:left; border:none; background:none; color:red; cursor:pointer; font-weight:bold;">✖</button><div class="pm-name">${pms[id].name}</div><div class="pm-depts">${pms[id].assigned_depts.join(', ')}</div></div>`).join('');
    }

    window.processData = () => {
        const year = document.getElementById('globalYear').value;
        document.querySelectorAll('.selected-year-label').forEach(el => el.innerText = year);
        const stats = {};
        Object.values(pms).forEach(p => stats[p.name] = { depts: p.assigned_depts, hours: 0 });
        stats["לא שויך"] = { depts: ["אחר"], hours: 0 };
        allPlacements.filter(p => p.year === year).forEach(p => { 
            const total = (parseFloat(p.contact)||0) + (parseFloat(p.bonus)||0); 
            const owner = deptToPM[p.dept?.trim()] || "לא שויך"; 
            if (stats[owner]) stats[owner].hours += total; 
        });
        document.querySelector('#pmSummaryTable tbody').innerHTML = Object.keys(stats).filter(n => n !== "לא שויך" || stats[n].hours > 0).map(name => `<tr onclick="drillDownPM('${name}')"><td><b>${name}</b></td><td>${stats[name].depts.join(', ')}</td><td style="font-weight:900;color:var(--primary); font-size:20px;">${stats[name].hours.toFixed(1)} <small>ש"ש</small></td></tr>`).join('');
        document.getElementById('totalSchoolHours').innerText = Object.values(stats).reduce((a,b)=>a+b.hours, 0).toFixed(1);
        document.getElementById('totalTeachersCount').innerText = new Set(allPlacements.filter(p=>p.year===year).map(p=>p.teacher)).size;
        document.getElementById('totalPMCount').innerText = Object.keys(pms).length;
    };

    window.drillDownPM = (name) => {
        document.getElementById('drillModal').style.display = 'block';
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalSubTitle').innerText = "פיקוח פדגוגי והשוואה רב-שנתית";
        const depts = name === "לא שויך" ? [...new Set(allPlacements.filter(p => !deptToPM[p.dept?.trim()]).map(p => p.dept))] : (Object.values(pms).find(p => p.name === name)?.assigned_depts || []);
        document.getElementById('deptButtons').innerHTML = depts.map(d => `<button onclick="showSubjectDetails('${d}')" style="padding:20px 35px; border-radius:20px; border:3px solid var(--primary); background:white; color:var(--primary); font-weight:900; cursor:pointer; font-size:20px;">${d}</button>`).join('');
        document.getElementById('deptPickerArea').style.display = 'block'; document.getElementById('monitorDetailArea').style.display = 'none';
    };

    window.showSubjectDetails = (deptName) => {
        currentActiveDept = deptName; document.getElementById('deptPickerArea').style.display = 'none'; document.getElementById('monitorDetailArea').style.display = 'block';
        renderComparison(deptName);
        renderPrettyMonitor(deptName, 'תשפו', 'monitor-2026', 'jobs-2026');
        renderPrettyMonitor(deptName, 'תש制造', 'monitor-2027', 'jobs-2027');
        renderPrettyMonitor(deptName, 'תש制造'.replace('制造','פז'), 'monitor-2027', 'jobs-2027');
        renderPrettyMonitor(deptName, 'תשפז', 'monitor-2027', 'jobs-2027');
    };

    function renderComparison(deptName) {
        const teachers = [...new Set(allPlacements.filter(p => p.dept === deptName).map(p => p.teacher))];
        let t26=0, t27=0;
        document.querySelector('#comparisonTable tbody').innerHTML = teachers.sort().map(t => {
            const h26 = allPlacements.filter(p => p.dept === deptName && p.teacher === t && p.year === 'תשפו').reduce((s, p) => s + (parseFloat(p.contact)||0) + (parseFloat(p.bonus)||0), 0);
            const h27 = allPlacements.filter(p => p.dept === deptName && p.teacher === t && p.year === 'תש制造'.replace('制造','פז')).reduce((s, p) => s + (parseFloat(p.contact)||0) + (parseFloat(p.bonus)||0), 0);
            t26+=h26; t27+=h27; const d = h27 - h26; 
            return `<tr><td><b>${t}</b></td><td>${h26.toFixed(1)}</td><td>${h27.toFixed(1)}</td><td style="color:${d>0?'green':d<0?'red':'black'}; font-weight:900;">${d>0?'+':''}${d.toFixed(1)}</td><td>${d>0?'📈 גדל':d<0?'📉 קטן':'➖ יציב'}</td></tr>`;
        }).join('');
        document.getElementById('compStats').innerText = `תשפ"ו: ${t26.toFixed(1)} ➔ תשפ"ז: ${t27.toFixed(1)}`;
    }

    function renderPrettyMonitor(deptName, year, monitorId, jobsId) {
        const filtered = allPlacements.filter(p => p.dept === deptName && p.year === year);
        const config = deptConfigs[deptName] || {};
        const mCont = document.getElementById(monitorId); mCont.innerHTML = '';
        const teacherLoads = {};
        ['י','יא','יב'].forEach(g => {
            const gradeData = filtered.filter(p => p.grade === g); if(!gradeData.length) return;
            let html = `<div class="grade-monitor-box grade-${g === 'י' ? 'y' : g === 'יא' ? 'ya' : 'yb'}"><h3>שכבת ${g} - ${year}</h3>`;
            Object.values(config.structure || {}).forEach(row => {
                const rowData = gradeData.filter(p => row.subjects.includes(p.subject));
                if(rowData.length) {
                    html += `<b>📌 ${row.label}</b><table class="monitor-table"><thead><tr><th>מורה</th><th>מקצוע</th><th>מגע</th><th>גמול</th><th>סה"כ</th></tr></thead><tbody>`;
                    rowData.forEach(p => { 
                        const total = (parseFloat(p.contact)||0) + (parseFloat(p.bonus)||0);
                        teacherLoads[p.teacher] = (teacherLoads[p.teacher] || 0) + total;
                        html += `<tr><td>${p.teacher}</td><td>${p.subject}</td><td>${p.contact}</td><td>${p.bonus}</td><td style="font-weight:900;">${total.toFixed(1)}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }
            });
            mCont.innerHTML += html + `</div>`;
        });
        let jobHtml = `<h2>ריכוז משרות (בסיס 25) - ${year}</h2><table class="job-table"><thead><tr><th>מורה</th><th>שעות מגמה</th><th>תפקיד</th><th>שעות תפקיד</th><th>ת"ש</th><th>סה"כ</th><th>%</th></tr></thead><tbody>`;
        Object.keys(teacherLoads).sort().forEach(t => {
            const info = (extraInfo[year] && extraInfo[year][t]) ? extraInfo[year][t] : { role: "", hours: 0, welfareHours: 0 };
            const total = teacherLoads[t] + (parseFloat(info.hours)||0) + (parseFloat(info.welfareHours)||0);
            const p = (total/25*100).toFixed(0);
            jobHtml += `<tr><td><b>${t}</b></td><td>${teacherLoads[t].toFixed(1)}</td><td>${info.role||'-'}</td><td>${info.hours||0}</td><td>${info.welfareHours||0}</td><td style="font-weight:900;">${total.toFixed(1)}</td><td><div class="percentage-bar-bg"><div class="percentage-bar-fill" style="width:${Math.min(p,100)}%;background:${p>100?'#ef4444':p>85?'orange':'#10b981'}"></div></div> ${p}%</td></tr>`;
        });
        document.getElementById(jobsId).innerHTML = (Object.keys(teacherLoads).length > 0) ? jobHtml + `</tbody></table>` : `<p style="padding:20px; text-align:center; color:#94a3b8;">אין נתוני משרות לשנה זו</p>`;
    }

    window.switchView = (v) => {
        document.getElementById('view-compare').style.display = v === 'compare' ? 'block' : 'none';
        document.getElementById('view-y2027').style.display = v === 'y2027' ? 'block' : 'none';
        document.getElementById('view-y2026').style.display = v === 'y2026' ? 'block' : 'none';
        document.querySelectorAll('.m-tab').forEach(b => b.classList.toggle('active', b.id.includes(v.replace('y',''))));
    };
    window.closeModal = () => document.getElementById('drillModal').style.display = 'none';
    window.backToDepts = () => { document.getElementById('deptPickerArea').style.display = 'block'; document.getElementById('monitorDetailArea').style.display = 'none'; };
</script>
</body>
</html>
