<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז שליטה מנהלת - Drill Down</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --admin: #1e293b; --primary: #6366f1; --bg: #f1f5f9; --white: #ffffff; --success: #10b981; --p1: #6366f1; --p1-bg: #f5f3ff; --p2: #10b981; --p2-bg: #f0fdf4; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: var(--admin); color: white; padding: 25px 40px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid var(--primary); }
        .stat-card .val { font-size: 36px; font-weight: 900; color: var(--admin); }

        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }
        .card { background: var(--white); padding: 25px; border-radius: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        
        /* טבלת סיכום לחיצה */
        .summary-table { width: 100%; border-collapse: collapse; text-align: right; }
        .summary-table th { background: #f8fafc; padding: 15px; border-bottom: 2px solid #e2e8f0; }
        .summary-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .summary-table tr:hover td { background: #eef2ff; color: var(--primary); }

        /* Modal - חלון צף לפרטים */
        #drillModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; padding: 40px; overflow-y: auto; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg); max-width: 1100px; margin: 0 auto; border-radius: 30px; padding: 30px; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; left: 25px; top: 25px; font-size: 30px; cursor: pointer; background: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; }

        /* עיצוב המוניטור בתוך המודל (מועתק מרכזת פדגוגית) */
        .grade-monitor-box { border-radius: 20px; padding: 20px; margin-bottom: 15px; background: white; border-right: 8px solid #ddd; }
        .grade-y { border-right-color: #6366f1; background-color: #f5f3ff; }
        .grade-ya { border-right-color: #10b981; background-color: #f0fdf4; }
        .grade-yb { border-right-color: #f97316; background-color: #fff7ed; }
        
        .monitor-table, .job-table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; border-radius: 10px; overflow: hidden; font-size: 14px; }
        .monitor-table th, .job-table th { background: #1e293b; color: white; padding: 10px; text-align: right; }
        .monitor-table td, .job-table td { padding: 10px; border-bottom: 1px solid #eee; }

        .setup-section { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 10px; }
        .btn-add { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .pm-item { background: white; padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; border-right: 5px solid var(--primary); position: relative; }
        
        .percentage-bar-bg { background: #eee; border-radius: 10px; height: 8px; width: 100px; overflow: hidden; }
        .percentage-bar-fill { height: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>מרכז שליטה מנהלת ביה"ס</h1>
        <div style="font-weight: 700;">דוח היררכי מלא - תשפ"ז</div>
    </div>

    <div class="grid-stats">
        <div class="stat-card"><h3>סה"כ שעות תקן</h3><div class="val" id="totalSchoolHours">0</div></div>
        <div class="stat-card"><h3>מורים פעילים</h3><div class="val" id="totalTeachersCount">0</div></div>
        <div class="stat-card"><h3>מנהלות פדגוגיות</h3><div class="val" id="totalPMCount">0</div></div>
    </div>

    <div class="main-grid">
        <div class="side-col">
            <div class="card">
                <h2>1. ניהול היררכיה</h2>
                <div class="setup-section">
                    <label>הוספת מורה למאגר:</label>
                    <input type="text" id="newTeacherName" placeholder="שם מלא...">
                    <button class="btn-add" onclick="addNewTeacher()" style="background:var(--success); margin-bottom:15px;">הוסף למאגר +</button>
                    
                    <label>מינוי מנהלת פדגוגית:</label>
                    <select id="teacherSelect"></select>
                    <input type="text" id="deptInput" placeholder="מגמות (מופרדות בפסיק)...">
                    <button class="btn-add" onclick="addPM()">שמור מינוי</button>
                </div>
                <div id="pmList"></div>
            </div>
        </div>

        <div class="card">
            <h2>2. ריכוז תקציבי (לחצי על שם לצפייה בפרטים)</h2>
            <table class="summary-table" id="pmSummaryTable">
                <thead><tr><th>מנהלת פדגוגית</th><th>מגמות</th><th>סה"כ שעות</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- חלון ה-Drill Down -->
<div id="drillModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">✕</span>
        <h1 id="modalTitle" style="color:var(--admin); margin-bottom:5px;"></h1>
        <div id="modalSubTitle" style="color:var(--primary); font-weight:700; margin-bottom:30px;"></div>
        
        <!-- שלב א: בחירת מגמה -->
        <div id="deptPickerArea" style="display:none;">
            <h3>בחרי מגמה לצפייה בפירוט פדגוגי:</h3>
            <div id="deptButtons" style="display:flex; gap:15px; flex-wrap:wrap;"></div>
        </div>

        <!-- שלב ב: המוניטור המלא (מה שהמנהלת הפדגוגית רואה) -->
        <div id="monitorDetailArea" style="display:none;">
            <button onclick="backToDepts()" style="margin-bottom:15px; border:none; background:none; color:var(--primary); cursor:pointer; font-weight:800;">← חזרה לרשימת המגמות</button>
            <div id="monitorContainer"></div>
            <div id="jobTableArea"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    let allPlacements = [], pms = {}, allTeachers = [], deptToPM = {}, extraInfo = {}, deptConfigs = {};

    // טעינת נתונים
    onValue(ref(db, 'school_settings/all_teachers'), snap => {
        allTeachers = snap.val() ? Object.values(snap.val()) : [];
        document.getElementById('teacherSelect').innerHTML = '<option value="">— בחר מורה —</option>' + allTeachers.sort().map(t => `<option value="${t}">${t}</option>`).join('');
    });
    onValue(ref(db, 'school_admin/pedagogical_managers'), snap => {
        pms = snap.val() || {}; deptToPM = {};
        Object.values(pms).forEach(p => p.assigned_depts.forEach(d => deptToPM[d.trim()] = p.name));
        renderPMList(); processData();
    });
    onValue(ref(db, 'rakevet_v3'), snap => {
        allPlacements = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})) : [];
        processData();
    });
    onValue(ref(db, 'school_settings/teacher_extra_info'), snap => extraInfo = snap.val() || {});
    onValue(ref(db, 'config/departments'), snap => deptConfigs = snap.val() || {});

    // ניהול
    window.addNewTeacher = () => {
        const n = document.getElementById('newTeacherName').value.trim();
        if(n) push(ref(db, 'school_settings/all_teachers'), n).then(() => document.getElementById('newTeacherName').value = '');
    };
    window.addPM = () => {
        const n = document.getElementById('teacherSelect').value, d = document.getElementById('deptInput').value;
        if(n && d) push(ref(db, 'school_admin/pedagogical_managers'), { name: n, assigned_depts: d.split(',').map(s => s.trim()) });
        document.getElementById('deptInput').value = '';
    };
    window.deletePM = (id) => remove(ref(db, `school_admin/pedagogical_managers/${id}`));
    function renderPMList() {
        document.getElementById('pmList').innerHTML = Object.keys(pms).map(id => `<div class="pm-item"><button onclick="deletePM('${id}')" style="float:left; border:none; background:none; color:red; cursor:pointer;">✖</button><b>${pms[id].name}</b><br><small>${pms[id].assigned_depts.join(', ')}</small></div>`).join('');
    }

    // עיבוד נתונים לטבלה הראשית
    window.processData = () => {
        const stats = {};
        Object.values(pms).forEach(p => stats[p.name] = { depts: p.assigned_depts, hours: 0 });
        stats["לא שויך"] = { depts: ["מגמות ללא מפקחת"], hours: 0 };

        allPlacements.forEach(p => {
            const total = (parseFloat(p.contact) || 0) + (parseFloat(p.bonus) || 0);
            const owner = deptToPM[p.dept?.trim()] || "לא שויך";
            if (stats[owner]) stats[owner].hours += total;
        });

        const tbody = document.querySelector('#pmSummaryTable tbody');
        tbody.innerHTML = Object.keys(stats).filter(n => n !== "לא שויך" || stats[n].hours > 0).map(name => `
            <tr onclick="drillDownPM('${name}')">
                <td><b>${name}</b></td>
                <td>${stats[name].depts.join(', ')}</td>
                <td style="font-weight:900; color:var(--primary); font-size:18px;">${stats[name].hours.toFixed(1)}</td>
            </tr>
        `).join('');

        document.getElementById('totalSchoolHours').innerText = Object.values(stats).reduce((a,b)=>a+b.hours, 0).toFixed(1);
        document.getElementById('totalTeachersCount').innerText = new Set(allPlacements.map(p=>p.teacher)).size;
        document.getElementById('totalPMCount').innerText = Object.keys(pms).length;
    };

    // לוגיקת Drill Down
    let currentDrillPM = "";
    window.drillDownPM = (name) => {
        currentDrillPM = name;
        const modal = document.getElementById('drillModal');
        modal.style.display = 'block';
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalSubTitle').innerText = "פירוט מגמות תחת פיקוח פדגוגי";
        
        document.getElementById('deptPickerArea').style.display = 'block';
        document.getElementById('monitorDetailArea').style.display = 'none';

        const depts = name === "לא שויך" ? [...new Set(allPlacements.filter(p => !deptToPM[p.dept?.trim()]).map(p => p.dept))] : stats_getPMDepts(name);
        
        document.getElementById('deptButtons').innerHTML = depts.map(d => `
            <button onclick="showSubjectDetails('${d}')" style="padding:15px 25px; border-radius:15px; border:2px solid var(--primary); background:white; color:var(--primary); font-weight:800; cursor:pointer; font-size:16px;">${d}</button>
        `).join('');
    };

    function stats_getPMDepts(name) {
        const pm = Object.values(pms).find(p => p.name === name);
        return pm ? pm.assigned_depts : [];
    }

    window.showSubjectDetails = (deptName) => {
        document.getElementById('deptPickerArea').style.display = 'none';
        document.getElementById('monitorDetailArea').style.display = 'block';
        document.getElementById('modalSubTitle').innerText = `מגמת ${deptName} - מבט מפקחת פדגוגית`;

        const filtered = allPlacements.filter(p => p.dept === deptName);
        const config = deptConfigs[deptName] || {};
        const container = document.getElementById('monitorContainer');
        container.innerHTML = '';

        const grades = [{id:'י', l:"שכבת י'", c:'grade-y'}, {id:'יא', l:"שכבת י\"א", c:'grade-ya'}, {id:'יב', l:"שכבת י\"ב", c:'grade-yb'}];
        const teacherLoads = {};

        grades.forEach(g => {
            const gradeData = filtered.filter(p => p.grade === g.id);
            if(gradeData.length === 0) return;
            const box = document.createElement('div'); box.className = `grade-monitor-box ${g.c}`;
            let html = `<h3>${g.l}</h3>`;
            
            if(config.structure) {
                Object.values(config.structure).forEach(row => {
                    const rowData = gradeData.filter(p => row.subjects.includes(p.subject));
                    if(rowData.length > 0) {
                        html += `<div style="font-weight:800; margin-top:10px;">📌 ${row.label}</div><table class="monitor-table"><thead><tr><th>מורה</th><th>מקצוע</th><th>מגע</th><th>גמול</th></tr></thead><tbody>`;
                        rowData.forEach(p => {
                            const total = (p.contact + p.bonus);
                            teacherLoads[p.teacher] = (teacherLoads[p.teacher] || 0) + total;
                            html += `<tr><td>${p.teacher}</td><td>${p.subject}</td><td>${p.contact}</td><td>${p.bonus}</td></tr>`;
                        });
                        html += `</tbody></table>`;
                    }
                });
            }
            box.innerHTML = html; container.appendChild(box);
        });

        // רנדור טבלת משרות 25 שעות (תצוגת מראה)
        let jobHtml = `<h3>ריכוז משרות מגמתי (בסיס 25 שעות)</h3><table class="job-table"><thead><tr><th>שם המורה</th><th>שעות מגמה</th><th>תפקיד/נוסף</th><th>ת"ש</th><th>סה"כ</th><th>% משרה</th></tr></thead><tbody>`;
        Object.keys(teacherLoads).sort().forEach(t => {
            const info = extraInfo[t] || { role: "", hours: 0, welfareHours: 0 };
            const total = teacherLoads[t] + (parseFloat(info.hours)||0) + (parseFloat(info.welfareHours)||0);
            const perc = Math.min((total/25)*100, 100).toFixed(0);
            jobHtml += `<tr><td><b>${t}</b></td><td>${teacherLoads[t].toFixed(1)}</td><td>${info.role || '-'} (${info.hours || 0})</td><td>${info.welfareHours || 0}</td><td style="font-weight:900;">${total.toFixed(1)}</td><td><div class="percentage-bar-bg"><div class="percentage-bar-fill" style="width:${perc}%; background:${perc>90?'#ef4444':'#10b981'}"></div></div> ${perc}%</td></tr>`;
        });
        document.getElementById('jobTableArea').innerHTML = jobHtml + `</tbody></table>`;
    };

    window.backToDepts = () => {
        document.getElementById('deptPickerArea').style.display = 'block';
        document.getElementById('monitorDetailArea').style.display = 'none';
        document.getElementById('modalSubTitle').innerText = "פירוט מגמות תחת פיקוח פדגוגי";
    };

    window.closeModal = () => document.getElementById('drillModal').style.display = 'none';
</script>
</body>
</html>
