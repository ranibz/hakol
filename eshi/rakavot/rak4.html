<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת רכז — דף תבנית חכם</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8fafc; --primary: #6366f1; --yod: #e0f2fe; --ya: #f5f3ff; --yb: #fff7ed; --magama: #ecfdf5; --magama-border: #10b981; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); direction: rtl; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-bar { background: #1e293b; color: white; padding: 15px 30px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .input-card { background: #fff; padding: 35px; border-radius: 30px; border: 2px solid #e2e8f0; margin-bottom: 40px; display: none; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; align-items: flex-end; }
        .grade-box { background: #fff; border: 2px solid #cbd5e1; border-radius: 40px; padding: 35px; margin-bottom: 40px; box-shadow: 10px 10px 0px rgba(0,0,0,0.02); }
        .grade-title { font-family: 'Secular One'; font-size: 32px; margin-bottom: 20px; }
        .row-header { font-size: 15px; font-weight: 900; color: #475569; margin: 25px 0 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .teacher-card { background: rgba(255,255,255,0.8); border-radius: 20px; padding: 20px; position: relative; border: 1px solid rgba(0,0,0,0.05); }
        .empty-slot { border: 2px dashed #cbd5e1; border-radius: 20px; height: 100px; display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-weight: 800; }
        footer { text-align: center; padding: 40px; color: #64748b; font-size: 14px; border-top: 1px solid #e2e8f0; margin-top: 50px; }
        #stats-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; padding: 40px; overflow-y: auto; }
        .modal-content { background: white; max-width: 1000px; margin: 0 auto; padding: 40px; border-radius: 30px; position: relative; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyCvvXDGHLBQKEPvkSQ8p8rdyGgUQc9NHOY", authDomain: "rakevet-65218.firebaseapp.com", databaseURL: "https://rakevet-65218-default-rtdb.europe-west1.firebasedatabase.app", projectId: "rakevet-65218", appId: "1:1096554736743:web:b2e78ba157117e1c44f8c2" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // --- זיהוי המגמה מהכתובת (URL) ---
        const urlParams = new URLSearchParams(window.location.search);
        const currentDeptName = urlParams.get('dept') || "תקשורת"; // ברירת מחדל
        document.getElementById('deptTitle').innerText = currentDeptName;

        let allEntries = []; let isAuthorized = false; let deptConfig = null;

        // טעינת הגדרות המגמה
        onValue(ref(db, 'config/departments'), (snap) => {
            const depts = snap.val();
            if(depts) {
                deptConfig = Object.values(depts).find(d => d.name === currentDeptName);
                if(deptConfig) updateFormUI();
            }
        });

        // טעינת רשימת מורים גלובלית
        onValue(ref(db, 'config/teachers'), (snap) => {
            const select = document.getElementById('inTeacher');
            select.innerHTML = '<option value="">— בחר מורה —</option>';
            if(snap.val()) Object.values(snap.val()).forEach(t => select.innerHTML += `<option value="${t.name}">${t.name}</option>`);
        });

        function updateFormUI() {
            const sub = document.getElementById('inSubject'); sub.innerHTML = '';
            [...deptConfig.row1.subjects, ...deptConfig.row2.subjects].forEach(s => sub.innerHTML += `<option value="${s}">${s}</option>`);
            updateDisplay();
        }

        window.checkPassword = () => { if(document.getElementById('passField').value === "1234") { isAuthorized = true; document.getElementById('admin-section').style.display = 'block'; document.getElementById('login-ui').style.display = 'none'; updateDisplay(); } };
        
        window.addEntry = () => {
            if(!isAuthorized) return;
            const entry = {
                dept: currentDeptName, // שיוך למגמה הספציפית
                year: document.getElementById('inYear').value,
                grade: document.getElementById('inGrade').value,
                subject: document.getElementById('inSubject').value,
                teacher: document.getElementById('inTeacher').value,
                contact: parseFloat(document.getElementById('inContact').value) || 0,
                bonus: parseFloat(document.getElementById('inBonus').value) || 0
            };
            if(entry.teacher) push(ref(db, 'rakevet_v3'), entry);
        };

        onValue(ref(db, 'rakevet_v3'), (snap) => {
            allEntries = snap.val() ? Object.keys(snap.val()).map(k => ({id: k, ...snap.val()[k]})) : [];
            updateDisplay();
        });

        window.updateDisplay = () => {
            const year = document.getElementById('viewYear').value;
            const filtered = allEntries.filter(e => e.year === year && (e.dept === currentDeptName || (!e.dept && currentDeptName === "תקשורת")));
            render(filtered, year);
        };

        function render(entries, year) {
            const dash = document.getElementById('dashboard'); dash.innerHTML = '';
            if(!deptConfig) return;
            ['י', 'יא', 'יב'].forEach(g => {
                const gradeData = entries.filter(e => e.grade === g);
                const r1Data = gradeData.filter(e => deptConfig.row1.subjects.includes(e.subject));
                const r2Data = gradeData.filter(e => deptConfig.row2.subjects.includes(e.subject));
                const box = document.createElement('div'); box.className = 'grade-box';
                box.innerHTML = `<h2 class="grade-title">שכבת ${g} — ${year}</h2>
                    <div class="row-header">${deptConfig.row1.label}</div><div class="cards-grid">${renderCards(r1Data, 2)}</div>
                    <div class="row-header">${deptConfig.row2.label}</div><div class="cards-grid">${renderCards(r2Data, 3)}</div>`;
                dash.appendChild(box);
            });
        }

        function renderCards(list, slots) {
            let html = list.map(d => `<div class="teacher-card"><h3>${d.teacher}</h3><div style="color:var(--primary); font-weight:700;">${d.subject}</div><div style="display:flex; justify-content:space-between; margin-top:10px; font-weight:900;"><span>מגע: ${d.contact}</span><span>גמול: ${d.bonus}</span></div>${isAuthorized ? `<button onclick="confirm('למחוק?') && remove(ref(db, 'rakevet_v3/${d.id}'))" style="color:red; cursor:pointer; background:none; border:none; position:absolute; top:10px; left:10px;">🗑️</button>` : ''}</div>`).join('');
            for(let i = list.length; i < slots; i++) html += '<div class="empty-slot">מקום פנוי</div>';
            return html;
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="login-bar">
            <span style="font-weight: 800;">רכז מגמת <span id="deptTitle"></span></span>
            <div id="login-ui"><input type="password" id="passField" placeholder="סיסמה" style="padding:8px; border-radius:8px; width:100px; border:none; text-align:center;"> <button onclick="checkPassword()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:800;">כניסה</button></div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; background:#fff; padding:20px; border-radius:20px; margin-bottom:30px; border:1px solid #e2e8f0;">
            <div><label>בחר שנה:</label> <select id="viewYear" onchange="updateDisplay()"><option value="תשפו">תשפ"ו</option><option value="תשפז" selected>תשפ"ז</option></select></div>
            <a href="admin.html" style="text-decoration:none; color:var(--primary); font-weight:800;">➔ חזרה לפורטל מנהל</a>
        </div>

        <div id="admin-section" class="input-card">
            <div class="form-grid">
                <div style="display:flex; flex-direction:column;"><label>שנה</label><select id="inYear"><option value="תשפו">תשפ"ו</option><option value="תשפז" selected>תשפ"ז</option></select></div>
                <div style="display:flex; flex-direction:column;"><label>שכבה</label><select id="inGrade"><option value="י">י'</option><option value="יא">י"א</option><option value="יב">י"ב</option></select></div>
                <div style="display:flex; flex-direction:column;"><label>מקצוע</label><select id="inSubject"></select></div>
                <div style="display:flex; flex-direction:column;"><label>מורה</label><select id="inTeacher"></select></div>
                <div style="display:flex; flex-direction:column;"><label>מגע</label><input type="number" id="inContact" value="4"></div>
                <div style="display:flex; flex-direction:column;"><label>גמול</label><select id="inBonus"><option value="0">0</option><option value="1">1</option><option value="1.5">1.5</option><option value="2">2</option><option value="2.5">2.5</option><option value="3">3</option><option value="3.5">3.5</option><option value="4.5">4.5</option></select></div>
                <button onclick="addEntry()" style="background:var(--primary); color:white; border:none; padding:12px; border-radius:12px; cursor:pointer; font-weight:900;">הוסף +</button>
            </div>
        </div>

        <div id="dashboard"></div>
        <footer>פיתוח מערכת: רני בן זאב</footer>
    </div>
</body>
</html>
