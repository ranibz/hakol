<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שיבוץ רכז מגמה — חטיבת ביניים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #f8fafc; --admin: #0f4c5c; --primary: #6366f1; --primary-bg: #f5f3ff;
            --success: #10b981; --success-bg: #f0fdf4; --danger: #ef4444;
            --warning: #f97316; --white: #ffffff; --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); direction: rtl; min-height: 100vh; }

        #error-screen { display: none; text-align: center; padding: 100px 20px; }
        #error-screen h1 { font-family: 'Secular One'; font-size: 32px; color: var(--admin); margin-bottom: 12px; }
        #error-screen p { color: #64748b; font-size: 16px; }

        #login-screen { display: none; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        #login-screen.show { display: flex; }
        .login-card { background: white; padding: 50px 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; border-top: 8px solid var(--primary); text-align: center; }
        .login-card h1 { font-family: 'Secular One'; font-size: 24px; color: var(--admin); margin-bottom: 6px; }
        .dept-name { color: var(--primary); font-size: 20px; font-weight: 900; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 13px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Heebo'; font-size: 15px; margin-bottom: 12px; outline: none; }
        .login-card input:focus { border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-family: 'Heebo'; font-size: 16px; font-weight: 800; cursor: pointer; }
        .btn-primary:hover { background: #4f46e5; }
        .login-err { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }

        #app { display: none; }
        .topbar { background: var(--admin); color: white; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .topbar-left h1 { font-family: 'Secular One'; font-size: 20px; }
        .topbar-left p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
        .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .year-sel { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 14px; border-radius: 10px; font-family: 'Heebo'; font-size: 14px; font-weight: 700; cursor: pointer; }
        .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 7px 14px; border-radius: 10px; font-family: 'Heebo'; font-size: 13px; cursor: pointer; }

        .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 26px; flex-wrap: wrap; }
        .tab-btn { padding: 11px 22px; border-radius: 12px; border: 2px solid var(--border); cursor: pointer; font-weight: 800; font-size: 14px; background: white; color: #64748b; font-family: 'Heebo'; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .add-form { background: white; padding: 24px; border-radius: 20px; border: 2px solid var(--border); margin-bottom: 28px; display: none; }
        .add-form h3 { font-size: 16px; font-weight: 800; margin-bottom: 16px; color: var(--admin); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; align-items: flex-end; }
        .fg label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; }
        .fg select, .fg input { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-family: 'Heebo'; font-size: 14px; outline: none; background: #f8fafc; }
        .fg select:focus, .fg input:focus { border-color: var(--primary); background: white; }
        .btn-add { padding: 11px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; font-family: 'Heebo'; font-size: 14px; font-weight: 800; cursor: pointer; align-self: flex-end; }

        .year-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; background: var(--primary-bg); border: 2px solid #c7d2fe; border-radius: 14px; padding: 14px 20px; }
        .year-bar label { font-weight: 800; color: var(--primary); font-size: 15px; }
        .year-bar select { padding: 8px 14px; border: 2px solid var(--primary); border-radius: 10px; font-family: 'Heebo'; font-size: 15px; font-weight: 800; color: var(--primary); outline: none; background: white; cursor: pointer; }

        .grade-box { background: white; border: 2px solid var(--border); border-radius: 24px; padding: 26px; margin-bottom: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .grade-title { font-family: 'Secular One'; font-size: 24px; color: var(--admin); border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 18px; }
        .row-section { padding: 14px; border-radius: 14px; margin-bottom: 14px; }
        .row-indigo { background: var(--primary-bg); border-right: 7px solid var(--primary); }
        .row-green { background: var(--success-bg); border-right: 7px solid var(--success); }
        .row-gray { background: #f8fafc; border-right: 7px solid #94a3b8; }
        .row-label { font-weight: 900; font-size: 16px; margin-bottom: 12px; color: var(--admin); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .teacher-card { background: white; border-radius: 16px; padding: 16px; border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.04); position: relative; }
        .tc-name { font-weight: 900; font-size: 15px; color: var(--admin); margin-bottom: 3px; }
        .tc-id { font-size: 11px; color: #94a3b8; font-family: monospace; margin-bottom: 6px; }
        .tc-subject { color: var(--primary); font-weight: 700; font-size: 13px; margin-bottom: 8px; }
        .tc-hours { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; }
        .del-btn { position: absolute; top: 10px; left: 10px; background: #fee2e2; color: var(--danger); border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 12px; display: none; align-items: center; justify-content: center; }
        .teacher-card:hover .del-btn { display: flex; }
        .empty-row { color: #94a3b8; font-style: italic; padding: 10px; font-size: 13px; }

        .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; flex-wrap: wrap; gap: 12px; }
        .btn-excel { background: #16a34a; color: white; border: none; padding: 11px 22px; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 14px; font-family: 'Heebo'; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 14px; margin-bottom: 22px; }
        .stat-box { background: white; border-radius: 16px; padding: 18px; text-align: center; border-top: 4px solid var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .stat-num { font-family: 'Secular One'; font-size: 32px; color: var(--admin); }
        .stat-lbl { font-size: 11px; color: #64748b; font-weight: 700; margin-top: 4px; }
        .alert-banner { background: #fff7ed; border: 2px solid #f97316; border-radius: 14px; padding: 16px 20px; margin-bottom: 18px; display: none; }
        .alert-banner.show { display: block; }
        .alert-banner h4 { color: #c2410c; margin-bottom: 10px; font-size: 14px; }
        .alert-item { font-size: 13px; color: #7c2d12; margin-bottom: 4px; }
        .job-table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .job-table th { background: var(--admin); color: white; padding: 13px 16px; text-align: right; font-size: 13px; }
        .job-table td { padding: 13px 16px; border-bottom: 1px solid var(--bg); font-size: 14px; }
        .job-table tr:last-child td { border-bottom: none; }
        .job-table tr:hover td { background: var(--primary-bg); }
        .pct-bar-bg { background: var(--border); border-radius: 6px; height: 8px; width: 80px; display: inline-block; vertical-align: middle; overflow: hidden; }
        .pct-bar-fill { height: 100%; border-radius: 6px; display: block; }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }
        .badge-ok { background: #dcfce7; color: var(--success); }
        .badge-over { background: #fee2e2; color: var(--danger); }
        .badge-low { background: #ffedd5; color: var(--warning); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--admin); color: white; padding: 13px 26px; border-radius: 12px; font-weight: 700; font-size: 14px; z-index: 9999; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .toast.show { display: block; animation: fadeUp 0.3s; }
        @keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
        .loading { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>

<div id="error-screen">
    <h1>גישה נדחתה</h1>
    <p id="errorMsg">נא להיכנס דרך הקישור האישי שקיבלת מהמנהלת הפדגוגית.</p>
</div>

<div id="login-screen">
    <div class="login-card">
        <h1>שיבוץ רכז מגמה — חט"ב</h1>
        <div class="dept-name" id="loginDeptName"></div>
        <input type="password" id="loginPass" placeholder="סיסמה">
        <button class="btn-primary" onclick="doLogin()">כניסה</button>
        <div class="login-err" id="loginErr">סיסמה שגויה</div>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div class="topbar-left">
            <h1>מגמת: <span id="deptTitle"></span></h1>
            <p>מערכת ניהול שיבוץ מורים — חטיבת ביניים (אופק חדש)</p>
        </div>
        <div class="topbar-right">
            <button class="btn-logout" onclick="location.reload()">יציאה</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="tbtn-grid" onclick="switchTab('grid')">📋 שיבוצים לפי שכבה</button>
            <button class="tab-btn" id="tbtn-summary" onclick="switchTab('summary')">📊 סיכום משרות</button>
        </div>

        <div class="add-form" id="addForm">
            <h3>➕ הוספת שיבוץ חדש</h3>
            <div class="form-grid">
                <div class="fg"><label>שנה</label><select id="inYear"><option value="תשפז">תשפ"ז</option><option value="תשפו">תשפ"ו</option></select></div>
                <div class="fg"><label>שכבה</label><select id="inGrade"><option value="ז">ז'</option><option value="ח">ח'</option><option value="ט">ט'</option></select></div>
                <div class="fg"><label>מורה</label><select id="inTeacher"></select></div>
                <div class="fg">
                    <label>סוג שיבוץ</label>
                    <select id="inType" onchange="onTypeChange()">
                        <option value="מגע">מגע (תקן)</option>
                        <option value="פרטנות">פרטנות</option>
                    </select>
                </div>
                <div class="fg" id="fgSubjectSelect"><label>מקצוע</label><select id="inSubject"></select></div>
                <div class="fg" id="fgSubjectManual" style="display:none;"><label>מקצוע (ידני)</label><input type="text" id="inSubjectManual" placeholder="שם המקצוע..."></div>
                <div class="fg" id="fgContact"><label>שעות מגע</label><input type="number" id="inContact" value="4" step="0.5" min="0"></div>
                <div class="fg" id="fgPartanut" style="display:none;"><label>שעות פרטנות</label><input type="number" id="inPartanut" value="2" step="0.5" min="0"></div>
                <div class="fg"><label>שעות גמול</label><input type="number" id="inBonus" value="0" step="0.5" min="0"></div>
                <button class="btn-add" onclick="addPlacement()">בצע שיבוץ +</button>
            </div>
        </div>

        <div id="tab-grid" class="tab-content active">
            <div class="year-bar">
                <label>שנת לימודים:</label>
                <select id="gridYear" onchange="renderGrid()">
                    <option value="תשפז">תשפ"ז (הבאה)</option>
                    <option value="תשפו">תשפ"ו (נוכחית)</option>
                </select>
            </div>
            <div id="gridContainer"><div class="loading">טוען נתונים...</div></div>
            <div id="gridComparison"></div>
        </div>

        <div id="tab-summary" class="tab-content">
            <div class="summary-header">
                <h2 style="font-family:'Secular One';font-size:22px;color:var(--admin);">סיכום משרות מורים</h2>
                <button class="btn-excel" onclick="exportExcel()">⬇ ייצוא לאקסל</button>
            </div>
            <div class="stats-row" id="summaryStats"></div>
            <div class="alert-banner" id="alertBanner">
                <h4>⚠️ חריגות שדורשות טיפול</h4>
                <div id="alertList"></div>
            </div>
            <div style="overflow-x:auto;">
                <table class="job-table">
                    <thead><tr><th>ת.ז</th><th>שם מורה</th><th>שעות מגע</th><th>שעות גמול</th><th>פרטנות</th><th>סה"כ</th><th>% משרה</th><th>סטטוס</th></tr></thead>
                    <tbody id="summaryBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xxrrqaolggawkutjwtbk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JPaHTkx93APc1b1IbYbFSg_QBvdjQN1';
const RAKAZ_PASS = '1234';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const deptId = params.get('dept');

let deptConfig = null, allPlacements = [], deptTeachers = [], isAuth = false;

async function init() {
    if(!deptId) { document.getElementById('error-screen').style.display = 'block'; return; }
    document.getElementById('loginDeptName').textContent = deptId;
    document.getElementById('login-screen').classList.add('show');

    const { data } = await sb.from('departments').select('*').eq('id', deptId).single();
    deptConfig = data;
    if(!deptConfig) {
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('login-screen').classList.remove('show');
        document.getElementById('errorMsg').textContent = 'המגמה טרם הוגדרה ע"י המנהלת הפדגוגית.';
        return;
    }
    if(deptConfig.teachers?.length) {
        const { data: teachers } = await sb.from('teachers').select('*').in('id_number', deptConfig.teachers);
        deptTeachers = teachers || [];
    }
}

function doLogin() {
    const pass = document.getElementById('loginPass').value;
    if(pass !== RAKAZ_PASS) { document.getElementById('loginErr').style.display='block'; return; }
    isAuth = true;
    document.getElementById('login-screen').classList.remove('show');
    document.getElementById('app').style.display = 'block';
    document.getElementById('deptTitle').textContent = deptId;
    document.getElementById('addForm').style.display = 'block';
    populateForm();
    loadPlacements();
}

document.getElementById('loginPass').addEventListener('keyup', e => { if(e.key==='Enter') doLogin(); });

function getSubjectName(s) { return (typeof s === 'object') ? s.name : s; }

function populateForm() {
    document.getElementById('inTeacher').innerHTML = '<option value="">— בחר מורה —</option>' +
        deptTeachers.map(t => `<option value="${t.id_number}">${t.name}</option>`).join('');
    const subjects = Object.values(deptConfig.structure||{}).flatMap(r => r.subjects||[]).map(getSubjectName);
    document.getElementById('inSubject').innerHTML = '<option value="">— בחר מקצוע —</option>' +
        subjects.map(s => `<option value="${s}">${s}</option>`).join('');
}

async function loadPlacements() {
    const { data } = await sb.from('placements').select('*, teachers(name, id_number)').eq('dept_id', deptId).eq('framework', 'אופק');
    allPlacements = data || [];
    renderGrid();
}

function renderGrid() {
    const year = document.getElementById('gridYear').value;
    const filtered = allPlacements.filter(p => p.year === year);
    const container = document.getElementById('gridContainer');
    container.innerHTML = '';
    document.getElementById('gridComparison').innerHTML = '';
    const struct = deptConfig?.structure || {};
    const rowColors = ['row-indigo','row-green','row-gray'];

    ['ז','ח','ט'].forEach(g => {
        const gData = filtered.filter(p => p.grade === g);
        const box = document.createElement('div');
        box.className = 'grade-box';
        let html = `<div class="grade-title">שכבת ${g} — ${year}</div>`;

        Object.values(struct).forEach((row, idx) => {
            const rowSubjNames = (row.subjects||[]).map(getSubjectName);
            const rowData = gData.filter(p => rowSubjNames.includes(p.subject));
            const color = rowColors[Math.min(idx, rowColors.length-1)];
            html += `<div class="row-section ${color}"><div class="row-label">📌 ${row.label}</div><div class="cards-grid">`;
            html += rowData.length
                ? rowData.map(p => cardHTML(p)).join('')
                : '<div class="empty-row">אין שיבוצים</div>';
            html += '</div></div>';
        });

        const allSubjs = Object.values(struct).flatMap(r => r.subjects||[]).map(getSubjectName);
        const uncat = gData.filter(p => !allSubjs.includes(p.subject));
        if(uncat.length) {
            html += `<div class="row-section row-gray"><div class="row-label">📌 כללי</div><div class="cards-grid">`;
            html += uncat.map(p => cardHTML(p)).join('');
            html += '</div></div>';
        }

        box.innerHTML = html;
        container.appendChild(box);
    });

    // השוואה בין שנים
    buildComparisonHTML(deptId, year).then(html => {
        document.getElementById('gridComparison').innerHTML = html;
    });
}

function cardHTML(p) {
    const isPartanut = p.type === 'פרטנות';
    const typeBadge = isPartanut
        ? `<span style="background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:800;">פרטנות</span>`
        : `<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:800;">מגע</span>`;
    const subjectDisplay = p.subject_manual ? `${p.subject} <span style="color:#64748b;font-size:11px;">(${p.subject_manual})</span>` : p.subject;
    const hoursDisplay = isPartanut
        ? `<span style="color:#1d4ed8;">פרטנות: ${p.partanut||p.contact}</span><span>גמול: ${p.bonus}</span>`
        : `<span>מגע: ${p.contact}</span><span>גמול: ${p.bonus}</span>`;
    return `<div class="teacher-card" style="${isPartanut ? 'border-right: 4px solid #6366f1;' : ''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
            <div class="tc-name">${p.teachers?.name||'—'}</div>
            ${typeBadge}
        </div>
        <div class="tc-id">${p.teacher_id}</div>
        <div class="tc-subject">${subjectDisplay}</div>
        <div class="tc-hours">${hoursDisplay}</div>
        ${isAuth ? `<button class="del-btn" onclick="deletePlacement(${p.id})">✕</button>` : ''}
    </div>`;
}

function onTypeChange() {
    const type = document.getElementById('inType').value;
    const isPartanut = type === 'פרטנות';
    document.getElementById('fgSubjectSelect').style.display = isPartanut ? 'none' : '';
    document.getElementById('fgSubjectManual').style.display = isPartanut ? '' : 'none';
    document.getElementById('fgContact').style.display = isPartanut ? 'none' : '';
    document.getElementById('fgPartanut').style.display = isPartanut ? '' : 'none';
}

async function addPlacement() {
    const teacher_id = document.getElementById('inTeacher').value;
    const grade = document.getElementById('inGrade').value;
    const year = document.getElementById('inYear').value;
    const type = document.getElementById('inType').value;
    const isPartanut = type === 'פרטנות';
    const bonus = parseFloat(document.getElementById('inBonus').value)||0;

    let subject, subject_manual = null, contact = 0, partanut = 0;

    if(isPartanut) {
        subject_manual = document.getElementById('inSubjectManual').value.trim();
        if(!subject_manual) { showToast('נא לציין שם מקצוע לפרטנות'); return; }
        subject = 'פרטנות';
        partanut = parseFloat(document.getElementById('inPartanut').value)||0;
    } else {
        subject = document.getElementById('inSubject').value;
        if(!subject) { showToast('נא לבחור מקצוע'); return; }
        contact = parseFloat(document.getElementById('inContact').value)||0;
    }

    if(!teacher_id) { showToast('נא לבחור מורה'); return; }

    const { error } = await sb.from('placements').insert({
        teacher_id, dept_id: deptId, year, grade, subject, subject_manual, type, contact, partanut, bonus, framework: 'אופק'
    });
    if(error) { showToast('שגיאה: '+error.message); return; }
    await markDirtyIfApproved();
    showToast('✅ שיבוץ נוסף');
    // reset manual field
    document.getElementById('inSubjectManual').value = '';
    loadPlacements();
}

async function deletePlacement(id) {
    if(!confirm('למחוק שיבוץ זה?')) return;
    await sb.from('placements').delete().eq('id', id);
    await markDirtyIfApproved();
    showToast('🗑 נמחק');
    loadPlacements();
}

function renderSummary() {
    const year = document.getElementById('gridYear').value;
    const filtered = allPlacements.filter(p => p.year === year);
    const loads = {};
    filtered.forEach(p => {
        const id = p.teacher_id;
        if(!loads[id]) loads[id] = { name: p.teachers?.name||id, contact:0, bonus:0, partanut:0 };
        if(p.type === 'פרטנות') {
            loads[id].partanut += parseFloat(p.partanut)||parseFloat(p.contact)||0;
        } else {
            loads[id].contact += parseFloat(p.contact)||0;
        }
        loads[id].bonus += parseFloat(p.bonus)||0;
    });
    const entries = Object.entries(loads).map(([id,l]) => {
        l.total = l.contact + l.bonus + l.partanut;
        return [id, l];
    }).sort((a,b)=>b[1].total-a[1].total);

    const totalHours = entries.reduce((s,[,l])=>s+l.total,0);
    const alerts = entries.filter(([,l])=>{ const p=l.total/38*100; return p>100||(p<50&&l.total>0); });

    document.getElementById('summaryStats').innerHTML = `
        <div class="stat-box"><div class="stat-num">${entries.length}</div><div class="stat-lbl">מורים פעילים</div></div>
        <div class="stat-box"><div class="stat-num">${totalHours.toFixed(1)}</div><div class="stat-lbl">סה"כ שעות</div></div>
        <div class="stat-box"><div class="stat-num">${filtered.length}</div><div class="stat-lbl">שיבוצים</div></div>
        <div class="stat-box"><div class="stat-num">${year}</div><div class="stat-lbl">שנת לימודים</div></div>`;

    const banner = document.getElementById('alertBanner');
    if(alerts.length) {
        banner.classList.add('show');
        document.getElementById('alertList').innerHTML = alerts.map(([,l])=>`<div class="alert-item">• ${l.name} — ${(l.total/38*100).toFixed(0)}% משרה (${l.total.toFixed(1)} שעות)</div>`).join('');
    } else banner.classList.remove('show');

    document.getElementById('summaryBody').innerHTML = entries.map(([id,l])=>{
        const pct=l.total/38*100;
        const color=pct>100?'#ef4444':pct<50&&l.total>0?'#f97316':'#10b981';
        const cls=pct>100?'badge-over':pct<50&&l.total>0?'badge-low':'badge-ok';
        const txt=pct>100?'⚠️ חריגה':pct<50&&l.total>0?'⚡ חסר':'✓ תקין';
        const partanutCell = l.partanut > 0
            ? `<span style="color:#1d4ed8;font-weight:800;">${l.partanut.toFixed(1)}</span>`
            : `<span style="color:#cbd5e1;">—</span>`;
        return `<tr>
            <td style="font-family:monospace;font-size:12px;color:#94a3b8;">${id}</td>
            <td style="font-weight:800;">${l.name}</td>
            <td style="text-align:center;">${l.contact.toFixed(1)}</td>
            <td style="text-align:center;">${l.bonus.toFixed(1)}</td>
            <td style="text-align:center;">${partanutCell}</td>
            <td style="text-align:center;font-weight:900;">${l.total.toFixed(1)}</td>
            <td><span style="font-weight:900;color:${color};">${pct.toFixed(0)}%</span>
                <span class="pct-bar-bg"><span class="pct-bar-fill" style="width:${Math.min(pct,100)}%;background:${color};"></span></span></td>
            <td><span class="badge ${cls}">${txt}</span></td>
        </tr>`;
    }).join('')||'<tr><td colspan="8" style="text-align:center;padding:30px;color:#94a3b8;">אין שיבוצים לשנה זו</td></tr>';
}

function exportExcel() {
    const year = document.getElementById('gridYear').value;
    const filtered = allPlacements.filter(p=>p.year===year);
    const loads = {};
    filtered.forEach(p=>{
        if(!loads[p.teacher_id]) loads[p.teacher_id]={name:p.teachers?.name||p.teacher_id,contact:0,bonus:0,partanut:0};
        if(p.type==='פרטנות') loads[p.teacher_id].partanut+=parseFloat(p.partanut)||parseFloat(p.contact)||0;
        else loads[p.teacher_id].contact+=parseFloat(p.contact)||0;
        loads[p.teacher_id].bonus+=parseFloat(p.bonus)||0;
    });
    const rows=[['ת.ז','שם מורה','שעות מגע','שעות גמול','פרטנות','סה"כ','% משרה','סטטוס']];
    Object.entries(loads).sort((a,b)=>(b[1].contact+b[1].bonus+b[1].partanut)-(a[1].contact+a[1].bonus+a[1].partanut)).forEach(([id,l])=>{
        const total=l.contact+l.bonus+l.partanut;
        const pct=(total/38*100).toFixed(0);
        rows.push([id,l.name,l.contact.toFixed(1),l.bonus.toFixed(1),l.partanut.toFixed(1),total.toFixed(1),pct+'%',pct>100?'חריגה':pct<50?'חסר':'תקין']);
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:14},{wch:20},{wch:12},{wch:12},{wch:12},{wch:10},{wch:10},{wch:14}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,`משרות ${year}`);
    XLSX.writeFile(wb,`משרות_${deptId}_${year}.xlsx`);
}

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('tbtn-'+tab).classList.add('active');
    if(tab==='summary') renderSummary();
}


// ===== YEAR COMPARISON COMPONENT =====
const YEAR_ORDER = ['תשפו', 'תשפז'];
function getPrevYear(year) { const idx=YEAR_ORDER.indexOf(year); return idx>0?YEAR_ORDER[idx-1]:null; }

async function buildComparisonHTML(deptId, currentYear) {
    const prevYear = getPrevYear(currentYear);
    if (!prevYear) return '<div style="color:#94a3b8;padding:20px;text-align:center;">אין נתוני שנה קודמת להשוואה</div>';
    const {data:prevData} = await sb.from('placements').select('*,teachers(name,id_number)').eq('dept_id',deptId).eq('year',prevYear);
    const {data:currData} = await sb.from('placements').select('*,teachers(name,id_number)').eq('dept_id',deptId).eq('year',currentYear);
    const prev={}, curr={};
    (prevData||[]).forEach(p=>{if(!prev[p.teacher_id])prev[p.teacher_id]={name:p.teachers?.name||p.teacher_id,total:0};prev[p.teacher_id].total+=(parseFloat(p.contact)||0)+(parseFloat(p.bonus)||0);});
    (currData||[]).forEach(p=>{if(!curr[p.teacher_id])curr[p.teacher_id]={name:p.teachers?.name||p.teacher_id,total:0};curr[p.teacher_id].total+=(parseFloat(p.contact)||0)+(parseFloat(p.bonus)||0);});
    const allIds=[...new Set([...Object.keys(curr),...Object.keys(prev)])];
    const rows=allIds.map(id=>({id,name:curr[id]?.name||prev[id]?.name||id,curr:curr[id]?.total||0,prev:prev[id]?.total||0,isNew:!prev[id]})).sort((a,b)=>b.curr-a.curr);
    const maxVal=Math.max(...rows.map(r=>Math.max(r.curr,r.prev)),1);
    const barW=28,gap=8,groupW=barW*2+gap+16,svgH=160,maxBarH=100;
    const svgW=Math.max(rows.length*groupW+60,300);
    const bars=rows.map((r,i)=>{
        const x=40+i*groupW;
        const hC=r.curr>0?Math.max((r.curr/maxVal)*maxBarH,4):0;
        const hP=r.prev>0?Math.max((r.prev/maxVal)*maxBarH,4):0;
        const yC=svgH-30-hC,yP=svgH-30-hP;
        const diff=r.curr-r.prev;
        const col=r.isNew?'#10b981':diff>0?'#6366f1':diff<0?'#f97316':'#6366f1';
        const nm=r.name.split(' ').slice(-1)[0].substring(0,6);
        return `<rect x="${x}" y="${yP}" width="${barW}" height="${hP}" rx="4" fill="#cbd5e1" opacity="0.8"/>
<rect x="${x+barW+gap}" y="${yC}" width="${barW}" height="${hC}" rx="4" fill="${col}"/>
${r.curr>0?`<text x="${x+barW+gap+barW/2}" y="${yC-4}" text-anchor="middle" font-size="9" fill="#475569" font-family="Heebo">${r.curr}</text>`:''}
<text x="${x+barW}" y="${svgH-12}" text-anchor="middle" font-size="9" fill="#64748b" font-family="Heebo">${nm}</text>
${r.isNew?`<text x="${x+barW}" y="${svgH-2}" text-anchor="middle" font-size="8" fill="#10b981" font-family="Heebo">חדש</text>`:''}`;
    }).join('');
    const tRows=rows.map(r=>{
        const diff=r.curr-r.prev;
        const arrow=diff>0?'▲':diff<0?'▼':'—';
        const col=r.isNew?'#10b981':diff>0?'#6366f1':diff<0?'#f97316':'#64748b';
        const badge=r.isNew?'<span style="background:#dcfce7;color:#10b981;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:800;">חדש</span>':'';
        return `<tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:10px 14px;font-weight:800;">${r.name} ${badge}</td>
            <td style="padding:10px 14px;text-align:center;color:#94a3b8;">${r.prev>0?r.prev.toFixed(1):'0'}</td>
            <td style="padding:10px 14px;text-align:center;font-weight:900;">${r.curr>0?r.curr.toFixed(1):'—'}</td>
            <td style="padding:10px 14px;text-align:center;font-weight:900;color:${col};">${r.isNew?'+'+r.curr.toFixed(1):diff!==0?(diff>0?'+':'')+diff.toFixed(1):'—'} ${r.isNew?'':arrow}</td>
        </tr>`;
    }).join('');
    return `<div style="background:white;border-radius:20px;padding:24px;margin-top:24px;border:2px solid #e2e8f0;box-shadow:0 4px 10px rgba(0,0,0,0.04);">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap;">
            <h3 style="font-family:'Secular One';font-size:18px;color:#1e293b;margin:0;">📈 השוואה: ${prevYear} ← ${currentYear}</h3>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <span style="font-size:12px;color:#64748b;font-weight:700;display:flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:#cbd5e1;border-radius:3px;display:inline-block;"></span>${prevYear}</span>
                <span style="font-size:12px;color:#64748b;font-weight:700;display:flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:#6366f1;border-radius:3px;display:inline-block;"></span>${currentYear}</span>
                <span style="font-size:12px;color:#64748b;font-weight:700;display:flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:#10b981;border-radius:3px;display:inline-block;"></span>מורה חדש</span>
                <span style="font-size:12px;color:#64748b;font-weight:700;display:flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:#f97316;border-radius:3px;display:inline-block;"></span>ירידה</span>
            </div>
        </div>
        <div style="overflow-x:auto;margin-bottom:20px;">
            <svg width="${svgW}" height="${svgH}" style="min-width:300px;display:block;">
                <line x1="35" y1="${svgH-30}" x2="${svgW-10}" y2="${svgH-30}" stroke="#e2e8f0" stroke-width="1"/>
                ${bars}
            </svg>
        </div>
        <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;font-size:13px;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.04);">
                <thead><tr style="background:#1e293b;color:white;">
                    <th style="padding:11px 14px;text-align:right;">מורה</th>
                    <th style="padding:11px 14px;text-align:center;">${prevYear}</th>
                    <th style="padding:11px 14px;text-align:center;">${currentYear}</th>
                    <th style="padding:11px 14px;text-align:center;">שינוי</th>
                </tr></thead>
                <tbody>${tRows}</tbody>
            </table>
        </div>
    </div>`;
}
// ===== END COMPARISON =====

function showToast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
}

// ===== DIRTY FLAG =====
async function markDirtyIfApproved() {
    if(!deptId) return;
    const { data } = await sb.from('departments').select('status').eq('id', deptId).single();
    if(data && data.status === 'approved') {
        await sb.from('departments').update({
            status: 'approved_dirty',
            dirty_at: new Date().toISOString()
        }).eq('id', deptId);
    }
}
