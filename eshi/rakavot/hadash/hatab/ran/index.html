<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>פורטל ניהול פדגוגי — גליל מערבי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Secular+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8fafc; --white:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b;
    --admin:#1e293b; --menahelet:#6366f1; --rakaz:#10b981; --danger:#ef4444;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; direction:rtl; overflow-x:hidden; }
  .bg-blobs { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .blob { position:absolute; border-radius:50%; filter:blur(90px); opacity:.45; }
  .blob-1 { width:500px; height:500px; top:-150px; right:-100px; background:rgba(99,102,241,.18); }
  .blob-2 { width:400px; height:400px; bottom:-100px; left:-80px; background:rgba(16,185,129,.14); }
  .blob-3 { width:300px; height:300px; top:40%; left:40%; background:rgba(245,158,11,.1); }
  .hero { position:relative; z-index:1; text-align:center; padding:52px 20px 36px; }
  .school-badge { display:inline-flex; align-items:center; gap:7px; background:rgba(99,102,241,.1); border:1px solid rgba(99,102,241,.25); border-radius:20px; padding:5px 16px; font-size:.78rem; font-weight:700; color:#6366f1; margin-bottom:18px; }
  h1 { font-family:'Secular One'; font-size:clamp(1.8rem,6vw,2.6rem); color:var(--text); margin-bottom:10px; line-height:1.2; }
  .hero-sub { color:var(--muted); font-size:.9rem; margin-bottom:40px; }
  .cards { position:relative; z-index:1; display:flex; flex-direction:column; gap:12px; padding:0 16px 40px; max-width:480px; margin:0 auto; }
  .entry-card { background:var(--white); border-radius:18px; border:1.5px solid var(--border); overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.06); transition:transform .2s; }
  .entry-card:active { transform:scale(.98); }
  .card-header { padding:18px 20px 14px; display:flex; align-items:center; gap:14px; cursor:pointer; user-select:none; }
  .card-icon { width:48px; height:48px; border-radius:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
  .icon-admin     { background:#f1f5f9; }
  .icon-menahelet { background:#eef2ff; }
  .icon-rakaz     { background:#ecfdf5; }
  .card-info { flex:1; }
  .card-title { font-family:'Secular One'; font-size:1.05rem; color:var(--text); margin-bottom:2px; }
  .card-desc  { font-size:.76rem; color:var(--muted); }
  .card-arrow { font-size:1rem; color:var(--muted); transition:transform .25s; }
  .entry-card.open .card-arrow { transform:rotate(90deg); }
  .entry-card.card-admin     { border-top:3px solid var(--admin); }
  .entry-card.card-menahelet { border-top:3px solid var(--menahelet); }
  .entry-card.card-rakaz     { border-top:3px solid var(--rakaz); }
  .card-panel { max-height:0; overflow:hidden; transition:max-height .35s ease; }
  .card-panel.open { max-height:260px; }
  .panel-inner { padding:0 20px 20px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:.72rem; font-weight:800; color:var(--muted); margin-bottom:6px; letter-spacing:.5px; text-transform:uppercase; }
  .field input { width:100%; background:var(--bg); border:2px solid var(--border); border-radius:10px; padding:12px 14px; font-family:'Heebo'; font-size:.95rem; color:var(--text); outline:none; transition:border-color .2s; }
  .field input:focus { border-color:var(--menahelet); background:var(--white); }
  .error-msg { color:var(--danger); font-size:.78rem; margin-bottom:10px; min-height:18px; }
  .btn-enter { width:100%; padding:13px; border:none; border-radius:12px; font-family:'Heebo'; font-weight:800; font-size:.95rem; cursor:pointer; transition:opacity .2s; touch-action:manipulation; }
  .btn-enter:active { opacity:.85; }
  .btn-admin     { background:var(--admin); color:#fff; }
  .btn-menahelet { background:linear-gradient(135deg,#6366f1,#4f46e5); color:#fff; }
  .btn-rakaz     { background:linear-gradient(135deg,#10b981,#059669); color:#fff; }
  footer { position:relative; z-index:1; text-align:center; font-size:.72rem; color:#cbd5e1; padding:20px; }
</style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="hero">
  <div class="school-badge">🏫 בית חינוך גליל מערבי</div>
  <h1>פורטל ניהול פדגוגי</h1>
  <p class="hero-sub">בחר את סביבת הכניסה שלך</p>
</div>

<div class="cards">

  <!-- מנהלת -->
  <div class="entry-card card-menahelet" id="card-menahelet">
    <div class="card-header" onclick="toggle('menahelet')">
      <div class="card-icon icon-menahelet">🏰</div>
      <div class="card-info">
        <div class="card-title">סביבת מנהלת</div>
        <div class="card-desc">מאגר מורים, סטטיסטיקות ומשרות</div>
      </div>
      <span class="card-arrow">›</span>
    </div>
    <div class="card-panel" id="panel-menahelet">
      <div class="panel-inner">
        <div class="field"><label>סיסמה</label><input type="password" id="pass-menahelet" placeholder="••••••"></div>
        <div class="error-msg" id="err-menahelet"></div>
        <button class="btn-enter btn-menahelet" onclick="enter('menahelet','menahelet.html','pass_menahelet','1234')">כניסה ←</button>
      </div>
    </div>
  </div>

  <!-- רכזת פדגוגית -->
  <div class="entry-card card-rakaz" id="card-rakaz">
    <div class="card-header" onclick="toggle('rakaz')">
      <div class="card-icon icon-rakaz">📝</div>
      <div class="card-info">
        <div class="card-title">סביבת רכזת פדגוגית</div>
        <div class="card-desc">ניהול מגמות, שיבוצים וקישורים</div>
      </div>
      <span class="card-arrow">›</span>
    </div>
    <div class="card-panel" id="panel-rakaz">
      <div class="panel-inner">
        <div class="field"><label>סיסמה</label><input type="password" id="pass-rakaz" placeholder="••••••"></div>
        <div class="error-msg" id="err-rakaz"></div>
        <button class="btn-enter btn-rakaz" onclick="enter('rakaz','rakazpedagogi.html','pass_rakazpd','1234')">כניסה ←</button>
      </div>
    </div>
  </div>

  <!-- אדמין -->
  <div class="entry-card card-admin" id="card-admin">
    <div class="card-header" onclick="toggle('admin')">
      <div class="card-icon icon-admin">🛡️</div>
      <div class="card-info">
        <div class="card-title">ניהול מערכת</div>
        <div class="card-desc">אדמין — גישה מלאה</div>
      </div>
      <span class="card-arrow">›</span>
    </div>
    <div class="card-panel" id="panel-admin">
      <div class="panel-inner">
        <div class="field"><label>סיסמת מנהל</label><input type="password" id="pass-admin" placeholder="••••••••"></div>
        <div class="error-msg" id="err-admin"></div>
        <button class="btn-enter btn-admin" onclick="enterAdmin()">כניסה ←</button>
      </div>
    </div>
  </div>

</div>

<footer>© גליל מערבי — מערכת ניהול פדגוגי תשפ"ז</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://xxrrqaolggawkutjwtbk.supabase.co',
  'sb_publishable_JPaHTkx93APc1b1IbYbFSg_QBvdjQN1'
);
const ADMIN_PASS = 'Galil2025!';
let openCard = null;

function toggle(name) {
  if (openCard && openCard !== name) {
    document.getElementById('panel-'+openCard).classList.remove('open');
    document.getElementById('card-'+openCard).classList.remove('open');
  }
  const panel = document.getElementById('panel-'+name);
  const card  = document.getElementById('card-'+name);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  card.classList.toggle('open', !isOpen);
  openCard = isOpen ? null : name;
}

async function enter(name, url, settingKey, fallback) {
  const pass = document.getElementById('pass-'+name).value;
  const err  = document.getElementById('err-'+name);
  err.textContent = '';
  if (!pass) { err.textContent = 'נא להזין סיסמה'; return; }
  const { data } = await sb.from('system_settings').select('value').eq('key', settingKey).single();
  const correct = data?.value || fallback;
  if (pass !== correct) { err.textContent = 'סיסמה שגויה'; return; }
  location.href = url;
}

function enterAdmin() {
  const pass = document.getElementById('pass-admin').value;
  const err  = document.getElementById('err-admin');
  err.textContent = '';
  if (!pass) { err.textContent = 'נא להזין סיסמה'; return; }
  if (pass !== ADMIN_PASS) { err.textContent = 'סיסמה שגויה'; return; }
  location.href = 'ran/admin.html';
}

['menahelet','rakaz','admin'].forEach(name => {
  document.getElementById('pass-'+name).addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (name === 'admin') enterAdmin();
    else if (name === 'menahelet') enter('menahelet','menahelet.html','pass_menahelet','1234');
    else enter('rakaz','rakazpedagogi.html','pass_rakazpd','1234');
  });
});
</script>
</body>
</html>
