<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>קישורי רכזי מקצוע — גליל מערבי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Secular+One&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#f1f5f9; --white:#fff; --border:#e2e8f0;
    --accent:#6366f1; --accent-bg:#eef2ff;
    --success:#10b981; --success-bg:#d1fae5;
    --danger:#ef4444; --danger-bg:#fee2e2;
    --hatav:#0ea5e9; --hatav-bg:#e0f2fe;
    --hatab:#8b5cf6; --hatab-bg:#ede9fe;
    --text:#1e293b; --muted:#64748b; --radius:14px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; direction:rtl; }

  .header { background:var(--white); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .header h1 { font-family:'Secular One'; font-size:1.05rem; color:var(--text); }
  .btn-back { background:none; border:1px solid var(--border); color:var(--muted); padding:7px 14px; border-radius:8px; font-family:'Heebo'; font-size:.8rem; cursor:pointer; text-decoration:none; display:inline-block; }

  .content { padding:16px; max-width:700px; margin:0 auto; padding-bottom:30px; }

  /* TABS */
  .tabs { display:flex; gap:8px; margin-bottom:20px; }
  .tab-btn { flex:1; padding:11px; border-radius:12px; border:2px solid var(--border); background:var(--white); font-family:'Heebo'; font-weight:800; font-size:.88rem; cursor:pointer; text-align:center; transition:all .15s; color:var(--muted); touch-action:manipulation; }
  .tab-btn.active-hatav { border-color:var(--hatav); background:var(--hatav-bg); color:var(--hatav); }
  .tab-btn.active-hatab { border-color:var(--hatab); background:var(--hatab-bg); color:var(--hatab); }

  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* DEPT CARD */
  .dept-card { background:var(--white); border-radius:var(--radius); border:1px solid var(--border); margin-bottom:12px; overflow:hidden; }
  .dept-header { padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .dept-name { font-weight:800; font-size:1rem; }
  .dept-pm { font-size:.78rem; color:var(--muted); margin-top:2px; }

  .badge-hatav { background:var(--hatav-bg); color:var(--hatav); padding:3px 10px; border-radius:6px; font-size:.72rem; font-weight:800; white-space:nowrap; }
  .badge-hatab { background:var(--hatab-bg); color:var(--hatab); padding:3px 10px; border-radius:6px; font-size:.72rem; font-weight:800; white-space:nowrap; }

  .dept-actions { padding:0 16px 14px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }

  /* COPY LINK */
  .link-box { display:flex; gap:6px; align-items:center; flex:1; min-width:0; }
  .link-url { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:.75rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; direction:ltr; text-align:left; }
  .btn-copy { padding:8px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:'Heebo'; font-weight:700; font-size:.78rem; cursor:pointer; white-space:nowrap; touch-action:manipulation; flex-shrink:0; }
  .btn-copy:active { opacity:.8; }

  /* EDIT PM */
  .btn-edit-pm { padding:7px 12px; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; font-family:'Heebo'; font-weight:700; font-size:.78rem; cursor:pointer; color:var(--muted); white-space:nowrap; touch-action:manipulation; }

  /* EDIT PANEL */
  .edit-panel { display:none; background:var(--bg); border-top:1px solid var(--border); padding:14px 16px; }
  .edit-panel.open { display:block; }
  .edit-label { font-size:.72rem; font-weight:800; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
  .edit-row { display:flex; gap:8px; }
  .edit-select { flex:1; background:var(--white); border:2px solid var(--border); border-radius:8px; padding:9px 12px; font-family:'Heebo'; font-size:.9rem; color:var(--text); outline:none; transition:border-color .2s; }
  .edit-select:focus { border-color:var(--accent); }
  .btn-save-pm { padding:9px 16px; background:var(--success); color:#fff; border:none; border-radius:8px; font-family:'Heebo'; font-weight:800; font-size:.85rem; cursor:pointer; white-space:nowrap; touch-action:manipulation; }

  /* EMPTY / SPINNER */
  .empty { text-align:center; padding:40px; color:var(--muted); font-size:.9rem; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:11px 22px; border-radius:12px; font-weight:700; font-size:.85rem; z-index:999; display:none; white-space:nowrap; box-shadow:0 8px 20px rgba(0,0,0,.2); }
  .toast.show { display:block; animation:fadeUp .3s; }
  @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <h1>🔗 קישורי רכזי מקצוע</h1>
  <a class="btn-back" href="admin.html">← חזרה</a>
</div>

<div class="content">
  <div class="tabs">
    <button class="tab-btn active-hatav" id="tbtn-hatav" onclick="switchTab('hatav')">🏫 חטיבה עליונה</button>
    <button class="tab-btn" id="tbtn-hatab" onclick="switchTab('hatab')">🏛 חטיבת ביניים</button>
  </div>

  <div class="tab-content active" id="tab-hatav">
    <div class="empty"><span class="spinner"></span></div>
  </div>
  <div class="tab-content" id="tab-hatab">
    <div class="empty"><span class="spinner"></span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://xxrrqaolggawkutjwtbk.supabase.co',
  'sb_publishable_JPaHTkx93APc1b1IbYbFSg_QBvdjQN1'
);

const BASE_URL_HATAV = '../rakazmegama.html';
const BASE_URL_HATAB = '../rakazmegama-ofek.html';

let allDepts = [];
let allPMs   = [];

async function init() {
  const [deptsRes, pmsRes] = await Promise.all([
    sb.from('departments').select('id, structure').order('id'),
    sb.from('pedagogical_managers').select('name, assigned_depts').order('name')
  ]);
  allDepts = deptsRes.data || [];
  allPMs   = pmsRes.data  || [];
  renderTab('hatav');
  renderTab('hatab');
}

function getPMForDept(deptId) {
  const pm = allPMs.find(p => (p.assigned_depts||[]).includes(deptId));
  return pm?.name || '—';
}

function renderTab(type) {
  const isHatab = type === 'hatab';
  const filtered = allDepts.filter(d => isHatab ? d.id.includes('חטב') : !d.id.includes('חטב'));
  const el = document.getElementById('tab-' + type);
  const baseUrl = isHatab ? BASE_URL_HATAB : BASE_URL_HATAV;
  const badgeClass = isHatab ? 'badge-hatab' : 'badge-hatav';
  const badgeLabel = isHatab ? 'חטב' : 'חטע';

  if (!filtered.length) { el.innerHTML = '<div class="empty">אין מקצועות</div>'; return; }

  el.innerHTML = filtered.map((dept, i) => {
    const pm   = getPMForDept(dept.id);
    const link = `${baseUrl}?dept=${encodeURIComponent(dept.id)}`;
    const pmOptions = allPMs.map(p =>
      `<option value="${p.name}" ${p.name===pm?'selected':''}>${p.name}</option>`
    ).join('');

    return `<div class="dept-card" id="dcard-${type}-${i}">
      <div class="dept-header">
        <div>
          <div class="dept-name">${dept.id}</div>
          <div class="dept-pm">רכזת: <strong id="pm-label-${type}-${i}">${pm}</strong></div>
        </div>
        <span class="${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="dept-actions">
        <div class="link-box">
          <div class="link-url" title="${link}">${link}</div>
          <button class="btn-copy" onclick="copyLink('${link}','${dept.id}')">📋 העתק</button>
        </div>
        <button class="btn-edit-pm" onclick="toggleEdit('${type}','${i}')">✏️ רכזת</button>
      </div>
      <div class="edit-panel" id="edit-${type}-${i}">
        <div class="edit-label">שנה רכזת פדגוגית אחראית</div>
        <div class="edit-row">
          <select class="edit-select" id="pm-sel-${type}-${i}">
            <option value="">— ללא רכזת —</option>
            ${pmOptions}
          </select>
          <button class="btn-save-pm" onclick="savePM('${dept.id}','${type}','${i}')">שמור</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function switchTab(type) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + type).classList.add('active');
  document.getElementById('tbtn-hatav').className = 'tab-btn' + (type==='hatav'?' active-hatav':'');
  document.getElementById('tbtn-hatab').className = 'tab-btn' + (type==='hatab'?' active-hatab':'');
}

function toggleEdit(type, i) {
  const panel = document.getElementById(`edit-${type}-${i}`);
  panel.classList.toggle('open');
}

async function savePM(deptId, type, i) {
  const newPM = document.getElementById(`pm-sel-${type}-${i}`).value;

  // הסר את המגמה מכל הרכזות הקיימות
  for (const pm of allPMs) {
    if ((pm.assigned_depts||[]).includes(deptId)) {
      const updated = pm.assigned_depts.filter(d => d !== deptId);
      await sb.from('pedagogical_managers').update({ assigned_depts: updated }).eq('name', pm.name);
      pm.assigned_depts = updated;
    }
  }

  // הוסף לרכזת החדשה
  if (newPM) {
    const pm = allPMs.find(p => p.name === newPM);
    if (pm) {
      const updated = [...(pm.assigned_depts||[]), deptId];
      await sb.from('pedagogical_managers').update({ assigned_depts: updated }).eq('name', newPM);
      pm.assigned_depts = updated;
    }
  }

  // עדכן תצוגה
  document.getElementById(`pm-label-${type}-${i}`).textContent = newPM || '—';
  document.getElementById(`edit-${type}-${i}`).classList.remove('open');
  showToast(`✅ רכזת ${deptId} עודכנה`);
}

function copyLink(link, deptId) {
  navigator.clipboard.writeText(link).then(() => showToast(`📋 קישור ${deptId} הועתק`));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
