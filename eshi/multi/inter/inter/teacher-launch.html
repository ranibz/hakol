<!-- version: 8 -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כיתה חיה — הפעלת שיעור</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&family=Assistant:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6f9;
    --white: #ffffff;
    --border: #dde2ea;
    --accent: #f0a500;
    --accent2: #e05a00;
    --live: #1a9e4a;
    --live-bg: #edfaf2;
    --self: #1a6ecf;
    --self-bg: #eef4fd;
    --text: #1a1f2e;
    --muted: #7a8499;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Assistant', sans-serif;
    font-size: 16px;
    min-height: 100vh;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    font-family: 'Heebo', sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 6px var(--live);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .ver { font-size: .72rem; color: #bbb; margin-right: auto; }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
  }

  .card-title {
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    font-size: .78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  /* שיעורים */
  #lesson-list { display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }

  .lesson-item:hover { border-color: #bcc5d6; background: #fafbfc; }
  .lesson-item.selected { border-color: var(--accent); background: #fffbf0; }

  .radio {
    width: 17px; height: 17px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s;
  }

  .lesson-item.selected .radio { border-color: var(--accent); background: var(--accent); }
  .lesson-item.selected .radio::after { content:''; width:5px; height:5px; border-radius:50%; background:#fff; }

  .lesson-title { font-weight: 600; font-size: .95rem; }
  .lesson-sub { font-size: .78rem; color: var(--muted); margin-top: 1px; }
  .lesson-tag {
    margin-right: auto;
    font-size: .72rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: #f0f2f5;
    color: var(--muted);
    white-space: nowrap;
  }

  .loading-row { display:flex; align-items:center; gap:10px; color:var(--muted); padding:16px 0; font-size:.9rem; }
  .spinner { width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty { color:var(--muted); font-size:.9rem; padding:12px 0; }

  /* מצב */
  .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .mode-card {
    padding: 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: flex; align-items: flex-start; gap: 12px;
  }

  .mode-card:hover { border-color: #bcc5d6; }
  .mode-card.sel-live { border-color: var(--live); background: var(--live-bg); }
  .mode-card.sel-self { border-color: var(--self); background: var(--self-bg); }

  .mode-icon { font-size: 1.4rem; flex-shrink:0; }
  .mode-label { font-family:'Heebo',sans-serif; font-weight:700; font-size:.95rem; margin-bottom:3px; }
  .mode-card.sel-live .mode-label { color: var(--live); }
  .mode-card.sel-self .mode-label { color: var(--self); }
  .mode-desc { font-size:.8rem; color:var(--muted); line-height:1.4; }

  /* הפעלה */
  .action-row { display:flex; gap:10px; flex-wrap:wrap; }

  .btn-launch {
    flex:1; min-width:150px;
    padding: 13px 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none; border-radius: var(--radius);
    font-family: 'Heebo', sans-serif; font-weight: 800; font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: opacity .2s;
  }
  .btn-launch:hover { opacity:.88; }
  .btn-launch:disabled { opacity:.35; cursor:default; }

  .btn-teacher {
    padding: 13px 18px;
    background: var(--white);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    font-family: 'Heebo', sans-serif; font-weight: 600; font-size: .95rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: border-color .15s, background .15s;
    white-space: nowrap;
  }
  .btn-teacher:hover { border-color: var(--accent); background: #fffbf0; }
  .btn-teacher:disabled { opacity:.35; cursor:default; }

  #code-box {
    display: none;
    margin-top: 16px;
    padding: 14px 18px;
    background: var(--live-bg);
    border: 1.5px solid #a8e8c0;
    border-radius: 8px;
    align-items: center; gap: 14px;
    flex-wrap: wrap;
  }

  .code-label { font-size: .78rem; color: var(--muted); margin-bottom: 2px; }
  .code-val { font-family:'Heebo',sans-serif; font-weight:900; font-size:2rem; color:var(--live); letter-spacing:6px; }

  #btn-copy {
    margin-right: auto;
    padding: 6px 14px;
    border: 1.5px solid #a8e8c0;
    background: none; border-radius: 6px;
    color: var(--live); font-size: .82rem; cursor: pointer;
    font-family: 'Assistant', sans-serif;
    transition: background .15s;
  }
  #btn-copy:hover { background: #d0f5e0; }

  #status { font-size: .85rem; color: var(--muted); margin-top: 10px; min-height: 18px; }

  @media(max-width:560px){
    .mode-row{grid-template-columns:1fr;}
    .action-row{flex-direction:column;}
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="dot"></span> כיתה חיה</div>
  <span class="ver">v8</span>
</header>

<main>

  <div class="card">
    <div class="card-title">1 — בחר שיעור</div>
    <div id="lesson-list">
      <div class="loading-row"><div class="spinner"></div> טוען שיעורים...</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">2 — מצב הפעלה</div>
    <div class="mode-row">
      <div class="mode-card sel-live" id="mode-live" onclick="selectMode('live')">
        <div class="mode-icon">📡</div>
        <div>
          <div class="mode-label">מצב חי</div>
          <div class="mode-desc">המורה שולט בקצב. התלמידים עוקבים בזמן אמת.</div>
        </div>
      </div>
      <div class="mode-card" id="mode-self" onclick="selectMode('self')">
        <div class="mode-icon">🧭</div>
        <div>
          <div class="mode-label">מצב עצמאי</div>
          <div class="mode-desc">כל תלמיד מתקדם בקצב האישי שלו.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">3 — הפעלה</div>
    <div class="action-row">
      <button class="btn-launch" id="btn-launch" onclick="launchLesson()" disabled>▶ הפעל שיעור</button>
      <button class="btn-teacher" id="btn-teacher" onclick="enterTeacher()" disabled>🖥 מסך מורה</button>
    </div>
    <div id="code-box">
      <div>
        <div class="code-label">קוד לתלמידים:</div>
        <div class="code-val" id="code-val">—</div>
      </div>
      <button id="btn-copy" onclick="copyCode()">העתק קישור</button>
    </div>
    <div id="status"></div>
  </div>

</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const sb = createClient(
  'https://seuskpyofhkvejyooghk.supabase.co',
  'sb_publishable_qrLorZwzfmjFh9S3iRa1sQ_u6DVP29b'
);

const STUDENT_URL    = "https://hakolbakaf.co.il/kita-haya/student.html";
const TEACHER_SCREEN = "https://hakolbakaf.co.il/kita-haya/teacher-screen.html";

let selectedLesson = null;
let selectedMode   = 'live';
let activeCode     = null;
let launched       = false;

// ── טעינת שיעורים מ-Supabase ──
async function loadLessons() {
  const list = document.getElementById('lesson-list');
  try {
    const { data, error } = await sb
      .from('sessions')
      .select('code, title, slides')
      .eq('is_template', true)
      .order('code', { ascending: false });

    if (error) throw error;

    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">אין שיעורים שמורים. בנה שיעור בבילדר תחילה.</div>';
      return;
    }

    renderLessons(data);
  } catch(e) {
    list.innerHTML = '<div class="empty">שגיאה בטעינה: ' + e.message + '</div>';
  }
}

function renderLessons(lessons) {
  const list = document.getElementById('lesson-list');
  list.innerHTML = '';
  lessons.forEach(lesson => {
    const slideCount = Array.isArray(lesson.slides) ? lesson.slides.length : '?';
    const div = document.createElement('div');
    div.className = 'lesson-item';
    div.innerHTML = `
      <div class="radio"></div>
      <div>
        <div class="lesson-title">${lesson.title || 'שיעור ללא שם'}</div>
        <div class="lesson-sub">${slideCount} שקפים</div>
      </div>
      <span class="lesson-tag">קוד ${lesson.code}</span>
    `;
    div.onclick = () => selectLesson(div, lesson);
    list.appendChild(div);
  });
}

window.selectLesson = function(el, lesson) {
  document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedLesson = lesson;
  launched = false; activeCode = null;
  document.getElementById('code-box').style.display = 'none';
  resetLaunchBtn();
  updateButtons();
}

window.selectMode = function(mode) {
  selectedMode = mode;
  document.getElementById('mode-live').className = 'mode-card' + (mode==='live' ? ' sel-live' : '');
  document.getElementById('mode-self').className = 'mode-card' + (mode==='self' ? ' sel-self' : '');
}

function updateButtons() {
  document.getElementById('btn-launch').disabled  = !selectedLesson;
  document.getElementById('btn-teacher').disabled = !selectedLesson;
}

function resetLaunchBtn() {
  const btn = document.getElementById('btn-launch');
  btn.textContent = '▶ הפעל שיעור';
  btn.style.background = '';
  btn.disabled = !selectedLesson;
}

window.launchLesson = async function() {
  if (!selectedLesson) return;
  const btn = document.getElementById('btn-launch');
  btn.disabled = true;
  btn.textContent = '...מפעיל';

  try {
    const code = Math.floor(1000 + Math.random() * 9000).toString();
    activeCode = code;

    const sessionMode = selectedMode === 'live' ? 'broadcast' : 'self';

    const { error } = await sb.from('sessions').upsert({
      code,
      title:         selectedLesson.title,
      slides:        selectedLesson.slides,
      current_slide: 0,
      mode:          sessionMode,
      started:       true,
      session_type:  selectedMode === 'live' ? 'live' : 'free'
    });

    if (error) throw error;

    launched = true;
    btn.textContent = '✓ מופעל';
    btn.style.background = 'linear-gradient(135deg,#1a9e4a,#157a3a)';

    document.getElementById('code-val').textContent = code;
    document.getElementById('code-box').style.display = 'flex';
    document.getElementById('status').textContent =
      `✅ השיעור פעיל במצב ${selectedMode === 'live' ? 'חי 📡' : 'עצמאי 🧭'}`;
    document.getElementById('btn-teacher').disabled = false;

  } catch(e) {
    document.getElementById('status').textContent = '❌ שגיאה: ' + e.message;
    btn.disabled = false;
    resetLaunchBtn();
  }
}

window.enterTeacher = async function() {
  if (!launched) await window.launchLesson();
  if (!activeCode) return;
  window.open(`${TEACHER_SCREEN}?code=${activeCode}&mode=${selectedMode}`, '_blank');
}

window.copyCode = function() {
  const link = `${STUDENT_URL}?code=${activeCode}`;
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'הועתק ✓';
    setTimeout(() => btn.textContent = 'העתק קישור', 2000);
  });
}

loadLessons();
</script>
</body>
</html>
