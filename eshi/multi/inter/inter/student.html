<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>כיתה חיה — תלמיד v4</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#fde8f5 0%,#e8f0fd 35%,#e8fdf0 70%,#fdf5e8 100%);background-attachment:fixed;color:#2a1a3a;font-family:'Heebo',sans-serif;min-height:100vh;direction:rtl}
:root{
  --pink:#fce0f5;--pink-b:#e8a8d8;--pink-t:#8a1870;
  --blue:#ddeeff;--blue-b:#a8ccf0;--blue-t:#1840a0;
  --green:#ddf5ea;--green-b:#a8e0c8;--green-t:#185c38;
  --yellow:#fff3cc;--yellow-b:#e8d890;--yellow-t:#7a5800;
  --purple:#eeddf8;--purple-b:#c8a8e8;--purple-t:#5810a0;
  --coral:#ffe0d8;--coral-b:#f0b8a8;--coral-t:#903020;
  --glass:rgba(255,255,255,0.7);--border:rgba(255,255,255,0.9);--text:#2a1a3a;--muted:#7a6a8a;
}
#join-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.brand{font-size:32px;font-weight:900;color:#5810a0}.brand em{color:#d94fbf;font-style:normal}
.join-card{background:rgba(255,255,255,0.75);backdrop-filter:blur(12px);border:1.5px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(100,40,160,.1)}
.join-card h2{font-size:18px;font-weight:900;margin-bottom:4px;text-align:center;color:var(--purple-t)}.join-card p{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.code-inp{width:100%;background:rgba(255,255,255,.7);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:30px;font-weight:900;text-align:center;letter-spacing:8px;padding:14px;outline:none;transition:all .15s;font-variant-numeric:tabular-nums}
.code-inp:focus{background:rgba(255,255,255,.95);border-color:var(--purple-b)}
.name-inp{width:100%;background:rgba(255,255,255,.7);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:16px;text-align:center;padding:12px;outline:none;transition:all .15s;margin-top:10px}
.name-inp:focus{background:rgba(255,255,255,.95);border-color:var(--purple-b)}
.err{color:var(--coral-t);font-size:13px;text-align:center;min-height:18px;margin-top:6px;font-weight:600}
.join-btn{width:100%;margin-top:14px;padding:14px;border-radius:24px;background:linear-gradient(135deg,#c8a0f0,#f0a0d0);border:none;color:#4a0a7a;font-family:'Heebo',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(180,100,220,.2)}
.join-btn:hover{box-shadow:0 6px 20px rgba(180,100,220,.35);transform:translateY(-2px)}.join-btn:active{transform:scale(.98)}
#lesson-screen{display:none;min-height:100vh;flex-direction:column}
.status-bar{background:rgba(255,255,255,.65);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.s-code{font-size:11px;color:var(--muted);font-weight:700;font-family:monospace}
.s-title{flex:1;font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mode-pill{font-size:11px;padding:3px 12px;border-radius:20px;font-weight:700;flex-shrink:0;border:1.5px solid}
.mp-b{background:var(--blue);border-color:var(--blue-b);color:var(--blue-t)}.mp-v{background:var(--pink);border-color:var(--pink-b);color:var(--pink-t)}.mp-t{background:var(--green);border-color:var(--green-b);color:var(--green-t)}.mp-f{background:var(--yellow);border-color:var(--yellow-b);color:var(--yellow-t)}
.slide-view{padding:20px;flex:1}
.sl-title{font-size:22px;font-weight:900;margin-bottom:12px;line-height:1.3}
.sl-body{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:16px}
.sl-body .highlight{background:linear-gradient(120deg,var(--pink) 0%,var(--yellow) 100%);padding:2px 8px;border-radius:6px;font-weight:700;color:var(--text)}
.sl-body .box{background:rgba(255,255,255,0.75);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin:10px 0;font-size:14px}
.sl-body .box-blue{border-color:var(--blue-b);background:var(--blue)}
.sl-body .box-pink{border-color:var(--pink-b);background:var(--pink)}
.sl-body .box-green{border-color:var(--green-b);background:var(--green)}
.sl-body .box-yellow{border-color:var(--yellow-b);background:var(--yellow)}
.sl-body .box h4{font-size:13px;font-weight:800;margin-bottom:6px;color:var(--text)}
.sl-body ul{padding-right:18px;margin:8px 0}
.sl-body li{margin-bottom:6px}
.sl-body .example{border-right:4px solid var(--purple-b);padding-right:12px;margin:10px 0;font-style:italic;color:var(--text)}
.sl-body strong{color:var(--text);font-weight:800}
.vote-opts{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.vote-opt{padding:14px 18px;border-radius:16px;border:2px solid var(--border);background:rgba(255,255,255,.7);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;text-align:right}
.vote-opt:nth-child(1){border-color:var(--pink-b)}.vote-opt:nth-child(2){border-color:var(--blue-b)}.vote-opt:nth-child(3){border-color:var(--green-b)}.vote-opt:nth-child(4){border-color:var(--yellow-b)}
.vote-opt:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08);background:rgba(255,255,255,.95)}
.vote-opt:nth-child(1):hover,.vote-opt.sel:nth-child(1){background:var(--pink);border-color:var(--pink-b);color:var(--pink-t)}
.vote-opt:nth-child(2):hover,.vote-opt.sel:nth-child(2){background:var(--blue);border-color:var(--blue-b);color:var(--blue-t)}
.vote-opt:nth-child(3):hover,.vote-opt.sel:nth-child(3){background:var(--green);border-color:var(--green-b);color:var(--green-t)}
.vote-opt:nth-child(4):hover,.vote-opt.sel:nth-child(4){background:var(--yellow);border-color:var(--yellow-b);color:var(--yellow-t)}
.voted-msg{text-align:center;padding:24px;color:var(--green-t);font-size:16px;font-weight:800;background:var(--green);border-radius:16px;border:1.5px solid var(--green-b)}
.res-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.res-lbl{font-size:13px;font-weight:700;min-width:80px;text-align:right}.res-track{flex:1;height:30px;background:rgba(255,255,255,.5);border-radius:8px;overflow:hidden;border:1.5px solid var(--border)}
.res-fill{height:100%;border-radius:6px;transition:width .5s ease;background:linear-gradient(90deg,#d8c0f0,#f0c0e0)}
.res-fill.mine{background:linear-gradient(90deg,#c8a0f0,#f0a0d0)}
.res-pct{font-size:12px;color:var(--muted);min-width:36px;font-weight:700}
.task-timer{text-align:center;font-size:56px;font-weight:900;color:var(--green-t);font-family:monospace;margin:14px 0;font-variant-numeric:tabular-nums}
.task-timer.warn{color:var(--yellow-t)}.task-timer.danger{color:var(--coral-t)}
.task-ta{width:100%;background:rgba(255,255,255,.75);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:15px;padding:14px;min-height:140px;outline:none;resize:vertical;transition:all .15s}
.task-ta:focus{background:rgba(255,255,255,.95);border-color:var(--green-b)}
.sub-btn{width:100%;margin-top:12px;padding:14px;border-radius:24px;background:linear-gradient(135deg,#a0e0c0,#c0f0a0);border:none;color:#0a5c2a;font-family:'Heebo',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 12px rgba(50,180,100,.2)}
.sub-btn:hover{box-shadow:0 6px 18px rgba(50,180,100,.3);transform:translateY(-2px)}
.sub-msg{text-align:center;padding:20px;color:var(--green-t);font-size:15px;font-weight:800;background:var(--green);border-radius:16px;border:1.5px solid var(--green-b)}
.free-card{background:rgba(255,255,255,.65);border:1.5px solid var(--yellow-b);border-radius:18px;padding:24px;text-align:center;margin-top:8px}
.inline-q{background:rgba(255,255,255,0.75);border:1.5px solid var(--purple-b);border-radius:16px;padding:16px;margin-top:16px}
.inline-q .iq-title{font-size:15px;font-weight:800;color:var(--purple-t);margin-bottom:10px}
.inline-q .iq-open textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-family:Heebo,sans-serif;font-size:14px;resize:none;outline:none;direction:rtl;min-height:80px}
.inline-q .iq-open textarea:focus{border-color:var(--purple-b)}
.inline-q .iq-opts{display:flex;flex-direction:column;gap:8px}
.inline-q .iq-opt{padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,0.7);font-size:14px;font-weight:600;cursor:pointer;text-align:right;transition:all .15s}
.inline-q .iq-opt:hover{background:var(--purple);border-color:var(--purple-b)}
.inline-q .iq-opt.sel{background:var(--purple);border-color:var(--purple-b);color:var(--purple-t)}
.inline-q .iq-submit{margin-top:10px;padding:10px 24px;border-radius:12px;background:var(--purple-t);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.inline-q .iq-done{text-align:center;color:var(--green-t);font-weight:700;font-size:14px;padding:8px}
.free-icon{font-size:40px;margin-bottom:10px}.free-card p{font-size:14px;color:var(--yellow-t);line-height:1.7;font-weight:700}
.sl-body img{max-width:100%;border-radius:12px;margin:10px 0;display:block}
.sl-body .video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin:10px 0}
.sl-body .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:12px}
.waiting{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:40px;min-height:200px}
.free-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);background:rgba(255,255,255,0.6);position:sticky;bottom:0}
.free-nav-btn{padding:10px 20px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.free-nav-btn.prev{background:var(--purple);color:var(--purple-t)}
.free-nav-btn.next{background:linear-gradient(135deg,#c8a0f0,#f0a0d0);color:#4a0a7a}
.free-nav-btn:disabled{opacity:0.4;cursor:not-allowed}
.free-nav-btn.locked{background:var(--yellow);color:var(--yellow-t);cursor:not-allowed}
.free-progress{font-size:12px;font-weight:700;color:var(--muted)}
.locked-msg{text-align:center;font-size:13px;color:var(--coral-t);font-weight:700;padding:8px;background:var(--coral);border-radius:10px;margin-top:8px}
.spinner{width:36px;height:36px;border:3px solid rgba(180,100,220,.2);border-top-color:#c8a0f0;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.waiting p{font-size:14px;color:var(--muted);font-weight:600}
.pull-flash{position:fixed;inset:0;background:linear-gradient(135deg,rgba(200,160,240,.4),rgba(240,160,208,.4));opacity:0;pointer-events:none;z-index:999;animation:flash .6s ease}
@keyframes flash{0%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div id="join-screen">
  <div class="brand">כיתה <em>חיה</em> <span style="font-size:11px;font-weight:400;opacity:0.5;vertical-align:middle">v4</span></div>
  <div class="join-card">
    <h2>🎒 כניסה לשיעור</h2>
    <p>הזן את הקוד שהמורה מציג בכיתה</p>
    <input class="code-inp" id="code-input" maxlength="4" placeholder="0000" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
    <input class="name-inp" id="name-input" placeholder="השם שלך..." maxlength="20">
    <div class="err" id="err"></div>
    <button class="join-btn" onclick="joinLesson()">כניסה לשיעור ✨</button>
  </div>
</div>
<div id="lesson-screen">
  <div class="status-bar">
    <div class="s-code" id="s-code"></div>
    <div class="s-title" id="s-title">כיתה חיה</div>
    <div class="mode-pill mp-b" id="mode-pill">📺 שידור</div>
  </div>
  <div class="slide-view" id="slide-view">
    <div class="waiting"><div class="spinner"></div><p>מחכה לשיעור...</p></div>
  </div>
  <div class="free-nav" id="free-nav" style="display:none">
    <button class="free-nav-btn next" id="nav-next" onclick="window.freeNext()">הבא ←</button>
    <span class="free-progress" id="free-progress"></span>
    <button class="free-nav-btn prev" id="nav-prev" onclick="window.freePrev()">→ הקודם</button>
  </div>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient(
  'https://seuskpyofhkvejyooghk.supabase.co',
  'sb_publishable_qrLorZwzfmjFh9S3iRa1sQ_u6DVP29b'
);

const params=new URLSearchParams(location.search);
if(params.get('code'))document.getElementById('code-input').value=params.get('code');

let session=null,myCode=null,myName=null;
const sid=sessionStorage.getItem('kitah_sid')||('S_'+Math.random().toString(36).slice(2,8));
sessionStorage.setItem('kitah_sid',sid);
let myVotes={},mySubs={},frozenSlide=null,lastPull=null,freeIdx=0,isFreeMode=false;
const ML={broadcast:'📺 שידור',vote:'🗳️ הצבעה',task:'📝 משימה',free:'🔓 חופשי'};
const MC={broadcast:'mode-pill mp-b',vote:'mode-pill mp-v',task:'mode-pill mp-t',free:'mode-pill mp-f'};

window.joinLesson=async()=>{
  const code=document.getElementById('code-input').value.trim();
  const name=document.getElementById('name-input').value.trim();
  if(code.length!==4){showErr('הכנס קוד 4 ספרות');return}
  if(!name){showErr('הכנס את שמך');return}
  showErr('');
  const {data,error}=await sb.from('sessions').select('*').eq('code',code).single();
  if(error||!data){showErr('קוד לא נמצא — בדוק שוב');return}
  if(!data.started){showErr('השיעור עדיין לא התחיל');return}
  myCode=code;myName=name;
  sessionStorage.setItem('kitah_code',code);
  sessionStorage.setItem('kitah_name',name);
  await sb.from('students').upsert({id:sid,session_code:code,name});
  document.getElementById('join-screen').style.display='none';
  document.getElementById('lesson-screen').style.display='flex';
  document.getElementById('s-code').textContent=`קוד: ${code}`;
  session=data;
  renderSlide(data);
  listenToSession();
};

// Auto-rejoin if session stored
(async()=>{
  const sc=sessionStorage.getItem('kitah_code');
  const sn=sessionStorage.getItem('kitah_name');
  if(sc&&sn){
    document.getElementById('code-input').value=sc;
    document.getElementById('name-input').value=sn;
    await window.joinLesson();
  }
})();
document.getElementById('code-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('name-input').focus()});
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')window.joinLesson()});
function showErr(m){document.getElementById('err').textContent=m}

function applySession(d){console.log('apply',d?.current_slide,d?.mode);
  if(typeof d.slides==='string'){try{d.slides=JSON.parse(d.slides)}catch(e){}}
  if(d.pull_signal&&d.pull_signal!==lastPull){lastPull=d.pull_signal;frozenSlide=null;flashPull()}
  const sameSlide=session&&session.current_slide===d.current_slide&&session.mode===d.mode&&session.reveal_votes===d.reveal_votes;
  document.getElementById('s-title').textContent=d.title||'כיתה חיה';
  const pill=document.getElementById('mode-pill');
  // detect free/self mode
  isFreeMode=d.session_type==='free'||d.mode==='self';
  if(isFreeMode){
    pill.textContent='🔓 עצמאי';pill.className='mode-pill mp-f';
    document.getElementById('free-nav').style.display='flex';
    updateFreeNav(d);
  } else {
    pill.textContent=ML[d.mode]||'';pill.className=MC[d.mode]||'mode-pill';
    document.getElementById('free-nav').style.display='none';
    if(d.mode==='free'&&frozenSlide===null)frozenSlide=d.current_slide||0;
    else if(d.mode!=='free')frozenSlide=null;
  }
  session=d;
  // don't re-render if user is actively typing in a textarea
  const activeEl=document.activeElement;
  const isTyping=activeEl&&(activeEl.tagName==='TEXTAREA'||activeEl.tagName==='INPUT');
  if(isFreeMode){if(!isTyping)renderFreeSlide(d);}
  else if(!sameSlide){if(!isTyping)renderSlide(d);}
}
function listenToSession(){
  sb.channel('student-'+myCode+'-'+sid)
    .on('postgres_changes',{event:'*',schema:'public',table:'sessions',filter:'code=eq.'+myCode},payload=>{
      applySession(payload.new);
    })
    .subscribe();
  // polling fallback every 2 seconds
  setInterval(async()=>{
    const {data,error}=await sb.from('sessions').select('*').eq('code',myCode).single();
    console.log('poll',myCode,data?.current_slide,data?.mode,error?.message);
    if(data)applySession(data);
  },2000);
}

function processContent(html){
  // Convert YouTube links to embedded iframes
  return html.replace(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g,
    (match,id)=>`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`
  );
}
function saveTextareaState(){
  const ta=document.querySelector('#slide-view textarea');
  if(ta)return{id:ta.id,value:ta.value,start:ta.selectionStart,end:ta.selectionEnd};
  return null;
}
function restoreTextareaState(state){
  if(!state)return;
  const ta=document.getElementById(state.id);
  if(!ta)return;
  ta.value=state.value;
  ta.setSelectionRange(state.start,state.end);
  if(document.activeElement?.tagName==='BODY')ta.focus();
}
async function renderSlide(data){
  const idx=frozenSlide!==null?frozenSlide:(data.current_slide||0);
  const slide=data.slides?.[idx];if(!slide)return;
  const view=document.getElementById('slide-view');
  let h='';

  if(slide.type==='broadcast'){
    h=`<div class="sl-title">${slide.title||''}</div><div class="sl-body">${processContent(slide.content||'')} </div>`;
    if(slide.question){
      const qKey=`q_${idx}`;
      const done=mySubs[qKey];
      if(done){
        h+=`<div class="inline-q"><div class="iq-done">✓ תשובתך נשמרה!</div></div>`;
      } else if(slide.question.type==='open'){
        h+=`<div class="inline-q"><div class="iq-title">❓ ${slide.question.text}</div><div class="iq-open"><textarea id="iq-ta-${idx}" placeholder="כתוב את תשובתך..."></textarea></div><button class="iq-submit" onclick="submitInlineQ(${idx},'open')">הגש ✓</button></div>`;
      } else if(slide.question.type==='mc'){
        const opts=(slide.question.options||[]).map((o,i)=>`<div class="iq-opt${myVotes['iq_'+idx]===i?' sel':''}" onclick="selectIQ(${idx},${i})">${o}</div>`).join('');
        h+=`<div class="inline-q"><div class="iq-title">❓ ${slide.question.text}</div><div class="iq-opts">${opts}</div><button class="iq-submit" onclick="submitInlineQ(${idx},'mc')">הגש ✓</button></div>`;
      }
    }
  }
  else if(slide.type==='vote'){
    h=`<div class="sl-title">${slide.title||''}</div><div class="sl-body">${processContent(slide.content||'')} </div>`;
    const alreadyVoted=myVotes[idx]!==undefined;
    if(data.reveal_votes){
      const {data:votes}=await sb.from('votes').select('*').eq('session_code',myCode).eq('slide_idx',idx);
      const tv=(votes||[]).length;
      h+='<div>';
      (slide.options||[]).forEach((opt,i)=>{
        const cnt=(votes||[]).filter(v=>v.choice===i).length;
        const pct=tv?Math.round(cnt/tv*100):0;
        h+=`<div class="res-row"><div class="res-lbl">${opt}</div><div class="res-track"><div class="res-fill${myVotes[idx]===i?' mine':''}" style="width:${pct}%"></div></div><div class="res-pct">${pct}%</div></div>`;
      });
      h+='</div>';
    } else if(alreadyVoted){
      h+=`<div class="voted-msg">✓ הצבעת! ממתין לתוצאות...</div>`;
    } else {
      h+='<div class="vote-opts">';
      (slide.options||[]).forEach((opt,i)=>{h+=`<div class="vote-opt" onclick="castVote(${idx},${i})">${opt}</div>`});
      h+='</div>';
    }
  }
  else if(slide.type==='task'){
    const tl=data.timer_left!==null&&data.timer_left!==undefined?data.timer_left:(slide.timer||120);
    const cls=tl<=30?' danger':tl<=60?' warn':'';
    h=`<div class="sl-title">${slide.title||''}</div><div class="sl-body">${processContent(slide.content||'')} </div>`;
    h+=`<div class="task-timer${cls}">${fmt(tl)}</div>`;
    if(mySubs[idx]){
      h+=`<div class="sub-msg">✓ הוגש בהצלחה! 🎉</div>`;
    } else {
      h+=`<textarea class="task-ta" id="task-ans" placeholder="כתוב את תשובתך כאן..."></textarea><button class="sub-btn" onclick="submitTask(${idx})">הגש תשובה ✓</button>`;
    }
  }
  else if(slide.type==='free'){
    h=`<div class="sl-title">${slide.title||''}</div>`;
    h+=`<div class="free-card"><div class="free-icon">🔓</div><p>${slide.content||'עבודה עצמאית — עבוד בקצב שלך'}</p></div>`;
  }
  view.innerHTML=h;
}

function isSlideComplete(slide,idx){
  if(!slide)return true;
  // check task
  if(slide.type==='task'&&!mySubs[idx])return false;
  // check vote
  if(slide.type==='vote'&&myVotes[idx]===undefined)return false;
  // check inline question
  if(slide.question&&!mySubs[`q_${idx}`])return false;
  return true;
}

function updateFreeNav(d){
  const total=(d.slides||[]).length;
  document.getElementById('free-progress').textContent=`${freeIdx+1} / ${total}`;
  document.getElementById('nav-prev').disabled=freeIdx===0;
  const slide=d.slides?.[freeIdx];
  const complete=isSlideComplete(slide,freeIdx);
  const nextBtn=document.getElementById('nav-next');
  if(freeIdx>=total-1){
    nextBtn.textContent='סיום ✓';
    nextBtn.disabled=!complete;
    nextBtn.className='free-nav-btn next'+(complete?'':' locked');
  } else {
    nextBtn.textContent='הבא ←';
    nextBtn.disabled=!complete;
    nextBtn.className='free-nav-btn next'+(complete?'':' locked');
    if(!complete)nextBtn.title='השלם את המשימה כדי להמשיך';
  }
}

async function renderFreeSlide(d){
  freeIdx=Math.min(freeIdx,(d.slides||[]).length-1);
  const slide=d.slides?.[freeIdx];if(!slide)return;
  const view=document.getElementById('slide-view');
  let h='';
  // render same as normal but always show content
  if(slide.type==='broadcast'){
    h=`<div class="sl-title">${slide.title||''}</div><div class="sl-body">${processContent(slide.content||'')} </div>`;
    if(slide.question){
      const qKey=`q_${freeIdx}`;
      const done=mySubs[qKey];
      if(done){
        h+=`<div class="inline-q"><div class="iq-done">✓ תשובתך נשמרה!</div></div>`;
      } else if(slide.question.type==='open'){
        h+=`<div class="inline-q"><div class="iq-title">❓ ${slide.question.text}</div><div class="iq-open"><textarea id="iq-ta-${freeIdx}" placeholder="כתוב את תשובתך..."></textarea></div><button class="iq-submit" onclick="submitInlineQ(${freeIdx},'open')">הגש ✓</button></div>`;
      } else if(slide.question.type==='mc'){
        const opts=(slide.question.options||[]).map((o,i)=>`<div class="iq-opt${myVotes['iq_'+freeIdx]===i?' sel':''}" onclick="selectIQ(${freeIdx},${i})">${o}</div>`).join('');
        h+=`<div class="inline-q"><div class="iq-title">❓ ${slide.question.text}</div><div class="iq-opts">${opts}</div><button class="iq-submit" onclick="submitInlineQ(${freeIdx},'mc')">הגש ✓</button></div>`;
      }
    }
  } else if(slide.type==='vote'){
    h=`<div class="sl-title">${slide.title||''}</div><div class="sl-body">${processContent(slide.content||'')} </div>`;
    if(myVotes[freeIdx]!==undefined){
      h+=`<div class="voted-msg">✓ הצבעת!</div>`;
    } else {
      h+='<div class="vote-opts">';
      (slide.options||[]).forEach((opt,i)=>{h+=`<div class="vote-opt" onclick="castVoteFree(${freeIdx},${i})">${opt}</div>`;});
      h+='</div>';
    }
  } else if(slide.type==='task'){
    h=`<div class="sl-title">${slide.title||''}</div><div class="sl-body">${processContent(slide.content||'')} </div>`;
    if(mySubs[freeIdx]){
      h+=`<div class="sub-msg">✓ הוגש בהצלחה! 🎉</div>`;
    } else {
      h+=`<textarea class="task-ta" id="task-ans" placeholder="כתוב את תשובתך כאן..."></textarea><button class="sub-btn" onclick="submitTaskFree(${freeIdx})">הגש תשובה ✓</button>`;
    }
  } else if(slide.type==='free'){
    h=`<div class="sl-title">${slide.title||''}</div><div class="free-card"><div class="free-icon">🔓</div><p>${slide.content||'עבודה עצמאית'}</p></div>`;
  }
  const savedFreeState=saveTextareaState();
  view.innerHTML=h;
  restoreTextareaState(savedFreeState);
  updateFreeNav(d);
}

window.freeNext=()=>{
  if(!session)return;
  const slide=session.slides?.[freeIdx];
  if(!isSlideComplete(slide,freeIdx)){
    // flash locked message
    const nextBtn=document.getElementById('nav-next');
    nextBtn.textContent='השלם קודם! 🔒';
    setTimeout(()=>{nextBtn.textContent=freeIdx>=session.slides.length-1?'סיום ✓':'הבא ←';},1500);
    return;
  }
  if(freeIdx<session.slides.length-1){
    freeIdx++;
    renderFreeSlide(session);
  } else {
    alert('🎉 סיימת את השיעור!');
  }
};

window.freePrev=()=>{
  if(freeIdx>0){freeIdx--;renderFreeSlide(session);}
};

window.castVoteFree=async(slideIdx,choice)=>{
  myVotes[slideIdx]=choice;
  await sb.from('votes').upsert({id:`${sid}_${slideIdx}`,session_code:myCode,slide_idx:slideIdx,student_name:myName,choice});
  renderFreeSlide(session);
};

window.submitTaskFree=async idx=>{
  const ans=document.getElementById('task-ans')?.value?.trim();
  if(!ans)return;
  mySubs[idx]=true;
  await sb.from('responses').upsert({id:`${sid}_${idx}`,session_code:myCode,slide_idx:idx,student_name:myName,answer:ans});
  renderFreeSlide(session);
};

window.selectIQ=(idx,i)=>{
  myVotes['iq_'+idx]=i;
  renderSlide(session);
};
window.submitInlineQ=async(idx,type)=>{
  const qKey=`q_${idx}`;
  let answer='';
  if(type==='open'){
    answer=document.getElementById(`iq-ta-${idx}`)?.value?.trim();
    if(!answer)return;
  } else {
    const choice=myVotes['iq_'+idx];
    if(choice===undefined){alert('בחר תשובה');return;}
    answer=session.slides[idx].question.options[choice];
  }
  mySubs[qKey]=true;
  await sb.from('responses').upsert({
    id:`${sid}_q_${idx}`,
    session_code:myCode,
    slide_idx:idx,
    student_name:myName,
    answer:`[שאלת בדיקה] ${answer}`
  });
  if(isFreeMode)renderFreeSlide(session);
  else renderSlide(session);
};
window.castVote=async(slideIdx,choice)=>{
  if(myVotes[slideIdx]!==undefined)return;
  myVotes[slideIdx]=choice;
  await sb.from('votes').upsert({id:`${sid}_${slideIdx}`,session_code:myCode,slide_idx:slideIdx,student_name:myName,choice});
  renderSlide(session);
};
window.submitTask=async idx=>{
  const ans=document.getElementById('task-ans')?.value?.trim();
  if(!ans)return;
  mySubs[idx]=true;
  await sb.from('responses').upsert({id:`${sid}_${idx}`,session_code:myCode,slide_idx:idx,student_name:myName,answer:ans});
  renderSlide(session);
};

function flashPull(){const el=document.createElement('div');el.className='pull-flash';document.body.appendChild(el);setTimeout(()=>el.remove(),700)}
function fmt(s){if(typeof s!=='number')return'00:00';return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
</script>
</body>
</html>
