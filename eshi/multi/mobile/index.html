<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rani@Media — כיתה חיה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #131929;
    --border: #1e2d45;
    --accent: #f0a500;
    --accent2: #e05a00;
    --live: #00d97e;
    --blue: #3b82f6;
    --purple: #a855f7;
    --text: #e8edf5;
    --muted: #6b7fa3;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    background:var(--bg); color:var(--text);
    font-family:'Rubik',sans-serif; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden;
  }

  /* ── BACKGROUND ── */
  .bg-grid {
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
    background-size:40px 40px;
  }
  .bg-glow {
    position:fixed; top:-200px; left:50%; transform:translateX(-50%);
    width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle, rgba(240,165,0,.12) 0%, transparent 70%);
    z-index:0; pointer-events:none;
  }

  /* ── HERO ── */
  .hero {
    position:relative; z-index:1;
    text-align:center; padding:60px 20px 40px;
    width:100%; max-width:480px;
  }

  .brand {
    font-family:'Heebo',sans-serif; font-weight:900;
    font-size:clamp(2rem, 8vw, 3rem);
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; letter-spacing:-1px; margin-bottom:6px;
  }

  .brand-sub {
    font-size:.85rem; color:var(--muted); font-weight:300;
    letter-spacing:3px; text-transform:uppercase; margin-bottom:40px;
  }

  .live-dot {
    display:inline-flex; align-items:center; gap:7px;
    background:rgba(0,217,126,.1); border:1px solid rgba(0,217,126,.25);
    border-radius:20px; padding:5px 14px; font-size:.78rem;
    color:var(--live); font-weight:500; margin-bottom:40px;
  }
  .live-dot::before {
    content:''; width:7px; height:7px; border-radius:50%;
    background:var(--live); box-shadow:0 0 8px var(--live);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  /* ── CARDS ── */
  .cards {
    position:relative; z-index:1;
    width:100%; max-width:440px; padding:0 16px 60px;
    display:flex; flex-direction:column; gap:14px;
  }

  .entry-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; overflow:hidden; transition:transform .2s, border-color .2s;
  }
  .entry-card:active { transform:scale(.98); }

  .card-header {
    padding:18px 20px 14px;
    display:flex; align-items:center; gap:14px; cursor:pointer;
    user-select:none;
  }

  .card-icon {
    width:46px; height:46px; border-radius:14px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:1.4rem;
  }
  .icon-student  { background:rgba(0,217,126,.15); }
  .icon-teacher  { background:rgba(240,165,0,.15); }
  .icon-admin    { background:rgba(168,85,247,.15); }

  .card-info { flex:1; }
  .card-title { font-family:'Heebo',sans-serif; font-weight:700; font-size:1.05rem; margin-bottom:2px; }
  .card-desc  { font-size:.78rem; color:var(--muted); }

  .card-arrow { color:var(--muted); font-size:1.1rem; transition:transform .2s; }
  .entry-card.open .card-arrow { transform:rotate(90deg); }

  /* accent lines */
  .entry-card.student { border-top:2px solid var(--live); }
  .entry-card.teacher { border-top:2px solid var(--accent); }
  .entry-card.admin   { border-top:2px solid var(--purple); }

  /* ── PANEL ── */
  .card-panel {
    max-height:0; overflow:hidden; transition:max-height .35s ease;
  }
  .card-panel.open { max-height:300px; }
  .panel-inner { padding:0 20px 20px; }

  .field { margin-bottom:12px; }
  .field label { display:block; font-size:.75rem; color:var(--muted); font-weight:500; margin-bottom:6px; letter-spacing:.5px; }
  .field input {
    width:100%; background:#0d1524; border:1px solid var(--border);
    border-radius:10px; padding:12px 14px; color:var(--text);
    font-family:'Rubik',sans-serif; font-size:.95rem; outline:none;
    transition:border-color .2s;
  }
  .field input:focus { border-color:var(--accent); }
  .field input::placeholder { color:#3a4a6a; }

  .error-msg { color:#f87171; font-size:.78rem; margin-bottom:10px; min-height:18px; }

  .btn-enter {
    width:100%; padding:13px; border:none; border-radius:12px;
    font-family:'Heebo',sans-serif; font-weight:800; font-size:1rem;
    cursor:pointer; transition:opacity .2s; touch-action:manipulation;
  }
  .btn-enter:active { opacity:.85; }
  .btn-student { background:linear-gradient(135deg,#00d97e,#00a85e); color:#0b1a12; }
  .btn-teacher { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .btn-admin   { background:linear-gradient(135deg,#a855f7,#7c3aed); color:#fff; }

  /* student code field */
  .code-field input { font-size:1.3rem; text-align:center; letter-spacing:8px; font-family:'Heebo',sans-serif; font-weight:700; }

  /* ── FOOTER ── */
  footer {
    position:relative; z-index:1;
    font-size:.72rem; color:#2a3a5a; text-align:center;
    padding:20px; margin-top:auto;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="hero">
  <div class="brand">Rani@Media</div>
  <div class="brand-sub">מערכת שיעורים אינטראקטיבית</div>
  <div class="live-dot">כיתה חיה פעילה</div>
</div>

<div class="cards">

  <!-- תלמיד -->
  <div class="entry-card student" id="card-student">
    <div class="card-header" onclick="toggle('student')">
      <div class="card-icon icon-student">🎓</div>
      <div class="card-info">
        <div class="card-title">כניסת תלמיד</div>
        <div class="card-desc">הזן קוד שיעור ושם</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
    <div class="card-panel" id="panel-student">
      <div class="panel-inner">
        <div class="field code-field">
          <label>קוד שיעור</label>
          <input type="text" id="s-code" placeholder="0000" inputmode="numeric" maxlength="6">
        </div>
        <div class="field">
          <label>שם מלא</label>
          <input type="text" id="s-name" placeholder="שם פרטי ושם משפחה">
        </div>
        <div class="error-msg" id="s-err"></div>
        <button class="btn-enter btn-student" onclick="enterStudent()">כניסה לשיעור ←</button>
      </div>
    </div>
  </div>

  <!-- מורה -->
  <div class="entry-card teacher" id="card-teacher">
    <div class="card-header" onclick="toggle('teacher')">
      <div class="card-icon icon-teacher">📡</div>
      <div class="card-info">
        <div class="card-title">כניסת מורה</div>
        <div class="card-desc">הפעל שיעור וצפה בתלמידים</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
    <div class="card-panel" id="panel-teacher">
      <div class="panel-inner">
        <div class="field">
          <label>סיסמה</label>
          <input type="password" id="t-pass" placeholder="••••••">
        </div>
        <div class="error-msg" id="t-err"></div>
        <button class="btn-enter btn-teacher" onclick="enterTeacher()">כניסה למורה ←</button>
      </div>
    </div>
  </div>

  <!-- מנהל -->
  <div class="entry-card admin" id="card-admin">
    <div class="card-header" onclick="toggle('admin')">
      <div class="card-icon icon-admin">⚙️</div>
      <div class="card-info">
        <div class="card-title">כניסת מנהל</div>
        <div class="card-desc">ניהול מערכת ושיעורים</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
    <div class="card-panel" id="panel-admin">
      <div class="panel-inner">
        <div class="field">
          <label>סיסמת מנהל</label>
          <input type="password" id="a-pass" placeholder="••••••••">
        </div>
        <div class="error-msg" id="a-err"></div>
        <button class="btn-enter btn-admin" onclick="enterAdmin()">כניסה למנהל ←</button>
      </div>
    </div>
  </div>

</div>

<footer>
  <div style="margin-bottom:4px">Rani@Media © 2025 — כיתה חיה</div>
  <div style="color:#1a2a4a">פותח על ידי <span style="color:#3a5a8a">רני בן זאב</span></div>
</footer>

<script>
const STUDENT_URL = 'student.html';
const TEACHER_URL = 'teacher-mobile.html';
const ADMIN_URL   = 'builder.html';

const TEACHER_PASS = '1234';
const ADMIN_PASS   = 'Galil2025!';

let openCard = null;

function toggle(name) {
  const panel = document.getElementById('panel-' + name);
  const card  = document.getElementById('card-' + name);
  if (openCard && openCard !== name) {
    document.getElementById('panel-' + openCard).classList.remove('open');
    document.getElementById('card-' + openCard).classList.remove('open');
  }
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  card.classList.toggle('open', !isOpen);
  openCard = isOpen ? null : name;
}

function enterStudent() {
  const code = document.getElementById('s-code').value.trim();
  const name = document.getElementById('s-name').value.trim();
  const err  = document.getElementById('s-err');
  if (!code) { err.textContent = 'נא להזין קוד שיעור'; return; }
  if (!name) { err.textContent = 'נא להזין שם'; return; }
  err.textContent = '';
  location.href = `${STUDENT_URL}?code=${encodeURIComponent(code)}&name=${encodeURIComponent(name)}`;
}

function enterTeacher() {
  const pass = document.getElementById('t-pass').value;
  const err  = document.getElementById('t-err');
  if (pass !== TEACHER_PASS) { err.textContent = 'סיסמה שגויה'; return; }
  err.textContent = '';
  location.href = TEACHER_URL;
}

function enterAdmin() {
  const pass = document.getElementById('a-pass').value;
  const err  = document.getElementById('a-err');
  if (pass !== ADMIN_PASS) { err.textContent = 'סיסמה שגויה'; return; }
  err.textContent = '';
  location.href = ADMIN_URL;
}

// Enter key support
document.getElementById('s-name').addEventListener('keydown', e => { if(e.key==='Enter') enterStudent(); });
document.getElementById('t-pass').addEventListener('keydown', e => { if(e.key==='Enter') enterTeacher(); });
document.getElementById('a-pass').addEventListener('keydown', e => { if(e.key==='Enter') enterAdmin(); });

// פתח כרטיס תלמיד אוטומטית אם יש קוד ב-URL
const urlCode = new URLSearchParams(location.search).get('code');
if (urlCode) {
  toggle('student');
  document.getElementById('s-code').value = urlCode;
}
</script>
</body>
</html>
