<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>מסך מורה – כיתה חיה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#fde8f5 0%,#e8f0fd 35%,#e8fdf0 70%,#fdf5e8 100%);background-attachment:fixed;color:#2a1a3a;font-family:'Heebo',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;direction:rtl}
:root{
  --pink:#fce0f5;--pink-b:#e8a8d8;--pink-t:#8a1870;
  --blue:#ddeeff;--blue-b:#a8ccf0;--blue-t:#1840a0;
  --green:#ddf5ea;--green-b:#a8e0c8;--green-t:#185c38;
  --yellow:#fff3cc;--yellow-b:#e8d890;--yellow-t:#7a5800;
  --purple:#eeddf8;--purple-b:#c8a8e8;--purple-t:#5810a0;
  --coral:#ffe0d8;--coral-b:#f0b8a8;--coral-t:#903020;
  --teal:#d8f8f4;--teal-b:#a0e0d8;--teal-t:#187060;
  --glass:rgba(255,255,255,0.65);--border:rgba(255,255,255,0.88);--text:#2a1a3a;--muted:#7a6a8a;
}
.topbar{background:rgba(255,255,255,0.75);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.code-pill{background:var(--purple);border:2px solid var(--purple-b);color:var(--purple-t);font-weight:900;font-size:20px;letter-spacing:5px;padding:4px 14px;border-radius:12px;font-family:monospace}
.sess-title{flex:1;font-size:13px;font-weight:700;color:var(--muted)}
.live-dot{width:8px;height:8px;background:#3ecf7a;border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.count-lbl{font-size:13px;color:var(--muted);font-weight:700}
.mode-bar{background:rgba(255,255,255,0.5);backdrop-filter:blur(8px);border-bottom:1.5px solid var(--border);padding:8px 14px;display:flex;gap:7px;flex-shrink:0;overflow-x:auto}
.mode-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:22px;border:1.5px solid rgba(255,255,255,.7);background:rgba(255,255,255,.5);color:var(--muted);font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .12s}
.mode-btn:hover{background:rgba(255,255,255,.8);color:var(--text);transform:translateY(-1px)}
.on-b{background:var(--blue)!important;border-color:var(--blue-b)!important;color:var(--blue-t)!important}
.on-v{background:var(--pink)!important;border-color:var(--pink-b)!important;color:var(--pink-t)!important}
.on-t{background:var(--green)!important;border-color:var(--green-b)!important;color:var(--green-t)!important}
.on-f{background:var(--yellow)!important;border-color:var(--yellow-b)!important;color:var(--yellow-t)!important}
.main{display:flex;flex:1;overflow:hidden}
.slide-area{flex:1;display:flex;flex-direction:column;padding:14px;gap:10px;overflow-y:auto}
.strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.strip::-webkit-scrollbar{display:none}
.mini{flex-shrink:0;width:64px;height:42px;border-radius:10px;border:1.5px solid rgba(255,255,255,.7);background:rgba(255,255,255,.5);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .12s;font-size:14px}
.mini:hover{background:rgba(255,255,255,.8);transform:translateY(-1px)}
.mini.cur{border-color:var(--purple-b);background:var(--purple)}
.mini span{font-size:9px;color:var(--muted);font-weight:700}
.s-card{background:rgba(255,255,255,0.8);border:1.5px solid var(--border);border-radius:16px;padding:18px 20px;flex-shrink:0}
.type-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px;border:1.5px solid}
.tt-b{background:var(--blue);border-color:var(--blue-b);color:var(--blue-t)}.tt-v{background:var(--pink);border-color:var(--pink-b);color:var(--pink-t)}.tt-t{background:var(--green);border-color:var(--green-b);color:var(--green-t)}.tt-f{background:var(--yellow);border-color:var(--yellow-b);color:var(--yellow-t)}
.s-title{font-size:20px;font-weight:800;margin-bottom:8px;color:var(--text)}.s-body{font-size:14px;color:var(--muted);line-height:1.8}
.v-results{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.v-row{display:flex;align-items:center;gap:10px}
.v-lbl{font-size:13px;font-weight:700;min-width:80px;text-align:right;color:var(--text)}
.v-track{flex:1;height:28px;background:rgba(255,255,255,.5);border-radius:8px;overflow:hidden;border:1.5px solid var(--border)}
.v-fill{height:100%;background:linear-gradient(90deg,#c8a0f0,#f0a0d0);border-radius:6px;transition:width .4s ease}
.v-cnt{font-size:12px;color:var(--muted);min-width:50px;font-weight:700}
.timer-disp{text-align:center;font-size:52px;font-weight:900;font-family:monospace;margin:12px 0;letter-spacing:2px;color:var(--green-t)}
.timer-disp.warn{color:var(--yellow-t)}.timer-disp.danger{color:var(--coral-t)}
.timer-ctrls{display:flex;gap:8px;justify-content:center}
.pull-btn{width:100%;padding:14px;border-radius:24px;background:linear-gradient(135deg,#c8a0f0,#f0a0d0);border:none;color:#4a0a7a;font-family:'Heebo',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;flex-shrink:0;box-shadow:0 4px 14px rgba(180,100,220,.2)}
.pull-btn:hover{box-shadow:0 6px 20px rgba(180,100,220,.35);transform:translateY(-2px)}
.pull-btn:active{transform:scale(.98)}
.nav-row{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-btn{padding:8px 18px;border-radius:20px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:rgba(255,255,255,.7);color:var(--text);transition:all .12s}
.nav-btn:hover:not(:disabled){background:var(--purple);border-color:var(--purple-b);color:var(--purple-t);transform:translateY(-1px)}
.nav-btn:disabled{opacity:.35;cursor:default}
.nav-ind{flex:1;text-align:center;font-size:13px;color:var(--muted);font-weight:700}
.students-panel{width:200px;background:rgba(255,255,255,.5);backdrop-filter:blur(8px);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.panel-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:14px 12px 8px}
.s-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.s-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:10px;transition:background .1s}
.s-item:hover{background:rgba(255,255,255,.5)}
.s-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.s-name{flex:1;font-size:12px;font-weight:600;color:var(--text)}.s-dot{width:6px;height:6px;background:#3ecf7a;border-radius:50%}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:20px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .12s}
.btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1)}
.btn-green{background:var(--green);border-color:var(--green-b);color:var(--green-t)}.btn-coral{background:var(--coral);border-color:var(--coral-b);color:var(--coral-t)}.btn-yellow{background:var(--yellow);border-color:var(--yellow-b);color:var(--yellow-t)}
.reveal-btn{margin-top:10px;padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:rgba(255,255,255,.7);color:var(--muted);font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.reveal-btn:hover{background:var(--purple);border-color:var(--purple-b);color:var(--purple-t)}.reveal-btn.on{background:var(--purple);border-color:var(--purple-b);color:var(--purple-t)}
.free-note{background:var(--yellow);border:1.5px solid var(--yellow-b);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--yellow-t);line-height:1.6;margin-top:10px;font-weight:600}
.toast{position:fixed;bottom:20px;right:50%;transform:translateX(50%);background:linear-gradient(135deg,#c8a0f0,#f0a0d0);color:#4a0a7a;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:800;z-index:500;animation:slideup .3s ease;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(180,100,220,.3)}
@keyframes slideup{from{opacity:0;transform:translateX(50%) translateY(8px)}to{opacity:1;transform:translateX(50%) translateY(0)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="code-pill" id="code-display">----</div>
  <div class="sess-title" id="sess-title">טוען...</div>
  <div class="live-dot"></div>
  <div class="count-lbl"><span id="s-count">0</span> תלמידים</div>
</div>
<div class="mode-bar">
  <button class="mode-btn" id="btn-broadcast" onclick="setMode('broadcast')">📺 שידור</button>
  <button class="mode-btn" id="btn-vote" onclick="setMode('vote')">🗳️ הצבעה</button>
  <button class="mode-btn" id="btn-task" onclick="setMode('task')">📝 משימה</button>
  <button class="mode-btn" id="btn-free" onclick="setMode('free')">🔓 חופשי</button>
</div>
<div class="main">
  <div class="slide-area">
    <div class="strip" id="strip"></div>
    <div class="s-card" id="slide-display"><div style="color:var(--muted);font-size:14px">טוען שיעור...</div></div>
    <button class="pull-btn" onclick="pullStudents()">← משוך את כולם לשקף הזה</button>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">→ הקודם</button>
      <div class="nav-ind" id="nav-ind">1 / 1</div>
      <button class="nav-btn" id="btn-next" onclick="navigate(1)">הבא ←</button>
    </div>
  </div>
  <div class="students-panel">
    <div class="panel-lbl">תלמידים</div>
    <div class="s-list" id="s-list"><div style="font-size:12px;color:var(--muted);padding:8px">ממתין...</div></div>
  </div>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient(
  'https://seuskpyofhkvejyooghk.supabase.co',
  'sb_publishable_qrLorZwzfmjFh9S3iRa1sQ_u6DVP29b'
);

const params = new URLSearchParams(location.search);
const code = params.get('code');
if(!code){document.body.innerHTML='<div style="padding:40px;font-family:Heebo,sans-serif;color:#2a1a3a">חסר קוד שיעור.</div>'}
document.getElementById('code-display').textContent = code;

let session=null,curIdx=0,timerInt=null,timerLeft=0,revealed=false;
const TL={broadcast:'📺 שידור',vote:'🗳️ הצבעה',task:'📝 משימה',free:'🔓 חופשי'};
const TT={broadcast:'tt-b',vote:'tt-v',task:'tt-t',free:'tt-f'};
const MO={broadcast:'on-b',vote:'on-v',task:'on-t',free:'on-f'};
const avBg=['#fce0f5','#ddeeff','#ddf5ea','#fff3cc','#eeddf8','#ffe0d8'];
const avCl=['#8a1870','#1840a0','#185c38','#7a5800','#5810a0','#903020'];

async function loadSession(){
  const {data}=await sb.from('sessions').select('*').eq('code',code).single();
  if(!data)return;
  session=data;curIdx=data.current_slide||0;
  document.getElementById('sess-title').textContent=data.title||'שיעור';
  updModes(data.mode);renderStrip();renderSlide();
  document.getElementById('nav-ind').textContent=`${curIdx+1} / ${data.slides?.length||1}`;
  document.getElementById('btn-prev').disabled=curIdx===0;
  document.getElementById('btn-next').disabled=curIdx>=(data.slides?.length||1)-1;
}

async function loadStudents(){
  const {data}=await sb.from('students').select('*').eq('session_code',code);
  renderStudents(data||[]);
  document.getElementById('s-count').textContent=(data||[]).length;
}

async function loadVotes(){
  const {data}=await sb.from('votes').select('*').eq('session_code',code);
  return data||[];
}
async function loadResponses(){
  const {data}=await sb.from('responses').select('*').eq('session_code',code);
  return data||[];
}

await loadSession();
await loadStudents();

sb.channel('session-'+code)
  .on('postgres_changes',{event:'*',schema:'public',table:'sessions',filter:`code=eq.${code}`},async()=>{await loadSession()})
  .on('postgres_changes',{event:'*',schema:'public',table:'students',filter:`session_code=eq.${code}`},async()=>{await loadStudents()})
  .on('postgres_changes',{event:'*',schema:'public',table:'votes',filter:`session_code=eq.${code}`},async()=>{await renderSlide()})
  .on('postgres_changes',{event:'*',schema:'public',table:'responses',filter:`session_code=eq.${code}`},async()=>{await renderSlide()})
  .subscribe();

async function renderSlide(){
  if(!session?.slides)return;
  const s=session.slides[curIdx];if(!s)return;
  const votes=await loadVotes();
  const responses=await loadResponses();
  let h=`<span class="type-tag ${TT[s.type]}">${TL[s.type]}</span>`;
  h+=`<div class="s-title">${s.title||'(ללא כותרת)'}</div>`;
  if(s.type==='broadcast')h+=`<div class="s-body">${s.content||''}</div>`;
  if(s.type==='vote'){
    h+=`<div class="s-body" style="margin-bottom:10px">${s.content||''}</div>`;
    const tv=votes.filter(v=>v.slide_idx===curIdx).length;
    h+=`<div class="v-results">`;
    (s.options||[]).forEach((opt,i)=>{
      const cnt=votes.filter(v=>v.slide_idx===curIdx&&v.choice===i).length;
      const pct=tv?Math.round(cnt/tv*100):0;
      h+=`<div class="v-row"><div class="v-lbl">${opt||'?'}</div><div class="v-track"><div class="v-fill" style="width:${revealed?pct:0}%"></div></div><div class="v-cnt">${revealed?`${cnt} (${pct}%)`:'?'}</div></div>`;
    });
    h+=`</div><div style="margin-top:8px;font-size:12px;color:var(--muted);font-weight:600">הצביעו: ${tv}</div>`;
    h+=`<button class="reveal-btn${revealed?' on':''}" onclick="window.toggleReveal()">${revealed?'✓ גלויות':'הצג תוצאות'}</button>`;
  }
  if(s.type==='task'){
    h+=`<div class="s-body">${s.content||''}</div>`;
    const tl=session.timer_left!==null?session.timer_left:(s.timer||120);
    const cls=tl<=30?' danger':tl<=60?' warn':'';
    h+=`<div class="timer-disp${cls}" id="tdis">${fmt(tl)}</div>`;
    h+=`<div class="timer-ctrls"><button class="btn btn-green" onclick="startTimer()">▶ התחל</button><button class="btn btn-yellow" onclick="pauseTimer()">⏸ עצור</button><button class="btn btn-coral" onclick="resetTimer()">↺ אפס</button></div>`;
    const rsp=responses.filter(r=>r.slide_idx===curIdx);
    h+=`<div style="margin-top:10px;font-size:12px;color:var(--muted);font-weight:600">הגישו: ${rsp.length}</div>`;
  }
  if(s.type==='free'){
    h+=`<div class="s-body">${s.content||'עבודה עצמאית חופשית'}</div>`;
    h+=`<div class="free-note">🔓 התלמידים עובדים בקצב שלהם. לחץ "משוך" להחזיר את כולם.</div>`;
  }
  document.getElementById('slide-display').innerHTML=h;
}

function renderStrip(){
  if(!session?.slides)return;
  const em={broadcast:'📺',vote:'🗳️',task:'📝',free:'🔓'};
  document.getElementById('strip').innerHTML=session.slides.map((s,i)=>`
    <div class="mini${i===curIdx?' cur':''}" onclick="jumpTo(${i})">
      <div>${em[s.type]}</div><span>${i+1}</span>
    </div>`).join('');
}

function renderStudents(students){
  const el=document.getElementById('s-list');
  if(!students.length){el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:8px">ממתין לתלמידים...</div>';return}
  el.innerHTML=students.map((s,i)=>`
    <div class="s-item">
      <div class="s-av" style="background:${avBg[i%6]};color:${avCl[i%6]}">${(s.name||'?')[0]}</div>
      <div class="s-name">${s.name||'אנונימי'}</div>
      <div class="s-dot"></div>
    </div>`).join('');
}

function updModes(mode){
  ['broadcast','vote','task','free'].forEach(m=>{
    document.getElementById('btn-'+m).className='mode-btn'+(mode===m?' '+MO[m]:'');
  });
}

window.setMode=async m=>{await sb.from('sessions').update({mode:m}).eq('code',code)};
window.navigate=async dir=>{
  if(!session?.slides)return;
  const n=curIdx+dir;
  if(n<0||n>=session.slides.length)return;
  revealed=false;clearInterval(timerInt);timerInt=null;timerLeft=0;
  await sb.from('sessions').update({current_slide:n,mode:session.slides[n].type}).eq('code',code);
};
window.jumpTo=async idx=>{
  revealed=false;clearInterval(timerInt);timerInt=null;timerLeft=0;
  await sb.from('sessions').update({current_slide:idx,mode:session.slides[idx].type}).eq('code',code);
};
window.pullStudents=async()=>{
  await sb.from('sessions').update({pull_signal:Date.now()}).eq('code',code);
  toast('⟵ משך את כולם לשקף הנוכחי');
};
window.startTimer=()=>{
  if(timerInt)return;
  if(!timerLeft)timerLeft=session.slides[curIdx].timer||120;
  timerInt=setInterval(async()=>{
    timerLeft--;
    await sb.from('sessions').update({timer_left:timerLeft}).eq('code',code);
    updTd();
    if(timerLeft<=0){clearInterval(timerInt);timerInt=null}
  },1000);
};
window.pauseTimer=()=>{clearInterval(timerInt);timerInt=null};
window.resetTimer=async()=>{
  clearInterval(timerInt);timerInt=null;
  timerLeft=session.slides[curIdx].timer||120;
  await sb.from('sessions').update({timer_left:timerLeft}).eq('code',code);
  updTd();
};
function updTd(){const el=document.getElementById('tdis');if(!el)return;el.textContent=fmt(timerLeft);el.className='timer-disp'+(timerLeft<=30?' danger':timerLeft<=60?' warn':'')}
function fmt(s){const m=Math.floor(s/60),sc=s%60;return`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`}
window.toggleReveal=()=>{revealed=!revealed;renderSlide()};
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500)}
</script>
</body>
</html>
