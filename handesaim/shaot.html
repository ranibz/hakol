<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חלוקת שעות לימוד י"ג-י"ד</title>
    <!-- ייבוא גופן מודרני ונקי -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e92525; /* הצבע האדום מהעיצוב המקורי */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --radius: 16px;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            max-width: 800px;
            width: 100%;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            /* רקע כהה ומרשים לכותרת כדי לתת תחושה רשמית ומודרנית */
            background: linear-gradient(135deg, #2c3e50, #3498db); 
            color: white;
            text-align: center;
            padding: 3rem 2rem;
        }

        .header h1 {
            margin: 0;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .content {
            padding: 3rem 2rem;
            text-align: center;
        }

        .highlight-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 2.5rem;
            padding: 1.5rem;
            background: rgba(233, 37, 37, 0.05);
            border-radius: 12px;
            border: 2px dashed rgba(233, 37, 37, 0.2);
            display: inline-block;
        }

        .images-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 3rem;
            align-items: center;
        }

        .images-grid img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .images-grid img:hover {
            transform: scale(1.02);
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1rem 3rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 37, 37, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(233, 37, 37, 0.4);
            background-color: #d11e1e;
        }

        /* התאמה למסכים קטנים (מובייל) */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .header h1 { font-size: 2rem; }
            .highlight-text { font-size: 1.4rem; padding: 1rem; }
            .content { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>חלוקת שעות לימוד י"ג-י"ד</h1>
        </header>
        
        <main class="content">
            <div class="highlight-text">
                סה"כ שעות הלימוד בכיתות י"ג + י"ד: 2,380 שעות
            </div>

            <div class="images-grid">
                <!-- התמונות חולצו מהקוד המקורי -->
                <img src="https://cdn.smore.com/u/afe3/f30ea3a065e91b238a6e048de78f8a00.jpg" alt="טבלת חלוקת שעות 1">
                <img src="https://cdn.smore.com/u/5cb8/09249ca4e2cc1f608f07179911c88fd6.jpg" alt="טבלת חלוקת שעות 2">
            </div>

            <a href="https://www.smore.com/umwyq" class="btn" target="_blank" rel="noopener noreferrer">
                חזרה לעמוד הקודם
            </a>
        </main>
    </div>

</body>
</html>
