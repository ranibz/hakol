<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תיקי הפקה | וידאוקאסט</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --film: #0a0a0f;
            --gold: #f5c542;
            --gold2: #e8a020;
            --red: #e63946;
            --teal: #2ec4b6;
            --blue: #3a86ff;
            --purple: #8338ec;
            --text: #f0eee8;
            --muted: #8a8070;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--film);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            direction: rtl;
        }

        /* ── Film strip top ── */
        .filmstrip {
            width: 100%;
            height: 28px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 4px;
            gap: 4px;
            overflow: hidden;
            border-bottom: 2px solid #222;
        }
        .film-hole {
            width: 18px; height: 18px;
            border-radius: 3px;
            background: var(--film);
            border: 1px solid #333;
            flex-shrink: 0;
        }

        /* ── Hero ── */
        .hero {
            position: relative;
            text-align: center;
            padding: 60px 20px 50px;
            overflow: hidden;
        }

        /* animated gradient background */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 40%, rgba(58,134,255,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 60%, rgba(131,56,236,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 0%, rgba(245,197,66,0.12) 0%, transparent 50%);
            animation: aurora 8s ease-in-out infinite alternate;
        }
        @keyframes aurora {
            0%   { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1;   transform: scale(1.05); }
        }

        /* grid lines */
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .hero-inner { position: relative; z-index: 2; }

        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(245,197,66,0.1);
            border: 1px solid rgba(245,197,66,0.3);
            color: var(--gold);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 28px;
            animation: fadeUp 0.5s ease both;
        }

        .hero h1 {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 10px;
            animation: fadeUp 0.6s ease 0.1s both;
        }

        .hero h1 .line1 { color: var(--text); display: block; }
        .hero h1 .line2 {
            display: block;
            background: linear-gradient(90deg, var(--gold), var(--red), var(--teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            font-size: 1.1rem;
            color: var(--muted);
            margin-top: 16px;
            animation: fadeUp 0.6s ease 0.2s both;
        }

        .scroll-hint {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--muted);
            animation: fadeUp 0.6s ease 0.4s both;
        }
        .scroll-hint i { animation: bounce 1.4s infinite; display: inline-block; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }

        /* ── Section title ── */
        .section-title {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
        }
        .section-title h2 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .section-title::after {
            content: '';
            display: block;
            width: 40px; height: 2px;
            background: var(--gold);
            margin: 12px auto 0;
        }

        /* ── Schools grid ── */
        .schools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .school-card {
            background: #12121a;
            border: 1px solid #222;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.25s, border-color 0.25s;
            animation: fadeUp 0.5s ease both;
        }
        .school-card:hover { transform: translateY(-4px); }

        .school-card:nth-child(1) { animation-delay: 0.1s; }
        .school-card:nth-child(2) { animation-delay: 0.2s; }

        .school-header {
            padding: 24px 24px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #1e1e2a;
        }

        .school-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .school-card:nth-child(1) .school-icon { background: linear-gradient(135deg, #3a86ff22, #3a86ff44); color: var(--blue); }
        .school-card:nth-child(2) .school-icon { background: linear-gradient(135deg, #2ec4b622, #2ec4b644); color: var(--teal); }

        .school-card:nth-child(1):hover { border-color: var(--blue); }
        .school-card:nth-child(2):hover { border-color: var(--teal); }

        .school-name {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .school-code {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
            margin-top: 3px;
        }

        .school-actions {
            padding: 18px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-action {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-family: 'Heebo', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-portfolio {
            background: rgba(245,197,66,0.08);
            border-color: rgba(245,197,66,0.2);
            color: var(--gold);
        }
        .btn-portfolio:hover {
            background: rgba(245,197,66,0.16);
            border-color: var(--gold);
            transform: translateX(-3px);
        }

        .btn-teacher {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.08);
            color: #aaa;
        }
        .btn-teacher:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            color: var(--text);
            transform: translateX(-3px);
        }

        .btn-action .btn-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .btn-portfolio .btn-icon { background: rgba(245,197,66,0.15); }
        .btn-teacher  .btn-icon { background: rgba(255,255,255,0.06); }

        .btn-action .btn-text { flex: 1; text-align: right; }
        .btn-action .btn-arrow { opacity: 0.4; font-size: 0.8rem; }

        /* ── Divider ── */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #2a2a3a, transparent);
            margin: 0 auto;
            max-width: 700px;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 30px 20px 40px;
            color: var(--muted);
            font-size: 0.82rem;
        }
        footer strong { color: #555; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .hero { padding: 40px 16px 36px; }
            .schools { padding: 0 14px 50px; }
        }
    </style>
</head>
<body>

<!-- Film strip -->

</div>

<footer>

</body>
</html>
