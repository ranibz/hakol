<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שיעור מס' 4 - נקודת מבט ומשמעותה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&family=Rubik:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a1628;
            --accent: #50c0cb;
            --accent-glow: rgba(80,192,203,0.25);
            --gold: #f0c040;
            --text: #e0e8f0;
            --text-dim: rgba(255,255,255,0.55);
            --card-bg: rgba(255,255,255,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(170deg, #0a1628 0%, #132744 40%, #1a3a5c 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.8;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .hero {
            position: relative;
            padding: 80px 20px 50px;
            text-align: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(80,192,203,0.1) 0%, transparent 65%);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(80,192,203,0.15);
            border: 1px solid rgba(80,192,203,0.3);
            border-radius: 30px;
            padding: 6px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .hero h1 {
            font-family: 'Rubik', 'Heebo', sans-serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent) 0%, #80deea 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .content {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        .video-section {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }

        .video-caption {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-dim);
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .video-caption .icon { font-size: 1.4rem; }

        .back-btn {
            display: block;
            width: fit-content;
            margin: 40px auto 0;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--accent), #3ba8b3);
            color: var(--bg-deep);
            text-decoration: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px var(--accent-glow);
        }

        @media (max-width: 600px) {
            .hero { padding: 50px 16px 30px; }
            .content { padding: 0 14px 60px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-badge">🎥 שפת הקולנוע</div>
        <h1>שיעור 4 — נקודת מבט ומשמעותה</h1>
        <p>כיצד בחירת נקודת המבט של המצלמה משפיעה על הסיפור, הדמויות והחוויה של הצופה</p>
    </div>

    <div class="content">

        <div class="video-section">
            <div class="video-wrapper">
                <iframe src="https://player.vimeo.com/video/446760825?fl=pl&fe=vl" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>
            </div>
            <div class="video-caption">
                <span class="icon">🎞️</span>
                <span>סרטון שיעור 4 — נקודת מבט ומשמעותה</span>
            </div>
        </div>

        <a href="film-landing.html" class="back-btn">🏠 חזרה לדף הראשי</a>

    </div>

</body>
</html>
