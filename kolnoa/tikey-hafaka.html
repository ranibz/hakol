<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תיקי הפקה דיגיטליים תשפ"ו</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background:#080810;
  color:#f0eeff;
  font-family:'Heebo',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* ── BACKGROUND ── */
.bg-layer {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 20% 40%, rgba(109,40,217,.28) 0%, transparent 55%),
    radial-gradient(ellipse 55% 55% at 80% 70%, rgba(6,182,212,.12) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 10%, rgba(245,158,11,.07) 0%, transparent 50%),
    #080810;
}

.grid {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(168,85,247,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,.04) 1px, transparent 1px);
  background-size:52px 52px;
}

/* rings */
.ring {
  position:fixed; border-radius:50%;
  border:1px solid rgba(168,85,247,.08);
  top:50%; left:50%;
  animation:spinRing linear infinite;
  z-index:0;
}
@keyframes spinRing { to { transform:translate(-50%,-50%) rotate(360deg); } }

/* ── CARD ── */
.card {
  position:relative; z-index:10;
  background:rgba(14,14,26,.85);
  backdrop-filter:blur(20px);
  border:1px solid rgba(168,85,247,.2);
  border-radius:28px;
  padding:60px 56px 52px;
  width:min(560px, calc(100vw - 40px));
  text-align:center;
  box-shadow:
    0 40px 80px rgba(0,0,0,.6),
    0 0 0 1px rgba(255,255,255,.04),
    inset 0 1px 0 rgba(255,255,255,.07);
  animation:fadeUp .9s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(40px); }
  to   { opacity:1; transform:none; }
}

/* top glow */
.card::before {
  content:'';
  position:absolute; top:-1px; left:50%;
  transform:translateX(-50%);
  width:200px; height:2px;
  background:linear-gradient(90deg, transparent, #a855f7, #22d3ee, transparent);
  border-radius:2px;
}

/* ── HEADER ── */
.year-chip {
  display:inline-flex; align-items:center; gap:7px;
  padding:5px 16px; border-radius:999px;
  background:rgba(168,85,247,.12);
  border:1px solid rgba(168,85,247,.3);
  font-size:12px; letter-spacing:3px; color:#c084fc; font-weight:600;
  margin-bottom:28px;
  animation:fadeUp .9s .1s ease both;
}
.year-chip .dot {
  width:6px; height:6px; border-radius:50%;
  background:#a855f7;
  animation:blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.main-icon {
  font-size:56px;
  margin-bottom:20px;
  display:block;
  animation:fadeUp .9s .15s ease both;
  filter:drop-shadow(0 0 20px rgba(168,85,247,.4));
}

h1 {
  font-family:'Frank Ruhl Libre',serif;
  font-size:clamp(28px,6vw,44px);
  font-weight:900;
  line-height:1.15;
  letter-spacing:-.5px;
  margin-bottom:10px;
  animation:fadeUp .9s .2s ease both;
}

.grad {
  background:linear-gradient(135deg,#c084fc 0%,#22d3ee 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

.subtitle {
  font-size:15px; color:#6b7280; font-weight:300;
  margin-bottom:44px;
  animation:fadeUp .9s .25s ease both;
}

/* ── BUTTONS ── */
.btn-group {
  display:flex; flex-direction:column; gap:14px;
  animation:fadeUp .9s .3s ease both;
}

.btn {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px 28px;
  border-radius:16px;
  text-decoration:none;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s;
  border:none;
  width:100%;
}

.btn:hover { transform:translateY(-4px); }

.btn::before {
  content:'';
  position:absolute; inset:0;
  opacity:0; transition:opacity .3s;
  background:rgba(255,255,255,.04);
}
.btn:hover::before { opacity:1; }

/* 3 יח"ל */
.btn-3 {
  background:linear-gradient(135deg,rgba(109,40,217,.35) 0%,rgba(109,40,217,.18) 100%);
  border:1px solid rgba(168,85,247,.45);
  box-shadow:0 8px 32px rgba(109,40,217,.2);
}
.btn-3:hover {
  box-shadow:0 16px 48px rgba(109,40,217,.35), 0 0 0 1px rgba(168,85,247,.6);
}

/* 5 יח"ל */
.btn-5 {
  background:linear-gradient(135deg,rgba(6,140,180,.3) 0%,rgba(6,100,140,.18) 100%);
  border:1px solid rgba(6,182,212,.4);
  box-shadow:0 8px 32px rgba(6,182,212,.15);
}
.btn-5:hover {
  box-shadow:0 16px 48px rgba(6,182,212,.28), 0 0 0 1px rgba(6,182,212,.55);
}

.btn-left {
  display:flex; align-items:center; gap:16px; text-align:right;
}

.btn-badge {
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Frank Ruhl Libre',serif;
  font-size:20px; font-weight:900;
  flex-shrink:0;
}

.btn-3 .btn-badge {
  background:rgba(168,85,247,.25);
  border:1px solid rgba(168,85,247,.4);
  color:#c084fc;
}
.btn-5 .btn-badge {
  background:rgba(6,182,212,.22);
  border:1px solid rgba(6,182,212,.4);
  color:#22d3ee;
}

.btn-text {}
.btn-title {
  font-size:17px; font-weight:700; color:#f0eeff;
  margin-bottom:3px;
}
.btn-sub {
  font-size:12.5px; color:#9ca3af; font-weight:300;
}

.btn-arrow {
  font-size:22px;
  transition:transform .3s;
  flex-shrink:0;
}
.btn-3 .btn-arrow { color:#c084fc; }
.btn-5 .btn-arrow { color:#22d3ee; }
.btn:hover .btn-arrow { transform:translateX(-6px); }

/* ── FOOTER NOTE ── */
.note {
  margin-top:36px;
  padding-top:28px;
  border-top:1px solid rgba(255,255,255,.06);
  font-size:12px; color:#4b5563; line-height:1.8;
  animation:fadeUp .9s .4s ease both;
}

.note strong { color:#6b7280; }

</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer"></div>
<div class="grid"></div>
<div class="ring" style="width:700px;height:700px;animation-duration:28s"></div>
<div class="ring" style="width:500px;height:500px;animation-duration:18s;animation-direction:reverse;border-color:rgba(6,182,212,.05)"></div>
<div class="ring" style="width:320px;height:320px;animation-duration:12s;border-color:rgba(245,158,11,.04)"></div>

<!-- Main card -->
<div class="card">

  <div class="year-chip">
    <span class="dot"></span>
    תשפ"ו
  </div>

  <span class="main-icon">🎬</span>

  <h1>תיקי הפקה<br><span class="grad">דיגיטליים</span></h1>
  <p class="subtitle">להפקות קולנוע — בחרו את רמת הלימוד שלכם</p>

  <div class="btn-group">

    <!-- 3 יח"ל -->
    <a href="https://drive.google.com/drive/folders/19VdqM53bDupID9-frXMR0YPsjIuXYgqZ?usp=sharing" class="btn btn-3" target="_blank">
      <div class="btn-left">
        <div class="btn-badge">3</div>
        <div class="btn-text">
          <div class="btn-title">שכפול תיק הפקה</div>
          <div class="btn-sub">רמה של 3 יחידות לימוד</div>
        </div>
      </div>
      <span class="btn-arrow">←</span>
    </a>

    <!-- 5 יח"ל -->
    <a href="https://drive.google.com/drive/folders/1tKQ1PCWIImkftfIju1clGZRh86Q7NmTq" class="btn btn-5" target="_blank">
      <div class="btn-left">
        <div class="btn-badge">5</div>
        <div class="btn-text">
          <div class="btn-title">שכפול תיק הפקה</div>
          <div class="btn-sub">רמה של 5 יחידות לימוד</div>
        </div>
      </div>
      <span class="btn-arrow">←</span>
    </a>

  </div>

  <div class="note">
    <strong>הוראות שימוש:</strong> לחצו על הכפתור המתאים לרמת הלימוד שלכם
    לשכפול תיק ההפקה הדיגיטלי לחשבון Google שלכם.
    <br>לאחר השכפול תוכלו להתחיל למלא את התיק.
  </div>

</div>

</body>
</html>
